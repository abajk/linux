%YAML 1.2
---
$id: http://devicetree.org/schemas/pinctrl/microchip,pic32-pinctrl.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Microchip PIC32 Pin Controller

maintainers:
  - Geert Uytterhoeven <geert+renesas@glider.be>
  - Joshua Henderson <joshua.henderson@microchip.com>
  - Purna Chandra Mandal <purna.mandal@microchip.com>

description: |
  * Microchip PIC32 Pin Controller

  Please refer to pinctrl-bindings.txt, ../gpio/gpio.txt, and
  ../interrupt-controller/interrupts.txt for generic information regarding
  pin controller, GPIO, and interrupt bindings.

  PIC32 'pin configuration node' is a node of a group of pins which can be
  used for a specific device or function. This node represents configurations of
  pins, optional function, and optional mux related configuration.

properties:
  compatible:
    items:
      - enum: [microchip, pic32mada-pinctrl]
      - enum: [microchip, pic32mzda-pinctrl]
  reg:
    maxItems: 1

  clocks:
    maxItems: 1

  '#address-cells':
    const: 1

  '#size-cells':
    const: 1


required:
  - compatible
  - reg
  - clocks

definitions:
  pin-config:
    type: object
    description: Pin configuration sub-node
    properties:
      pins:
        $ref: /schemas/types.yaml#/definitions/string-array
        description: List of pins to which the configuration applies.
      function:
        $ref: /schemas/types.yaml#/definitions/string
        description: Mux function for the specified pins.
      bias-pull-up:
        type: boolean
        description: Enable weak pull-up.
      bias-pull-down:
        type: boolean
        description: Enable weak pull-down.
      input-enable:
        type: boolean
        description: Set the pin as an input.
      output-low:
        type: boolean
        description: Set the pin as an output level low.
      output-high:
        type: boolean
        description: Set the pin as an output level high.
      microchip,digital:
        type: boolean
        description: Enable digital I/O.
      microchip,analog:
        type: boolean
        description: Enable analog I/O.
    required:
      - pins
    additionalProperties: false

additionalProperties:
  $ref: '#/definitions/pin-config'

examples:
  - |
    pic32_pinctrl: pinctrl@1f801400 {
        #address-cells = <1>;
        #size-cells = <1>;
        compatible = "microchip,pic32mzda-pinctrl";
        reg = <0x1f801400 0x400>;
        clocks = <&rootclk PB1CLK>;

        pinctrl_uart2: pinctrl_uart2 {
            uart2-tx {
                pins = "G9";
                function = "U2TX";
                microchip,digital;
                output-low;
            };
            uart2-rx {
                pins = "B0";
                function = "U2RX";
                microchip,digital;
                input-enable;
            };
        };
    };

    uart2: serial@1f822200 {
        compatible = "microchip,pic32mzda-uart";
        reg = <0x1f822200 0x50>;
        pinctrl-names = "default";
        pinctrl-0 = <&pinctrl_uart2>;
    };
