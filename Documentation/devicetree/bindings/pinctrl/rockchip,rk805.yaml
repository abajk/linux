%YAML 1.2
---
$id: http://devicetree.org/schemas/pinctrl/rockchip,rk805.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Rockchip RK805 Pin Controller

maintainers:
  - Bjorn Helgaas <bhelgaas@google.com>
  - Joseph Chen <chenjh@rock-chips.com>
  - Mauro Carvalho Chehab <mchehab@kernel.org>
  - Mauro Carvalho Chehab <mchehab+samsung@kernel.org>

description: |
  Pincontrol driver for RK805 Power management IC.

  RK805 has 2 pins which can be configured as GPIO output only.

  Please refer file <devicetree/bindings/pinctrl/pinctrl-bindings.txt>
  for details of the common pinctrl bindings used by client devices,
  including the meaning of the phrase "pin configuration node".

properties:
  compatible:
    items:
      - const: rockchip,rk805

  '#gpio-cells':
    const: 2
    description: The first cell is the pin number and the second is the GPIO flags.

  gpio-controller:
    description: Marks this node as a GPIO controller.
    type: boolean

  pinctrl-names:
    $ref: /schemas/types.yaml#/definitions/string-array
    description: List of pinctrl states.

  pinctrl-0:
    $ref: /schemas/types.yaml#/definitions/phandle-array
    description: Phandle list for the default pinctrl state.

patternProperties:
  '^.+$':
    description: Pin configuration sub-node.
    type: object
    properties:
      pins:
        $ref: /schemas/types.yaml#/definitions/string-array
        description: List of pins to configure. Valid values are "gpio0" or "gpio1".
        items:
          - enum: [gpio0]
          - enum: [gpio1]
      function:
        $ref: /schemas/types.yaml#/definitions/string
        description: Pin function. Must be "gpio".
        enum: [gpio]
      output-low:
        type: boolean
        description: Drive the pin low.
      output-high:
        type: boolean
        description: Drive the pin high.
    required:
      - pins
      - function
    additionalProperties: false

required:
  - compatible
  - gpio-controller
  - '#gpio-cells'

additionalProperties: false

examples:
  - |
    rk805: rk805@18 {
        compatible = "rockchip,rk805";
        gpio-controller;
        #gpio-cells = <2>;

        pinctrl-names = "default";
        pinctrl-0 = <&pmic_int_l>, <&rk805_default>;

        rk805_default: pinmux {
            gpio01 {
                pins = "gpio0", "gpio1";
                function = "gpio";
                output-high;
            };
        };
    };
