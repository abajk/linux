---
$schema: http://devicetree.org/meta-schemas/core.yaml#
$id: http://devicetree.org/schemas/pinctrl/brcm,nsp-gpio-a.yaml#

title: Broadcom Northstar plus (NSP) GPIO/PINCONF Controller

maintainers:
  - Yendapally Reddy Dhananjaya Reddy <yrdreddy@broadcom.com>

description: |
  Broadcom Northstar plus (NSP) GPIO/PINCONF Controller

  Required properties:
    - compatible: Must be "brcm,nsp-gpio-a"
    - reg: Register physical address and length for GPIO base and IO control registers
    - #gpio-cells: Must be two
    - gpio-controller: Specifies that the node is a GPIO controller
    - ngpios: Number of GPIOs supported (58x25 supports 32 and 58x23 supports 24)

  Optional properties:
    - interrupts: Interrupt ID(s)
    - interrupt-controller: Specifies that the node is an interrupt controller
    - gpio-ranges: Mapping between GPIO controller and pin-controller pins

properties:
  compatible:
    items:
      - const: brcm,nsp-gpio-a

  reg:
    description: Register physical address and length for GPIO base and IO control registers
    items:
      - description: GPIO base registers
      - description: IO control registers

  "#gpio-cells":
    const: 2

  gpio-controller: true

  ngpios:
    $ref: /schemas/types.yaml#/definitions/uint32
    description: Number of GPIOs supported (e.g., 32 for NSP-58x25, 24 for NSP-58x23)

  gpio-ranges:
    description: Mapping between GPIO controller and pin-controller pins
    items:
      - description: Phandle of pin-controller
      - description: GPIO base pin offset
      - description: Pin-control base pin offset
      - description: Number of GPIO pins mapped

  interrupt-controller: true

  interrupts:
    description: Interrupt ID(s)
    items:
      - description: Interrupt specifier

# Generic PINCONF child nodes for pin settings
definitions:
  child-nodes:
    description: Child nodes for pin configuration
    type: object
    additionalProperties: false
    properties:
      pins:
        $ref: /schemas/types.yaml#/definitions/string-array
        description: List of pins this setting applies to
      bias-disable: true
      bias-pull-up: true
      bias-pull-down: true
      drive-strength:
        $ref: /schemas/types.yaml#/definitions/uint32
        enum: [2, 4, 6, 8, 10, 12, 14, 16]
    required: [pins]

dependencies:
  gpio-controller: [ '#gpio-cells' ]
additionalProperties: false

examples:
  - |
    gpioa: gpio@18000020 {
        compatible = "brcm,nsp-gpio-a";
        reg = <0x18000020 0x100>,
              <0x1803f1c4 0x1c>;
        #gpio-cells = <2>;
        gpio-controller;
        ngpios = <32>;
        gpio-ranges = <&pinctrl 0 0 31>;
        interrupt-controller;
        interrupts = <GIC_SPI 85 IRQ_TYPE_LEVEL_HIGH>;

        /* Hog a few default settings */
        pinctrl-names = "default";
        pinctrl-0 = <&led>;
        led: led {
            pins = "gpio-1";
            bias-pull-up;
        };

        pwr: pwr {
            gpio-hog;
            gpios = <3 1>;
            output-high;
        };
    };
