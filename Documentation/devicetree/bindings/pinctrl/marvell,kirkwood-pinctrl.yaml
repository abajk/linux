%YAML 1.2
---
$id: http://devicetree.org/schemas/pinctrl/marvell,kirkwood-pinctrl.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Marvell Kirkwood SoC pinctrl driver for mpp

maintainers:
  - Andreas Klinger <ak@it-klinger.de>
  - Chris Packham <chris.packham@alliedtelesis.co.nz>
  - Sebastian Hesselbarth <sebastian.hesselbarth@gmail.com>
  - Valentin Longchamp <valentin.longchamp@keymile.com>

description: |
  Marvell Kirkwood SoC pinctrl driver for mpp

  Please refer to marvell,mvebu-pinctrl.txt in this directory for common binding
  part and usage.

  This driver supports all kirkwood variants, i.e. 88f6180, 88f619x, and 88f628x.
  It also supports the 88f6281-based variant in the 98dx412x Bobcat SoCs.

properties:
  compatible:
    description: List of compatible strings for Kirkwood pinctrl driver.
    items:
      - enum:
          - "marvell,88f6180-pinctrl"
          - "marvell,88f6190-pinctrl"
          - "marvell,88f6192-pinctrl"
          - "marvell,88f6281-pinctrl"
          - "marvell,88f6282-pinctrl"
          - "marvell,98dx4122-pinctrl"
          - "marvell,98dx1135-pinctrl"
  reg:
    description: Register specifier of MPP registers.
    items:
      - description: Register base address.
      - description: Register block size.

required:
  - compatible
  - reg

additionalProperties: false

examples:
  - |
    pinctrl@1000 {
      compatible = "marvell,88f6281-pinctrl";
      reg = <0x1000 0x1000>;
    };
