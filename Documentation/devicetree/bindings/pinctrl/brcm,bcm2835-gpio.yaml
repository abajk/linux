%YAML 1.2
---
$id: http://devicetree.org/schemas/pinctrl/brcm,bcm2835-gpio.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Broadcom BCM2835 GPIO (and pinmux) controller
maintainers:
  - Florian Fainelli <f.fainelli@gmail.com>
  - Masanari Iida <standby24x7@gmail.com>
  - Matheus Castello <matheus@castello.eng.br>
  - Simon Arlott <simon@octiron.net>
  - Stefan Wahren <wahrenst@gmx.net>
description: |
  Broadcom BCM2835 GPIO (and pinmux) controller

  The BCM2835 GPIO module is a combined GPIO controller, (GPIO) interrupt
  controller, and pinmux/control device.

  The BCM2835 pin configuration and multiplexing supports the generic bindings.
  For details on each property, refer to pinctrl-bindings.txt in this directory.

properties:
  compatible:
    description: >
      Valid compatible strings for this GPIO controller.
    items:
      - const: brcm,bcm2835-gpio
      - const: brcm,bcm2711-gpio
      - const: brcm,bcm7211-gpio

  reg:
    maxItems: 1

  gpio-controller: true

  '#gpio-cells':
    description: >
      GPIO specifier: pin number and optional polarity flags.
    const: 2

  interrupts:
    description: >
      Interrupt outputs: one per bank, then the combined “all banks” line.
      BCM7211 may specify up to four per-bank wake-up lines and one combined
      wake-up interrupt.
    items:
      description: >
        Interrupt specifier: GPIO number and trigger-type flags.
    minItems: 5
    maxItems: 10

  interrupt-controller: true

  '#interrupt-cells':
    const: 2

  pins:
    $ref: /schemas/pinctrl-bindings.yaml#/definitions/pins

  function:
    $ref: /schemas/pinctrl-bindings.yaml#/definitions/function

  bias-disable:
    $ref: /schemas/pinctrl-bindings.yaml#/definitions/bias-disable

  bias-pull-up:
    $ref: /schemas/pinctrl-bindings.yaml#/definitions/bias-pull-up

  bias-pull-down:
    $ref: /schemas/pinctrl-bindings.yaml#/definitions/bias-pull-down

  output-high:
    $ref: /schemas/pinctrl-bindings.yaml#/definitions/output-high

  output-low:
    $ref: /schemas/pinctrl-bindings.yaml#/definitions/output-low

  brcm,pins:
    description: >
      GPIO pin numbers for legacy configuration (deprecated).
    $ref: /schemas/types.yaml#/definitions/uint32-array

  brcm,function:
    description: >
      Legacy mux function for the pins (0=input, 1=output, 2–7=alt functions).
    $ref: /schemas/types.yaml#/definitions/uint32-array

  brcm,pull:
    description: >
      Legacy pull setting for the pins (0=none, 1=pull-down, 2=pull-up).
    $ref: /schemas/types.yaml#/definitions/uint32-array

additionalProperties: false

examples:
  - |
    gpio: gpio {
      compatible = "brcm,bcm2835-gpio";
      reg = <0x2200000 0xb4>;
      interrupts = <2 17>, <2 19>, <2 18>, <2 20>, <2 21>;
      gpio-controller;
      #gpio-cells = <2>;
      interrupt-controller;
      #interrupt-cells = <2>;
    };
