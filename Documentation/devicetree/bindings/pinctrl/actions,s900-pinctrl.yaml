%YAML 1.2
---
$id: http://devicetree.org/schemas/pinctrl/actions,s900-pinctrl.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Actions Semi S900 Pin Controller
maintainers:
  - Manivannan Sadhasivam <manivannan.sadhasivam@linaro.org>

description: |
  This binding describes the pin controller found in the S900 SoC.

  Please refer to pinctrl-bindings.txt in this directory for details of the
  common pinctrl bindings used by client devices, including the meaning of the
  phrase "pin configuration node".

  The pin configuration nodes act as a container for an arbitrary number of
  subnodes. Each of these subnodes represents some desired configuration for a
  pin, a group, or a list of pins or groups. This configuration can include the
  mux function to select on those group(s), and various pin configuration
  parameters, such as pull-up, drive strength, etc.

  PIN CONFIGURATION NODES:

  The name of each subnode is not important; all subnodes should be enumerated
  and processed purely based on their content.

  Each subnode only affects those parameters that are explicitly listed. In
  other words, a subnode that lists a mux function but no pin configuration
  parameters implies no information about any pin configuration parameters.
  Similarly, a pin subnode that describes a pullup parameter implies no
  information about e.g. the mux function.

  Pinmux functions are available only for the pin groups while pinconf
  parameters are available for both pin groups and individual pins.

properties:
  compatible:
    items:
      - const: actions,s900-pinctrl

  reg:
    items:
      - description: Address (high 32 bits)
      - description: Address (low 32 bits)
      - description: Size (high 32 bits)
      - description: Size (low 32 bits)

  interrupts:
    minItems: 1
    description: The interrupt outputs from the controller. There is one GPIO
      interrupt per GPIO bank. The number of interrupts listed depends on the
      number of GPIO banks on the SoC. The interrupts must be ordered by bank,
      starting with bank 0.
    items:
      description: Interrupt specifier (interrupt number and flags)

  interrupt-controller: true

  "#interrupt-cells":
    const: 2

  clocks:
    maxItems: 1
    description: phandle of the clock feeding the pin controller

  gpio-controller: true

  gpio-ranges:
    description: Specifies the mapping between the gpio controller and pin
      controller pins.
    items:
      - description: phandle to pin controller node
      - description: Pin-controller pin offset
      - description: GPIO controller pin number
      - description: Number of pins

  "#gpio-cells":
    const: 2

required:
  - compatible
  - reg
  - interrupts
  - interrupt-controller
  - "#interrupt-cells"
  - clocks
  - gpio-controller
  - gpio-ranges
  - "#gpio-cells"

additionalProperties: false

patternProperties:
  "^.+$":
    type: object
    description: Pin configuration subnode
    additionalProperties: false
    properties:
      pinmux:
        type: object
        description: Pin mux configuration
        additionalProperties: false
        required:
          - groups
          - function
        properties:
          groups:
            $ref: /schemas/types.yaml#/definitions/string-array
            description: An array of pin groups used for selecting pinmux functions.
            items:
              description: Pin group name
          function:
            $ref: /schemas/types.yaml#/definitions/string-array
            description: An array of pinmux functions to select.
            items:
              description: Pinmux function name
      pinconf:
        type: object
        description: Pin configuration parameters
        additionalProperties: false
        required:
          - groups
        properties:
          groups:
            $ref: /schemas/types.yaml#/definitions/string-array
            description: An array of pin groups or pins these settings apply to.
            items:
              description: Pin group or pin name
          bias-bus-hold:
            type: boolean
            description: No arguments. The specified pins should retain the previous state value.
          bias-high-impedance:
            type: boolean
            description: No arguments. The specified pins should be configured as high impedance.
          bias-pull-down:
            type: boolean
            description: No arguments. The specified pins should be configured as pull down.
          bias-pull-up:
            type: boolean
            description: No arguments. The specified pins should be configured as pull up.
          input-schmitt-enable:
            type: boolean
            description: "No arguments: Enable schmitt trigger for the specified pins"
          input-schmitt-disable:
            type: boolean
            description: "No arguments: Disable schmitt trigger for the specified pins"
          slew-rate:
            $ref: /schemas/types.yaml#/definitions/uint32
            description: Integer. Sets slew rate for the specified pins.
          drive-strength:
            $ref: /schemas/types.yaml#/definitions/uint32
            description: Integer. Selects the drive strength for the specified pins in mA.

examples:
  - |
    pinctrl: pinctrl@e01b0000 {
        compatible = "actions,s900-pinctrl";
        reg = <0x0 0xe01b0000 0x0 0x1000>;
        clocks = <&cmu CLK_GPIO>;
        gpio-controller;
        gpio-ranges = <&pinctrl 0 0 146>;
        #gpio-cells = <2>;
        interrupt-controller;
        #interrupt-cells = <2>;
        interrupts = <GIC_SPI 36 IRQ_TYPE_LEVEL_HIGH>,
                     <GIC_SPI 37 IRQ_TYPE_LEVEL_HIGH>,
                     <GIC_SPI 38 IRQ_TYPE_LEVEL_HIGH>,
                     <GIC_SPI 39 IRQ_TYPE_LEVEL_HIGH>,
                     <GIC_SPI 40 IRQ_TYPE_LEVEL_HIGH>,
                     <GIC_SPI 16 IRQ_TYPE_LEVEL_HIGH>;

        uart2-default: uart2-default {
                pinmux {
                        groups = "lvds_oep_odn_mfp";
                        function = "uart2";
                };
                pinconf {
                        groups = "lvds_oep_odn_drv";
                        drive-strength = <12>;
                };
        };
    };
