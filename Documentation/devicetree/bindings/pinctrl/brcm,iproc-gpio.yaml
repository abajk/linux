%YAML 1.2
---
$id: http://devicetree.org/schemas/pinctrl/brcm,iproc-gpio.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Broadcom iProc GPIO/PINCONF Controller
maintainers:
  - Pramod Kumar <pramodku@broadcom.com>
  - Ray Jui <ray.jui@broadcom.com>

description: |
  Broadcom iProc GPIO/PINCONF Controller

properties:
  compatible:
    description: |
      "brcm,iproc-gpio" for the generic iProc based GPIO controller IP that
      supports full-featured pinctrl and GPIO functions used in various iProc
      based SoCs.
      May contain an SoC-specific compatibility string to accommodate any SoC-
      specific features:
      "brcm,cygnus-ccm-gpio", "brcm,cygnus-asiu-gpio", or
      "brcm,cygnus-crmu-gpio" for Cygnus SoCs.
      "brcm,iproc-nsp-gpio" for the iProc NSP SoC that has drive strength
      support disabled.
      "brcm,iproc-stingray-gpio" for the iProc Stingray SoC that has the
      general pinctrl support completely disabled in this IP block. In
      Stingray, a different IP block is used to handle pinctrl related
      functions.
    items:
      - enum:
          - brcm,iproc-gpio
          - brcm,cygnus-ccm-gpio
          - brcm,cygnus-asiu-gpio
          - brcm,cygnus-crmu-gpio
          - brcm,iproc-nsp-gpio
          - brcm,iproc-stingray-gpio

  reg:
    maxItems: 1

  ngpios:
    description: Total number of in-use slots in GPIO controller.

  "#gpio-cells":
    description: |
      Must be two. The first cell is the GPIO pin number (within the
      controller's pin space) and the second cell is used for the following:
      bit[0]: polarity (0 for active high and 1 for active low).
    const: 2

  gpio-controller: true

  interrupts:
    maxItems: 1

  interrupt-controller: true

  gpio-ranges:
    description: |
      Specifies the mapping between GPIO controller and pin-controller
      pins. Each entry is a phandle-array cell list of four integers:
        1. Phandle of pin-controller.
        2. GPIO base pin offset.
        3. Pin-control base pin offset.
        4. Number of GPIO pins which are linearly mapped from pin base.
    $ref: /schemas/types.yaml#/definitions/phandle-array

required:
  - compatible
  - reg
  - ngpios
  - "#gpio-cells"
  - gpio-controller

additionalProperties: false

patternProperties:
  ".*":
    description: Pin configuration child node.
    type: object
    additionalProperties: false
    properties:
      pins:
        description: The list of pins (within the controller's own pin space)
          that properties in the node apply to. Pin names are "gpio-<pin>".
        $ref: /schemas/types.yaml#/definitions/string-array
      bias-disable:
        description: Disable pin bias.
        type: boolean
      bias-pull-up:
        description: Enable internal pull-up resistor.
        type: boolean
      bias-pull-down:
        description: Enable internal pull-down resistor.
        type: boolean
      drive-strength:
        description: Valid drive strength values include 2, 4, 6, 8, 10, 12,
          14, 16 (mA).
        $ref: /schemas/types.yaml#/definitions/uint32
    required:
      - pins

examples:
  - |
    gpio_ccm: gpio@1800a000 {
        compatible = "brcm,cygnus-ccm-gpio";
        reg = <0x1800a000 0x50>,
              <0x0301d164 0x20>;
        ngpios = <24>;
        #gpio-cells = <2>;
        gpio-controller;
        interrupts = <GIC_SPI 84 IRQ_TYPE_LEVEL_HIGH>;
        interrupt-controller;

        touch_pins: touch_pins {
            pwr: pwr {
                pins = "gpio-0";
                drive-strength = <16>;
            };

            event: event {
                pins = "gpio-1";
                bias-pull-up;
            };
        };
    };

    gpio_asiu: gpio@180a5000 {
        compatible = "brcm,cygnus-asiu-gpio";
        reg = <0x180a5000 0x668>;
        ngpios = <146>;
        #gpio-cells = <2>;
        gpio-controller;
        interrupts = <GIC_SPI 174 IRQ_TYPE_LEVEL_HIGH>;
        interrupt-controller;
        gpio-ranges = <&pinctrl 0 42 1>,
                      <&pinctrl 1 44 3>;
    };
