%YAML 1.2
---
$id: http://devicetree.org/schemas/soc/fsl/cpm_qe/cpm/fsl,cpm1-i2c.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Freescale CPM I2C controller
maintainers:
  - Zhao Qiang <qiang.zhao@nxp.com>

description: |
  The I2C controller is expressed as a bus under the CPM node.

  Properties:
  - compatible: "fsl,cpm1-i2c", "fsl,cpm2-i2c"
  - reg: Base region and CPM parameter RAM region on CPM2 devices
  - #address-cells: One address cell, representing I2C device address with the r/w bit cleared
  - #size-cells: Zero size cells
  - clock-frequency: I2C bus clock frequency in Hz (default 60000)
  - linux,i2c-index: Hard-coded I2C bus number (deprecated)
  - linux,i2c-class: I2C legacy device class number (deprecated)
  - fsl,cpm-command: CPM command register offset

properties:
  compatible:
    oneOf:
      - items:
          - enum:
              - "fsl,cpm1-i2c"
              - "fsl,cpm2-i2c"
  reg:
    items:
      - description: Base address and size
      - description: CPM parameter RAM on CPM2
  '#address-cells':
    const: 1
    description: Address cell count for child I2C devices
  '#size-cells':
    const: 0
    description: Size cell count for child I2C devices
  clock-frequency:
    description: I2C bus clock frequency in Hz
    default: 60000
  interrupts:
    items:
      - description: I2C interrupt
  linux,i2c-index:
    description: Hard-coded I2C bus number
  linux,i2c-class:
    description: I2C legacy device class number
  fsl,cpm-command:
    description: CPM command register offset
    $ref: /schemas/types.yaml#/definitions/uint32

additionalProperties: false

examples:
  - |
    i2c@860 {
        compatible = "fsl,cpm1-i2c", "fsl,cpm2-i2c";
        reg = <0x860 0x20 0x3c80 0x30>;
        interrupts = <16>;
        fsl,cpm-command = <0x10>;
        #address-cells = <1>;
        #size-cells = <0>;
    };
