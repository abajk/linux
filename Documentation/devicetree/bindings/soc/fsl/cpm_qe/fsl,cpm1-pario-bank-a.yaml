%YAML 1.2
---
$id: http://devicetree.org/schemas/soc/fsl/cpm_qe/fsl,cpm1-pario-bank-a.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Freescale CPM QE GPIO Controller Banks
maintainers:
  - Christophe Leroy <christophe.leroy@c-s.fr>
  - Rob Herring <robh@kernel.org>
  - Zhao Qiang <qiang.zhao@nxp.com>

description: |
  Every GPIO controller node must have #gpio-cells property defined,
  this information will be used to translate gpio-specifiers.

  On CPM1 devices, all ports are using slightly different register layouts.
  Ports A, C and D are 16bit ports and Ports B and E are 32bit ports.

  On CPM2 devices, all ports are 32bit ports and use a common register layout.

properties:
  compatible:
    description: Must be one of the supported compatible strings.
    enum:
      - fsl,cpm1-pario-bank-a
      - fsl,cpm1-pario-bank-b
      - fsl,cpm1-pario-bank-c
      - fsl,cpm1-pario-bank-d
      - fsl,cpm1-pario-bank-e
      - fsl,cpm2-pario-bank

  '#gpio-cells':
    description: >
      Should be two. The first cell is the pin number and the
      second cell is used to specify optional parameters (currently unused).
    const: 2

  gpio-controller: true

  reg:
    items:
      - description: Register base address.
      - description: Register size.

  fsl,cpm1-gpio-irq-mask:
    description: >
      For banks having interrupt capability (like port C on CPM1), this item
      tells which ports have an associated interrupt (ports are listed in the
      same order as in the PCINT register).
    $ref: /schemas/types.yaml#/definitions/uint32-array
    items:
      - description: Mask of GPIO interrupt lines.

  interrupts:
    description: >
      This property provides the list of interrupts for each GPIO having one
      as described by the fsl,cpm1-gpio-irq-mask property. The first interrupt
      in the list corresponds to the most significant bit of the mask.
    items:
      - description: GPIO interrupt specifier.

required:
  - compatible
  - '#gpio-cells'
  - gpio-controller

additionalProperties: false

examples:
  - |
    CPM1_PIO_A: gpio-controller@950 {
      #gpio-cells = <2>;
      compatible = "fsl,cpm1-pario-bank-a";
      reg = <0x950 0x10>;
      gpio-controller;
    };

    CPM1_PIO_B: gpio-controller@ab8 {
      #gpio-cells = <2>;
      compatible = "fsl,cpm1-pario-bank-b";
      reg = <0xab8 0x10>;
      gpio-controller;
    };

    CPM1_PIO_C: gpio-controller@960 {
      #gpio-cells = <2>;
      compatible = "fsl,cpm1-pario-bank-c";
      reg = <0x960 0x10>;
      fsl,cpm1-gpio-irq-mask = <0x0fff>;
      interrupts = <1 2 6 9 10 11 14 15 23 24 26 31>;
      gpio-controller;
    };

    CPM1_PIO_E: gpio-controller@ac8 {
      #gpio-cells = <2>;
      compatible = "fsl,cpm1-pario-bank-e";
      reg = <0xac8 0x18>;
      gpio-controller;
    };
