%YAML 1.2
---
$id: http://devicetree.org/schemas/soc/fsl/cpm_qe/fsl,cpm1.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Freescale Communications Processor Module
maintainers:
  - Zhao Qiang <qiang.zhao@nxp.com>

description: |
  * Freescale Communications Processor Module

  NOTE: This is an interim binding, and will likely change slightly,
  as more devices are supported.  The QE bindings especially are
  incomplete.

  * Root CPM node

  * Multi-User RAM (MURAM)

  The multi-user/dual-ported RAM is expressed as a bus under the CPM node.

  Ranges must be set up subject to the following restrictions:

  - Children's reg nodes must be offsets from the start of all muram, even
    if the user-data area does not begin at zero.
  - If multiple range entries are used, the difference between the parent
    address and the child address must be the same in all, so that a single
    mapping can cover them all while maintaining the ability to determine
    CPM-side offsets with pointer subtraction.  It is recommended that
    multiple range entries not be used.
  - A child address of zero must be translatable, even if no reg resources
    contain it.

  A child "data" node must exist, compatible with "fsl,cpm-muram-data", to
  indicate the portion of muram that is usable by the OS for arbitrary
  purposes.  The data node may have an arbitrary number of reg resources,
  all of which contribute to the allocatable muram pool.

properties:
  compatible:
    description: Device compatibility.
    oneOf:
      - items:
          - enum:
              - fsl,mpc8272-cpm
          - const: fsl,cpm2
      - items:
          - const: fsl,cpm1
      - items:
          - const: fsl,cpm2
      - items:
          - const: fsl,qe

  reg:
    maxItems: 1

  fsl,cpm-command:
    description: |
      ORed with the opcode and command flag to specify the device on which a
      CPM command operates.
    $ref: /schemas/types.yaml#/definitions/uint32

  fsl,cpm-brg:
    description: |
      Indicates which baud rate generator the device is associated with. If
      absent, an unused BRG should be dynamically allocated. If zero, the
      device uses an external clock rather than a BRG.
    $ref: /schemas/types.yaml#/definitions/uint32

patternProperties:
  "^muram@.*$":
    description: Multi-user RAM bus under the CPM node.
    type: object
    additionalProperties: false
    properties:
      ranges: true

    required: [ranges]
    patternProperties:
      "^data@.*$":
        description: Portion of MURAM usable by the OS.
        type: object
        additionalProperties: false
        properties:
          compatible:
            enum: ["fsl,cpm-muram-data"]
          reg:
            maxItems: 1

        required: [compatible, reg]

additionalProperties: false

examples:
  - |
    cpm@119c0 {
        #address-cells = <1>;
        #size-cells = <1>;
        #interrupt-cells = <2>;
        compatible = "fsl,mpc8272-cpm", "fsl,cpm2";
        reg = <0x119c0 0x30>;
    };
  - |
    muram@0 {
        #address-cells = <1>;
        #size-cells = <1>;
        ranges = <0 0 10000>;

        data@0 {
            compatible = "fsl,cpm-muram-data";
            reg = <0 2000 9800 800>;
        };
    };
