%YAML 1.2
---
$id: http://devicetree.org/schemas/display/pervasive,e1144cs021.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Pervasive Displays RePaper e-ink display

maintainers:
  - Noralf Trønnes <noralf@tronnes.org>

description: |
  Pervasive Displays RePaper branded e-ink displays

  The node for this driver must be a child node of a SPI controller, hence
  all mandatory properties described in ../spi/spi-bus.txt must be specified.

properties:
  compatible:
    description: Supported RePaper display panels
    enum:
      - pervasive,e1144cs021
      - pervasive,e1190cs021
      - pervasive,e2200cs021
      - pervasive,e2271cs021

  reg:
    description: SPI chip select
    maxItems: 1

  spi-max-frequency:
    description: Maximum SPI bus frequency
    $ref: /schemas/types.yaml#/definitions/uint32

  panel-on-gpios:
    description: Timing controller power control
    maxItems: 1

  discharge-gpios:
    description: Discharge control
    maxItems: 1

  reset-gpios:
    description: RESET pin
    maxItems: 1

  busy-gpios:
    description: BUSY pin
    maxItems: 1

  border-gpios:
    description: Border control
    maxItems: 1

  pervasive,thermal-zone:
    description: Name of thermometer's thermal zone
    $ref: /schemas/types.yaml#/definitions/string

required:
  - compatible
  - reg
  - spi-max-frequency
  - panel-on-gpios
  - discharge-gpios
  - reset-gpios
  - busy-gpios

allOf:
  - if:
      properties:
        compatible:
          contains:
            const: pervasive,e2271cs021
    then:
      required:
        - border-gpios
    else:
      properties:
        border-gpios: false

additionalProperties: false

examples:
  - |
    papirus27@0 {
        compatible = "pervasive,e2271cs021";
        reg = <0>;
        spi-max-frequency = <8000000>;
        panel-on-gpios = <&gpio 23 0>;
        border-gpios = <&gpio 14 0>;
        discharge-gpios = <&gpio 15 0>;
        reset-gpios = <&gpio 24 0>;
        busy-gpios = <&gpio 25 0>;
        pervasive,thermal-zone = "display";
    };
