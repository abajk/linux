%YAML 1.2
---
$id: http://devicetree.org/schemas/display/ilitek,ili9225.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Ilitek ILI9225 display panels

maintainers:
  - David Lechner <david@lechnology.com>

description: |
  Ilitek ILI9225 display panels

  This binding is for display panels using an Ilitek ILI9225 controller in SPI mode.

  The node for this driver must be a child node of a SPI controller, hence
  all mandatory properties described in ../spi/spi-bus.txt must be specified.

properties:
  compatible:
    description: Must be one of the compatible strings for this display
    items:
      - enum: ["vot,v220hf01a-t"]
      - enum: ["ilitek,ili9225"]

  reg:
    description: Chip select number for the SPI device
    items:
      - description: Chip select

  spi-max-frequency:
    $ref: /schemas/types.yaml#/definitions/uint32
    description: Maximum SPI bus frequency in Hertz

  rs-gpios:
    maxItems: 1
    description: Register select GPIO line

  reset-gpios:
    maxItems: 1
    description: Reset GPIO line

  rotation:
    $ref: /schemas/types.yaml#/definitions/uint32
    description: Panel rotation in degrees counter clockwise
    enum: [0, 90, 180, 270]

required:
  - compatible
  - rs-gpios
  - reset-gpios

additionalProperties: false

examples:
  - |
    display@0 {
        compatible = "vot,v220hf01a-t", "ilitek,ili9225";
        reg = <0>;
        spi-max-frequency = <12000000>;
        rs-gpios = <&gpio0 9 GPIO_ACTIVE_HIGH>;
        reset-gpios = <&gpio0 8 GPIO_ACTIVE_HIGH>;
        rotation = <270>;
    };
