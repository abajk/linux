%YAML 1.2
---
$id: http://devicetree.org/schemas/display/ti/ti,dra7-dss.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Texas Instruments DRA7x Display Subsystem

maintainers:
  - Peter Ujfalusi <peter.ujfalusi@ti.com>

description: |
  See Documentation/devicetree/bindings/display/ti/ti,omap-dss.txt for generic
  description about OMAP Display Subsystem bindings.

  DSS Core
  --------

properties:
  compatible:
    const: ti,dra7-dss

  reg:
    maxItems: 1

  ti,hwmods:
    items:
      - const: dss_core
    description: Hardware module for DSS core

  clocks:
    maxItems: 3
    description: Handles to fclk and optional video PLL clocks

  clock-names:
    items:
      - const: fck
      - const: video1_clk
      - const: video2_clk
    description: Clock names for fclk and video PLLs

  syscon:
    $ref: /schemas/types.yaml#/definitions/phandle
    description: Phandle to control module core syscon node

  # ----------------------------------------
  # Child nodes
  # ----------------------------------------

  dispc:
    type: object
    description: DISPC node
    required:
      - compatible
      - reg
      - ti,hwmods
      - interrupts
      - clocks
      - clock-names
    properties:
      compatible:
        const: ti,dra7-dispc
      reg:
        maxItems: 1
      ti,hwmods:
        items:
          - const: dss_dispc
        description: Hardware module for DISPC
      interrupts:
        maxItems: 1
      clocks:
        maxItems: 1
      clock-names:
        items:
          - const: fck
      max-memory-bandwidth:
        $ref: /schemas/types.yaml#/definitions/uint32
        description: Input memory (from main memory to DISPC) bandwidth limit in bytes per second
    additionalProperties: false

  hdmi:
    type: object
    description: HDMI node
    required:
      - compatible
      - reg
      - reg-names
      - interrupts
      - ti,hwmods
      - vdda-supply
      - clocks
      - clock-names
    properties:
      compatible:
        const: ti,dra7-hdmi
      reg:
        maxItems: 4
      reg-names:
        items:
          - const: wp
          - const: pll
          - const: phy
          - const: core
        description: Names for register spaces
      interrupts:
        maxItems: 1

      ti,hwmods:
        items:
          - const: dss_hdmi
        description: Hardware module for HDMI

      vdda-supply:
        description: VDDA power supply

      clocks:
        maxItems: 2
      clock-names:
        items:
          - const: fck
          - const: sys_clk

    additionalProperties: false

  dpi-out:
    type: object
    description: DPI output port endpoint
    required:
      - data-lines
    properties:
      data-lines:
        $ref: /schemas/types.yaml#/definitions/uint32
        description: Number of lines used
    additionalProperties: false

additionalProperties: false
