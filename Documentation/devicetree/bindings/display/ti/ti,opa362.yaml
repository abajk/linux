%YAML 1.2
---
$id: http://devicetree.org/schemas/display/ti/ti,opa362.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: TI OPA362 analog video amplifier

maintainers:
  - Rob Herring <robh@kernel.org>

description: |
  OPA362 analog video amplifier

properties:
  compatible:
    items:
      - const: "ti,opa362"
    description: Device compatible with TI OPA362 analog video amplifier.

  enable-gpios:
    maxItems: 1
    description: GPIO to enable or disable video output amplifier.

  ports:
    description: Subnode containing input and output endpoints.
    type: object
    additionalProperties: false
    properties:
      "#address-cells":
        const: 1
      "#size-cells":
        const: 0

      port@0:
        description: Input port for the amplifier.
        type: object
        additionalProperties: false
        properties:
          reg:
            items:
              - description: Identifier for input port.
          endpoint@0:
            description: Endpoint connecting amplifier input to video encoder.
            type: object
            additionalProperties: false
            properties:
              remote-endpoint:
                $ref: /schemas/types.yaml#/definitions/phandle
            required:
              - remote-endpoint
        required:
          - reg
          - endpoint@0

      port@1:
        description: Output port for the amplifier.
        type: object
        additionalProperties: false
        properties:
          reg:
            items:
              - description: Identifier for output port.
          endpoint@0:
            description: Endpoint connecting amplifier output to TV connector.
            type: object
            additionalProperties: false
            properties:
              remote-endpoint:
                $ref: /schemas/types.yaml#/definitions/phandle
            required:
              - remote-endpoint
        required:
          - reg
          - endpoint@0

    required:
      - "#address-cells"
      - "#size-cells"
      - port@0
      - port@1

required:
  - compatible
  - enable-gpios
  - ports

additionalProperties: false

examples:
  - |
    tv_amp: opa362 {
      compatible = "ti,opa362";
      enable-gpios = <&gpio1 23 0>;

      ports {
        #address-cells = <1>;
        #size-cells = <0>;

        port@0 {
          reg = <0>;
          opa_in: endpoint@0 {
            remote-endpoint = <&venc_out>;
          };
        };

        port@1 {
          reg = <1>;
          opa_out: endpoint@0 {
            remote-endpoint = <&tv_connector_in>;
          };
        };
      };
    };
