%YAML 1.2
---
$id: http://devicetree.org/schemas/display/ti/ti,omap5-dss.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Texas Instruments OMAP5 Display Subsystem

maintainers:
  - Peter Ujfalusi <peter.ujfalusi@ti.com>
  - Rob Herring <robh@kernel.org>

description: |
  Texas Instruments OMAP5 Display Subsystem

  See Documentation/devicetree/bindings/display/ti/ti,omap-dss.txt for generic
  description about OMAP Display Subsystem bindings.

properties:
  compatible:
    description: List of compatible strings for the OMAP5 DSS
    items:
      - const: ti,omap5-dss

  reg:
    maxItems: 1

  ti,hwmods:
    description: Hardware modules for DSS core
    $ref: /schemas/types.yaml#/definitions/string-array
    items:
      - const: dss_core

  clocks:
    description: Clock input for DSS core
    maxItems: 1

  clock-names:
    items:
      - const: fck

  DISPC:
    description: Display controller
    type: object
    properties:
      compatible:
        description: List of compatible strings for DISPC
        items:
          - const: ti,omap5-dispc
      reg:
        description: Base address and length of the DISPC register space
        items:
          - description: DISPC registers
      ti,hwmods:
        description: Hardware modules for DISPC
        $ref: /schemas/types.yaml#/definitions/string-array
        items:
          - const: dss_dispc
      interrupts:
        maxItems: 1

      clocks:
        maxItems: 1

      clock-names:
        items:
          - const: fck

      max-memory-bandwidth:
        description: Input memory (from main memory to DISPC) bandwidth limit in bytes per second

    required:
      - compatible
      - reg
      - ti,hwmods
      - interrupts
      - clocks
      - clock-names
    additionalProperties: false

  RFBI:
    description: Raster frame buffer interface
    type: object
    properties:
      compatible:
        description: List of compatible strings for RFBI
        items:
          - const: ti,omap5-rfbi
      reg:
        description: Base address and length of the RFBI register space
        items:
          - description: RFBI registers
      ti,hwmods:
        description: Hardware modules for RFBI
        $ref: /schemas/types.yaml#/definitions/string-array
        items:
          - const: dss_rfbi
      clocks:
        description: Clocks used by RFBI
      clock-names:
        items:
          - const: fck
          - const: ick
    required:
      - compatible
      - reg
      - ti,hwmods
      - clocks
      - clock-names
    additionalProperties: false

  DSI:
    description: Display Serial Interface controller
    type: object
    properties:
      compatible:
        description: List of compatible strings for DSI
        items:
          - const: ti,omap5-dsi
      reg:
        description: Addresses and lengths of the DSI register spaces
        items:
          - description: proto registers
          - description: phy registers
          - description: pll registers
      reg-names:
        items:
          - const: proto
          - const: phy
          - const: pll
      ti,hwmods:
        description: Hardware modules for DSI
        $ref: /schemas/types.yaml#/definitions/string-array
        items:
          - enum: [dss_dsi1, dss_dsi2]
      vdd-supply: true
      clocks:
        description: Clocks used by DSI
      clock-names:
        items:
          - const: fck
          - const: sys_clk
    required:
      - compatible
      - reg
      - reg-names
      - ti,hwmods
      - vdd-supply
      - clocks
      - clock-names
    additionalProperties: false

  HDMI:
    description: HDMI transmitter
    type: object
    properties:
      compatible:
        description: List of compatible strings for HDMI
        items:
          - const: ti,omap5-hdmi
      reg:
        description: Addresses and lengths of the HDMI register spaces
        items:
          - description: wp registers
          - description: pll registers
          - description: phy registers
          - description: core registers
      reg-names:
        items:
          - const: wp
          - const: pll
          - const: phy
          - const: core
      interrupts:
        description: HDMI interrupt line
        $ref: /schemas/types.yaml#/definitions/interrupt-array
      ti,hwmods:
        description: Hardware modules for HDMI
        $ref: /schemas/types.yaml#/definitions/string-array
        items:
          - const: dss_hdmi
      vdda-supply: true
      clocks:
        description: Clocks used by HDMI
      clock-names:
        items:
          - const: fck
          - const: sys_clk
    required:
      - compatible
      - reg
      - reg-names
      - interrupts
      - ti,hwmods
      - vdda-supply
      - clocks
      - clock-names
    additionalProperties: false

required:
  - compatible
  - reg
  - ti,hwmods
  - clocks
  - clock-names
  - DISPC

additionalProperties: false

examples:
  - |
    dss: display-subsystem@4a000000 {
      compatible = "ti,omap5-dss";
      reg = <0x4a000000 0x1000>;
      ti,hwmods = "dss_core";
      clocks = <&fclk>;
      clock-names = "fck";
      DISPC: dispc@4a002000 {
        compatible = "ti,omap5-dispc";
        reg = <0x4a002000 0x1000>;
        ti,hwmods = "dss_dispc";
        interrupts = <72>;
        clocks = <&fclk>;
        clock-names = "fck";
      };
    };
