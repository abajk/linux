%YAML 1.2
---
$id: http://devicetree.org/schemas/display/google,goldfish-fb.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Google Goldfish Framebuffer

maintainers:
  - Aleksandar Markovic <aleksandar.markovic@mips.com>

description: |-
  Android Goldfish framebuffer

  Android Goldfish framebuffer device used by Android emulator.

properties:
  compatible:
    const: google,goldfish-fb

  reg:
    items:
      - description: Framebuffer register base address
      - description: Framebuffer register size

  interrupts:
    items:
      - description: Interrupt mapping for the framebuffer device

required:
  - compatible
  - reg
  - interrupts

additionalProperties: false

examples:
  - |
    display-controller@1f008000 {
      compatible = "google,goldfish-fb";
      reg = <0x1f008000 0x100>;
      interrupts = <0x10>;
    };
