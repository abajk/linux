%YAML 1.2
---
$id: http://devicetree.org/schemas/display/armada/marvell,dove-lcd.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Armada DRM CRTC driver

maintainers:
  - Rob Herring <robh@kernel.org>

description: |
  Device Tree bindings for Armada DRM CRTC driver

  Note: all clocks are optional but at least one must be specified.
  Further clocks may be added in the future according to requirements of different SoCs.

properties:
  compatible:
    items:
      - const: marvell,dove-lcd

  reg:
    maxItems: 1

  interrupts:
    maxItems: 1

  port:
    description: Video output port with endpoints, as described by graph.txt.

  clocks:
    maxItems: 1

  clock-names:
    description: Clock names for pixel clock sources.
    items:
      - enum: [axiclk, plldivider, ext_ref_clk0, ext_ref_clk1]

additionalProperties: false

examples:
  - |
    lcd0: lcd-controller@820000 {
        compatible = "marvell,dove-lcd";
        reg = <0x820000 0x1000>;
        interrupts = <47>;
        clocks = <&si5351 0>;
        clock-names = "ext_ref_clk1";
        port {
            endpoint {
                remote-endpoint;
            };
        };
    };
