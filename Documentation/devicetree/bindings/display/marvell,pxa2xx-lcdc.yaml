---
$id: http://devicetree.org/schemas/display/marvell,pxa2xx-lcdc.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Marvell PXA2XX LCD Controller

maintainers:
  - Daniel Mack <daniel@zonque.org>
  - Robert Jarzmik <robert.jarzmik@free.fr>

description: |
  PXA LCD Controller.

  Required nodes:
   - port: connection to the LCD panel (see video-interfaces.txt)
       This node must have its properties bus-width and remote-endpoint set.
       If the panel is not a TFT color panel, then a "lcd-type" property in
       the panel should specify the panel type.
       This panel node should be in the board dts.

properties:
  compatible:
    items:
      - enum:
          - marvell,pxa2xx-lcdc
          - marvell,pxa270-lcdc
          - marvell,pxa300-lcdc

  reg:
    maxItems: 1

  interrupts:
    maxItems: 1

  clocks:
    maxItems: 1

  lcd-supply: true

  port:
    description: Connection to the LCD panel (see video-interfaces.txt)
    $ref: /schemas/graph.yaml#/properties/port

additionalProperties: false

examples:
  - |
    lcd-controller@40500000 {
        compatible = "marvell,pxa2xx-lcdc";
        reg = <0x44000000 0x10000>;
        interrupts = <17>;
        clocks = <&clks CLK_LCD>;

        port {
            lcdc_out: endpoint {
                remote-endpoint = <&panel_in>;
                bus-width = <16>;
            };
        };
    };
