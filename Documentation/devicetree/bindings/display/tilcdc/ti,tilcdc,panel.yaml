%YAML 1.2
---
$id: http://devicetree.org/schemas/display/tilcdc/ti,tilcdc,panel.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: TI LCDC panel

maintainers:
  - Rob Herring <robh@kernel.org>
  - Yegor Yefremov <yegorslists@googlemail.com>

description: |
  Generic panel output driver for TI LCDC

properties:
  compatible:
    description: Compatible string identifying the panel driver
    items:
      - const: ti,tilcdc,panel

  panel-info:
    description: Configuration info to configure LCDC correctly for the panel
    type: object
    properties:
      ac-bias:
        description: AC Bias Pin Frequency
        $ref: /schemas/types.yaml#/definitions/uint32
      ac-bias-intrpt:
        description: AC Bias Pin Transitions per Interrupt
        $ref: /schemas/types.yaml#/definitions/uint32
      dma-burst-sz:
        description: DMA burst size
        $ref: /schemas/types.yaml#/definitions/uint32
      bpp:
        description: Bits per pixel
        $ref: /schemas/types.yaml#/definitions/uint32
      fdd:
        description: FIFO DMA Request Delay
        $ref: /schemas/types.yaml#/definitions/uint32
      sync-edge:
        description: "Horizontal and Vertical Sync Edge: 0=rising 1=falling"
        $ref: /schemas/types.yaml#/definitions/uint32
      sync-ctrl:
        description: "Horizontal and Vertical Sync Control: 0=ignore"
        $ref: /schemas/types.yaml#/definitions/uint32
      raster-order:
        description: "Raster Data Order Select: 1=Most-to-least 0=Least-to-most"
        $ref: /schemas/types.yaml#/definitions/uint32
      fifo-th:
        description: DMA FIFO threshold
        $ref: /schemas/types.yaml#/definitions/uint32
    additionalProperties: false
    required:
      - ac-bias
      - ac-bias-intrpt
      - dma-burst-sz
      - bpp
      - fdd
      - sync-edge
      - sync-ctrl
      - raster-order
      - fifo-th

  display-timings:
    description: |
      Typical videomode of lcd panel. Multiple video modes can be listed if the panel
      supports multiple timings, but the 'native-mode' should be the preferred/default resolution.
      Refer to Documentation/devicetree/bindings/display/panel/display-timing.txt
      for display timing binding details.
    $ref: /schemas/display/panel/display-timings.yaml#

  backlight:
    description: Phandle of the backlight device attached to the panel
    $ref: /schemas/types.yaml#/definitions/phandle

  enable-gpios:
    description: GPIO pin to enable or disable the panel
    maxItems: 1

required:
  - compatible
  - panel-info
  - display-timings

additionalProperties: false

examples:
  - |
    lcd3 {
      compatible = "ti,tilcdc,panel";
      pinctrl-names = "default";
      pinctrl-0 = <&bone_lcd3_cape_lcd_pins>;
      backlight = <&backlight>;
      enable-gpios = <&gpio3 19 0>;

      panel-info {
        ac-bias = <255>;
        ac-bias-intrpt = <0>;
        dma-burst-sz = <16>;
        bpp = <16>;
        fdd = <0x80>;
        sync-edge = <0>;
        sync-ctrl = <1>;
        raster-order = <0>;
        fifo-th = <0>;
      };
      display-timings {
        native-mode = <&timing0>;
        timing0: 320x240 {
          hactive = <320>;
          vactive = <240>;
          hback-porch = <21>;
          hfront-porch = <58>;
          hsync-len = <47>;
          vback-porch = <11>;
          vfront-porch = <23>;
          vsync-len = <2>;
          clock-frequency = <8000000>;
          hsync-active = <0>;
          vsync-active = <0>;
        };
      };
    };
