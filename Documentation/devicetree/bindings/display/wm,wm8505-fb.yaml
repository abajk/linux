%YAML 1.2
---
$id: http://devicetree.org/schemas/display/wm,wm8505-fb.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Wondermedia WM8505 Framebuffer

description: |
  Wondermedia WM8505 Framebuffer

  Required subnodes:
  - display-timings: see display-timing.txt for information

maintainers:
  - Rob Herring <robh@kernel.org>

properties:
  compatible:
    description: Compatible string for the WM8505 framebuffer.
    items:
      - const: wm,wm8505-fb

  reg:
    description: Framebuffer register region; list contains one element with base address and size.
    items:
      - description: Base address and length of the framebuffer region.

  bits-per-pixel:
    description: Bit depth of the framebuffer; valid values are 16 or 32.
    $ref: /schemas/types.yaml#/definitions/uint32
    enum: [16, 32]

  display-timings:
    description: Subnode containing display timing information.
    $ref: /schemas/display/panel/display-timings.yaml#

required:
  - compatible
  - reg
  - bits-per-pixel

additionalProperties: false

examples:
  - |
    fb@d8051700 {
        compatible = "wm,wm8505-fb";
        reg = <0xd8051700 0x200>;
        bits-per-pixel = <16>;

        display-timings {
            native-mode = <&timing0>;
            timing0: 800x480 {
                clock-frequency = <0>; /* unused but required */
                hactive = <800>;
                vactive = <480>;
                hfront-porch = <40>;
                hback-porch = <88>;
                hsync-len = <0>;
                vback-porch = <32>;
                vfront-porch = <11>;
                vsync-len = <1>;
            };
        };
    };
