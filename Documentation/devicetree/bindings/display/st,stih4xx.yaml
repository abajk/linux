%YAML 1.2
---
$id: http://devicetree.org/schemas/display/st,stih4xx.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: STMicroelectronics stih4xx platforms

maintainers:
  - Rob Herring <robh@kernel.org>

description: |
  STMicroelectronics stih4xx platforms

properties:
  compatible:
    description: Allowed compatible values for the device.
    items:
      - enum:
          - "st,vtg"
          - "st,vtac-main"
          - "st,vtac-aux"
          - "st,sti-display-subsystem"
          - "st,stih4xx-compositor"
          - "st,stih4xx-tvout"
          - "st,stih4xx-hdmi"
          - "st,stih4xx-hda"
          - "st,stih4xx-dvo"
          - "st,stih4xx-hqvdp"

  reg:
    description: Physical base address and size pairs for the device registers.
    items:
      - description: First register region
      - description: Second register region
      - description: Third register region
      - description: Fourth register region

  reg-names:
    description: Names corresponding to reg entries in the same order.
    items:
      - const: tvout-reg
      - const: hda-reg
      - const: syscfg
      - const: dvo-reg

  clocks:
    description: Device clocks.
    items:
      - description: First clock
      - description: Second clock
      - description: Third clock
      - description: Fourth clock

  clock-names:
    description: Names corresponding to clocks entries in the same order.
    items:
      - enum:
          - vtac
          - compo_main
          - compo_aux
          - pix_main
          - pix_aux
          - pix
          - tmds
          - phy
          - audio
          - dvo_pix
          - dvo
          - main_parent
          - aux_parent
          - hqvdp

  resets:
    description: Reset phandles required by the device.
    items:
      - description: First reset line
      - description: Second reset line

  reset-names:
    description: Names corresponding to resets entries.
    items:
      - const: tvout
      - const: compo-main
      - const: compo-aux
      - const: hqvdp

  interrupts:
    description: IRQs for the device.
    items:
      - description: Primary interrupt
      - description: Secondary interrupt

  interrupt-names:
    description: Names corresponding to interrupts entries.
    items:
      - const: irq

  interrupt-controller: true

  ranges:
    description: Address translation ranges for the display subsystem.

  st,slave:
    description: Phandle to a slave VTG device.
    $ref: /schemas/types.yaml#/definitions/phandle

  ddc:
    description: Phandle of an I2C controller used for DDC EDID probing.

  pinctrl-0:
    description: Phandle for pin control.

  pinctrl-names:
    description: Names of pin control states.
    items:
      - const: default

  sti,panel:
    description: Phandle of the panel connected to the DVO output.
    $ref: /schemas/types.yaml#/definitions/phandle

additionalProperties: false

required:
  - compatible
  - reg
  - interrupts
  - interrupt-controller

examples:
  - |
    / {
        vtg_main_slave: sti-vtg-main-slave@fe85a800 {
            compatible = "st,vtg";
            reg = <0xfe85A800 0x300>;
            interrupts = <GIC_SPI 175 IRQ_TYPE_NONE>;
        };

        vtg_main: sti-vtg-main-master@fd348000 {
            compatible = "st,vtg";
            reg = <0xfd348000 0x400>;
            st,slave = <&vtg_main_slave>;
        };

        vtg_aux_slave: sti-vtg-aux-slave@fd348400 {
            compatible = "st,vtg";
            reg = <0xfe858200 0x300>;
            interrupts = <GIC_SPI 176 IRQ_TYPE_NONE>;
        };

        vtg_aux: sti-vtg-aux-master@fd348400 {
            compatible = "st,vtg";
            reg = <0xfd348400 0x400>;
            st,slave = <&vtg_aux_slave>;
        };

        sti-vtac-rx-main@fee82800 {
            compatible = "st,vtac-main";
            reg = <0xfee82800 0x200>;
            clock-names = "vtac";
            clocks = <&clk_m_a2_div0 CLK_M_VTAC_MAIN_PHY>;
        };

        sti-vtac-rx-aux@fee82a00 {
            compatible = "st,vtac-aux";
            reg = <0xfee82a00 0x200>;
            clock-names = "vtac";
            clocks = <&clk_m_a2_div0 CLK_M_VTAC_AUX_PHY>;
        };

        sti-vtac-tx-main@fd349000 {
            compatible = "st,vtac-main";
            reg = <0xfd349000 0x200>, <0xfd320000 0x10000>;
            clock-names = "vtac";
            clocks = <&clk_s_a1_hs CLK_S_VTAC_TX_PHY>;
        };

        sti-vtac-tx-aux@fd349200 {
            compatible = "st,vtac-aux";
            reg = <0xfd349200 0x200>, <0xfd320000 0x10000>;
            clock-names = "vtac";
            clocks = <&clk_s_a1_hs CLK_S_VTAC_TX_PHY>;
        };

        sti-display-subsystem {
            compatible = "st,sti-display-subsystem";
            ranges;
        };

        sti-compositor@fd340000 {
            compatible = "st,stih416-compositor";
            reg = <0xfd340000 0x1000>;
            clock-names = "compo_main", "compo_aux", "pix_main", "pix_aux";
            clocks = <&clk_m_a2_div1 CLK_M_COMPO_MAIN>, <&clk_m_a2_div1 CLK_M_COMPO_AUX>,
                     <&clockgen_c_vcc CLK_S_PIX_MAIN>, <&clockgen_c_vcc CLK_S_PIX_AUX>;
            reset-names = "compo-main", "compo-aux";
            resets = <&softreset STIH416_COMPO_M_SOFTRESET>, <&softreset STIH416_COMPO_A_SOFTRESET>;
            st,vtg = <&vtg_main>, <&vtg_aux>;
        };

        sti-tvout@fe000000 {
            compatible = "st,stih416-tvout";
            reg = <0xfe000000 0x1000>, <0xfe85a000 0x400>, <0xfe830000 0x10000>;
            reg-names = "tvout-reg", "hda-reg", "syscfg";
            reset-names = "tvout";
            resets = <&softreset STIH416_HDTVOUT_SOFTRESET>;
        };

        sti-hdmi@fe85c000 {
            compatible = "st,stih416-hdmi";
            reg = <0xfe85c000 0x1000>, <0xfe830000 0x10000>;
            reg-names = "hdmi-reg", "syscfg";
            interrupts = <GIC_SPI 173 IRQ_TYPE_NONE>;
            interrupt-names = "irq";
            clock-names = "pix", "tmds", "phy", "audio";
            clocks = <&clockgen_c_vcc CLK_S_PIX_HDMI>, <&clockgen_c_vcc CLK_S_TMDS_HDMI>,
                     <&clockgen_c_vcc CLK_S_HDMI_REJECT_PLL>, <&clockgen_b1 CLK_S_PCM_0>;
        };

        sti-hda@fe85a000 {
            compatible = "st,stih416-hda";
            reg = <0xfe85a000 0x400>, <0xfe83085c 0x4>;
            reg-names = "hda-reg", "video-dacs-ctrl";
            clock-names = "pix", "hddac";
            clocks = <&clockgen_c_vcc CLK_S_PIX_HD>, <&clockgen_c_vcc CLK_S_HDDAC>;
        };

        sti-dvo@8d00400 {
            compatible = "st,stih407-dvo";
            reg = <0x8d00400 0x200>;
            reg-names = "dvo-reg";
            clock-names = "dvo_pix", "dvo", "main_parent", "aux_parent";
            clocks = <&clk_s_d2_flexgen CLK_PIX_DVO>, <&clk_s_d2_flexgen CLK_DVO>,
                     <&clk_s_d2_quadfs 0>, <&clk_s_d2_quadfs 1>;
            pinctrl-names = "default";
            pinctrl-0 = <&pinctrl_dvo>;
            sti,panel = <&panel_dvo>;
        };

        sti-hqvdp@9c000000 {
            compatible = "st,stih407-hqvdp";
            reg = <0x9C00000 0x100000>;
            clock-names = "hqvdp", "pix_main";
            clocks = <&clk_s_c0_flexgen CLK_MAIN_DISP>, <&clk_s_d2_flexgen CLK_PIX_MAIN_DISP>;
            reset-names = "hqvdp";
            resets = <&softreset STIH407_HDQVDP_SOFTRESET>;
            st,vtg = <&vtg_main>;
        };
    };
