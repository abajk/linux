%YAML 1.2
---
$id: http://devicetree.org/schemas/display/hisilicon/hisilicon,hi6220-dsi.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: HiSilicon DesignWare DSI Host Controller

maintainers:
  - Xinliang Liu <xinliang.liu@linaro.org>

properties:
  compatible:
    items:
      - const: hisilicon,hi6220-dsi

  reg:
    maxItems: 1

  clocks:
    maxItems: 1
    description: APB clock for the DSI controller.

  clock-names:
    items:
      - const: pclk

  ports:
    $ref: /schemas/graph.yaml#/properties/ports

    properties:
      port@0:
        description: Input port, connects to ADE output endpoint.
        $ref: /schemas/graph.yaml#/properties/port

      port@1:
        description: Output port, connects to panel or bridge endpoints.
        $ref: /schemas/graph.yaml#/properties/port

required:
  - compatible
  - reg
  - clocks
  - clock-names
  - ports

additionalProperties: false

examples:
  - |
    dsi: dsi@f4107800 {
        compatible = "hisilicon,hi6220-dsi";
        reg = <0x0 0xf4107800 0x0 0x100>;
        clocks = <&media_ctrl  HI6220_DSI_PCLK>;
        clock-names = "pclk";
        status = "disabled";

        ports {
            #address-cells = <1>;
            #size-cells = <0>;

            /* 0 for input port */
            port@0 {
                reg = <0>;
                dsi_in: endpoint {
                    remote-endpoint = <&ade_out>;
                };
            };
        };
    };
  - |
    &dsi {
        status = "ok";

        ports {
            /* 1 for output port */
            port@1 {
                reg = <1>;

                dsi_out0: endpoint@0 {
                    remote-endpoint = <&adv7533_in>;
                };
            };
        };
    };
