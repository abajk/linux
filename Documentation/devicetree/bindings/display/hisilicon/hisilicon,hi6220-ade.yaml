%YAML 1.2
---
$id: http://devicetree.org/schemas/display/hisilicon/hisilicon,hi6220-ade.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Hisilicon ADE Display Controller
maintainers:
  - Peter Meerwald-Stadler <pmeerw@pmeerw.net>
  - Xinliang Liu <xinliang.liu@linaro.org>
description: |
  Device-Tree bindings for hisilicon ADE display controller driver

  ADE (Advanced Display Engine) is the display controller which grab image
  data from memory, do composition, do post image processing, generate RGB
  timing stream and transfer to DSI.

properties:
  compatible:
    const: hisilicon,hi6220-ade

  reg:
    items:
      - description: Physical base address and length of the ADE controller's registers.

  reg-names:
    items:
      - const: ade_base

  hisilicon,noc-syscon:
    description: ADE NOC QoS syscon.
    $ref: /schemas/types.yaml#/definitions/phandle

  resets:
    description: ADE reset controller node.
    maxItems: 1

  interrupts:
    items:
      - description: LDI vblank interrupt specifier.

  clocks:
    description: A list of phandle + clock-specifier pairs, one for each entry in clock-names.
    maxItems: 3

  clock-names:
    items:
      - const: clk_ade_core
      - const: clk_codec_jpeg
      - const: clk_ade_pix

  assigned-clocks:
    description: Assigned ADE core and media NOC QoS clock phandle + specifier pairs.
    $ref: /schemas/types.yaml#/definitions/phandle-array

  assigned-clock-rates:
    description: Clock rates for each entry in assigned-clocks.
    $ref: /schemas/types.yaml#/definitions/uint32-array

  dma-coherent:
    description: Indicates DMA operations are coherent.
    type: boolean

  port:
    description: Output port containing an endpoint subnode.

required:
  - compatible
  - reg
  - reg-names
  - hisilicon,noc-syscon
  - resets
  - interrupts
  - clocks
  - clock-names
  - assigned-clocks
  - assigned-clock-rates
  - port

additionalProperties: false

examples:
  - |
    ade: ade@f4100000 {
        compatible = "hisilicon,hi6220-ade";
        reg = <0x0 0xf4100000 0x0 0x7800>;
        reg-names = "ade_base";
        hisilicon,noc-syscon = <&medianoc_ade>;
        resets = <&media_ctrl MEDIA_ADE>;
        interrupts = <0 115 4>;
        clocks = <&media_ctrl HI6220_ADE_CORE>,
                 <&media_ctrl HI6220_CODEC_JPEG>,
                 <&media_ctrl HI6220_ADE_PIX_SRC>;
        clock-names = "clk_ade_core", "clk_codec_jpeg", "clk_ade_pix";
        assigned-clocks = <&media_ctrl HI6220_ADE_CORE>,
                          <&media_ctrl HI6220_CODEC_JPEG>;
        assigned-clock-rates = <360000000>, <288000000>;
        dma-coherent;
        port {
            endpoint {
                remote-endpoint = <&dsi_in>;
            };
        };
    };
