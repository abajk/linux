%YAML 1.2
---
$id: http://devicetree.org/schemas/wm,prizm-ge-rops.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: VIA/Wondermedia Graphics Engine Controller

maintainers:
  - Rob Herring <robh@kernel.org>

description: |
  VIA/Wondermedia Graphics Engine Controller
  -----------------------------------------------------

properties:
  compatible:
    description: Device compatible identifier.
    items:
      - const: wm,prizm-ge-rops

  reg:
    description: Physical address and length of the register region.
    items:
      - description: Address of register region
      - description: Size of register region

required:
  - compatible
  - reg

additionalProperties: false

examples:
  - |
    ge_rops@d8050400 {
        compatible = "wm,prizm-ge-rops";
        reg = <0xd8050400 0x100>;
    };
