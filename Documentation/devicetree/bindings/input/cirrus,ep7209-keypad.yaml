%YAML 1.2
---
$id: http://devicetree.org/schemas/cirrus,ep7209-keypad.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Cirrus Logic CLPS711X matrix keypad

maintainers:
  - Alexander Shiyan <shc_work@mail.ru>

description: |
  * Cirrus Logic CLPS711X matrix keypad device tree bindings

properties:
  compatible:
    oneOf:
      - items:
          - enum:
              - cirrus,ep7312-keypad
          - const: cirrus,ep7209-keypad
      - items:
          - const: cirrus,ep7209-keypad
  row-gpios:
    description: List of GPIOs used as row lines.
    items:
      description: A connection of a 'row' gpio line.
  poll-interval:
    description: Poll interval time in milliseconds.
    $ref: /schemas/types.yaml#/definitions/uint32
  linux,keymap:
    description: The definition can be found at bindings/input/matrix-keymap.txt.
  autorepeat:
    type: boolean
    description: Enable autorepeat feature.

required:
  - compatible
  - row-gpios
  - poll-interval
  - linux,keymap

additionalProperties: false

examples:
  - |
    keypad {
      compatible = "cirrus,ep7312-keypad", "cirrus,ep7209-keypad";
      autorepeat;
      poll-interval = <120>;
      row-gpios = <&porta 0 0>,
                  <&porta 1 0>;
      linux,keymap = <
        MATRIX_KEY(0, 0, KEY_UP)
        MATRIX_KEY(0, 1, KEY_DOWN)
        MATRIX_KEY(1, 0, KEY_LEFT)
        MATRIX_KEY(1, 1, KEY_RIGHT)
      >;
    };
