%YAML 1.2
---
$id: http://devicetree.org/schemas/ti,palmas-pwrbutton.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: TI Palmas power button module
maintainers:
  - Nishanth Menon <nm@ti.com>
  - Rob Herring <robh@kernel.org>

description: |
  Texas Instruments Palmas family power button module

  This module is part of the Palmas family of PMICs. For more details
  about the whole chip see:
  Documentation/devicetree/bindings/mfd/palmas.txt.

  This module provides a simple power button event via an Interrupt.

properties:
  compatible:
    items:
      - const: ti,palmas-pwrbutton
  interrupts:
    description: Interrupt number of power button submodule on device.
    items:
      - description: Power button interrupt event.
  ti,palmas-long-press-seconds:
    description: Duration in seconds which the power button should be kept
      pressed for Palmas to power off automatically.
    $ref: /schemas/types.yaml#/definitions/uint32
    enum: [6, 8, 10, 12]
  ti,palmas-pwron-debounce-milli-seconds:
    description: Duration in milliseconds which the power button should be kept
      pressed for Palmas to register a press for debouncing purposes.
    $ref: /schemas/types.yaml#/definitions/uint32
    enum: [15, 100, 500, 1000]

required:
  - compatible
  - interrupts

additionalProperties: false

examples:
  - |
    &palmas {
        palmas_pwr_button: pwrbutton {
            compatible = "ti,palmas-pwrbutton";
            interrupts = <1 IRQ_TYPE_EDGE_FALLING>;
            ti,palmas-long-press-seconds = <12>;
            ti,palmas-pwron-debounce-milli-seconds = <15>;
        };
    };
