%YAML 1.2
---
$id: http://devicetree.org/schemas/ti,twl4030-keypad.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: TWL4030 Keypad Controller

maintainers:
  - Sebastian Reichel <sre@kernel.org>

description: |
  * TWL4030's Keypad Controller device tree bindings

  TWL4030's Keypad controller is used to interface a SoC with a matrix-type
  keypad device. The keypad controller supports multiple row and column lines.
  A key can be placed at each intersection of a unique row and a unique column.
  The keypad controller can sense a key-press and key-release and report the
  event using a interrupt to the cpu.

  This binding is based on the matrix-keymap binding with the following
  changes:

   * keypad,num-rows and keypad,num-columns are required.

properties:
  compatible:
    items:
      - const: "ti,twl4030-keypad"
    description: Name of the driver for the TWL4030 keypad controller.

  interrupts:
    maxItems: 1
    description: Interrupt line used by the keypad controller.

  keypad,num-rows:
    description: Number of rows in the keypad matrix.
    $ref: /schemas/types.yaml#/definitions/uint32

  keypad,num-columns:
    description: Number of columns in the keypad matrix.
    $ref: /schemas/types.yaml#/definitions/uint32

required:
  - compatible
  - interrupts
  - keypad,num-rows
  - keypad,num-columns

additionalProperties: false

examples:
  - |
    twl_keypad: keypad {
        compatible = "ti,twl4030-keypad";
        interrupts = <1>;
        keypad,num-rows = <8>;
        keypad,num-columns = <8>;
    };
