%YAML 1.2
---
$id: http://devicetree.org/schemas/raydium,rm32380.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Raydium I2C touchscreen

maintainers:
  - Jeffrey Lin <jeffrey.lin@rad-ic.com>
  - Rob Herring <robh@kernel.org>

description: |
  Raydium I2C touchscreen

  Required properties:
  - compatible: must be "raydium,rm32380"
  - reg: The I2C address of the device
  - interrupts: interrupt to which the chip is connected (See ../interrupt-controller/interrupts.txt)

properties:
  compatible:
    const: raydium,rm32380

  reg:
    description: The I2C address of the device
    items:
      - description: I2C device address

  interrupts:
    description: Interrupt to which the chip is connected
    items:
      - description: Interrupt specifier

  avdd-supply:
    description: Analog power supply needed to power the device

  vccio-supply:
    description: IO power source for the device

  reset-gpios:
    maxItems: 1
    description: Reset GPIO the chip is connected to

required:
  - compatible
  - reg
  - interrupts

additionalProperties: false

examples:
  - |
    touchscreen@39 {
        compatible = "raydium,rm32380";
        reg = <0x39>;
        interrupts = <0x0 IRQ_TYPE_EDGE_FALLING>;
    };
