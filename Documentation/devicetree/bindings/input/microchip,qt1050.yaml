%YAML 1.2
---
$id: http://devicetree.org/schemas/microchip,qt1050.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Microchip AT42QT1050 Five-channel Touch Sensor IC

maintainers:
  - Marco Felsch <m.felsch@pengutronix.de>

description: |
  The AT42QT1050 (QT1050) is a QTouchADC sensor device. The device can sense from
  one to five keys, dependent on mode. The QT1050 includes all signal processing
  functions necessary to provide stable sensing under a wide variety of changing
  conditions, and the outputs are fully debounced.

properties:
  compatible:
    const: microchip,qt1050

  reg:
    maxItems: 1

  interrupts:
    maxItems: 1
    description: Touch sensor IRQ specifier

  wakeup-source:
    type: boolean
    description: Touch keys can be used as a wakeup source

  microchip,pre-charge-time-ns:
    description: Time for touchpad pre-charge in nanoseconds
    minimum: 0
    maximum: 637500
    multipleOf: 2500
    default: 0

  microchip,average-samples:
    description: Number of data samples to average for each read
    $ref: /schemas/types.yaml#/definitions/uint32
    enum: [1, 4, 16, 64, 256, 1024, 4096, 16384]
    default: 1

  microchip,average-scaling:
    description: Scaling factor for average-samples
    $ref: /schemas/types.yaml#/definitions/uint32
    enum: [1, 2, 4, 8, 16, 32, 64, 128]
    default: 1

  microchip,threshold:
    description: Number of counts to register a touch detection
    $ref: /schemas/types.yaml#/definitions/uint32
    minimum: 0
    maximum: 255
    default: 20

patternProperties:
  "^[^/]+$":
    type: object
    description: Touch key sub-node
    properties:
      reg:
        description: Key number (0–4)
        enum: [0, 1, 2, 3, 4]

      linux,code:
        $ref: /schemas/types.yaml#/definitions/uint32
        description: Keycode to emit

      microchip,pre-charge-time-ns:
        description: Time for touchpad pre-charge in nanoseconds
        minimum: 0
        maximum: 637500
        multipleOf: 2500
        default: 0

      microchip,average-samples:
        description: Number of data samples to average for each read
        $ref: /schemas/types.yaml#/definitions/uint32
        enum: [1, 4, 16, 64, 256, 1024, 4096, 16384]
        default: 1

      microchip,average-scaling:
        description: Scaling factor for average-samples
        $ref: /schemas/types.yaml#/definitions/uint32
        enum: [1, 2, 4, 8, 16, 32, 64, 128]
        default: 1

      microchip,threshold:
        description: Number of counts to register a touch detection
        $ref: /schemas/types.yaml#/definitions/uint32
        minimum: 0
        maximum: 255
        default: 20

    required:
      - reg
      - linux,code
    additionalProperties: false

additionalProperties: false

examples:
  - |
    touchkeys@41 {
        compatible = "microchip,qt1050";
        reg = <0x41>;
        interrupts = <17 IRQ_TYPE_EDGE_FALLING>;

        up@0 {
            reg = <0>;
            linux,code = <KEY_UP>;
            microchip,average-samples = <64>;
            microchip,average-scaling = <16>;
            microchip,pre-charge-time-ns = <10000>;
        };

        right@1 {
            reg = <1>;
            linux,code = <KEY_RIGHT>;
            microchip,average-samples = <64>;
            microchip,average-scaling = <8>;
        };

        down@3 {
            reg = <3>;
            linux,code = <KEY_DOWN>;
            microchip,average-samples = <256>;
            microchip,average-scaling = <16>;
        };
    };
