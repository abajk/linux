%YAML 1.2
---
$id: http://devicetree.org/schemas/dlink,dir685-touchkeys.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: D-Link DIR-685 Touchkeys
maintainers:
  - Linus Walleij <linus.walleij@linaro.org>

description: |
  * D-Link DIR-685 Touchkeys

  This is a I2C one-off touchkey controller based on the Cypress Semiconductor
  CY8C214 MCU with some firmware in its internal 8KB flash. The circuit
  board inside the router is named E119921.

  The touchkey device node should be placed inside an I2C bus node.

properties:
  compatible:
    const: dlink,dir685-touchkeys

  reg:
    description: I2C address of the touchkeys
    items:
      - description: I2C 7-bit address

  interrupts:
    description: IRQ line for the touchkey controller
    items:
      - description: Combined interrupt

required:
  - compatible
  - reg
  - interrupts

additionalProperties: false

examples:
  - |
    touchkeys@26 {
        compatible = "dlink,dir685-touchkeys";
        reg = <0x26>;
        interrupts = <17 IRQ_TYPE_EDGE_FALLING>;
    };
