%YAML 1.2
---
$id: http://devicetree.org/schemas/ti,tca8418.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: TI TCA8418 Keypad Controller

maintainers:
  - Alban Bedel <alban.bedel@avionic-design.de>
  - Simon Glass <sjg@chromium.org>

description: |
  This binding is based on the matrix-keymap binding with the following changes:

  keypad,num-rows and keypad,num-columns are required.

properties:
  compatible:
    items:
      - const: ti,tca8418

  reg:
    description: I2C address of the TCA8418 device.
    items:
      - description: I2C bus address

  interrupts:
    description: Interrupt line number, triggers on falling edge.
    items:
      - description: Interrupt, falling-edge triggered

  linux,keymap:
    description: Keys definitions, see keypad-matrix.
    $ref: /schemas/types.yaml#/definitions/string-array

required:
  - compatible
  - reg
  - interrupts
  - linux,keymap

additionalProperties: false

examples:
  - |
    keypad@24 {
        compatible = "ti,tca8418";
        reg = <0x24>;
        interrupts = <10 2>;
        linux,keymap = <0 1 2 3>;
    };
