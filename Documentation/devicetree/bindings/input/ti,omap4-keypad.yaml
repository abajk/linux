%YAML 1.2
---
$id: http://devicetree.org/schemas/ti,omap4-keypad.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: TI OMAP4 Keypad Controller

maintainers:
  - Simon Glass <sjg@chromium.org>
  - Sourav Poddar <sourav.poddar@ti.com>

description: |
  * TI's Keypad Controller device tree bindings

  TI's Keypad controller is used to interface a SoC with a matrix-type
  keypad device. The keypad controller supports multiple row and column lines.
  A key can be placed at each intersection of a unique row and a unique column.
  The keypad controller can sense a key-press and key-release and report the
  event using a interrupt to the cpu.

  This binding is based on the matrix-keymap binding with the following
  changes:

properties:
  compatible:
    items:
      - const: ti,omap4-keypad
  keypad,num-rows:
    description: Number of rows in the keypad matrix.
    $ref: /schemas/types.yaml#/definitions/uint32
  keypad,num-columns:
    description: Number of columns in the keypad matrix.
    $ref: /schemas/types.yaml#/definitions/uint32
  linux,keypad-no-autorepeat:
    description: Disable the autorepeat feature in Linux.
    type: boolean

required:
  - compatible
  - keypad,num-rows
  - keypad,num-columns

additionalProperties: false

examples:
  - |
    keypad@4ae1c000 {
        compatible = "ti,omap4-keypad";
        keypad,num-rows = <2>;
        keypad,num-columns = <8>;
        linux,keypad-no-autorepeat;
    };
