%YAML 1.2
---
$id: http://devicetree.org/schemas/input/touchscreen/microchip,ar1021-i2c.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Microchip AR1021 touchscreen interface

maintainers:
  - Martin Kepplinger <martink@posteo.de>
  - Rob Herring <robh@kernel.org>

description: |
  Microchip AR1020 and AR1021 touchscreen interface (I2C)

properties:
  compatible:
    items:
      - const: microchip,ar1021-i2c
    description: Compatible string for the Microchip AR1021 I2C touchscreen controller
  reg:
    items:
      - description: I2C slave address
  interrupts:
    items:
      - description: Touch controller interrupt

required:
  - compatible
  - reg
  - interrupts

additionalProperties: false

examples:
  - |
    touchscreen@4d {
        compatible = "microchip,ar1021-i2c";
        reg = <0x4d>;
        interrupts = <11 IRQ_TYPE_LEVEL_HIGH>;
    };
