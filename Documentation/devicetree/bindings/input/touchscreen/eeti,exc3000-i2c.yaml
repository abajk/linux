%YAML 1.2
---
$id: http://devicetree.org/schemas/input/touchscreen/eeti,exc3000-i2c.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: EETI Exc3000 I2C Touchscreen Controller

maintainers:
  - Daniel Mack <daniel@zonque.org>

description: |
  Bindings for EETI touchscreen controller

  The following optional properties described in touchscreen.txt are
  also supported:

properties:
  compatible:
    const: "eeti,exc3000-i2c"
    description: |
      Matching table for EETI Exc3000 I2C touchscreen controller.

  reg:
    description: |
      I2C address of the Exc3000 touchscreen controller.
    items:
      - description: I2C address of the chip.

  interrupts:
    description: |
      Interrupt to which the touchscreen controller is connected.
    items:
      - description: Interrupt for touch events.

  attn-gpios:
    maxItems: 1
    description: |
      GPIO line to check whether interrupt is still latched; needed on
      platforms that lack support for level-triggered IRQs.

  touchscreen-inverted-x:
    description: |
      Invert the X axis of the touchscreen.

  touchscreen-inverted-y:
    description: |
      Invert the Y axis of the touchscreen.

  touchscreen-swapped-x-y:
    description: |
      Swap the X and Y axes of the touchscreen.

required:
  - compatible
  - reg
  - interrupts

additionalProperties: false

examples:
  - |-
    i2c-master {
      touchscreen@a {
        compatible = "eeti,exc3000-i2c";
        reg = <0xa>;
        interrupts = <123 IRQ_TYPE_EDGE_RISING>;
        attn-gpios = <&gpio 123 GPIO_ACTIVE_HIGH>;
      };
    };
