%YAML 1.2
---
$id: http://devicetree.org/schemas/input/touchscreen/eeti,egalax_ts.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: EETI eGalax Multiple Touch Controller

maintainers:
  - Dmitry Torokhov <dmitry.torokhov@gmail.com>
  - Fabio Estevam <fabio.estevam@freescale.com>
  - Hui Wang <jason77.wang@gmail.com>
  - Marco Franchi <marco.franchi@nxp.com>
  - Rob Herring <robh@kernel.org>

description: |
  * EETI eGalax Multiple Touch Controller

properties:
  compatible:
    items:
      - const: eeti,egalax_ts

  reg:
    items:
      - description: I2C slave address of the touch controller

  interrupts:
    description: Interrupt generated by the touch controller
    items:
      - description: Touch controller interrupt

  wakeup-gpios:
    maxItems: 1
    description: GPIO used to wake up the controller and used as interrupt

required:
  - compatible
  - reg
  - interrupts
  - wakeup-gpios

additionalProperties: false

examples:
  - |
    touchscreen@4 {
        compatible = "eeti,egalax_ts";
        reg = <0x04>;
        interrupts = <9 IRQ_TYPE_LEVEL_LOW>;
        wakeup-gpios = <&gpio1 9 GPIO_ACTIVE_LOW>;
    };
