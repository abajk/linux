%YAML 1.2
---
$id: http://devicetree.org/schemas/raspberrypi,firmware-ts.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Raspberry Pi firmware based 7" touchscreen
maintainers:
  - Nicolas Saenz Julienne <nsaenz@kernel.org>

description: |
  Raspberry Pi firmware based 7" touchscreen

properties:
  compatible:
    description: Binding compatible string for Raspberry Pi firmware touchscreen
    $ref: /schemas/types.yaml#/definitions/string-array
    items:
      - enum:
          - raspberrypi,firmware-ts

  firmware:
    description: Reference to RPi's firmware device node
    $ref: /schemas/types.yaml#/definitions/phandle

  touchscreen-size-x:
    description: Width of the touchscreen in pixels
    $ref: /schemas/types.yaml#/definitions/uint32

  touchscreen-size-y:
    description: Height of the touchscreen in pixels
    $ref: /schemas/types.yaml#/definitions/uint32

  touchscreen-inverted-x:
    description: Invert the X axis
    type: boolean

  touchscreen-inverted-y:
    description: Invert the Y axis
    type: boolean

  touchscreen-swapped-x-y:
    description: Swap the X and Y axes
    type: boolean

required:
  - compatible

additionalProperties: false

examples:
  - |
    firmware: firmware-rpi {
        compatible = "raspberrypi,bcm2835-firmware";
        mboxes = <&mailbox>;

        ts: touchscreen {
            compatible = "raspberrypi,firmware-ts";
            touchscreen-size-x = <800>;
            touchscreen-size-y = <480>;
        };
    };
