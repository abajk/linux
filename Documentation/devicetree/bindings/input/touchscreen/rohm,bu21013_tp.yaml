%YAML 1.2
---
$id: http://devicetree.org/schemas/input/touchscreen/rohm,bu21013_tp.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Rohm BU21013 touch screen controller

maintainers:
  - Dmitry Torokhov <dmitry.torokhov@gmail.com>
  - Lee Jones <lee@kernel.org>
  - Linus Walleij <linus.walleij@linaro.org>
  - Mathieu Malaterre <malat@debian.org>

description: |
  Rohm BU21013 touch screen controller.

  Required properties:
    - compatible: "rohm,bu21013_tp"
    - reg: I2C device address
    - reset-gpios: GPIO pin enabling (selecting) chip (CS)
    - interrupt-parent: phandle for the GPIO controller
    - interrupts: (GPIO) interrupt to which the chip is connected

  Optional properties:
    - touch-gpios: GPIO pin registering a touch event
    - <supply_name>-supply: phandle to a regulator supply
    - touchscreen-size-x: width of the touchscreen in pixels
    - touchscreen-size-y: height of the touchscreen in pixels
    - touchscreen-inverted-x: invert the X axis
    - touchscreen-inverted-y: invert the Y axis
    - touchscreen-swapped-x-y: swap the X and Y axes

  Deprecated properties:
    - rohm,touch-max-x: maximum outward permitted limit in the X axis
    - rohm,touch-max-y: maximum outward permitted limit in the Y axis
    - rohm,flip-x: flip touch coordinates on the X axis
    - rohm,flip-y: flip touch coordinates on the Y axis

properties:
  compatible:
    items:
      - const: rohm,bu21013_tp

  reg:
    description: I2C address of the BU21013 controller
    maxItems: 1

  reset-gpios:
    description: GPIO pin enabling (selecting) chip (CS)
    maxItems: 1

  interrupts:
    maxItems: 1

  touch-gpios:
    description: GPIO pin registering a touch event
    maxItems: 1

  touchscreen-size-x:
    description: width of the touchscreen in pixels
    $ref: /schemas/types.yaml#/definitions/uint32

  touchscreen-size-y:
    description: height of the touchscreen in pixels
    $ref: /schemas/types.yaml#/definitions/uint32

  touchscreen-inverted-x:
    description: invert the X axis
    type: boolean

  touchscreen-inverted-y:
    description: invert the Y axis
    type: boolean

  touchscreen-swapped-x-y:
    description: swap the X and Y axes
    type: boolean

  rohm,touch-max-x:
    description: deprecated; maximum outward permitted limit in the X axis
    $ref: /schemas/types.yaml#/definitions/uint32

  rohm,touch-max-y:
    description: deprecated; maximum outward permitted limit in the Y axis
    $ref: /schemas/types.yaml#/definitions/uint32

  rohm,flip-x:
    description: deprecated; flip touch coordinates on the X axis
    type: boolean
    deprecated: true

  rohm,flip-y:
    description: deprecated; flip touch coordinates on the Y axis
    type: boolean
    deprecated: true

patternProperties:
  '^[a-zA-Z][a-zA-Z0-9,+._@-]*-supply$':
    description: phandle to a regulator supply

required:
  - compatible
  - reg
  - reset-gpios
  - interrupts

additionalProperties: false

examples:
  - |
    i2c@80110000 {
      bu21013_tp@5c {
        compatible = "rohm,bu21013_tp";
        reg = <0x5c>;
        reset-gpios = <&gpio2 20 GPIO_ACTIVE_LOW>;
        interrupts = <&gpio2 20 IRQ_TYPE_LEVEL_LOW>;
        touch-gpios = <&gpio2 20 GPIO_ACTIVE_LOW>;
        avdd-supply = <&ab8500_ldo_aux1_reg>;

        touchscreen-size-x = <384>;
        touchscreen-size-y = <704>;
        touchscreen-inverted-y;
      };
    };
