%YAML 1.2
---
$id: http://devicetree.org/schemas/technologic,ts4800-ts.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: TS-4800 Touchscreen
maintainers:
  - Damien Riegel <damien.riegel@savoirfairelinux.com>

description: |
  * TS-4800 Touchscreen bindings

properties:
  compatible:
    items:
      - const: "technologic,ts4800-ts"

  reg:
    items:
      - description: physical base address of the controller
      - description: length of memory mapped region

  syscon:
    description: FPGA syscon register phandle and offsets
    items:
      - description: phandle to FPGA's syscon node
      - description: offset to the touchscreen register
      - description: offset to the touchscreen enable bit

required:
  - compatible
  - reg
  - syscon

additionalProperties: false

examples:
  - |
    touchscreen@0 {
        compatible = "technologic,ts4800-ts";
        reg = <0x1000 0x100>;
        syscon = <&fpga_syscon 0x10 0x4>;
    };
