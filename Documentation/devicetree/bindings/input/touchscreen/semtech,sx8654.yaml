%YAML 1.2
---
$id: http://devicetree.org/schemas/input/touchscreen/semtech,sx8654.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Semtech SX8654 I2C Touchscreen Controller

maintainers:
  - Richard Leitner <richard.leitner@linux.dev>
  - Rob Herring <robh@kernel.org>
  - Sébastien Szymanski <sebastien.szymanski@armadeus.com>

description: |
  * Semtech SX8654 I2C Touchscreen Controller

properties:
  compatible:
    description: Compatible string identifying the SX865x model.
    items:
      - enum:
          - semtech,sx8650
          - semtech,sx8654
          - semtech,sx8655
          - semtech,sx8656

  reg:
    description: I2C slave address for the touchscreen controller.

  interrupts:
    description: Interrupt line for touch events.

  reset-gpios:
    maxItems: 1
    description: GPIO specification for the NRST input.

required:
  - compatible
  - reg
  - interrupts

additionalProperties: false

examples:
  - |
    sx8654@48 {
      compatible = "semtech,sx8654";
      reg = <0x48>;
      interrupts = <3 IRQ_TYPE_EDGE_FALLING>;
      reset-gpios = <&gpio4 2 GPIO_ACTIVE_LOW>;
    };
