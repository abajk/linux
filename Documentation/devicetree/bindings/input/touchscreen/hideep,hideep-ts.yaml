%YAML 1.2
---
$id: http://devicetree.org/schemas/input/touchscreen/hideep,hideep-ts.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: HiDeep Finger and Stylus touchscreen controller

maintainers:
  - Anthony Kim <anthony.kim@hideep.com>
  - Jonathan Neuschäfer <j.neuschaefer@gmx.net>
  - Rob Herring <robh@kernel.org>

description: |
  HiDeep Finger and Stylus touchscreen controller

  Required properties:
  - compatible: must be "hideep,hideep-ts"
  - reg: I2C slave address (e.g. 0x6C)
  - interrupts: Interrupt to which the chip is connected

  Optional properties:
  - vdd-supply: Controller main voltage supply (3.3V)
  - vid-supply: IO voltage supply (1.8V)
  - reset-gpios: GPIO to reset the touchscreen IC
  - touchscreen-size-x: X axis size of the touchscreen in pixels
  - touchscreen-size-y: Y axis size of the touchscreen in pixels
  - linux,keycodes: Up to 3 numeric keycode values for button presses

properties:
  compatible:
    items:
      - const: hideep,hideep-ts
  reg:
    items:
      - description: I2C slave address
  interrupts:
    items:
      - description: Interrupt line and trigger type
  vdd-supply:
    description: Main voltage regulator supply (3.3V)
  vid-supply:
    description: IO voltage regulator supply (1.8V)
  reset-gpios:
    maxItems: 1
    description: Reset GPIO for the touchscreen IC
  touchscreen-size-x:
    $ref: /schemas/types.yaml#/definitions/uint32
    description: X axis size of the touchscreen in pixels
  touchscreen-size-y:
    $ref: /schemas/types.yaml#/definitions/uint32
    description: Y axis size of the touchscreen in pixels
  linux,keycodes:
    $ref: /schemas/types.yaml#/definitions/uint32-array
    maxItems: 3
    description: Up to 3 numeric keycodes for button presses

required:
  - compatible
  - reg
  - interrupts

additionalProperties: false

examples:
  - |
    i2c@00000000 {
      touchscreen@6c {
        compatible = "hideep,hideep-ts";
        reg = <0x6c>;
        interrupts = <2 IRQ_TYPE_LEVEL_LOW>;
        vdd-supply = <&ldo15_reg>;
        vid-supply = <&ldo18_reg>;
        reset-gpios = <&gpx1 5 0>;
        touchscreen-size-x = <1080>;
        touchscreen-size-y = <1920>;
        linux,keycodes = <KEY_HOME>, <KEY_MENU>, <KEY_BACK>;
      };
    };
