%YAML 1.2
---
$id: http://devicetree.org/schemas/hisilicon,hip04-rng.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Hisilicon Random Number Generator

maintainers:
  - Kefeng Wang <wangkefeng.wang@huawei.com>

properties:
  compatible:
    items:
      - enum:
          - hisilicon,hip04-rng
          - hisilicon,hip05-rng

  reg:
    description: Register block base address and size.
    items:
      - description: Base address of RNG registers
      - description: Size of RNG register region

required:
  - compatible
  - reg

additionalProperties: false

examples:
  - |
    rng@d1010000 {
        compatible = "hisilicon,hip05-rng";
        reg = <0xd1010000 0x100>;
    };
