%YAML 1.2
---
$id: http://devicetree.org/schemas/sunw,n2-rng.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: HWRNG support for the n2_rng driver

maintainers:
  - Rob Herring <robh@kernel.org>

description: |
  HWRNG support for the n2_rng driver

  PS: see as well prtconfs.git by DaveM

properties:
  compatible:
    items:
      - enum:
          - SUNW,n2-rng
          - SUNW,vf-rng
          - SUNW,kt-rng
          - ORCL,m4-rng
          - ORCL,m7-rng

  reg:
    items:
      - description: base address to sample from

  rng-#units:
    description: Number of random number generator units.
    $ref: /schemas/types.yaml#/definitions/uint32

  name:
    description: Human-readable name of the random number generator.
    $ref: /schemas/types.yaml#/definitions/string

required:
  - compatible
  - reg

additionalProperties: false

examples:
  - |
    node@f029a4f4 {
        compatible = "ORCL,m4-rng";
        reg = <0x0000000e>;
        rng-#units = <0x00000002>;
        name = "random-number-generator";
    };
  - |
    node@f028c08c {
        compatible = "ORCL,m7-rng";
        reg = <0x0000000e>;
        rng-#units = <0x00000003>;
        name = "random-number-generator";
    };
