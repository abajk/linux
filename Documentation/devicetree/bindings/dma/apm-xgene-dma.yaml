%YAML 1.2
---
$id: http://devicetree.org/schemas/dma/apm-xgene-dma.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: APM X-Gene SoC DMA nodes

maintainers:
  - Rameshwar Prasad Sahu <rsahu@apm.com>

description: |
  Applied Micro X-Gene SoC DMA nodes

  DMA nodes are defined to describe on-chip DMA interfaces in APM X-Gene SoC.

properties:
  compatible:
    # list of compatible strings
    items:
      - const: apm,xgene-dma

  device_type:
    const: dma
    description: Must be set to "dma".

  reg:
    # register address spaces for DMA interface in order
    items:
      - description: DMA control and status register address space
      - description: Descriptor ring control and status register address space
      - description: Descriptor ring command register address space
      - description: SoC efuse register address space

  interrupts:
    # interrupt lines for DMA interface
    items:
      - description: DMA error reporting interrupt
      - description: DMA channel 0 completion interrupt
      - description: DMA channel 1 completion interrupt
      - description: DMA channel 2 completion interrupt
      - description: DMA channel 3 completion interrupt

  clocks:
    # DMA clock
    maxItems: 1
    description: Reference to the DMA clock.

  dma-coherent:
    description: Indicates that DMA operations are coherent.
    type: boolean

required:
  - compatible
  - device_type
  - reg
  - interrupts
  - clocks

additionalProperties: false

examples:
  - |
    dma@1f270000 {
      compatible = "apm,xgene-dma";
      device_type = "dma";
      reg = <0x0 0x1f270000 0x0 0x10000>,
            <0x0 0x1f200000 0x0 0x10000>,
            <0x0 0x1b000000 0x0 0x400000>,
            <0x0 0x1054a000 0x0 0x100>;
      interrupts = <0x0 0x82 0x4>,
                   <0x0 0xb8 0x4>,
                   <0x0 0xb9 0x4>,
                   <0x0 0xba 0x4>,
                   <0x0 0xbb 0x4>;
      dma-coherent;
      clocks = <&dmaclk 0>;
    };
