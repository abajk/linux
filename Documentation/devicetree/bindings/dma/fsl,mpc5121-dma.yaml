%YAML 1.2
---
$id: http://devicetree.org/schemas/dma/fsl,mpc5121-dma.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Freescale MPC512x and MPC8308 DMA Controller

maintainers:
  - Alexander Popov <a13xp0p0v88@gmail.com>

description: |
  * Freescale MPC512x and MPC8308 DMA Controller

  The DMA controller in Freescale MPC512x and MPC8308 SoCs can move
  blocks of memory contents between memory and peripherals or
  from memory to memory.

  Refer to "Generic DMA Controller and DMA request bindings" in
  the dma/dma.txt file for a more detailed description of binding.

properties:
  compatible:
    items:
      - const: fsl,mpc5121-dma
      - const: fsl,mpc8308-dma

  reg:
    description: "DMA controller registers: base address and size."
    items:
      - description: DMA controller register region

  interrupts:
    description: Interrupt specifier for this DMA controller.
    items:
      - description: DMA controller interrupt

  '#dma-cells':
    description: The length of the DMA specifier; must be 1.
    const: 1

required:
  - compatible
  - reg
  - interrupts
  - '#dma-cells'

additionalProperties: false

examples:
  - |
    dma0: dma@14000 {
        compatible = "fsl,mpc5121-dma";
        reg = <0x14000 0x1800>;
        interrupts = <65 0x8>;
        #dma-cells = <1>;
    };
