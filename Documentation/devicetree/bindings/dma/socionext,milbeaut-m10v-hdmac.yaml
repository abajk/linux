%YAML 1.2
---
$id: http://devicetree.org/schemas/socionext,milbeaut-m10v-hdmac.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Socionext Milbeaut M10V HDMAC
maintainers:
  - Jassi Brar <jaswinder.singh@linaro.org>

description: |
  * Milbeaut AHB DMA Controller

  Milbeaut AHB DMA controller has transfer capability below.
   - device to memory transfer
   - memory to device transfer

properties:
  compatible:
    items:
      - const: socionext,milbeaut-m10v-hdmac
  reg:
    items:
      - description: DMA registers location and length
  interrupts:
    description: Per-channel DMA interrupts
    items:
      description: DMA channel interrupt
    minItems: 2
    maxItems: 8
  '#dma-cells':
    description: DMA slave ID
    const: 1
  clocks:
    description: Clock for HDMAC module
    maxItems: 1

required:
  - compatible
  - reg
  - interrupts
  - '#dma-cells'
  - clocks

additionalProperties: false

examples:
  - |
    hdmac1: dma-controller@1e110000 {
      compatible = "socionext,milbeaut-m10v-hdmac";
      reg = <0x1e110000 0x10000>;
      interrupts = <0 132 4>,
                   <0 133 4>,
                   <0 134 4>,
                   <0 135 4>,
                   <0 136 4>,
                   <0 137 4>,
                   <0 138 4>,
                   <0 139 4>;
      #dma-cells = <1>;
      clocks = <&dummy_clk>;
    };
