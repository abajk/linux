%YAML 1.2
---
$id: http://devicetree.org/schemas/dma/st,stih407-fdma-mpe31-11.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: STMicroelectronics Flexible Direct Memory Access Controller

maintainers:
  - Peter Griffin <peter.griffin@linaro.org>
  - Rob Herring <robh@kernel.org>

description: |
  STMicroelectronics Flexible Direct Memory Access Device Tree bindings

  The FDMA is a general-purpose direct memory access controller capable of
  supporting 16 independent DMA channels. It accepts up to 32 DMA requests.
  The FDMA is based on a Slim processor which requires a firmware.

  See: Documentation/devicetree/bindings/clock/clock-bindings.txt

properties:
  compatible:
    oneOf:
      - items:
          - enum:
              - st,stih407-fdma-mpe31-11
              - st,stih407-fdma-mpe31-12
              - st,stih407-fdma-mpe31-13
          - const: st,slim-rproc
      - items:
          - const: st,slim-rproc

  reg:
    items:
      - description: slimcore registers
      - description: data memory registers
      - description: peripherals registers
      - description: instruction memory registers

  reg-names:
    items:
      - const: slimcore
      - const: dmem
      - const: peripherals
      - const: imem

  interrupts:
    description: Interrupt line shared by all DMA channels
    items:
      - description: DMA controller interrupt

  clocks:
    description: Clock phandles for each FDMA region
    items:
      - description: slimcore clock
      - description: data memory clock
      - description: peripherals clock
      - description: instruction memory clock

  dma-channels:
    description: Number of DMA channels supported by the controller
    $ref: /schemas/types.yaml#/definitions/uint32

  '#dma-cells':
    description: Number of cells used to specify a DMA request
    const: 3

required:
  - compatible
  - reg
  - reg-names
  - interrupts
  - clocks
  - dma-channels
  - '#dma-cells'

additionalProperties: false

examples:
  - |
    fdma0: dma-controller@8e20000 {
      compatible = "st,stih407-fdma-mpe31-11", "st,slim-rproc";
      reg = <0x8e20000 0x8000>,
            <0x8e30000 0x3000>,
            <0x8e37000 0x1000>,
            <0x8e38000 0x8000>;
      reg-names = "slimcore", "dmem", "peripherals", "imem";
      clocks = <&clk_s_c0_flexgen CLK_FDMA>,
               <&clk_s_c0_flexgen CLK_EXT2F_A9>,
               <&clk_s_c0_flexgen CLK_EXT2F_A9>,
               <&clk_s_c0_flexgen CLK_EXT2F_A9>;
      interrupts = <GIC_SPI 5 IRQ_TYPE_NONE>;
      dma-channels = <16>;
      #dma-cells = <3>;
    };
