%YAML 1.2
---
$id: http://devicetree.org/schemas/dma/xilinx/xlnx,axi-vdma-1.00.a.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Xilinx AXI DMA Controller

maintainers:
  - Andrea Merello <andrea.merello@gmail.com>
  - Eric Engestrom <eric@engestrom.ch>
  - Kedareswara rao Appana <appana.durga.rao@xilinx.com>
  - Radhey Shyam Pandey <radhey.shyam.pandey@amd.com>
  - Radhey Shyam Pandey <radhey.shyam.pandey@xilinx.com>
  - Srikanth Thokala <sthokal@xilinx.com>

description: |
  Xilinx AXI VDMA engine, it does transfers between memory and video devices.
  It can be configured to have one channel or two channels. If configured
  as two channels, one is to transmit to the video device and another is
  to receive from the video device.

  Xilinx AXI DMA engine, it does transfers between memory and AXI4 stream
  target devices. It can be configured to have one channel or two channels.
  If configured as two channels, one is to transmit to the device and another
  is to receive from the device.

  Xilinx AXI CDMA engine, it does transfers between memory-mapped source
  address and a memory-mapped destination address.

  Xilinx AXI MCDMA engine, it does transfer between memory and AXI4 stream
  target devices. It can be configured to have up to 16 independent transmit
  and receive channels.

properties:
  compatible:
    oneOf:
      - items:
          - const: xlnx,axi-vdma-1.00.a
      - items:
          - const: xlnx,axi-dma-1.00.a
      - items:
          - const: xlnx,axi-cdma-1.00.a
      - items:
          - const: xlnx,axi-mcdma-1.00.a

  '#dma-cells':
    description: Number of DMA cells
    const: 1

  reg:
    items:
      - description: Register base address
      - description: Register size in bytes

  xlnx,addrwidth:
    description: The DMA addressing size in bits
    $ref: /schemas/types.yaml#/definitions/uint32

  dma-ranges:
    items:
      - description: DMA address
      - description: CPU address
      - description: Maximum transfer length

  clocks:
    maxItems: 5
    description: Input clocks for the DMA engine

  clock-names:
    items:
      - const: s_axi_lite_aclk
      - const: m_axi_mm2s_aclk
      - const: m_axi_s2mm_aclk
      - const: m_axi_sg_aclk
      - const: m_axis_mm2s_aclk
      - const: s_axis_s2mm_aclk

  xlnx,num-fstores:
    description: Number of framebuffers (VDMA only)
    $ref: /schemas/types.yaml#/definitions/uint32

  xlnx,flush-fsync:
    description: Flush on frame sync setting (VDMA only)
    $ref: /schemas/types.yaml#/definitions/uint32

  xlnx,sg-length-width:
    description: Length width of SG register in bits (AXI DMA and MCDMA only)
    $ref: /schemas/types.yaml#/definitions/uint32

  xlnx,axistream-connected:
    description: Whether DMA is connected to AXI Stream IP (AXI DMA only)
    type: boolean

  xlnx,irq-delay:
    description: Interrupt delay timeout value (AXI DMA only)
    $ref: /schemas/types.yaml#/definitions/uint32

  dmas:
    description: List of DMA controllers and channel IDs (DMA clients only)
    $ref: /schemas/types.yaml#/definitions/phandle-array

  dma-names:
    description: DMA channel names (DMA clients only)
    $ref: /schemas/types.yaml#/definitions/string-array

required:
  - compatible
  - '#dma-cells'
  - reg

additionalProperties: false

examples:
  - |
    axi_vdma_0: axivdma@40030000 {
      compatible = "xlnx,axi-vdma-1.00.a";
      #dma-cells = <1>;
      reg = <0x40030000 0x10000>;
      dma-ranges = <0x00000000 0x00000000 0x40000000>;
      xlnx,num-fstores = <0x8>;
      xlnx,flush-fsync = <0x1>;
      xlnx,addrwidth = <0x20>;
      clocks = <&clk 0>, <&clk 1>, <&clk 2>, <&clk 3>, <&clk 4>;
      clock-names = "s_axi_lite_aclk", "m_axi_mm2s_aclk", "m_axi_s2mm_aclk",
                    "m_axi_sg_aclk", "m_axis_mm2s_aclk", "s_axis_s2mm_aclk";
      dma-channel@40030000 {
        compatible = "xlnx,axi-vdma-mm2s-channel";
        interrupts = <0 54 4>;
        xlnx,datawidth = <0x40>;
      };
      dma-channel@40030030 {
        compatible = "xlnx,axi-vdma-s2mm-channel";
        interrupts = <0 53 4>;
        xlnx,datawidth = <0x40>;
      };
    };
  - |
    vdmatest_0: vdmatest@0 {
      compatible = "xlnx,axi-vdma-test-1.00.a";
      dmas = <&axi_vdma_0 0 &axi_vdma_0 1>;
      dma-names = "vdma0", "vdma1";
    };
