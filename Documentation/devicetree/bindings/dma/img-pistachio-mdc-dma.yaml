%YAML 1.2
---
$id: http://devicetree.org/schemas/img-pistachio-mdc-dma.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: IMG Multi-threaded DMA Controller (MDC)

maintainers:
  - Andrew Bresticker <abrestic@chromium.org>

description: |
  * IMG Multi-threaded DMA Controller (MDC)

properties:
  compatible:
    const: img,pistachio-mdc-dma
    description: Must be "img,pistachio-mdc-dma".
  reg:
    items:
      - description: Base address of the MDC registers.
      - description: Length of the MDC registers.
    description: Base address and length of the MDC registers.
  interrupts:
    minItems: 1
    description: Per-channel DMA interrupts.
  clocks:
    maxItems: 1
    description: Must contain an entry for each entry in clock-names.
      See ../clock/clock-bindings.txt for details.
  clock-names:
    items:
      - const: sys
    description: Name of the MDC system interface clock.
  img,cr-periph:
    $ref: /schemas/types.yaml#/definitions/phandle
    description: Phandle to the peripheral control syscon node which
      contains the DMA request to channel mapping registers.
  img,max-burst-multiplier:
    $ref: /schemas/types.yaml#/definitions/uint32
    description: Maximum supported burst size multiplier.
      The maximum burst size is this value multiplied by the hardware-reported bus width.
  '#dma-cells':
    const: 3
    description: Must be 3. The first cell is the peripheral's DMA request line,
      the second cell is a bitmap specifying to which channels the DMA request
      line may be mapped, the third cell is the thread ID to be used by the
      channel.
  dma-channels:
    $ref: /schemas/types.yaml#/definitions/uint32
    minimum: 1
    maximum: 32
    description: Number of supported DMA channels, up to 32.
      If not specified the number reported by the hardware is used.

required:
  - compatible
  - reg
  - interrupts
  - clocks
  - clock-names
  - img,cr-periph
  - img,max-burst-multiplier
  - '#dma-cells'

additionalProperties: false

examples:
  - |
    mdc: dma-controller@18143000 {
        compatible = "img,pistachio-mdc-dma";
        reg = <0x18143000 0x1000>;
        interrupts = <GIC_SHARED 27 IRQ_TYPE_LEVEL_HIGH>,
                     <GIC_SHARED 28 IRQ_TYPE_LEVEL_HIGH>,
                     <GIC_SHARED 29 IRQ_TYPE_LEVEL_HIGH>,
                     <GIC_SHARED 30 IRQ_TYPE_LEVEL_HIGH>,
                     <GIC_SHARED 31 IRQ_TYPE_LEVEL_HIGH>,
                     <GIC_SHARED 32 IRQ_TYPE_LEVEL_HIGH>,
                     <GIC_SHARED 33 IRQ_TYPE_LEVEL_HIGH>,
                     <GIC_SHARED 34 IRQ_TYPE_LEVEL_HIGH>,
                     <GIC_SHARED 35 IRQ_TYPE_LEVEL_HIGH>,
                     <GIC_SHARED 36 IRQ_TYPE_LEVEL_HIGH>;
        clocks = <&system_clk>;
        clock-names = "sys";
        img,max-burst-multiplier = <16>;
        img,cr-periph = <&cr_periph>;
        #dma-cells = <3>;
    };
