%YAML 1.2
---
$id: http://devicetree.org/schemas/apm-xgene-pmu.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: APM X-Gene SoC PMU

maintainers:
  - Tai Nguyen <ttnguyen@apm.com>

description: |
  * APM X-Gene SoC PMU bindings

  This is APM X-Gene SoC PMU (Performance Monitoring Unit) module.
  The following PMU devices are supported:

    L3C            - L3 cache controller
    IOB            - IO bridge
    MCB            - Memory controller bridge
    MC             - Memory controller

  The following section describes the SoC PMU DT node binding.

properties:
  compatible:
    items:
      - enum:
          - apm,xgene-pmu
          - apm,xgene-pmu-v2
          - apm,xgene-pmu-l3c
          - apm,xgene-pmu-iob
          - apm,xgene-pmu-mcb
          - apm,xgene-pmu-mc
    description: >
      Supported compatible strings for the root PMU node and its subnodes.

  "#address-cells":
    const: 2

  "#size-cells":
    const: 2

  ranges:
    description: >
      Indicates this node does not map any address ranges.

  regmap-csw: true
  regmap-mcba: true
  regmap-mcbb: true

  reg:
    description: CPU bus PMU resource.
    items:
      - description: CPU bus PMU resource

  interrupts:
    description: IRQ specifier for the PMU interrupt.
    items:
      - description: PMU IRQ

  enable-bit-index:
    description: >
      Specifies which bit enables the associated resource in MCB or MC subnodes.

required:
  - compatible
  - regmap-csw
  - regmap-mcba
  - regmap-mcbb
  - reg
  - interrupts

additionalProperties: false

examples:
  - |
    csw: csw@7e200000 {
        compatible = "apm,xgene-csw", "syscon";
        reg = <0x0 0x7e200000 0x0 0x1000>;
    };

    mcba: mcba@7e700000 {
        compatible = "apm,xgene-mcb", "syscon";
        reg = <0x0 0x7e700000 0x0 0x1000>;
    };

    mcbb: mcbb@7e720000 {
        compatible = "apm,xgene-mcb", "syscon";
        reg = <0x0 0x7e720000 0x0 0x1000>;
    };

    pmu: pmu@78810000 {
        compatible = "apm,xgene-pmu-v2";
        #address-cells = <2>;
        #size-cells = <2>;
        ranges;
        regmap-csw = <&csw>;
        regmap-mcba = <&mcba>;
        regmap-mcbb = <&mcbb>;
        reg = <0x0 0x78810000 0x0 0x1000>;
        interrupts = <0x0 0x22 0x4>;

        pmul3c@7e610000 {
            compatible = "apm,xgene-pmu-l3c";
            reg = <0x0 0x7e610000 0x0 0x1000>;
        };

        pmuiob@7e940000 {
            compatible = "apm,xgene-pmu-iob";
            reg = <0x0 0x7e940000 0x0 0x1000>;
        };

        pmucmcb@7e710000 {
            compatible = "apm,xgene-pmu-mcb";
            reg = <0x0 0x7e710000 0x0 0x1000>;
            enable-bit-index = <0>;
        };

        pmucmcb@7e730000 {
            compatible = "apm,xgene-pmu-mcb";
            reg = <0x0 0x7e730000 0x0 0x1000>;
            enable-bit-index = <1>;
        };

        pmucmc@7e810000 {
            compatible = "apm,xgene-pmu-mc";
            reg = <0x0 0x7e810000 0x0 0x1000>;
            enable-bit-index = <0>;
        };

        pmucmc@7e850000 {
            compatible = "apm,xgene-pmu-mc";
            reg = <0x0 0x7e850000 0x0 0x1000>;
            enable-bit-index = <1>;
        };

        pmucmc@7e890000 {
            compatible = "apm,xgene-pmu-mc";
            reg = <0x0 0x7e890000 0x0 0x1000>;
            enable-bit-index = <2>;
        };

        pmucmc@7e8d0000 {
            compatible = "apm,xgene-pmu-mc";
            reg = <0x0 0x7e8d0000 0x0 0x1000>;
            enable-bit-index = <3>;
        };
    };
