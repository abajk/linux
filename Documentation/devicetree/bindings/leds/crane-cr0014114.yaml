%YAML 1.2
---
$id: http://devicetree.org/schemas/leds/crane-cr0014114.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Crane cr0014114 LED driver

maintainers:
  - Jacek Anaszewski <jacek.anaszewski@gmail.com>
  - Oleh Kravchenko <oleg@kaa.org.ua>

description: |
  Crane Merchandising System - cr0014114 LED driver

  This LED Board is widely used in vending machines produced
  by Crane Merchandising Systems.

  Property rules described in Documentation/devicetree/bindings/spi/spi-bus.txt
  apply. In particular, "reg" and "spi-max-frequency" properties must be given.

properties:
  compatible:
    description: Device compatible string.
    $ref: /schemas/types.yaml#/definitions/string-array
    items:
      - const: crane,cr0014114

  reg:
    description: SPI chip select number.
    items:
      - description: SPI chip select.

  spi-max-frequency:
    description: Maximum SPI clock frequency in Hz.
    $ref: /schemas/types.yaml#/definitions/uint32

  "#address-cells":
    const: 1

  "#size-cells":
    const: 0

patternProperties:
  "^led@[0-9]+$":
    description: LED sub-node definition.
    $ref: common.yaml#
    unevaluatedProperties: false

    properties:
      reg:
        description: LED index.
        items:
          - description: LED index.

    required:
      - reg
      - function
      - color

additionalProperties: false

examples:
  - |
    #include <dt-bindings/leds/common.h>
    led-controller@0 {
        compatible = "crane,cr0014114";
        reg = <0>;
        spi-max-frequency = <50000>;
        #address-cells = <1>;
        #size-cells = <0>;

        led@0 {
            reg = <0>;
            function = "coin";
            color = <LED_COLOR_ID_RED>;
        };
        led@1 {
            reg = <1>;
            function = "coin";
            color = <LED_COLOR_ID_GREEN>;
        };
        led@2 {
            reg = <2>;
            function = "coin";
            color = <LED_COLOR_ID_BLUE>;
        };
        led@3 {
            reg = <3>;
            function = "bill";
            color = <LED_COLOR_ID_RED>;
        };
        led@4 {
            reg = <4>;
            function = "bill";
            color = <LED_COLOR_ID_GREEN>;
        };
        led@5 {
            reg = <5>;
            function = "bill";
            color = <LED_COLOR_ID_BLUE>;
        };
    };
