%YAML 1.2
---
$id: http://devicetree.org/schemas/leds/leds-is31fl32xx.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: ISSI IS31FL32xx and Si-En SN32xx LED drivers

maintainers:
  - David Rivshin <drivshin@allworx.com>

description: |
  Binding for ISSI IS31FL32xx and Si-En SN32xx LED Drivers

  The IS31FL32xx/SN32xx family of LED drivers are I2C devices with multiple
  constant-current channels, each with independent 256-level PWM control.
  Each LED is represented as a sub-node of the device.

properties:
  compatible:
    items:
      - enum:
          - issi,is31fl3236
          - issi,is31fl3235
          - issi,is31fl3218
          - issi,is31fl3216
          - si-en,sn3218
          - si-en,sn3216
    description: Device compatible string.

  reg:
    description: I2C slave address.
    items:
      - description: Slave address

  "#address-cells":
    const: 1
    description: Number of address cells for LED sub-nodes.

  "#size-cells":
    const: 0
    description: Number of size cells for LED sub-nodes.

patternProperties:
  "^led@.*":
    description: LED sub-node for individual LED channels.
    type: object
    additionalProperties: false
    properties:
      reg:
        description: LED channel number.
        items:
          - description: Channel number
      label:
        description: Label for LED.
        $ref: /schemas/types.yaml#/definitions/string-array
      linux,default-trigger:
        description: Default trigger for LED.
        $ref: /schemas/types.yaml#/definitions/string-array
    required:
      - reg

required:
  - compatible
  - reg
  - "#address-cells"
  - "#size-cells"

additionalProperties: false

examples:
  - |
    is31fl3236: led-controller@3c {
        compatible = "issi,is31fl3236";
        reg = <0x3c>;
        #address-cells = <1>;
        #size-cells = <0>;

        led@1 {
            reg = <1>;
            label = "EB:blue:usr0";
        };
        led@2 {
            reg = <2>;
            label = "EB:blue:usr1";
        };
        ...
        led@36 {
            reg = <36>;
            label = "EB:blue:usr35";
        };
    };
