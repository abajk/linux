%YAML 1.2
---
$id: http://devicetree.org/schemas/leds/lacie,ns2-leds.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: LACIE NS2 dual-GPIO LEDs

maintainers:
  - Grant Likely <grant.likely@secretlab.ca>
  - Vincent Donnefort <vdonnefort@gmail.com>

description: |
  Binding for dual-GPIO LED found on Network Space v2 (and parents).

  Each LED is represented as a sub-node of the ns2-leds device.

properties:
  compatible:
    const: lacie,ns2-leds

patternProperties:
  "^.*$":
    description: A single LED sub-node.
    $ref: common.yaml#
    unevaluatedProperties: false

    properties:
      cmd-gpio:
        description: Command LED GPIO. See OF device-tree GPIO specification.
        maxItems: 1

      slow-gpio:
        description: Slow LED GPIO. See OF device-tree GPIO specification.
        maxItems: 1

      modes-map:
        description: A mapping between LED modes (off, on or SATA activity blinking) and
          the corresponding cmd-gpio/slow-gpio values. All the GPIO values combinations
          should be given in order to avoid having an unknown mode at driver probe time.
        $ref: /schemas/types.yaml#/definitions/uint32-array

    required:
      - cmd-gpio
      - slow-gpio
      - modes-map

additionalProperties: false

examples:
  - |
    #include <dt-bindings/leds/leds-ns2.h>
    lacie,ns2-leds {
      compatible = "lacie,ns2-leds";
      blue-sata {
        label = "ns2:blue:sata";
        slow-gpio = <&gpio0 29 0>;
        cmd-gpio = <&gpio0 30 0>;
        modes-map = <NS_V2_LED_OFF  0 1
                     NS_V2_LED_ON   1 0
                     NS_V2_LED_ON   0 0
                     NS_V2_LED_SATA 1 1>;
      };
    };
