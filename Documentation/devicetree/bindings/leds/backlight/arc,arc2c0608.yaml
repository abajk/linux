%YAML 1.2
---
$id: http://devicetree.org/schemas/leds/backlight/arc,arc2c0608.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: ArcticSand arc2c0608 LED backlight controller

maintainers:
  - Olimpiu Dejeu <olimpiu@arcticsand.com>

description: |
  Binding for ArcticSand arc2c0608 LED driver

  Note: Optional properties not specified will default to values in IC EPROM

properties:
  compatible:
    items:
      - const: arc,arc2c0608

  reg:
    items:
      - description: Slave address of the LED driver

  default-brightness:
    description: Brightness value on boot (0-4095)
    $ref: /schemas/types.yaml#/definitions/uint32
    minimum: 0
    maximum: 4095

  label:
    description: Label of the backlight device
    $ref: /schemas/types.yaml#/definitions/string

  linux,default-trigger:
    description: Default Linux trigger for the backlight
    $ref: /schemas/types.yaml#/definitions/string

  led-sources:
    description: List of enabled LED channels (0 to 5)
    $ref: /schemas/types.yaml#/definitions/uint32-array
    items:
      minimum: 0
      maximum: 5

  arc,led-config-0:
    description: Setting for register ILED_CONFIG_0
    $ref: /schemas/types.yaml#/definitions/uint32

  arc,led-config-1:
    description: Setting for register ILED_CONFIG_1
    $ref: /schemas/types.yaml#/definitions/uint32

  arc,dim-freq:
    description: PWM mode frequency setting (bits [3:0] used)
    $ref: /schemas/types.yaml#/definitions/uint32

  arc,comp-config:
    description: Setting for register CONFIG_COMP
    $ref: /schemas/types.yaml#/definitions/uint32

  arc,filter-config:
    description: Setting for register FILTER_CONFIG
    $ref: /schemas/types.yaml#/definitions/uint32

  arc,trim-config:
    description: Setting for register IMAXTUNE
    $ref: /schemas/types.yaml#/definitions/uint32

required:
  - compatible
  - reg

additionalProperties: false

examples:
  - |
    arc2c0608@30 {
        compatible = "arc,arc2c0608";
        reg = <0x30>;
        default-brightness = <500>;
        label = "lcd-backlight";
        linux,default-trigger = "backlight";
        led-sources = <0 1 2 5>;
    };
