%YAML 1.2
---
$id: http://devicetree.org/schemas/ti,tps65217.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: TI TPS65217 Backlight
maintainers:
  - Rob Herring <robh@kernel.org>

description: |
  TPS65217 family of regulators

  The TPS65217 chip contains a boost converter and current sinks which can be
  used to drive LEDs for use as backlights.

  Each regulator is defined using the standard binding for regulators.

properties:
  compatible:
    items:
      - const: ti,tps65217

  reg:
    description: I2C slave address
    items:
      - description: I2C slave address

  backlight:
    description: Node for specifying WLED1 and WLED2 lines in TPS65217
    type: object
    additionalProperties: false
    properties:
      isel:
        description: Selection bit, 1 for ISEL1 (low-level) or 2 for ISEL2 (high-level)
        enum: [1, 2]
      fdim:
        description: PWM dimming frequency
        enum: [100, 200, 500, 1000]
      default-brightness:
        description: Default brightness level
        minimum: 0
        maximum: 100
    required:
      - isel
      - fdim
      - default-brightness

required:
  - compatible
  - reg
  - backlight

additionalProperties: false

examples:
  - |
    tps: tps@24 {
        compatible = "ti,tps65217";
        reg = <0x24>;
        backlight {
            isel = <1>;  /* 1 - ISET1, 2 ISET2 */
            fdim = <100>; /* TPS65217_BL_FDIM_100HZ */
            default-brightness = <50>;
        };
    };
