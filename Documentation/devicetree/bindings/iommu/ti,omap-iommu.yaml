%YAML 1.2
---
$id: http://devicetree.org/schemas/iommu/ti,omap-iommu.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: TI OMAP IOMMU

maintainers:
  - Florian Vaussard <florian.vaussard@epfl.ch>
  - Suman Anna <s-anna@ti.com>

description: |
  OMAP2+ IOMMU binding.

  Required properties:
  - compatible: one of "ti,omap2-iommu", "ti,omap4-iommu",
    "ti,dra7-dsp-iommu", or "ti,dra7-iommu"
  - ti,hwmods: Name of the hwmod associated with the IOMMU instance
  - reg: Address space for the configuration registers
  - interrupts: Interrupt specifier for the IOMMU instance
  - #iommu-cells: Must be 0

  Optional properties:
  - ti,#tlb-entries: Number of entries in the translation look-aside buffer.
    Either 8 or 32 (default: 32)
  - ti,iommu-bus-err-back: Indicates support for bus error response on MMU faults
  - ti,syscon-mmuconfig: Phandle to DSP_SYSTEM syscon node and MMU instance
    number (0-indexed); required for DRA7xx DSP IOMMU instances

properties:
  compatible:
    enum:
      - ti,omap2-iommu
      - ti,omap4-iommu
      - ti,dra7-dsp-iommu
      - ti,dra7-iommu

  ti,hwmods:
    description: Name of the hwmod associated with the IOMMU instance

  reg:
    description: Address space for the configuration registers
    items:
      - description: <address>
      - description: <size>

  interrupts:
    description: Interrupt specifier for the IOMMU instance
    maxItems: 1

  '#iommu-cells':
    const: 0

  ti,#tlb-entries:
    description: Number of entries in the translation look-aside buffer
    $ref: /schemas/types.yaml#/definitions/uint32
    enum: [8, 32]

  ti,iommu-bus-err-back:
    description: Indicates support for bus error response on MMU faults
    type: boolean

  ti,syscon-mmuconfig:
    description: Phandle to DSP_SYSTEM syscon node and MMU instance number
    $ref: /schemas/types.yaml#/definitions/phandle-array
    items:
      - items:
          - description: phandle to syscon node
          - description: MMU instance number (0-indexed)

required:
  - compatible
  - ti,hwmods
  - reg
  - interrupts
  - "#iommu-cells"

additionalProperties: false

examples:
  - |
    /* OMAP3 ISP MMU */
    mmu_isp: mmu@480bd400 {
      compatible = "ti,omap2-iommu";
      ti,hwmods = "mmu_isp";
      reg = <0x480bd400 0x80>;
      interrupts = <24>;
      #iommu-cells = <0>;
      ti,#tlb-entries = <8>;
    };

    /* DRA74x DSP2 MMUs */
    mmu0_dsp2: mmu@41501000 {
      compatible = "ti,dra7-dsp-iommu";
      ti,hwmods = "mmu0_dsp2";
      reg = <0x41501000 0x100>;
      interrupts = <GIC_SPI 146 IRQ_TYPE_LEVEL_HIGH>;
      #iommu-cells = <0>;
      ti,syscon-mmuconfig = <&dsp2_system 0>;
    };

    mmu1_dsp2: mmu@41502000 {
      compatible = "ti,dra7-dsp-iommu";
      ti,hwmods = "mmu1_dsp2";
      reg = <0x41502000 0x100>;
      interrupts = <GIC_SPI 147 IRQ_TYPE_LEVEL_HIGH>;
      #iommu-cells = <0>;
      ti,syscon-mmuconfig = <&dsp2_system 1>;
    };
