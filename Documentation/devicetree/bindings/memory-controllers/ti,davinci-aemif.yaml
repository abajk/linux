%YAML 1.2
---
$id: http://devicetree.org/schemas/memory-controllers/ti,davinci-aemif.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Texas Instruments AEMIF Controller

maintainers:
  - Ivan Khoronzhuk <ivan.khoronzhuk@ti.com>
  - Rob Herring <robh@kernel.org>

description: |
  * Device tree bindings for Texas instruments AEMIF controller

  The Async External Memory Interface (EMIF16/AEMIF) controller is intended to
  provide a glue-less interface to a variety of asynchronous memory devices like
  ASRA M, NOR and NAND memory. A total of 256M bytes of any of these memories
  can be accessed at any given time via four chip selects with 64M byte access
  per chip select. Synchronous memories such as DDR1 SD RAM, SDR SDRAM
  and Mobile SDR are not supported.

  Documentation:
  Davinci DM646x - http://www.ti.com/lit/ug/sprueq7c/sprueq7c.pdf
  OMAP-L138 (DA850) - http://www.ti.com/lit/ug/spruh77a/spruh77a.pdf
  Kestone - http://www.ti.com/lit/ug/sprugz3a/sprugz3a.pdf

properties:
  compatible:
    items:
      - enum:
          - ti,davinci-aemif
          - ti,keystone-aemif
          - ti,da850-aemif
    description: List of compatible strings for the AEMIF controller.
  reg:
    description: Contains offset and length values for the AEMIF control registers space.
    items:
      - description: Control registers region
  "#address-cells":
    const: 2
    description: Number of address cells for child nodes.
  "#size-cells":
    const: 1
    description: Number of size cells for child nodes.
  ranges:
    description: |
      Memory regions mapped by the AEMIF controller, including CS-specific
      partitions and the control partition.
  clocks:
    maxItems: 1
    description: The clock feeding the AEMIF controller; required if clock tree data is present.
  clock-names:
    items:
      - const: aemif
    description: Name for the AEMIF controller clock.
  clock-ranges:
    type: boolean
    description: Empty property indicating that child nodes can inherit named clocks.

required:
  - compatible
  - reg
  - "#address-cells"
  - "#size-cells"
  - ranges

additionalProperties: false

examples:
  - |
    memory-controller@21000a00 {
      compatible = "ti,davinci-aemif";
      #address-cells = <2>;
      #size-cells = <1>;
      clocks = <&clkaemif 0>;
      clock-names = "aemif";
      clock-ranges;
      reg = <0x21000A00 0x00000100>;
      ranges = <0 0 0x70000000 0x10000000
                1 0 0x21000A00 0x00000100>;
    };
