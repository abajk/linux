%YAML 1.2
---
$id: http://devicetree.org/schemas/gpu/aspeed,ast2500-gfx.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: ASPEED GFX Display Controller

maintainers:
  - Joel Stanley <joel@jms.id.au>

description: |
  Device tree configuration for the GFX display device on the ASPEED SoCs

properties:
  compatible:
    items:
      - enum:
          - aspeed,ast2500-gfx
          - aspeed,ast2400-gfx
      - const: syscon
    description: >
      Device compatible strings. First must be one of the AST SoC GFX
      compatible values. Second must be "syscon" as required by the ASPEED
      pinctrl bindings.

  reg:
    items:
      - description: Physical base address of the GFX registers
      - description: Length of the GFX register region
    description: >
      Physical base address and length of the GFX registers.

  reg-io-width:
    $ref: /schemas/types.yaml#/definitions/uint32
    description: >
      Bus width (in bytes) of register accesses.

  clocks:
    maxItems: 1
    description: >
      Clock used to generate the pixel clock.

  resets:
    maxItems: 1
    description: >
      Reset line that must be released to use the GFX device.

  interrupts:
    items:
      - description: Interrupt number for the GFX device
    description: >
      Interrupt line for the GFX device.

  memory-region:
    $ref: /schemas/types.yaml#/definitions/phandle
    description: >
      Phandle to a reserved-memory region to use for the framebuffer.

required:
  - compatible
  - reg
  - interrupts
  - clocks
  - resets
  - memory-region

additionalProperties: false

examples:
  - |
    gfx: display@1e6e6000 {
        compatible = "aspeed,ast2500-gfx", "syscon";
        reg = <0x1e6e6000 0x1000>;
        reg-io-width = <4>;
        clocks = <&syscon ASPEED_CLK_GATE_D1CLK>;
        resets = <&syscon ASPEED_RESET_CRT1>;
        interrupts = <0x19>;
        memory-region = <&gfx_memory>;
    };
    gfx_memory: framebuffer {
        size = <0x01000000>;
        alignment = <0x01000000>;
        compatible = "shared-dma-pool";
        reusable;
    };
