%YAML 1.2
---
$id: http://devicetree.org/schemas/ti,palmas-pmic.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: TI Palmas PMIC
maintainers:
  - Bill Huang <bilhuang@nvidia.com>
  - J Keerthy <j-keerthy@ti.com>
  - Keerthy <j-keerthy@ti.com>
  - Laxman Dewangan <ldewangan@nvidia.com>
  - Nishanth Menon <nm@ti.com>
  - Rob Herring <robh@kernel.org>
  - Schuyler Patton <spatton@ti.com>

description: |
  * palmas regulator IP block devicetree bindings

  The tps659038 for the AM57x class have OTP spins that
  have different part numbers but the same functionality. There
  is not a need to add the OTP spins to the palmas driver. The
  spin devices should use the tps659038 as its compatible value.
  This is the list of those devices:
  tps659037

properties:
  compatible:
    description: Device compatible value(s) for Palmas PMIC.
    $ref: /schemas/types.yaml#/definitions/string-array
    items:
      - enum:
          - ti,twl6035-pmic
          - ti,twl6036-pmic
          - ti,twl6037-pmic
          - ti,tps65913-pmic
          - ti,tps65914-pmic
          - ti,tps65917-pmic
          - ti,tps659038-pmic
          - ti,palmas-pmic
  interrupts:
    description: PMIC interrupt specifier.
    items:
      - description: Interrupt number.
      - description: Interrupt type from interrupt-controller.
  interrupts-name:
    description: Names of the individual interrupts.
    $ref: /schemas/types.yaml#/definitions/string-array
    items:
      - enum: [short-irq]
  ti,ldo6-vibrator:
    description: LDO6 operates in vibrator mode if present.
    type: boolean
  ti,system-power-controller:
    description: PMIC controls system power if present.
    type: boolean
  regulators:
    description: PMIC regulator subnodes.
    type: object
    patternProperties:
      '^[a-zA-Z0-9,_+-]+$':
        description: Individual regulator settings.
        type: object
        required:
          - regulator-name
          - regulator-min-microvolt
          - regulator-max-microvolt
        properties:
          regulator-name:
            description: Name of the regulator.
            $ref: /schemas/types.yaml#/definitions/string
          regulator-min-microvolt:
            description: Minimum voltage in microvolts.
          regulator-max-microvolt:
            description: Maximum voltage in microvolts.
          regulator-always-on:
            description: Keep regulator enabled at all times.
            type: boolean
          regulator-boot-on:
            description: Enable regulator at boot.
            type: boolean
          ti,warm-reset:
            description: Maintain voltage during warm reset.
            type: boolean
          ti,roof-floor:
            description: Control rail by external pin (1=ENABLE1, 2=ENABLE2, 3=NSLEEP).
            $ref: /schemas/types.yaml#/definitions/int32
            enum: [1, 2, 3]
          ti,mode-sleep:
            description: PMIC sleep mode (0=off,1=auto,2=eco,3=forced-pwm).
            $ref: /schemas/types.yaml#/definitions/int32
            enum: [0, 1, 2, 3]
          ti,smps-range:
            description: Override SMPS hardware range (0=low,1=high).
            $ref: /schemas/types.yaml#/definitions/int32
            enum: [0, 1]
        additionalProperties: false
    additionalProperties: false

required:
  - compatible
  - interrupts
  - interrupts-name

additionalProperties: false

examples:
  - |
    #include <dt-bindings/interrupt-controller/irq.h>
    pmic {
        compatible = "ti,twl6035-pmic", "ti,palmas-pmic";
        interrupts = <14 IRQ_TYPE_NONE>;
        interrupts-name = "short-irq";

        ti,ldo6-vibrator;

        ti,system-power-controller;

        regulators {
            smps12_reg: smps12 {
                regulator-name = "smps12";
                regulator-min-microvolt = <600000>;
                regulator-max-microvolt = <1500000>;
                regulator-always-on;
                regulator-boot-on;
                ti,warm-reset;
                ti,roof-floor = <1>; /* ENABLE1 control */
                ti,mode-sleep = <0>;
                ti,smps-range = <1>;
            };

            ldo1_reg: ldo1 {
                regulator-name = "ldo1";
                regulator-min-microvolt = <2800000>;
                regulator-max-microvolt = <2800000>;
            };
        };
    };
