%YAML 1.2
---
$id: http://devicetree.org/schemas/regulator/pvs-pv88060.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Powerventure Semiconductor PV88060 Voltage Regulator

maintainers:
  - Geert Uytterhoeven <geert+renesas@glider.be>
  - James Ban <James.Ban.opensource@diasemi.com>

properties:
  compatible:
    enum:
      - pvs,pv88060

  reg:
    maxItems: 1
    description: I2C slave address, usually 0x49

  interrupts:
    description: the interrupt outputs of the controller
    items:
      - description: primary interrupt output
      - description: secondary interrupt output

  regulators:
    description: Node containing sub-nodes for each voltage regulator
    type: object
    additionalProperties: false
    properties:
      BUCK1:
        $ref: /schemas/regulator/regulator.yaml#
        unevaluatedProperties: false

      LDO1:
        $ref: /schemas/regulator/regulator.yaml#
        unevaluatedProperties: false

      LDO2:
        $ref: /schemas/regulator/regulator.yaml#
        unevaluatedProperties: false

      LDO3:
        $ref: /schemas/regulator/regulator.yaml#
        unevaluatedProperties: false

      LDO4:
        $ref: /schemas/regulator/regulator.yaml#
        unevaluatedProperties: false

      LDO5:
        $ref: /schemas/regulator/regulator.yaml#
        unevaluatedProperties: false

      LDO6:
        $ref: /schemas/regulator/regulator.yaml#
        unevaluatedProperties: false

      LDO7:
        $ref: /schemas/regulator/regulator.yaml#
        unevaluatedProperties: false

      SW1:
        $ref: /schemas/regulator/regulator.yaml#
        unevaluatedProperties: false

      SW2:
        $ref: /schemas/regulator/regulator.yaml#
        unevaluatedProperties: false

      SW3:
        $ref: /schemas/regulator/regulator.yaml#
        unevaluatedProperties: false

      SW4:
        $ref: /schemas/regulator/regulator.yaml#
        unevaluatedProperties: false

      SW5:
        $ref: /schemas/regulator/regulator.yaml#
        unevaluatedProperties: false

      SW6:
        $ref: /schemas/regulator/regulator.yaml#
        unevaluatedProperties: false


required:
  - compatible
  - reg
  - interrupts
  - regulators

additionalProperties: false

examples:
  - |
    pv88060@49 {
      compatible = "pvs,pv88060";
      reg = <0x49>;
      interrupts = <24 24>;
      regulators {
        BUCK1 {
          regulator-name = "buck1";
          regulator-min-microvolt = <2800000>;
          regulator-max-microvolt = <4387500>;
          regulator-min-microamp = <1496000>;
          regulator-max-microamp = <4189000>;
          regulator-boot-on;
        };
        LDO1 {
          regulator-name = "ldo1";
          regulator-min-microvolt = <1200000>;
          regulator-max-microvolt = <3350000>;
          regulator-boot-on;
        };
        LDO2 {
          regulator-name = "ldo2";
          regulator-min-microvolt = <1200000>;
          regulator-max-microvolt = <3350000>;
          regulator-boot-on;
        };
        LDO3 {
          regulator-name = "ldo3";
          regulator-min-microvolt = <1200000>;
          regulator-max-microvolt = <3350000>;
          regulator-boot-on;
        };
        LDO4 {
          regulator-name = "ldo4";
          regulator-min-microvolt = <1200000>;
          regulator-max-microvolt = <3350000>;
          regulator-boot-on;
        };
        LDO5 {
          regulator-name = "ldo5";
          regulator-min-microvolt = <1200000>;
          regulator-max-microvolt = <3350000>;
          regulator-boot-on;
        };
        LDO6 {
          regulator-name = "ldo6";
          regulator-min-microvolt = <1200000>;
          regulator-max-microvolt = <3350000>;
          regulator-boot-on;
        };
        LDO7 {
          regulator-name = "ldo7";
          regulator-min-microvolt = <1200000>;
          regulator-max-microvolt = <3350000>;
          regulator-boot-on;
        };
        SW1 {
          regulator-name = "sw1";
          regulator-min-microvolt = <5000000>;
          regulator-max-microvolt = <5000000>;
        };
        SW2 {
          regulator-name = "sw2";
          regulator-min-microvolt = <5000000>;
          regulator-max-microvolt = <5000000>;
          regulator-boot-on;
        };
        SW3 {
          regulator-name = "sw3";
          regulator-min-microvolt = <5000000>;
          regulator-max-microvolt = <5000000>;
          regulator-boot-on;
        };
        SW4 {
          regulator-name = "sw4";
          regulator-min-microvolt = <5000000>;
          regulator-max-microvolt = <5000000>;
          regulator-boot-on;
        };
        SW5 {
          regulator-name = "sw5";
          regulator-min-microvolt = <5000000>;
          regulator-max-microvolt = <5000000>;
          regulator-boot-on;
        };
        SW6 {
          regulator-name = "sw6";
          regulator-min-microvolt = <5000000>;
          regulator-max-microvolt = <5000000>;
        };
      };
    };
