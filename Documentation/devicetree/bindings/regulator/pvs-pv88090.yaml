%YAML 1.2
---
$id: http://devicetree.org/schemas/regulator/pvs-pv88090.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Powerventure Semiconductor PV88090 Voltage Regulator

maintainers:
  - James Ban <James.Ban.opensource@diasemi.com>

description: |
  * Powerventure Semiconductor PV88090 Voltage Regulator

  Required properties:
  - compatible: "pvs,pv88090".
  - reg: I2C slave address, usually 0x48.
  - interrupts: the interrupt outputs of the controller
  - regulators: A node that houses a sub-node for each regulator within the
    device. Each sub-node is identified using the node's name, with valid
    values listed below. The content of each sub-node is defined by the
    standard binding for regulators; see regulator.txt.

  Optional properties:
  - Any optional property defined in regulator.txt

properties:

  compatible:
    items:
      - const: pvs,pv88090

  reg:
    maxItems: 1

  interrupts:
    maxItems: 1

  regulators:
    description: A node that contains subnodes for each regulator in the device
    type: object
    additionalProperties: false

    properties:
      BUCK1:
        $ref: /schemas/regulator/regulator.yaml#
      BUCK2:
        $ref: /schemas/regulator/regulator.yaml#
      BUCK3:
        $ref: /schemas/regulator/regulator.yaml#
      LDO1:
        $ref: /schemas/regulator/regulator.yaml#
      LDO2:
        $ref: /schemas/regulator/regulator.yaml#

required:
  - compatible
  - reg
  - interrupts
  - regulators

additionalProperties: false

examples:
  - |
    pmic@48 {
        compatible = "pvs,pv88090";
        reg = <0x48>;
        interrupts = <24 24>;

        regulators {
            BUCK1 {
                regulator-name = "buck1";
                regulator-min-microvolt = < 600000>;
                regulator-max-microvolt = <1393750>;
                regulator-min-microamp = < 220000>;
                regulator-max-microamp = <7040000>;
                regulator-boot-on;
            };

            BUCK2 {
                regulator-name = "buck2";
                regulator-min-microvolt = < 600000>;
                regulator-max-microvolt = <1393750>;
                regulator-min-microamp = <1496000>;
                regulator-max-microamp = <4189000>;
            };

            BUCK3 {
                regulator-name = "buck3";
                regulator-min-microvolt = <600000>;
                regulator-max-microvolt = <1393750>;
                regulator-min-microamp = <1496000>;
                regulator-max-microamp = <4189000>;
                regulator-boot-on;
            };

            LDO1 {
                regulator-name = "ldo1";
                regulator-min-microvolt = <1200000>;
                regulator-max-microvolt = <4350000>;
                regulator-boot-on;
            };

            LDO2 {
                regulator-name = "ldo2";
                regulator-min-microvolt = < 650000>;
                regulator-max-microvolt = <2225000>;
                regulator-boot-on;
            };
        };
    };
