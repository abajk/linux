%YAML 1.2
---
$id: http://devicetree.org/schemas/regulator/ti,tps51632.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: TI TPS51632 Voltage Regulator

maintainers:
  - Laxman Dewangan <ldewangan@nvidia.com>

description: |
  TPS51632 Voltage regulators

  Any property defined as part of the core regulator binding, defined in
  regulator.txt, can also be used.

properties:
  compatible:
    items:
      - const: ti,tps51632

  reg:
    items:
      - description: I2C slave address

  regulator-name:
    description: Name of the regulator output

  regulator-min-microvolt:
    description: Minimum output voltage in microvolts

  regulator-max-microvolt:
    description: Maximum output voltage in microvolts

  regulator-boot-on:
    type: boolean
    description: Enable regulator at boot

  ti,enable-pwm-dvfs:
    type: boolean
    description: Enable the DVFS voltage control through the PWM interface.

  ti,dvfs-step-20mV:
    description: The 20mV step voltage when PWM DVFS enabled. Missing this
      will set 10mV step voltage in PWM DVFS mode. In normal mode, the voltage
      step is 10mV as per datasheet.
    $ref: /schemas/types.yaml#/definitions/uint32

additionalProperties: true

examples:
  - |
    tps51632 {
        compatible = "ti,tps51632";
        reg = <0x43>;
        regulator-name = "tps51632-vout";
        regulator-min-microvolt = <500000>;
        regulator-max-microvolt = <1500000>;
        regulator-boot-on;
        ti,enable-pwm-dvfs;
        ti,dvfs-step-20mV;
    };
