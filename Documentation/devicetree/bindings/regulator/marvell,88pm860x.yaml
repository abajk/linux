%YAML 1.2
---
$id: http://devicetree.org/schemas/regulator/marvell,88pm860x.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Marvell 88PM860x regulator

maintainers:
  - Haojian Zhuang <haojian.zhuang@gmail.com>

properties:
  compatible:
    const: marvell,88pm860x

  reg:
    maxItems: 1

  regulators:
    description: A node containing each regulator sub-node for the device.
    type: object
    additionalProperties:
      $ref: /schemas/regulator/regulator.yaml#
      unevaluatedProperties: false
      properties:
        regulator-compatible:
          description: Identifier for the regulator sub-node.
          enum:
            - BUCK1
            - BUCK3
      required:
        - regulator-compatible
        - regulator-min-microvolt
        - regulator-max-microvolt

required:
  - compatible
  - reg
  - regulators

additionalProperties: false

examples:
  - |
    pmic: 88pm860x@34 {
        compatible = "marvell,88pm860x";
        reg = <0x34>;
        regulators {
            BUCK1 {
                regulator-min-microvolt = <1000000>;
                regulator-max-microvolt = <1500000>;
                regulator-boot-on;
                regulator-always-on;
            };
            BUCK3 {
                regulator-min-microvolt = <1000000>;
                regulator-max-microvolt = <3000000>;
                regulator-boot-on;
                regulator-always-on;
            };
        };
    };
