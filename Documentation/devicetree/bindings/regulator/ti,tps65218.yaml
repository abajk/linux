%YAML 1.2
---
$id: http://devicetree.org/schemas/regulator/ti,tps65218.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: TI TPS65218 regulator controller

maintainers:
  - Christian Hohnstaedt <Christian.Hohnstaedt@wago.com>
  - Keerthy <j-keerthy@ti.com>

description: |
  TPS65218 family of regulators

  List of regulators provided by this controller, must be named
  after their hardware counterparts: dcdc[1-6] and ldo1
  This is the list of child nodes that specify the regulator
  initialization data for defined regulators. Not all regulators for the given
  device need to be present. The definition for each of these nodes is defined
  using the standard binding for regulators found at ./regulator.txt.

  The valid names for regulators are:
  tps65217: regulator-dcdc1, regulator-dcdc2, regulator-dcdc3, regulator-dcdc4,
  regulator-dcdc5, regulator-dcdc6, regulator-ldo1, regulator-ls3.
  Each regulator is defined using the standard binding for regulators.

properties:
  compatible:
    items:
      - const: ti,tps65218

  reg:
    items:
      - description: I2C slave address

  interrupts:
    items:
      - description: NMI interrupt
    description: NMI interrupt line

  interrupt-controller: true

  '#interrupt-cells':
    const: 2

patternProperties:
  '^regulator-(dcdc[1-6]|ldo1|ls3)$':
    $ref: /schemas/regulator/regulator.yaml
    unevaluatedProperties: false

additionalProperties: false

examples:
  - |
    tps65218: tps65218@24 {
        compatible = "ti,tps65218";
        reg = <0x24>;
        interrupts = <GIC_SPI 7 IRQ_TYPE_NONE>; /* NMIn */
        interrupt-controller;
        #interrupt-cells = <2>;
        dcdc1: regulator-dcdc1 {
            regulator-name = "vdd_core";
            regulator-min-microvolt = <912000>;
            regulator-max-microvolt = <1144000>;
            regulator-boot-on;
            regulator-always-on;
        };
        dcdc2: regulator-dcdc2 {
            regulator-name = "vdd_mpu";
            regulator-min-microvolt = <912000>;
            regulator-max-microvolt = <1378000>;
            regulator-boot-on;
            regulator-always-on;
        };
        dcdc3: regulator-dcdc3 {
            regulator-name = "vdcdc3";
            regulator-min-microvolt = <1500000>;
            regulator-max-microvolt = <1500000>;
            regulator-boot-on;
            regulator-always-on;
        };
        dcdc5: regulator-dcdc5 {
            regulator-name = "v1_0bat";
            regulator-min-microvolt = <1000000>;
            regulator-max-microvolt = <1000000>;
            regulator-boot-on;
            regulator-always-on;
        };
        dcdc6: regulator-dcdc6 {
            regulator-name = "v1_8bat";
            regulator-min-microvolt = <1800000>;
            regulator-max-microvolt = <1800000>;
            regulator-boot-on;
            regulator-always-on;
        };
        ldo1: regulator-ldo1 {
            regulator-min-microvolt = <1800000>;
            regulator-max-microvolt = <1800000>;
            regulator-boot-on;
            regulator-always-on;
        };
        ls2: regulator-ls2 {
            regulator-min-microamp = <100000>;
            regulator-max-microamp = <1000000>;
        };
        ls3: regulator-ls3 {
            regulator-min-microamp = <100000>;
            regulator-max-microamp = <1000000>;
        };
    };
