%YAML 1.2
---
$id: http://devicetree.org/schemas/ams,as3722.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: AMS AS3722 PMIC regulator

maintainers:
  - Laxman Dewangan <ldewangan@nvidia.com>

description: |
  Regulator of AMS AS3722 PMIC.
  Name of the regulator subnode must be "regulators".

  Optional nodes:
  - regulators: Must contain a sub-node per regulator from the list below.
    Each sub-node should contain the constraints and initialization information for that regulator.
    See regulator.txt for a description of standard properties for these sub-nodes.
    Additional custom properties are listed below.

  sd[0-6], ldo[0-7], ldo[9-11].

properties:
  compatible:
    items:
      - const: ams,as3722

  reg:
    description: Register offset of the PMIC
    items:
      - description: Register address offset

  regulators:
    description: Container node for regulator supplies and subnodes
    type: object
    additionalProperties: false
    properties:
      vsup-sd2-supply:
        description: Input supply for SD2
      vsup-sd3-supply:
        description: Input supply for SD3
      vsup-sd4-supply:
        description: Input supply for SD4
      vsup-sd5-supply:
        description: Input supply for SD5
      vin-ldo0-supply:
        description: Input supply for LDO0
      vin-ldo1-6-supply:
        description: Input supply for LDO1 and LDO6
      vin-ldo2-5-7-supply:
        description: Input supply for LDO2, LDO5 and LDO7
      vin-ldo3-4-supply:
        description: Input supply for LDO3 and LDO4
      vin-ldo9-10-supply:
        description: Input supply for LDO9 and LDO10
      vin-ldo11-supply:
        description: Input supply for LDO11
    patternProperties:
      '^(sd[0-6]|ldo([0-7]|9|10|11))$':
        description: Configuration for each regulator sub-node
        type: object
        additionalProperties: false
        properties:
          regulator-name:
            description: Name of the regulator
            $ref: /schemas/types.yaml#/definitions/string
          regulator-min-microvolt:
            description: Minimum voltage this regulator can output
          regulator-max-microvolt:
            description: Maximum voltage this regulator can output
          regulator-always-on:
            description: The regulator is always on
            type: boolean
          ams,ext-control:
            description: |
              External control of the rail.
              Valid values: 0=no external control, 1=ENABLE1, 2=ENABLE2, 3=ENABLE3
            $ref: /schemas/types.yaml#/definitions/uint32
            enum: [0, 1, 2, 3]
          ams,enable-tracking:
            description: Enable tracking with SD1, only supported by LDO3
            type: boolean
        required:
          - regulator-name
          - regulator-min-microvolt
          - regulator-max-microvolt

required:
  - compatible
  - reg

additionalProperties: false

examples:
  - |
    pmic@40 {
      compatible = "ams,as3722";
      reg = <0x40>;

      regulators {
        vsup-sd2-supply = <&vdd_ddr>;
        vin-ldo3-4-supply = <&vdd_sys>;

        sd0 {
          regulator-name = "vdd_cpu";
          regulator-min-microvolt = <700000>;
          regulator-max-microvolt = <1400000>;
          regulator-always-on;
          ams,ext-control = <2>;
        };

        sd1 {
          regulator-name = "vdd_core";
          regulator-min-microvolt = <700000>;
          regulator-max-microvolt = <1400000>;
          regulator-always-on;
          ams,ext-control = <1>;
        };

        sd2 {
          regulator-name = "vddio_ddr";
          regulator-min-microvolt = <1350000>;
          regulator-max-microvolt = <1350000>;
          regulator-always-on;
        };

        ldo3 {
          regulator-name = "avdd-hdmi-pex";
          regulator-min-microvolt = <1050000>;
          regulator-max-microvolt = <1050000>;
          regulator-always-on;
          ams,enable-tracking;
        };
      };
    };
