%YAML 1.2
---
$id: http://devicetree.org/schemas/regulator/arm,vexpress-volt.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Versatile Express voltage regulators
maintainers:
  - Mauro Carvalho Chehab <mchehab@kernel.org>
  - Pawel Moll <pawel.moll@arm.com>

description: |
  Versatile Express voltage regulators

  See Documentation/devicetree/bindings/regulator/regulator.txt
  for more details about the regulator properties.

  When no "regulator-[min|max]-microvolt" properties are defined,
  the device is treated as fixed (or rather "read-only") regulator.

properties:
  compatible:
    items:
      - const: arm,vexpress-volt

  arm,vexpress-sysreg,func:
    description: A phandle to the sysreg controller and the function index for this regulator.
    $ref: /schemas/types.yaml#/definitions/phandle-array
    items:
      - description: Sysreg controller phandle
      - description: Function index and flags

  regulator-name:
    description: Unique name of this regulator.

  regulator-min-microvolt:
    description: Minimum voltage in microvolts supported by this regulator.

  regulator-max-microvolt:
    description: Maximum voltage in microvolts supported by this regulator.

  regulator-always-on:
    description: Request that the regulator always remain enabled.
    type: boolean

required:
  - compatible
  - regulator-name
  - regulator-always-on

additionalProperties: false

examples:
  - |
    volt@0 {
        compatible = "arm,vexpress-volt";
        arm,vexpress-sysreg,func = <2 0>;
        regulator-name = "Cores";
        regulator-min-microvolt = <800000>;
        regulator-max-microvolt = <1050000>;
        regulator-always-on;
    };
