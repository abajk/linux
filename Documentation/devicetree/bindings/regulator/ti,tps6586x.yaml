%YAML 1.2
---
$id: http://devicetree.org/schemas/regulator/ti,tps6586x.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: TI TPS6586x PMIC

maintainers:
  - Bill Huang <bilhuang@nvidia.com>
  - Laxman Dewangan <ldewangan@nvidia.com>
  - Stephen Warren <swarren@nvidia.com>
  - Thierry Reding <thierry.reding@avionic-design.de>

description: |
  TPS6586x family of regulators

  Required properties:
  - compatible: "ti,tps6586x"
  - reg: I2C slave address
  - interrupts: the interrupt outputs of the controller
  - #gpio-cells: number of cells to describe a GPIO
  - gpio-controller: mark the device as a GPIO controller
  - regulators: A node that houses a sub-node for each regulator within the
    device. Each sub-node is identified using the node's name (or the deprecated
    regulator-compatible property if present), with valid values listed below.
    The content of each sub-node is defined by the standard binding for
    regulators; see regulator.txt.
  - sys-supply: The input supply for SYS.
  - vin-sm0-supply: The input supply for the SM0.
  - vin-sm1-supply: The input supply for the SM1.
  - vin-sm2-supply: The input supply for the SM2.
  - vinldo01-supply: The input supply for the LDO1 and LDO2
  - vinldo23-supply: The input supply for the LDO2 and LDO3
  - vinldo4-supply: The input supply for the LDO4
  - vinldo678-supply: The input supply for the LDO6, LDO7 and LDO8
  - vinldo9-supply: The input supply for the LDO9

  Optional properties:
  - ti,system-power-controller: Telling whether or not this pmic is controlling
    the system power.

  Note: LDO5 and LDO_RTC is supplied by SYS regulator internally and driver
        take care of making proper parent child relationship.

properties:
  compatible:
    items:
      - const: ti,tps6586x

  reg:
    items:
      - description: I2C slave address

  interrupts:
    description: interrupt outputs of the controller

  '#gpio-cells':
    const: 2

  gpio-controller: true

  ti,system-power-controller:
    type: boolean
    description: Telling whether or not this pmic is controlling the system power.

  sys-supply: true
  vin-sm0-supply: true
  vin-sm1-supply: true
  vin-sm2-supply: true
  vinldo01-supply: true
  vinldo23-supply: true
  vinldo4-supply: true
  vinldo678-supply: true
  vinldo9-supply: true

  regulators:
    description: A node that houses sub-nodes for each regulator within the
      device. Each sub-node is identified using the node's name (or the deprecated
      regulator-compatible property if present), with valid values listed below.
    type: object
    additionalProperties: false
    properties:
      sys:
        description: SYS regulator
        $ref: /schemas/regulator/regulator.yaml
      sm0:
        description: SM0 regulator
        $ref: /schemas/regulator/regulator.yaml
      sm1:
        description: SM1 regulator
        $ref: /schemas/regulator/regulator.yaml
      sm2:
        description: SM2 regulator
        $ref: /schemas/regulator/regulator.yaml
      ldo0:
        description: LDO0 regulator
        $ref: /schemas/regulator/regulator.yaml
      ldo1:
        description: LDO1 regulator
        $ref: /schemas/regulator/regulator.yaml
      ldo2:
        description: LDO2 regulator
        $ref: /schemas/regulator/regulator.yaml
      ldo3:
        description: LDO3 regulator
        $ref: /schemas/regulator/regulator.yaml
      ldo4:
        description: LDO4 regulator
        $ref: /schemas/regulator/regulator.yaml
      ldo5:
        description: LDO5 regulator
        $ref: /schemas/regulator/regulator.yaml
      ldo6:
        description: LDO6 regulator
        $ref: /schemas/regulator/regulator.yaml
      ldo7:
        description: LDO7 regulator
        $ref: /schemas/regulator/regulator.yaml
      ldo8:
        description: LDO8 regulator
        $ref: /schemas/regulator/regulator.yaml
      ldo9:
        description: LDO9 regulator
        $ref: /schemas/regulator/regulator.yaml
      ldo_rtc:
        description: LDO_RTC regulator
        $ref: /schemas/regulator/regulator.yaml

required:
  - compatible
  - reg
  - interrupts
  - '#gpio-cells'
  - gpio-controller
  - regulators
  - sys-supply
  - vin-sm0-supply
  - vin-sm1-supply
  - vin-sm2-supply
  - vinldo01-supply
  - vinldo23-supply
  - vinldo4-supply
  - vinldo678-supply
  - vinldo9-supply

additionalProperties: false
examples:
  - |
    pmu: tps6586x@34 {
        compatible = "ti,tps6586x";
        reg = <0x34>;
        interrupts = <0 88 0x4>;

        #gpio-cells = <2>;
        gpio-controller;

        ti,system-power-controller;

        sys-supply = <&some_reg>;
        vin-sm0-supply = <&some_reg>;
        vin-sm1-supply = <&some_reg>;
        vin-sm2-supply = <&some_reg>;
        vinldo01-supply = <...>;
        vinldo23-supply = <...>;
        vinldo4-supply = <...>;
        vinldo678-supply = <...>;
        vinldo9-supply = <...>;

        regulators {
            sys_reg: sys {
                regulator-name = "vdd_sys";
                regulator-boot-on;
                regulator-always-on;
            };

            sm0_reg: sm0 {
                regulator-min-microvolt = < 725000>;
                regulator-max-microvolt = <1500000>;
                regulator-boot-on;
                regulator-always-on;
            };

            sm1_reg: sm1 {
                regulator-min-microvolt = < 725000>;
                regulator-max-microvolt = <1500000>;
                regulator-boot-on;
                regulator-always-on;
            };

            sm2_reg: sm2 {
                regulator-min-microvolt = <3000000>;
                regulator-max-microvolt = <4550000>;
                regulator-boot-on;
                regulator-always-on;
            };

            ldo0_reg: ldo0 {
                regulator-name = "PCIE CLK";
                regulator-min-microvolt = <3300000>;
                regulator-max-microvolt = <3300000>;
            };

            ldo1_reg: ldo1 {
                regulator-min-microvolt = < 725000>;
                regulator-max-microvolt = <1500000>;
            };

            ldo2_reg: ldo2 {
                regulator-min-microvolt = < 725000>;
                regulator-max-microvolt = <1500000>;
            };

            ldo3_reg: ldo3 {
                regulator-min-microvolt = <1250000>;
                regulator-max-microvolt = <3300000>;
            };

            ldo4_reg: ldo4 {
                regulator-min-microvolt = <1700000>;
                regulator-max-microvolt = <2475000>;
            };

            ldo5_reg: ldo5 {
                regulator-min-microvolt = <1250000>;
                regulator-max-microvolt = <3300000>;
            };

            ldo6_reg: ldo6 {
                regulator-min-microvolt = <1250000>;
                regulator-max-microvolt = <3300000>;
            };

            ldo7_reg: ldo7 {
                regulator-min-microvolt = <1250000>;
                regulator-max-microvolt = <3300000>;
            };

            ldo8_reg: ldo8 {
                regulator-min-microvolt = <1250000>;
                regulator-max-microvolt = <3300000>;
            };

            ldo9_reg: ldo9 {
                regulator-min-microvolt = <1250000>;
                regulator-max-microvolt = <3300000>;
            };
        };
    };
