%YAML 1.2
---
$id: http://devicetree.org/schemas/ti,pbias-omap.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: PBIAS internal regulator

maintainers:
  - Balaji T K <balajitk@ti.com>
  - Kishon Vijay Abraham I <kishon@kernel.org>

description: |
  PBIAS internal regulator for SD card dual voltage i/o pads on OMAP SoCs.

properties:
  compatible:
    description: Valid compatible strings for the PBIAS regulator.
    items:
      - enum:
          - ti,pbias-omap
          - ti,pbias-omap2
          - ti,pbias-omap3
          - ti,pbias-omap4
          - ti,pbias-omap5
          - ti,pbias-dra7

  reg:
    description: Register offset from syscon base and size of the pbias register.
    items:
      - description: Register offset from syscon base
      - description: Size of pbias register

  syscon:
    description: phandle of the system control module
    $ref: /schemas/types.yaml#/definitions/phandle

  regulator-name:
    description: Name of the regulator
    enum:
      - pbias_mmc_omap2430
      - pbias_sim_omap3
      - pbias_mmc_omap4
      - pbias_mmc_omap5

  regulator-min-microvolt:
    description: Minimum voltage in microvolts supported by the regulator.

  regulator-max-microvolt:
    description: Maximum voltage in microvolts supported by the regulator.

required:
  - compatible
  - reg
  - syscon
  - regulator-name

additionalProperties: true

examples:
  - |
    pbias_regulator: pbias_regulator {
        compatible = "ti,pbias-omap";
        reg = <0 0x4>;
        syscon = <&omap5_padconf_global>;
        pbias_mmc_reg: pbias_mmc_omap5 {
            regulator-name = "pbias_mmc_omap5";
            regulator-min-microvolt = <1800000>;
            regulator-max-microvolt = <3000000>;
        };
    };
