      regulator-max-microvolt:
        description: Maximum voltage in microvolts.
      regulator-ramp-delay:
        description: Voltage ramp delay (microvolts per microsecond).
        $ref: /schemas/types.yaml#/definitions/uint32
      regulator-always-on:
        description: Whether the regulator is always on.
        type: boolean
      regulator-boot-on:
        description: Whether the regulator is enabled at boot.
        type: boolean
    required:
      - regulator-min-microvolt
      - regulator-max-microvolt
      - regulator-ramp-delay

required:
  - compatible

additionalProperties: false

examples:
  - |
    regulators {
      compatible = "mediatek,mt6380-regulator";

      buck-core1 {
        regulator-name = "vcore1";
        regulator-min-microvolt = <600000>;
        regulator-max-microvolt = <1393750>;
        regulator-ramp-delay = <6250>;
        regulator-always-on;
        regulator-boot-on;
      };

      buck-vcore {
        regulator-name = "vcore";
        regulator-min-microvolt = <600000>;
        regulator-max-microvolt = <1393750>;
        regulator-ramp-delay = <6250>;
      };

      buck-vrf {
        regulator-name = "vrf";
        regulator-min-microvolt = <1200000>;
        regulator-max-microvolt = <1575000>;
        regulator-ramp-delay = <0>;
        regulator-always-on;
        regulator-boot-on;
      };

      ldo-vm {
        regulator-name = "vm";
        regulator-min-microvolt = <1050000>;
        regulator-max-microvolt = <1400000>;
        regulator-ramp-delay = <0>;
        regulator-always-on;
        regulator-boot-on;
      };

      ldo-va {
        regulator-name = "va";
        regulator-min-microvolt = <2200000>;
        regulator-max-microvolt = <3300000>;
        regulator-ramp-delay = <0>;
        regulator-always-on;
        regulator-boot-on;
      };

      ldo-vphy {
        regulator-name = "vphy";
        regulator-min-microvolt = <1800000>;
        regulator-max-microvolt = <1800000>;
        regulator-ramp-delay = <0>;
        regulator-always-on;
        regulator-boot-on;
      };

      ldo-vddr {
        regulator-name = "vddr";
        regulator-min-microvolt = <1240000>;
        regulator-max-microvolt = <1840000>;
        regulator-ramp-delay = <0>;
        regulator-always-on;
        regulator-boot-on;
      };

      ldo-vt {
        regulator-name = "vt";
        regulator-min-microvolt = <2200000>;
        regulator-max-microvolt = <3300000>;
        regulator-ramp-delay = <0>;
        regulator-always-on;
        regulator-boot-on;
      };
    };
