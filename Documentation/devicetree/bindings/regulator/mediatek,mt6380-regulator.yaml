%YAML 1.2
---
$id: http://devicetree.org/schemas/mediatek,mt6380-regulator.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: MediaTek MT6380 Regulator

maintainers:
  - Sean Wang <sean.wang@mediatek.com>

description: |
  All voltage regulators provided by the MT6380 PMIC are described as the
  subnodes of the MT6380 regulators node. Each regulator is named according
  to its regulator type, buck-<name> and ldo-<name>. The definition for each
  of these nodes is defined using the standard binding for regulators at
  Documentation/devicetree/bindings/regulator/regulator.yaml.

properties:
  compatible:
    const: mediatek,mt6380-regulator
    description: Must be "mediatek,mt6380-regulator".

  buck-core1:
    type: object
    description: Core1 buck regulator.
    additionalProperties: false
    properties:
      regulator-name:
        description: Override name of the regulator.
        $ref: /schemas/types.yaml#/definitions/string
      regulator-min-microvolt:
        description: Minimum voltage in microvolts.
      regulator-max-microvolt:
        description: Maximum voltage in microvolts.
      regulator-ramp-delay:
        description: Voltage ramp delay (microvolts per microsecond).
        $ref: /schemas/types.yaml#/definitions/uint32
      regulator-always-on:
        description: Whether the regulator is always on.
        type: boolean
      regulator-boot-on:
        description: Whether the regulator is enabled at boot.
        type: boolean
    required:
      - regulator-min-microvolt
      - regulator-max-microvolt
      - regulator-ramp-delay

  buck-vcore:
    type: object
    description: Core buck regulator.
    additionalProperties: false
    properties:
      regulator-name:
        description: Override name of the regulator.
        $ref: /schemas/types.yaml#/definitions/string
      regulator-min-microvolt:
        description: Minimum voltage in microvolts.
      regulator-max-microvolt:
        description: Maximum voltage in microvolts.
      regulator-ramp-delay:
        description: Voltage ramp delay (microvolts per microsecond).
        $ref: /schemas/types.yaml#/definitions/uint32
      regulator-always-on:
        description: Whether the regulator is always on.
        type: boolean
      regulator-boot-on:
        description: Whether the regulator is enabled at boot.
        type: boolean
    required:
      - regulator-min-microvolt
      - regulator-max-microvolt
      - regulator-ramp-delay

  buck-vrf:
