%YAML 1.2
---
$id: http://devicetree.org/schemas/regulator/ti,tps65217.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: TPS65217 family of regulators

maintainers:
  - AnilKumar Ch <anilkumar@ti.com>
  - Colin Foe-Parker <colin.foeparker@logicpd.com>
  - Heiko Schocher <hs@denx.de>
  - Peter Ujfalusi <peter.ujfalusi@ti.com>
  - Stephen Warren <swarren@nvidia.com>

description: |
  TPS65217 family of regulators

  The valid names for regulators are:
  tps65217: dcdc1, dcdc2, dcdc3, ldo1, ldo2, ldo3 and ldo4

  Each regulator is defined using the standard binding for regulators found at
  Documentation/devicetree/bindings/regulator/regulator.txt.

properties:
  compatible:
    const: ti,tps65217

  reg:
    description: I2C slave address
    items:
      - description: I2C slave address

  ti,pmic-shutdown-controller:
    type: boolean
    description: Telling the PMIC to shutdown on PWR_EN toggle

  regulators:
    description: Child node containing regulator initialization data
    type: object
    additionalProperties: false
    patternProperties:
      "^(dcdc[1-3]|ldo[1-4])$":
        description: Initialization data for a regulator
        $ref: /schemas/regulator/regulator.yaml#

required:
  - compatible
  - reg
  - regulators

additionalProperties: false

examples:
  - |
    tps: tps@24 {
      compatible = "ti,tps65217";
      ti,pmic-shutdown-controller;

      regulators {
        dcdc1_reg: dcdc1 {
          regulator-min-microvolt = <900000>;
          regulator-max-microvolt = <1800000>;
          regulator-boot-on;
          regulator-always-on;
        };

        dcdc2_reg: dcdc2 {
          regulator-min-microvolt = <900000>;
          regulator-max-microvolt = <3300000>;
          regulator-boot-on;
          regulator-always-on;
        };

        dcdc3_reg: dcc3 {
          regulator-min-microvolt = <900000>;
          regulator-max-microvolt = <1500000>;
          regulator-boot-on;
          regulator-always-on;
        };

        ldo1_reg: ldo1 {
          regulator-min-microvolt = <1000000>;
          regulator-max-microvolt = <3300000>;
          regulator-boot-on;
          regulator-always-on;
        };

        ldo2_reg: ldo2 {
          regulator-min-microvolt = <900000>;
          regulator-max-microvolt = <3300000>;
          regulator-boot-on;
          regulator-always-on;
        };

        ldo3_reg: ldo3 {
          regulator-min-microvolt = <1800000>;
          regulator-max-microvolt = <3300000>;
          regulator-boot-on;
          regulator-always-on;
        };

        ldo4_reg: ldo4 {
          regulator-min-microvolt = <1800000>;
          regulator-max-microvolt = <3300000>;
          regulator-boot-on;
          regulator-always-on;
        };
      };
    };
