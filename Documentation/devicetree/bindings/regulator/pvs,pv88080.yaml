---
$id: http://devicetree.org/schemas/regulator/pvs,pv88080.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Powerventure Semiconductor PV88080 Voltage Regulator

maintainers:
  - Eric Jeong <eric.jeong.opensource@diasemi.com>
  - James Ban <James.Ban.opensource@diasemi.com>

description: |
  * Powerventure Semiconductor PV88080 Voltage Regulator

properties:
  compatible:
    enum:
      - pvs,pv88080-aa
      - pvs,pv88080-ba
      - pvs,pv88080
  reg:
    description: I2C slave address (usually 0x49)
    maxItems: 1

  interrupts:
    description: The interrupt outputs of the controller.
    items:
      - description: interrupt output 1
      - description: interrupt output 2
      
  regulators:
    description: A node that houses a sub-node for each regulator within the device.
      Each sub-node is identified using the node's name, with valid values listed below.
      The content of each sub-node is defined by the standard binding for regulators;
      see regulator.yaml.
    type: object
    additionalProperties: false
    properties:
      BUCK1:
        $ref: /schemas/regulator/regulator.yaml#
        unevaluatedProperties: false

      BUCK2:
        $ref: /schemas/regulator/regulator.yaml#
        unevaluatedProperties: false

      BUCK3:
        $ref: /schemas/regulator/regulator.yaml#
        unevaluatedProperties: false

      HVBUCK:
        $ref: /schemas/regulator/regulator.yaml#
        unevaluatedProperties: false

    required:
      - BUCK1
      - BUCK2
      - BUCK3
      - HVBUCK

required:
  - compatible
  - reg
  - interrupts
  - regulators

additionalProperties: false

examples:
  - |
    pmic: pv88080@49 {
        compatible = "pvs,pv88080-ba";
        reg = <0x49>;
        interrupts = <24 24>;
        regulators {
            BUCK1 {
                regulator-name = "buck1";
                regulator-min-microvolt = <600000>;
                regulator-max-microvolt = <1393750>;
                regulator-min-microamp = <220000>;
                regulator-max-microamp = <7040000>;
            };
            BUCK2 {
                regulator-name = "buck2";
                regulator-min-microvolt = <600000>;
                regulator-max-microvolt = <1393750>;
                regulator-min-microamp = <1496000>;
                regulator-max-microamp = <4189000>;
            };
            BUCK3 {
                regulator-name = "buck3";
                regulator-min-microvolt = <1400000>;
                regulator-max-microvolt = <2193750>;
                regulator-min-microamp = <1496000>;
                regulator-max-microamp = <4189000>;
            };
            HVBUCK {
                regulator-name = "hvbuck";
                regulator-min-microvolt = <5000>;
                regulator-max-microvolt = <1275000>;
            };
        };
    };
