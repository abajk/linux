# SPDX-License-Identifier: (GPL-2.0-only OR BSD-2-Clause)
%YAML 1.2
---
$id: http://devicetree.org/schemas/regulator/ti,tps65090.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: TI TPS65090 PMIC
maintainers:
  - Andreas Färber <afaerber@suse.de>
  - Doug Anderson <dianders@chromium.org>
  - Jonathan Neuschäfer <j.neuschaefer@gmx.net>
  - Laxman Dewangan <ldewangan@nvidia.com>

description: |
  TPS65090 regulators

  Each regulator is defined using the standard binding for regulators.

properties:
  compatible:
    items:
      - const: ti,tps65090

  reg:
    items:
      - description: I2C slave address of the PMIC

  interrupts:
    description: Interrupt outputs of the controller
    items:
      - description: interrupt output

  regulators:
    description: >-
      Node containing sub-nodes for each regulator within the device.
    type: object
    additionalProperties: false
    properties:
      dcdc1:
        $ref: /schemas/regulator/regulator.yaml#
      dcdc2:
        $ref: /schemas/regulator/regulator.yaml#
      dcdc3:
        $ref: /schemas/regulator/regulator.yaml#
      fet1:
        $ref: /schemas/regulator/regulator.yaml#
      fet2:
        $ref: /schemas/regulator/regulator.yaml#
      fet3:
        $ref: /schemas/regulator/regulator.yaml#
      fet4:
        $ref: /schemas/regulator/regulator.yaml#
      fet5:
        $ref: /schemas/regulator/regulator.yaml#
      fet6:
        $ref: /schemas/regulator/regulator.yaml#
      fet7:
        $ref: /schemas/regulator/regulator.yaml#
      ldo1:
        $ref: /schemas/regulator/regulator.yaml#
      ldo2:
        $ref: /schemas/regulator/regulator.yaml#
    required:
      - dcdc1
      - dcdc2
      - dcdc3
      - fet1
      - fet2
      - fet3
      - fet4
      - fet5
      - fet6
      - fet7
      - ldo1
      - ldo2

  vsys1-supply: true
  vsys2-supply: true
  vsys3-supply: true
  infet1-supply: true
  infet2-supply: true
  infet3-supply: true
  infet4-supply: true
  infet5-supply: true
  infet6-supply: true
  infet7-supply: true
  vsys-l1-supply: true
  vsys-l2-supply: true

  ti,enable-ext-control:
    description: Enable external control of DCDC1, DCDC2 and DCDC3
    type: boolean

  dcdc-ext-control-gpios:
    description: GPIOs for external control of DCDC rails
    maxItems: 1

  ti,overcurrent-wait:
    description: Overcurrent wait time for FET regulators
    $ref: /schemas/types.yaml#/definitions/uint32
    minimum: 0
    maximum: 3

required:
  - compatible
  - reg
  - interrupts
  - regulators

additionalProperties: false

examples:
  - |
    tps65090@48 {
      compatible = "ti,tps65090";
      reg = <0x48>;
      interrupts = <0 88 0x4>;
      vsys1-supply = <&some_reg>;
      vsys2-supply = <&some_reg>;
      vsys3-supply = <&some_reg>;
      infet1-supply = <&some_reg>;
      infet2-supply = <&some_reg>;
      infet3-supply = <&some_reg>;
      infet4-supply = <&some_reg>;
      infet5-supply = <&some_reg>;
      infet6-supply = <&some_reg>;
      infet7-supply = <&some_reg>;
      vsys-l1-supply = <&some_reg>;
      vsys-l2-supply = <&some_reg>;
      regulators {
        dcdc1 {
          regulator-name = "dcdc1";
          regulator-boot-on;
          regulator-always-on;
          ti,enable-ext-control;
          dcdc-ext-control-gpios = <&gpio 10 0>;
        };
        dcdc2 {
          regulator-name = "dcdc2";
          regulator-boot-on;
          regulator-always-on;
        };
        dcdc3 {
          regulator-name = "dcdc3";
          regulator-boot-on;
          regulator-always-on;
        };
        fet1 {
          regulator-name = "fet1";
          regulator-boot-on;
          regulator-always-on;
        };
        fet2 {
          regulator-name = "fet2";
          regulator-boot-on;
          regulator-always-on;
        };
        fet3 {
          regulator-name = "fet3";
          regulator-boot-on;
          regulator-always-on;
        };
        fet4 {
          regulator-name = "fet4";
          regulator-boot-on;
          regulator-always-on;
        };
        fet5 {
          regulator-name = "fet5";
          regulator-boot-on;
          regulator-always-on;
        };
        fet6 {
          regulator-name = "fet6";
          regulator-boot-on;
          regulator-always-on;
        };
        fet7 {
          regulator-name = "fet7";
          regulator-boot-on;
          regulator-always-on;
        };
        ldo1 {
          regulator-name = "ldo1";
          regulator-boot-on;
          regulator-always-on;
        };
        ldo2 {
          regulator-name = "ldo2";
          regulator-boot-on;
          regulator-always-on;
        };
      };
    };
