%YAML 1.2
---
$id: http://devicetree.org/schemas/regulator/maxim,max1586.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Maxim MAX1586 voltage regulator

maintainers:
  - Robert Jarzmik <robert.jarzmik@free.fr>

description: |
  Maxim MAX1586 voltage regulator

properties:
  compatible:
    # Only this compatible string is valid for this binding
    items:
      - const: maxim,max1586

  reg:
    description: I2C slave address of the device
    items:
      - description: I2C slave address

  v3-gain:
    description: integer specifying the V3 gain as per datasheet (1 + R24/R25 + R24/185.5kΩ)
    $ref: /schemas/types.yaml#/definitions/uint32

required:
  - compatible
  - reg
  - v3-gain

additionalProperties: false

examples:
  - |
    i2c_master {
        max1586@14 {
            compatible = "maxim,max1586";
            reg = <0x14>;
            v3-gain = <1000000>;

            regulators {
                vcc_core: v3 {
                    regulator-name = "vcc_core";
                    regulator-compatible = "Output_V3";
                    regulator-min-microvolt = <1000000>;
                    regulator-max-microvolt = <1705000>;
                    regulator-always-on;
                };
            };
        };
    };
