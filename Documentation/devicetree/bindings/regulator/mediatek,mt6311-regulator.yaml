%YAML 1.2
---
$id: http://devicetree.org/schemas/regulator/mediatek,mt6311-regulator.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Mediatek MT6311 Regulator

maintainers:
  - Henry Chen <henryc.chen@mediatek.com>
  - Sean Wang <sean.wang@mediatek.com>

description: |
  Mediatek MT6311 Regulator

  The valid names for regulators are:
  BUCK:
    VDVFS
  LDO:
    VBIASN

properties:
  compatible:
    description: Device compatible string
    items:
      - const: mediatek,mt6311-regulator

  reg:
    description: I2C slave address of the PMIC on the bus
    items:
      - description: I2C slave address

  regulators:
    description: Regulators provided by this controller
    type: object
    additionalProperties: false
    properties:
      VDVFS:
        description: DVFS buck regulator channel
        type: object
        $ref: /schemas/regulator/regulator.yaml#
      VBIASN:
        description: Bias LDO regulator channel
        type: object
        $ref: /schemas/regulator/regulator.yaml#
    required:
      - VDVFS
      - VBIASN

required:
  - compatible
  - reg
  - regulators

additionalProperties: false

examples:
  - |
    mt6311: pmic@6b {
        compatible = "mediatek,mt6311-regulator";
        reg = <0x6b>;
        regulators {
            mt6311_vcpu_reg: VDVFS {
                regulator-name = "VDVFS";
                regulator-min-microvolt = <600000>;
                regulator-max-microvolt = <1400000>;
                regulator-ramp-delay = <10000>;
            };
            mt6311_ldo_reg: VBIASN {
                regulator-name = "VBIASN";
                regulator-min-microvolt = <200000>;
                regulator-max-microvolt = <800000>;
            };
        };
    };
