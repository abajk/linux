%YAML 1.2
---
$id: http://devicetree.org/schemas/regulator/motorola,cpcap-regulator.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Motorola CPCAP PMIC regulator

maintainers:
  - Peter Geis <pgwipeout@gmail.com>
  - Tony Lindgren <tony@atomide.com>

description: |
  Motorola CPCAP PMIC voltage regulators
  ------------------------------------

  Requires node properties:

  See Documentation/devicetree/bindings/regulator/regulator.txt
  for more details about the regulator properties.

properties:
  compatible:
    description: >
      Device compatible string.
    items:
      - enum:
          - "motorola,cpcap-regulator"
          - "motorola,mapphone-cpcap-regulator"
          - "motorola,xoom-cpcap-regulator"

  regulator-name:
    description: Name of the regulator.
    $ref: /schemas/types.yaml#/definitions/string

  regulator-min-microvolt:
    description: Minimum output voltage in microvolts.

  regulator-max-microvolt:
    description: Maximum output voltage in microvolts.

  regulator-enable-ramp-delay:
    description: Ramp delay on regulator enable in microseconds.
    $ref: /schemas/types.yaml#/definitions/uint32

  regulator-boot-on:
    description: Enable regulator at boot.
    type: boolean

required:
  - compatible
  - regulator-name
  - regulator-min-microvolt
  - regulator-max-microvolt
  - regulator-enable-ramp-delay

additionalProperties: false

examples:
  - |
    cpcap_regulator: regulator {
        compatible = "motorola,cpcap-regulator";
        regulator-name = "sw5";
        regulator-min-microvolt = <5050000>;
        regulator-max-microvolt = <5050000>;
        regulator-enable-ramp-delay = <50000>;
        regulator-boot-on;
    };
