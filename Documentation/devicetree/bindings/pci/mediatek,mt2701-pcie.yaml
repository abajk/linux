---
$id: http://devicetree.org/schemas/pci/mediatek,mt2701-pcie.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: MediaTek Gen2 PCIe controller

maintainers:
  - Chuanjia Liu <chuanjia.liu@mediatek.com>
  - Honghui Zhang <honghui.zhang@mediatek.com>
  - Jianjun Wang <jianjun.wang@mediatek.com>
  - John Crispin <john@phrozen.org>
  - Ryder Lee <ryder.lee@mediatek.com>

description: |
  MediaTek Gen2 PCIe controller

properties:
  compatible:
    description: List of supported compatible strings.
    $ref: /schemas/types.yaml#/definitions/string-array
    items:
      - enum:
          - mediatek,mt2701-pcie
          - mediatek,mt2712-pcie
          - mediatek,mt7622-pcie
          - mediatek,mt7623-pcie
          - mediatek,mt7629-pcie
          - airoha,en7523-pcie

  device_type:
    description: Must be "pci".
    const: pci

  reg:
    description: Base addresses and lengths of the root ports.

  reg-names:
    description: Names of the above areas to use during resource lookup.
    $ref: /schemas/types.yaml#/definitions/string-array

  '#address-cells':
    description: Address representation for root ports (must be 3).
    const: 3

  '#size-cells':
    description: Size representation for root ports (must be 2).
    const: 2

  clocks:
    description: |
      Must contain an entry for each entry in clock-names; see
      ../clocks/clock-bindings.txt for details.

  clock-names:
    description: Names of the clocks in the 'clocks' property.

  '#interrupt-cells':
    description: Size representation for interrupts (must be 1 for MT7623/MT2701).
    const: 1

  interrupt-map-mask:
    description: PCI IRQ map mask.

  interrupt-map:
    description: Standard PCI IRQ mapping property.

  resets:
    description: Reset specifiers for root ports.

  reset-names:
    description: Names of the reset lines for root ports.

  interrupts:
    description: A list of interrupt outputs of the controller, one per PCIe port.

  interrupt-names:
    description: Names of interrupts for PCIe ports.
    items:
      - const: pcie_irq

  linux,pci-domain:
    description: PCI domain ID; should be unique for each host controller.

additionalProperties: false

allOf:
  - if:
      properties:
        compatible:
          contains:
            const: mediatek,mt7623-pcie
    then:
      required:
        - '#interrupt-cells'
        - interrupt-map-mask
        - interrupt-map
        - resets
        - reset-names
  - if:
      properties:
        compatible:
          contains:
            const: mediatek,mt2701-pcie
    then:
      required:
        - '#interrupt-cells'
        - interrupt-map-mask
        - interrupt-map
        - resets
        - reset-names
  - if:
      properties:
        compatible:
          contains:
            const: mediatek,mt2712-pcie
    then:
      required:
        - interrupts
        - interrupt-names
        - linux,pci-domain
  - if:
      properties:
        compatible:
          contains:
            const: mediatek,mt7622-pcie
    then:
      required:
        - interrupts
        - interrupt-names
        - linux,pci-domain
  - if:
      properties:
        compatible:
          contains:
            const: mediatek,mt7629-pcie
    then:
      required:
        - interrupts
        - interrupt-names
        - linux,pci-domain

examples:
  - |
    hifsys: syscon@1a000000 {
        compatible = "mediatek,mt7623-hifsys",
                     "mediatek,mt2701-hifsys",
                     "syscon";
        reg = <0 0x1a000000 0 0x1000>;
        #clock-cells = <1>;
        #reset-cells = <1>;
    };

  - |
    pcie: pcie@1a140000 {
        compatible = "mediatek,mt7623-pcie";
        device_type = "pci";
        reg = <0 0x1a140000 0 0x1000>,
              <0 0x1a142000 0 0x1000>,
              <0 0x1a143000 0 0x1000>,
              <0 0x1a144000 0 0x1000>;
        reg-names = "subsys", "port0", "port1", "port2";
        #address-cells = <3>;
        #size-cells = <2>;
        #interrupt-cells = <1>;
        interrupt-map-mask = <0xf800 0 0 0>;
        interrupt-map = <0x0000 0 0 0 &sysirq GIC_SPI 193 IRQ_TYPE_LEVEL_LOW>,
                        <0x0800 0 0 0 &sysirq GIC_SPI 194 IRQ_TYPE_LEVEL_LOW>,
                        <0x1000 0 0 0 &sysirq GIC_SPI 195 IRQ_TYPE_LEVEL_LOW>;
        clocks = <&topckgen CLK_TOP_ETHIF_SEL>,
                 <&hifsys CLK_HIFSYS_PCIE0>,
                 <&hifsys CLK_HIFSYS_PCIE1>,
                 <&hifsys CLK_HIFSYS_PCIE2>;
        clock-names = "free_ck", "sys_ck0", "sys_ck1", "sys_ck2";
        resets = <&hifsys MT2701_HIFSYS_PCIE0_RST>,
                 <&hifsys MT2701_HIFSYS_PCIE1_RST>,
                 <&hifsys MT2701_HIFSYS_PCIE2_RST>;
        reset-names = "pcie-rst0", "pcie-rst1", "pcie-rst2";
        phys = <&pcie0_phy PHY_TYPE_PCIE>, <&pcie1_phy PHY_TYPE_PCIE>,
               <&pcie2_phy PHY_TYPE_PCIE>;
        phy-names = "pcie-phy0", "pcie-phy1", "pcie-phy2";
        power-domains = <&scpsys MT2701_POWER_DOMAIN_HIF>;
        bus-range = <0x00 0xff>;
        ranges = <0x81000000 0 0x1a160000 0 0x1a160000 0 0x00010000  /* I/O space */
                  0x83000000 0 0x60000000 0 0x60000000 0 0x10000000>;  /* memory space */

        pcie@0,0 {
            reg = <0x0000 0 0 0 0>;
            #address-cells = <3>;
            #size-cells = <2>;
            #interrupt-cells = <1>;
            interrupt-map-mask = <0 0 0 0>;
            interrupt-map = <0 0 0 0 &sysirq GIC_SPI 193 IRQ_TYPE_LEVEL_LOW>;
            ranges;
        };

        pcie@1,0 {
            reg = <0x0800 0 0 0 0>;
            #address-cells = <3>;
            #size-cells = <2>;
            #interrupt-cells = <1>;
            interrupt-map-mask = <0 0 0 0>;
            interrupt-map = <0 0 0 0 &sysirq GIC_SPI 194 IRQ_TYPE_LEVEL_LOW>;
            ranges;
        };

        pcie@2,0 {
            reg = <0x1000 0 0 0 0>;
            #address-cells = <3>;
            #size-cells = <2>;
            #interrupt-cells = <1>;
            interrupt-map-mask = <0 0 0 0>;
            interrupt-map = <0 0 0 0 &sysirq GIC_SPI 195 IRQ_TYPE_LEVEL_LOW>;
            ranges;
        };
    };

  - |
    pcie1: pcie@112ff000 {
        compatible = "mediatek,mt2712-pcie";
        device_type = "pci";
        reg = <0 0x112ff000 0 0x1000>;
        reg-names = "port1";
        linux,pci-domain = <1>;
        #address-cells = <3>;
        #size-cells = <2>;
        interrupts = <GIC_SPI 117 IRQ_TYPE_LEVEL_HIGH>;
        interrupt-names = "pcie_irq";
        clocks = <&topckgen CLK_TOP_PE2_MAC_P1_SEL>,
                 <&pericfg CLK_PERI_PCIE1>;
        clock-names = "sys_ck1", "ahb_ck1";
        phys = <&u3port1 PHY_TYPE_PCIE>;
        phy-names = "pcie-phy1";
        bus-range = <0x00 0xff>;
        ranges = <0x82000000 0 0x11400000  0x0 0x11400000  0 0x300000>;
        status = "disabled";

        #interrupt-cells = <1>;
        interrupt-map-mask = <0 0 0 7>;
        interrupt-map = <0 0 0 1 &pcie_intc1 0>,
                        <0 0 0 2 &pcie_intc1 1>,
                        <0 0 0 3 &pcie_intc1 2>,
                        <0 0 0 4 &pcie_intc1 3>;
        pcie_intc1: interrupt-controller {
            interrupt-controller;
            #address-cells = <0>;
            #interrupt-cells = <1>;
        };
    };

  - |
    pcie0: pcie@11700000 {
        compatible = "mediatek,mt2712-pcie";
        device_type = "pci";
        reg = <0 0x11700000 0 0x1000>;
        reg-names = "port0";
        linux,pci-domain = <0>;
        #address-cells = <3>;
        #size-cells = <2>;
        interrupts = <GIC_SPI 115 IRQ_TYPE_LEVEL_HIGH>;
        interrupt-names = "pcie_irq";
        clocks = <&topckgen CLK_TOP_PE2_MAC_P0_SEL>,
                 <&pericfg CLK_PERI_PCIE0>;
        clock-names = "sys_ck0", "ahb_ck0";
        phys = <&u3port0 PHY_TYPE_PCIE>;
        phy-names = "pcie-phy0";
        bus-range = <0x00 0xff>;
        ranges = <0x82000000 0 0x20000000 0x0 0x20000000 0 0x10000000>;
        status = "disabled";

        #interrupt-cells = <1>;
        interrupt-map-mask = <0 0 0 7>;
        interrupt-map = <0 0 0 1 &pcie_intc0 0>,
                        <0 0 0 2 &pcie_intc0 1>,
                        <0 0 0 3 &pcie_intc0 2>,
                        <0 0 0 4 &pcie_intc0 3>;
        pcie_intc0: interrupt-controller {
            interrupt-controller;
            #address-cells = <0>;
            #interrupt-cells = <1>;
        };
    };

  - |
    pcie0: pcie@1a143000 {
        compatible = "mediatek,mt7622-pcie";
        device_type = "pci";
        reg = <0 0x1a143000 0 0x1000>;
        reg-names = "port0";
        linux,pci-domain = <0>;
        #address-cells = <3>;
        #size-cells = <2>;
        interrupts = <GIC_SPI 228 IRQ_TYPE_LEVEL_LOW>;
        interrupt-names = "pcie_irq";
        clocks = <&pciesys CLK_PCIE_P0_MAC_EN>,
                 <&pciesys CLK_PCIE_P0_AHB_EN>,
                 <&pciesys CLK_PCIE_P0_AUX_EN>,
                 <&pciesys CLK_PCIE_P0_AXI_EN>,
                 <&pciesys CLK_PCIE_P0_OBFF_EN>,
                 <&pciesys CLK_PCIE_P0_PIPE_EN>;
        clock-names = "sys_ck0", "ahb_ck0", "aux_ck0",
                      "axi_ck0", "obff_ck0", "pipe_ck0";

        power-domains = <&scpsys MT7622_POWER_DOMAIN_HIF0>;
        bus-range = <0x00 0xff>;
        ranges = <0x82000000 0 0x20000000  0x0 0x20000000  0 0x8000000>;
        status = "disabled";

        #interrupt-cells = <1>;
        interrupt-map-mask = <0 0 0 7>;
        interrupt-map = <0 0 0 1 &pcie_intc0 0>,
                        <0 0 0 2 &pcie_intc0 1>,
                        <0 0 0 3 &pcie_intc0 2>,
                        <0 0 0 4 &pcie_intc0 3>;
        pcie_intc0: interrupt-controller {
            interrupt-controller;
            #address-cells = <0>;
            #interrupt-cells = <1>;
        };
    };

  - |
    pcie1: pcie@1a145000 {
        compatible = "mediatek,mt7622-pcie";
        device_type = "pci";
        reg = <0 0x1a145000 0 0x1000>;
        reg-names = "port1";
        linux,pci-domain = <1>;
        #address-cells = <3>;
        #size-cells = <2>;
        interrupts = <GIC_SPI 229 IRQ_TYPE_LEVEL_LOW>;
        interrupt-names = "pcie_irq";
        clocks = <&pciesys CLK_PCIE_P1_MAC_EN>,
                 /* designer has connect RC1 with p0_ahb clock */
                 <&pciesys CLK_PCIE_P0_AHB_EN>,
                 <&pciesys CLK_PCIE_P1_AUX_EN>,
                 <&pciesys CLK_PCIE_P1_AXI_EN>,
                 <&pciesys CLK_PCIE_P1_OBFF_EN>,
                 <&pciesys CLK_PCIE_P1_PIPE_EN>;
        clock-names = "sys_ck1", "ahb_ck1", "aux_ck1",
                      "axi_ck1", "obff_ck1", "pipe_ck1";

        power-domains = <&scpsys MT7622_POWER_DOMAIN_HIF0>;
        bus-range = <0x00 0xff>;
        ranges = <0x82000000 0 0x28000000  0x0 0x28000000  0 0x8000000>;
        status = "disabled";

        #interrupt-cells = <1>;
        interrupt-map-mask = <0 0 0 7>;
        interrupt-map = <0 0 0 1 &pcie_intc1 0>,
                        <0 0 0 2 &pcie_intc1 1>,
                        <0 0 0 3 &pcie_intc1 2>,
                        <0 0 0 4 &pcie_intc1 3>;
        pcie_intc1: interrupt-controller {
            interrupt-controller;
            #address-cells = <0>;
            #interrupt-cells = <1>;
        };
    };
