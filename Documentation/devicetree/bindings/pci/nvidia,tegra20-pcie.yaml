%YAML 1.2
---
$id: http://devicetree.org/schemas/nvidia,tegra20-pcie.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: NVIDIA Tegra PCIe controller

maintainers:
  - Jay Agarwal <jagarwal@nvidia.com>
  - Lucas Stach <l.stach@pengutronix.de>
  - Manikanta Maddireddy <mmaddireddy@nvidia.com>
  - Marco Franchi <marco.franchi@nxp.com>
  - Paul Walmsley <paul@pwsan.com>
  - Stephen Warren <swarren@nvidia.com>
  - Thierry Reding <thierry.reding@avionic-design.de>
  - Thierry Reding <treding@nvidia.com>

description: |
  NVIDIA Tegra PCIe controller

  Root ports are defined as subnodes of the PCIe controller node.

properties:
  compatible:
    description: >
      List of compatible strings identifying the Tegra PCIe controller variant.
    items:
      - enum:
          - nvidia,tegra20-pcie
          - nvidia,tegra30-pcie
          - nvidia,tegra124-pcie
          - nvidia,tegra210-pcie
          - nvidia,tegra186-pcie

  device_type:
    const: pci
    description: >
      Specifies that the node represents a PCI bus.

  reg:
    description: >
      Physical base addresses and sizes for controller registers.

  reg-names:
    items:
      - const: pads
      - const: afi
      - const: cs

  interrupts:
    description: >
      Interrupt outputs of the controller.

  interrupt-names:
    items:
      - const: intr
      - const: msi

  interrupt-controller: true

  '#interrupt-cells':
    const: 1

  interrupt-map-mask:
    description: >
      Mask for standard PCI IRQ mapping.

  interrupt-map:
    description: >
      Standard PCI IRQ mapping entries.

  bus-range:
    description: >
      Range of PCI bus numbers managed by this controller.
    items:
      type: integer
      minimum: 0
      maximum: 255

  '#address-cells':
    const: 3

  '#size-cells':
    const: 2

  ranges:
    description: >
      Address translation entries for root ports and PCI regions.
    items:
      minItems: 6
      maxItems: 6

  clocks:
    description: >
      Clock phandles required by the controller.

  clock-names:
    items:
      - const: pex
      - const: afi
      - const: pll_e
      - const: cml

  resets:
    description: >
      Reset phandles required by the controller.

  reset-names:
    items:
      - const: pex
      - const: afi
      - const: pcie_x


  power-domains:
    description: >
      Phandles and IDs for BPMP powergate domains (Tegra186 only).

  pinctrl-names:
    items:
      - const: default
      - const: idle

  pinctrl-0:
    description: >
      Phandle for the active pinctrl state.

  pinctrl-1:
    description: >
      Phandle for the idle pinctrl state.

  phys:
    description: >
      Deprecated PHY aliases for Tegra124 and later.

  phy-names:
    items:
      - const: pcie

  avdd-pex-supply: true
  vdd-pex-supply: true
  avdd-pex-pll-supply: true
  avdd-plle-supply: true
  vddio-pex-clk-supply: true
  vdd-supply: true
  pex-clk-supply: true

  avdd-pexa-supply: true
  vdd-pexa-supply: true
  avdd-pexb-supply: true
  vdd-pexb-supply: true

  avddio-pex-supply: true
  dvddio-pex-supply: true
  hvdd-pex-supply: true
  hvdd-pex-pll-e-supply: true
  vddio-pex-ctl-supply: true
  avdd-pll-erefe-supply: true

  avdd-pll-uerefe-supply: true
  hvddio-pex-supply: true
  dvdd-pex-pll-supply: true

  dvdd-pex-supply: true
  hvdd-pex-pll-supply: true
  vddio-pexctl-aud-supply: true

required:
  - compatible
  - reg
  - interrupts
  - interrupt-controller

additionalProperties: false

examples:
  - |
    pcie-controller@80003000 {
        compatible = "nvidia,tegra20-pcie";
        device_type = "pci";
        reg = <0x80003000 0x00000800>,
              <0x80003800 0x00000200>,
              <0x90000000 0x10000000>;
        reg-names = "pads", "afi", "cs";
        interrupts = <0 98 0x04>, <0 99 0x04>;
        interrupt-names = "intr", "msi";
        #interrupt-cells = <1>;
        interrupt-map-mask = <0 0 0 0>;
        interrupt-map = <0 0 0 0 &intc GIC_SPI 98 IRQ_TYPE_LEVEL_HIGH>;
        bus-range = <0x00 0xff>;
        #address-cells = <3>;
        #size-cells = <2>;
        ranges = <0x82000000 0 0x80000000 0x80000000 0 0x00001000>,
                 <0x82000000 0 0x80001000 0x80001000 0 0x00001000>,
                 <0x81000000 0 0 0x82000000 0 0x00010000>,
                 <0x82000000 0 0xa0000000 0xa0000000 0 0x10000000>,
                 <0xc2000000 0 0xb0000000 0xb0000000 0 0x10000000>;
        clocks = <&tegra_car 70>, <&tegra_car 72>, <&tegra_car 118>;
        clock-names = "pex", "afi", "pll_e";
        resets = <&tegra_car 70>, <&tegra_car 72>, <&tegra_car 74>;
        reset-names = "pex", "afi", "pcie_x";
        status = "okay";
        vdd-supply = <&pci_vdd_reg>;
        pex-clk-supply = <&pci_clk_reg>;
    };
  - |
    pcie-controller@80003000 {
        status = "okay";
        pci@1,0 {
            status = "okay";
        };
    };
