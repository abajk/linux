%YAML 1.2
---
$id: http://devicetree.org/schemas/net/marvell,pxa168-eth.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Marvell PXA168 Ethernet Controller

maintainers:
  - Antoine Tenart <atenart@kernel.org>
  - Petr Štetiar <ynezz@true.cz>

description: |
  * Marvell PXA168 Ethernet Controller

  The MAC address will be determined using the optional properties
  defined in ethernet.txt.

  Sub-nodes:
  Each PHY can be represented as a sub-node. This is not mandatory.

  Sub-nodes required properties:
  - reg: the MDIO address of the PHY.

properties:
  compatible:
    items:
      - const: marvell,pxa168-eth

  reg:
    items:
      - description: Register set for the controller

  clocks:
    description: Pointer to the clock for the device
    maxItems: 1

  interrupts:
    items:
      - description: Interrupt for the device

  port-id:
    description: Ethernet port number
    $ref: /schemas/types.yaml#/definitions/uint32
    enum: [0, 1, 2]

  "#address-cells":
    description: Number of address cells for child nodes
    const: 1

  "#size-cells":
    description: Number of size cells for child nodes
    const: 0

  phy-handle:
    description: Reference to the attached PHY
    $ref: /schemas/types.yaml#/definitions/phandle

required:
  - compatible
  - reg
  - clocks
  - interrupts

additionalProperties: false

examples:
  - |
    eth0: ethernet@f7b90000 {
        compatible = "marvell,pxa168-eth";
        reg = <0xf7b90000 0x10000>;
        clocks = <&chip CLKID_GETH0>;
        interrupts = <GIC_SPI 24 IRQ_TYPE_LEVEL_HIGH>;
        #address-cells = <1>;
        #size-cells = <0>;
        phy-handle = <&ethphy0>;

        ethphy0: ethernet-phy@0 {
            reg = <0>;
        };
    };
