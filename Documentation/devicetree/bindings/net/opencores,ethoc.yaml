%YAML 1.2
---
$id: http://devicetree.org/schemas/opencores,ethoc.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: OpenCores Ethernet MAC (ethoc)

maintainers:
  - Max Filippov <jcmvbkbc@gmail.com>

description: |
  * OpenCores MAC 10/100 Mbps

properties:
  compatible:
    description: Must be "opencores,ethoc".
    items:
      - const: opencores,ethoc

  reg:
    description: |
      Two memory regions: first for the device registers and descriptor rings,
      second for the device packet memory.
    items:
      - description: Device registers and descriptor rings
      - description: Device packet memory

  interrupts:
    description: Interrupt for the device.
    items:
      - description: Device interrupt

  local-mac-address:
    description: Unique Ethernet MAC address for the device.
    $ref: /schemas/types.yaml#/definitions/uint8-array
    minItems: 6
    maxItems: 6

  clocks:
    description: Phandle to refer to the clock used by the device.
    maxItems: 1

required:
  - compatible
  - reg
  - interrupts

additionalProperties: false

examples:
  - |
    ethoc@fd030000 {
        compatible = "opencores,ethoc";
        reg = <0xfd030000 0x4000 0xfd800000 0x4000>;
        interrupts = <1>;
        local-mac-address = [00 50 c2 13 6f 00];
        clocks = <&osc>;
    };
