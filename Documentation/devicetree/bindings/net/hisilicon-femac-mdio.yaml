%YAML 1.2
---
$id: http://devicetree.org/schemas/net/hisilicon-femac-mdio.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Hisilicon Fast Ethernet MDIO Controller
maintainers:
  - Dongpo Li <lidongpo@hisilicon.com>

description: |
  Hisilicon Fast Ethernet MDIO Controller interface

  PHY subnode inherits from the standard PHY binding [1]:
    [1] Documentation/devicetree/bindings/net/phy.txt

allOf:
  - $ref: /schemas/net/mdio.yaml

properties:
  compatible:
    items:
      - const: hisilicon,hisi-femac-mdio
    description: Must be "hisilicon,hisi-femac-mdio".
  reg:
    items:
      - description: Memory region for MDIO controller registers.
  clocks:
    items:
      - description: Reference clock for MDIO controller.

unevaluatedProperties: false

examples:
  - |
    mdio@10091100 {
        compatible = "hisilicon,hisi-femac-mdio";
        reg = <0x10091100 0x10>;
        clocks = <&crg HI3516CV300_MDIO_CLK>;
        #address-cells = <1>;
        #size-cells = <0>;

        phy0: phy@1 {
          reg = <1>;
        };
    };
