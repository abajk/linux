%YAML 1.2
---
$id: http://devicetree.org/schemas/net/hisilicon,hns-mdio.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Hisilicon HNS MDIO bus controller

maintainers:
  - huangdaode <huangdaode@hisilicon.com>
  - yankejian <yankejian@huawei.com>

description: |
  Hisilicon MDIO bus controller

  Typically an MDIO bus might have several children.

properties:
  compatible:
    oneOf:
      - items:
          - enum:
              - hisilicon,hns-mdio
              - hisilicon,mdio

  reg:
    description: The base address of the MDIO bus controller register bank.
    items:
      - description: Specifier prefix (unused)
      - description: Base address of the MDIO controller register bank
      - description: Reserved, must be zero
      - description: Size of the MDIO controller register bank in bytes

  '#address-cells':
    const: 1

  '#size-cells':
    const: 0

required:
  - compatible
  - reg
  - '#address-cells'
  - '#size-cells'

additionalProperties: false

examples:
  - |
    mdio@803c0000 {
      #address-cells = <1>;
      #size-cells = <0>;
      compatible = "hisilicon,hns-mdio","hisilicon,mdio";
      reg = <0x0 0x803c0000 0x0 0x10000>;

      ethernet-phy@0 {
        reg = <0>;
      };
    };
