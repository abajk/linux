%YAML 1.2
---
$id: http://devicetree.org/schemas/net/bluetooth/mediatek,mt7663u-bluetooth.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: MediaTek UART based Bluetooth Devices

maintainers:
  - Krzysztof Kozlowski <krzysztof.kozlowski@linaro.org>

description: |
  MediaTek UART based Bluetooth Devices

  This device is a serial attached device to UART device and thus it must be a
  child node of the serial node with UART.

  Please refer to the following documents for generic properties:
    Documentation/devicetree/bindings/serial/serial.yaml

properties:
  compatible:
    items:
      - enum:
          - mediatek,mt7663u-bluetooth
          - mediatek,mt7668u-bluetooth

  vcc-supply: true

  pinctrl-names:
    oneOf:
      - items:
          - enum: [default]
      - items:
          - enum:
              - default
              - runtime

  pinctrl-0:
    description: Bootstrap UART RXD pinmux configuration
    $ref: /schemas/types.yaml#/definitions/phandle-array

  pinctrl-1:
    description: Runtime UART pinmux configuration
    $ref: /schemas/types.yaml#/definitions/phandle-array

  boot-gpios:
    description: GPIO holding UART RXD low to enter bootstrap mode
    $ref: /schemas/types.yaml#/definitions/phandle-array

  reset-gpios:
    description: GPIO used to reset the device
    $ref: /schemas/types.yaml#/definitions/phandle-array

  clocks:
    description: Clock specifiers for the device
    $ref: /schemas/types.yaml#/definitions/phandle-array

  clock-names:
    items:
      - const: osc

  current-speed:
    description: Baud rate of the device
    $ref: /schemas/types.yaml#/definitions/uint32
    default: 921600

additionalProperties: false

examples:
  - |
    bluetooth {
      compatible = "mediatek,mt7663u-bluetooth";
      vcc-supply = <&reg_5v>;
      reset-gpios = <&pio 24 GPIO_ACTIVE_LOW>;
      pinctrl-names = "default", "runtime";
      pinctrl-0 = <&uart1_pins_boot>;
      pinctrl-1 = <&uart1_pins_runtime>;
      current-speed = <921600>;
    };
