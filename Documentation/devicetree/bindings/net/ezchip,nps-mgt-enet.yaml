%YAML 1.2
---
$id: http://devicetree.org/schemas/ezchip,nps-mgt-enet.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: EZchip NPS Management Ethernet port driver

maintainers:
  - Noam Camus <noamc@ezchip.com>

description: |
  * EZchip NPS Management Ethernet port driver

properties:
  compatible:
    $ref: /schemas/types.yaml#/definitions/string-array
    items:
      - const: ezchip,nps-mgt-enet

  reg:
    items:
      - description: Address and length of the register set for the device

  interrupts:
    items:
      - description: ENET interrupt

  mac-address:
    description: MAC address for the interface
    $ref: /schemas/types.yaml#/definitions/string-array
    items:
      - pattern: ^([0-9A-Fa-f]{2}\s?){6}$

required:
  - compatible
  - reg
  - interrupts

additionalProperties: false

examples:
  - |
    ethernet@f0003000 {
        compatible = "ezchip,nps-mgt-enet";
        reg = <0xf0003000 0x44>;
        interrupts = <7>;
        mac-address = [ 00 11 22 33 44 55 ];
    };
