%YAML 1.2
---
$id: http://devicetree.org/schemas/apm,xgene-mdio-rgmii.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: APM X-Gene SoC MDIO node

maintainers:
  - Iyappan Subramanian <isubramanian@apm.com>

properties:
  compatible:
    enum:
      - apm,xgene-mdio-rgmii
      - apm,xgene-mdio-xfi

  '#address-cells':
    const: 1

  '#size-cells':
    const: 0

  reg:
    maxItems: 1

  clocks:
    maxItems: 1

additionalProperties: false

required:
  - compatible
  - '#address-cells'
  - '#size-cells'
  - reg
  - clocks

examples:
  - |
    mdio: mdio@17020000 {
        compatible = "apm,xgene-mdio-rgmii";
        #address-cells = <1>;
        #size-cells = <0>;
        reg = <0x0 0x17020000 0x0 0xd100>;
        clocks = <&menetclk 0>;
    };

    &mdio {
        menetphy: phy@3 {
            reg = <0x3>;
        };
        sgenet0phy: phy@4 {
            reg = <0x4>;
        };
        sgenet1phy: phy@5 {
            reg = <0x5>;
        };
    };
