%YAML 1.2
---
$id: http://devicetree.org/schemas/net/ieee802154/at86rf230.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Atmel AT86RF230 IEEE 802.15.4 RF transceiver
maintainers:
  - Alexander Aring <alex.aring@gmail.com>

description: |
  * AT86RF230 IEEE 802.15.4 *

properties:
  compatible:
    description: One or more compatible strings for the device.
    $ref: /schemas/types.yaml#/definitions/string-array
    items:
      - enum:
          - atmel,at86rf230
          - atmel,at86rf231
          - atmel,at86rf233
          - atmel,at86rf212

  spi-max-frequency:
    description: Maximal bus speed, should be set to 7500000 depending on sync or async operation mode.
    $ref: /schemas/types.yaml#/definitions/uint32

  reg:
    description: The chipselect index.
    items:
      - description: Chip-select index

  interrupts:
    description: |
      The interrupt spec (number and flags) generated by the device.
      Non high-level interrupts can cause deadlocks while handling ISR.
    items:
      - description: Interrupt number
      - description: Interrupt flags (trigger type and level)

  reset-gpio:
    description: GPIO spec for the rstn pin.
    maxItems: 1

  sleep-gpio:
    description: GPIO spec for the slp_tr pin.
    maxItems: 1

  xtal-trim:
    description: |
      U8 value for fine tuning the internal capacitance arrays of XTAL pins.
      0 = +0 pF, 0xf = +4.5 pF.
    $ref: /schemas/types.yaml#/definitions/uint32
    minimum: 0
    maximum: 15

required:
  - compatible
  - spi-max-frequency
  - reg
  - interrupts

additionalProperties: false

examples:
  - |
    at86rf231@0 {
        compatible = "atmel,at86rf231";
        spi-max-frequency = <7500000>;
        reg = <0>;
        interrupts = <19 4>;
        xtal-trim = /bits/ 8 <0x06>;
    };
