%YAML 1.2
---
$id: http://devicetree.org/schemas/net/ieee802154/nxp,mcr20a.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#
title: MCR20A IEEE 802.15.4 transceiver
maintainers:
  - Xue Liu <liuxuenetmail@gmail.com>
description: |
  * MCR20A IEEE 802.15.4 *
properties:
  compatible:
    items:
      - const: nxp,mcr20a
  spi-max-frequency:
    description: >
      Maximal SPI bus speed; should be lower than 9000000 depending on
      synchronous or asynchronous operation mode.
  reg:
    items:
      - description: Chipselect index.
  interrupts:
    items:
      - description: >
          Interrupt generated by the device; non-high-level interrupts can
          cause deadlocks during ISR handling.
  rst_b-gpio:
    maxItems: 1
    description: GPIO spec for the RST_B pin.
required:
  - compatible
  - spi-max-frequency
  - reg
  - interrupts
additionalProperties: false
examples:
  - |
    mcr20a@0 {
        compatible = "nxp,mcr20a";
        spi-max-frequency = <9000000>;
        reg = <0>;
        interrupts = <17 2>;
        rst_b-gpio = <&gpio 27 1>;
    };
