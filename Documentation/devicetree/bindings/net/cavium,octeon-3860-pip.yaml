%YAML 1.2
---
$id: http://devicetree.org/schemas/net/cavium,octeon-3860-pip.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Cavium Octeon PIP Ethernet nexus

maintainers:
  - Aaro Koskinen <aaro.koskinen@iki.fi>
  - David Daney <david.daney@cavium.com>
  - Sergei Shtylyov <sergei.shtylyov@cogentembedded.com>

description: |
  * PIP Ethernet nexus.

  The PIP Ethernet nexus can control several data packet input/output
  devices.  The devices have a two level grouping scheme.  There may be
  several interfaces, and each interface may have several ports.  These
  ports might be an individual Ethernet PHY.

properties:
  compatible:
    items:
      - const: cavium,octeon-3860-pip
    description: PIP Ethernet nexus compatible identifier
  reg:
    description: Base address of the PIP's register bank.
  '#address-cells':
    const: 1
    description: Number of address cells for child nodes. Must be 1.
  '#size-cells':
    const: 0
    description: Number of size cells for child nodes. Must be 0.

patternProperties:
  '^interface@.*$':
    description: Child nodes which are PIP interfaces
    type: object
    properties:
      compatible:
        items:
          - const: cavium,octeon-3860-pip-interface

      reg:
        maxItems: 1
      '#address-cells':
        const: 1
        description: Number of address cells for child ports. Must be 1.
      '#size-cells':
        const: 0
        description: Number of size cells for child ports. Must be 0.
    required:
      - compatible
      - reg
    additionalProperties: true

  '^ethernet@.*$':
    description: Child nodes which are PIP ports
    type: object
    properties:
      compatible:
        items:
          - const: cavium,octeon-3860-pip-port
        description: PIP port compatible identifier
      reg:
        description: Port number within the interface group.

      phy-handle:
        $ref: /schemas/types.yaml#/definitions/phandle
        description: Optional PHY phandle.
      rx-delay:
        $ref: /schemas/types.yaml#/definitions/uint32
        description: |
          Delay value for RGMII receive clock. Disabled if 0. Range 1–31; actual mapping
          varies with hardware.
      tx-delay:
        $ref: /schemas/types.yaml#/definitions/uint32
        description: |
          Delay value for RGMII transmit clock. Disabled if 0. Range 1–31; actual mapping
          varies with hardware.
    required:
      - compatible
      - reg
    additionalProperties: true

required:
  - compatible
  - reg
  - '#address-cells'
  - '#size-cells'

additionalProperties: false

examples:
  - |
    pip@11800a0000000 {
        compatible = "cavium,octeon-3860-pip";
        #address-cells = <1>;
        #size-cells = <0>;
        reg = <0x11800 0xa0000000 0x0 0x2000>;

        interface@0 {
            compatible = "cavium,octeon-3860-pip-interface";
            #address-cells = <1>;
            #size-cells = <0>;
            reg = <0>; /* interface */

            ethernet@0 {
                compatible = "cavium,octeon-3860-pip-port";
                reg = <0x0>; /* Port */
                local-mac-address = [ 00 0f b7 10 63 60 ];
                phy-handle = <&phy2>;
            };
            ethernet@1 {
                compatible = "cavium,octeon-3860-pip-port";
                reg = <0x1>; /* Port */
                local-mac-address = [ 00 0f b7 10 63 61 ];
                phy-handle = <&phy3>;
            };
            ethernet@2 {
                compatible = "cavium,octeon-3860-pip-port";
                reg = <0x2>; /* Port */
                local-mac-address = [ 00 0f b7 10 63 62 ];
                phy-handle = <&phy4>;
            };
            ethernet@3 {
                compatible = "cavium,octeon-3860-pip-port";
                reg = <0x3>; /* Port */
                local-mac-address = [ 00 0f b7 10 63 63 ];
                phy-handle = <&phy5>;
            };
        };

        interface@1 {
            compatible = "cavium,octeon-3860-pip-interface";
            #address-cells = <1>;
            #size-cells = <0>;
            reg = <1>; /* interface */

            ethernet@0 {
                compatible = "cavium,octeon-3860-pip-port";
                reg = <0x0>; /* Port */
                local-mac-address = [ 00 0f b7 10 63 64 ];
                phy-handle = <&phy6>;
            };
        };
    };
