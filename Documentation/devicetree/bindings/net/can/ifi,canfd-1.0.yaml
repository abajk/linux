%YAML 1.2
---
$id: http://devicetree.org/schemas/net/can/ifi,canfd-1.0.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: IFI CANFD controller

maintainers:
  - Marek Vasut <marex@denx.de>

description: |
  IFI CANFD controller

properties:
  compatible:
    items:
      - const: ifi,canfd-1.0
    description: |
      Must be "ifi,canfd-1.0".
  reg:
    description: |
      CAN controller registers location and length.
    items:
      - description: Register base address.
      - description: Register length.
  interrupts:
    description: |
      IRQ line and flags for the CAN controller.
    items:
      - description: Interrupt specifier number.
      - description: Interrupt flags.

required:
  - compatible
  - reg
  - interrupts

additionalProperties: false

examples:
  - |
    canfd0: canfd@ff220000 {
        compatible = "ifi,canfd-1.0";
        reg = <0xff220000 0x00001000>;
        interrupts = <0 43 0>;
    };
