%YAML 1.2
---
$id: http://devicetree.org/schemas/net/can/holt,hi3110.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Holt HI-311X stand-alone CAN controller
maintainers:
  - Akshay Bhat <akshay.bhat@timesys.com>
  - Lukas Wunner <lukas@wunner.de>
  - Rob Herring <robh@kernel.org>

description: |
  Holt HI-311X stand-alone CAN controller device tree bindings

properties:
  compatible:
    items:
      - const: holt,hi3110
  reg:
    items:
      - description: SPI chip select
  clocks:
    maxItems: 1
    description: The clock feeding the CAN controller
  interrupts:
    items:
      - description: CAN controller interrupt
  vdd-supply: true
  xceiver-supply: true

required:
  - compatible
  - reg
  - clocks
  - interrupts

additionalProperties: false

examples:
  - |
    can0: can@1 {
        compatible = "holt,hi3110";
        reg = <1>;
        clocks = <&clk32m>;
        interrupts = <13 IRQ_TYPE_LEVEL_HIGH>;
        vdd-supply = <&reg5v0>;
        xceiver-supply = <&reg5v0>;
    };
