%YAML 1.2
---
$id: http://devicetree.org/schemas/net/can/bosch,cc770.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Bosch CC770 and Intel AN82527 CAN controller

maintainers:
  - Bjorn Helgaas <bhelgaas@google.com>
  - Wolfgang Grandegger <wg@grandegger.com>

description: |
  Memory mapped Bosch CC770 and Intel AN82527 CAN controller

  Note: The CC770 is a CAN controller from Bosch, which is 100%
  compatible with the old AN82527 from Intel, but with "bugs" being fixed.

  For further information, please have a look to the CC770 or AN82527.

properties:
  compatible:
    oneOf:
      - items:
          - enum:
              - bosch,cc770
      - items:
          - enum:
              - intc,82527

  reg:
    items:
      - description: Chip select
      - description: Address offset
      - description: Register block size

  interrupts:
    description: Interrupt source (number and sensitivity) required for the controller
    items:
      - description: Interrupt specification

  bosch,clock-out-frequency:
    description: Clock frequency in Hz on the CLKOUT pin. If not specified or 0, the CLKOUT pin is disabled.
    $ref: /schemas/types.yaml#/definitions/uint32
    default: 0

  bosch,disconnect-rx0-input:
    description: Disconnect RX0 input (see data sheet).
    type: boolean

  bosch,disconnect-rx1-input:
    description: Disconnect RX1 input (see data sheet).
    type: boolean

  bosch,disconnect-tx1-output:
    description: Disconnect TX1 output (see data sheet).
    type: boolean

  bosch,divide-memory-clock:
    description: Divide memory clock (see data sheet).
    type: boolean

  bosch,external-clock-frequency:
    description: Frequency of the external oscillator clock in Hz. The internal clock is half this value.
    $ref: /schemas/types.yaml#/definitions/uint32
    default: 16000000

  bosch,iso-low-speed-mux:
    description: ISOLATED low speed MUX (see data sheet).
    type: boolean

  bosch,polarity-dominant:
    description: Polarity dominant (see data sheet).
    type: boolean

  bosch,slew-rate:
    description: Slew rate of the CLKOUT signal. If not specified, a reasonable value is calculated.
    $ref: /schemas/types.yaml#/definitions/uint32

required:
  - compatible
  - reg
  - interrupts

additionalProperties: false

examples:
  - |
    can@3,100 {
        compatible = "bosch,cc770";
        reg = <3 0x100 0x80>;
        interrupts = <2 0>;
        bosch,external-clock-frequency = <16000000>;
    };
