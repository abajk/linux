%YAML 1.2
---
$id: http://devicetree.org/schemas/net/can/fsl,mpc5xxx-mscan.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Freescale MPC5xxx MSCAN controller

maintainers:
  - Grant Likely <grant.likely@secretlab.ca>

description: |
  CAN Device Tree Bindings

  (c) 2006-2009 Secret Lab Technologies Ltd
  Grant Likely <grant.likely@secretlab.ca>

  fsl,mpc5200-mscan nodes
  -----------------------
  In addition to the required compatible-, reg- and interrupt-properties, you can
  also specify which clock source shall be used for the controller:

  fsl,mpc5121-mscan nodes
  -----------------------
  In addition to the required compatible-, reg- and interrupt-properties, you can
  also specify which clock source and divider shall be used for the controller:

  Note that the MPC5121 Rev. 1 processor is not supported.

properties:
  compatible:
    items:
      - enum:
          - fsl,mpc5200-mscan
          - fsl,mpc5121-mscan

  reg:
    items:
      - description: Base address and size of the MSCAN controller registers

  interrupts:
    description: Interrupt specifier for the MSCAN controller
    items:
      - description: Interrupt number
      - description: Interrupt flags

  fsl,mscan-clock-source:
    description: Clock source for the MSCAN controller
    $ref: /schemas/types.yaml#/definitions/string
    enum:
      - ip
      - ref

  fsl,mscan-clock-divider:
    description: Clock divider for reference and system clocks
    $ref: /schemas/types.yaml#/definitions/uint32
    default: 1

required:
  - compatible
  - reg
  - interrupts

additionalProperties: false

examples:
  - |
    can@1300 {
        compatible = "fsl,mpc5121-mscan";
        interrupts = <12 0x8>;
        reg = <0x1300 0x80>;
    };
  - |
    can@1380 {
        compatible = "fsl,mpc5121-mscan";
        interrupts = <13 0x8>;
        reg = <0x1380 0x80>;
        fsl,mscan-clock-source = "ref";
        fsl,mscan-clock-divider = <3>;
    };
