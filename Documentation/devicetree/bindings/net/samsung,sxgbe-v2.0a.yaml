%YAML 1.2
---
$id: http://devicetree.org/schemas/net/samsung,sxgbe-v2.0a.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Samsung SXGBE 10G Ethernet Controller

maintainers:
  - Bjorn Helgaas <bhelgaas@google.com>
  - Hayato Suzuki <hytszk@gmail.com>
  - Petr Štetiar <ynezz@true.cz>
  - Rob Herring <robh@kernel.org>
  - Siva Reddy <siva.kallam@samsung.com>

description: |
  * Samsung 10G Ethernet driver (SXGBE)

  The MAC address will be determined using the optional properties
  defined in ethernet.txt.

properties:
  compatible:
    items:
      - const: samsung,sxgbe-v2.0a

  reg:
    maxItems: 1

  interrupts:
    description: >
      SXGBE interrupts. The first entry is the fixed common interrupt, followed
      by up to 8 transmit DMA interrupts, up to 16 receive DMA interrupts, and
      an optional LPI interrupt.
    minItems: 1
    maxItems: 26
    items:
      - description: Fixed common interrupt
    additionalItems: true

  phy-mode:
    description: Operation mode of the PHY interface.
    enum:
      - sgmii
      - xgmii

  samsung,pbl:
    description: Programmable Burst Length.
    $ref: /schemas/types.yaml#/definitions/uint32
    enum: [1, 2, 4, 8, 16, 32]

  samsung,burst-map:
    description: >
      Program possible DMA bursts when fixed burst mode is enabled. Allowable
      range is 0x01–0x3F.
    $ref: /schemas/types.yaml#/definitions/uint32
    minimum: 1
    maximum: 63

  max-frame-size:
    description: Maximum frame size (MTU).
    $ref: /schemas/types.yaml#/definitions/uint32

required:
  - compatible
  - reg
  - interrupts
  - phy-mode
  - samsung,pbl
  - samsung,burst-map

additionalProperties: false

examples:
  - |
    sxgbe0: ethernet@1a040000 {
        compatible = "samsung,sxgbe-v2.0a";
        reg = <0 0x1a040000 0 0x10000>;
        interrupts = <0 209 4>, <0 185 4>, <0 186 4>, <0 187 4>,
                     <0 188 4>, <0 189 4>, <0 190 4>, <0 191 4>,
                     <0 192 4>, <0 193 4>, <0 194 4>, <0 195 4>,
                     <0 196 4>, <0 197 4>, <0 198 4>, <0 199 4>,
                     <0 200 4>, <0 201 4>, <0 202 4>, <0 203 4>,
                     <0 204 4>, <0 205 4>, <0 206 4>, <0 207 4>,
                     <0 208 4>, <0 210 4>;
        samsung,pbl = <0x08>;
        samsung,burst-map = <0x20>;
        mac-address = [00 11 22 33 44 55];
        max-frame-size = <9000>;
        phy-mode = "xgmii";
    };
