%YAML 1.2
---
$id: http://devicetree.org/schemas/net/hisilicon-hix5hd2-gmac.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Hisilicon HIX5HD2 GMAC controller

maintainers:
  - Dongpo Li <lidongpo@hisilicon.com>
  - Petr Štetiar <ynezz@true.cz>
  - Zhangfei Gao <zhangfei.gao@linaro.org>

properties:
  compatible:
    items:
      - enum: ["hisilicon,hix5hd2-gmac", "hisilicon,hi3798cv200-gmac", "hisilicon,hi3516a-gmac"]
      - enum: ["hisilicon,hisi-gmac-v1", "hisilicon,hisi-gmac-v2"]

  reg:
    items:
      - description: MAC register base and size.
      - description: External interface control register.

  interrupts:
    description: MAC interrupt.
    items:
      - description: MAC interrupt specifier.

  '#address-cells':
    const: 1
    description: Number of address cells for child nodes.

  '#size-cells':
    const: 0
    description: Number of size cells for child nodes.

  phy-mode:
    description: PHY interface mode, see Documentation/devicetree/bindings/net/ethernet.txt.
    $ref: /schemas/types.yaml#/definitions/string

  clocks:
    description: Clock phandles and specifier pairs.
    minItems: 1
    maxItems: 2

  clock-names:
    description: Names for the clocks in 'clocks'.
    minItems: 1
    items:
      - const: mac_core
      - const: mac_ifc

  resets:
    description: Reset phandles for MAC and PHY.
    minItems: 1
    maxItems: 3

  reset-names:
    description: Names for reset signals in 'resets'.
    minItems: 1
    items:
      - const: mac_core
      - const: mac_ifc
      - const: phy

  hisilicon,phy-reset-delays-us:
    description: Triplet of PHY reset delays in microseconds.
    items:
      - description: Pre-reset delay.
      - description: Reset pulse duration.
      - description: Post-reset delay.

patternProperties:
  "^phy@[0-9]+$":
    description: PHY child node.
    $ref: /schemas/devicetree/bindings/net/phy.yaml#

required:
  - compatible
  - reg
  - interrupts
  - '#address-cells'
  - '#size-cells'
  - phy-mode
  - phy-handle
  - clocks
  - clock-names

additionalProperties: false

examples:
  - |
    gmac0: ethernet@f9840000 {
        compatible = "hisilicon,hi3798cv200-gmac", "hisilicon,hisi-gmac-v2";
        reg = <0xf9840000 0x1000>, <0xf984300c 0x4>;
        interrupts = <0 71 4>;
        #address-cells = <1>;
        #size-cells = <0>;
        phy-mode = "rgmii";
        phy-handle = <&phy2>;
        mac-address = [00 00 00 00 00 00];
        clocks = <&crg HISTB_ETH0_MAC_CLK>, <&crg HISTB_ETH0_MACIF_CLK>;
        clock-names = "mac_core", "mac_ifc";
        resets = <&crg 0xcc 8>, <&crg 0xcc 10>, <&crg 0xcc 12>;
        reset-names = "mac_core", "mac_ifc", "phy";
        hisilicon,phy-reset-delays-us = <10000 10000 30000>;

        phy2: ethernet-phy@2 {
            reg = <2>;
        };
    };
