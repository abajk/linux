%YAML 1.2
---
$id: http://devicetree.org/schemas/net/hisilicon,hi3516cv300-femac.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Hisilicon Fast Ethernet MAC controller

maintainers:
  - Dongpo Li <lidongpo@hisilicon.com>
  - Petr Štetiar <ynezz@true.cz>

description: |
  Hisilicon Fast Ethernet MAC controller

  The MAC address will be determined using the optional properties
  defined in ethernet.txt[1].

  [1] Documentation/devicetree/bindings/net/ethernet.txt

properties:
  compatible:
    description: Must contain one of the version strings and the SOC string.
    oneOf:
      - items:
          - enum:
              - hisilicon
              - hisi-femac-v1
              - hisi-femac-v2
          - const: hisilicon,hi3516cv300-femac
      - items:
          - const: hisilicon,hi3516cv300-femac

  reg:
    description: Base physical addresses and sizes for device registers.
    items:
      - description: MAC core register base and size
      - description: Global MAC control register base and size

  interrupts:
    description: MAC interrupt
    maxItems: 1

  clocks:
    description: A phandle to the MAC main clock.
    maxItems: 1

  resets:
    description: Reset phandles.
    minItems: 1
    items:
      - description: MAC reset signal
      - description: PHY reset signal

  reset-names:
    description: Names for reset signals.
    minItems: 1
    items:
      - const: mac
      - const: phy

  mac-address:
    description: Hardware MAC address.
    items:
      minimum: 0
      maximum: 255
    minItems: 6
    maxItems: 6

  phy-mode:
    description: PHY interface mode.
    $ref: /schemas/types.yaml#/definitions/string

  phy-handle:
    description: Phandle to the physical PHY device.
    $ref: /schemas/types.yaml#/definitions/phandle

  hisilicon,phy-reset-delays-us:
    description: "Triplet of PHY reset delays in microseconds: pre-delay, pulse, post-delay."
    items:
      - description: Reset pre-delay in microseconds
        minimum: 0
      - description: Reset pulse in microseconds
        minimum: 0
      - description: Reset post-delay in microseconds
        minimum: 0

required:
  - compatible
  - reg
  - interrupts
  - clocks
  - resets
  - reset-names

additionalProperties: false

examples:
  - |
    hisi_femac: ethernet@10090000 {
        compatible = "hisilicon,hi3516cv300-femac", "hisilicon,hisi-femac-v2";
        reg = <0x10090000 0x1000>, <0x10091300 0x200>;
        interrupts = <12>;
        clocks = <&crg HI3518EV200_ETH_CLK>;
        resets = <&crg 0xec 0>, <&crg 0xec 3>;
        reset-names = "mac", "phy";
        mac-address = [00 00 00 00 00 00];
        phy-mode = "mii";
        phy-handle = <&phy0>;
        hisilicon,phy-reset-delays-us = <10000 20000 20000>;
    };
