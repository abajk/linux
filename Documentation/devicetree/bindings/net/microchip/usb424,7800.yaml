%YAML 1.2
---
$id: http://devicetree.org/schemas/usb424,7800.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Microchip LAN78xx Gigabit Ethernet controller

maintainers:
  - Petr Štetiar <ynezz@true.cz>
  - Phil Elwell <phil@raspberrypi.org>

description: |
  Microchip LAN78xx Gigabit Ethernet controller

  The LAN78XX devices are usually configured by programming their OTP or with
  an external EEPROM, but some platforms (e.g. Raspberry Pi 3 B+) have neither.
  The Device Tree properties, if present, override the OTP and EEPROM.

  The MAC address will be determined using the optional properties defined in
  ethernet.txt.

properties:
  compatible:
    items:
      - enum:
          - usb424,7800
          - usb424,7801
          - usb424,7850

  reg:
    items:
      - description: USB port index on the host controller.

  local-mac-address:
    description: Unicast MAC address assigned to the Ethernet controller.
    $ref: /schemas/types.yaml#/definitions/uint8-array
    minItems: 6
    maxItems: 6

  mdio:
    description: MDIO bus exposing the embedded PHY.
    type: object
    additionalProperties: false
    properties:
      "#address-cells":
        const: 1
      "#size-cells":
        const: 0

      ethernet-phy:
        description: Embedded Ethernet PHY on the MDIO bus.
        type: object
        additionalProperties: false
        properties:
          reg:
            items:
              - description: PHY address on the MDIO bus.
          microchip,led-modes:
            description: Operating modes for the PHY LEDs.
            $ref: /schemas/types.yaml#/definitions/uint32-array
            maxItems: 4
            items:
              enum:
                - LAN78XX_LINK_1000_ACTIVITY
                - LAN78XX_LINK_10_100_ACTIVITY
        required:
          - reg

required:
  - compatible
  - reg

additionalProperties: false

examples:
  - |
    &usb {
      usb-port@1 {
        compatible = "usb424,2514";
        reg = <1>;
        #address-cells = <1>;
        #size-cells = <0>;

        usb-port@1 {
          compatible = "usb424,2514";
          reg = <1>;
          #address-cells = <1>;
          #size-cells = <0>;

          ethernet: ethernet@1 {
            compatible = "usb424,7800";
            reg = <1>;
            local-mac-address = [ 00 11 22 33 44 55 ];

            mdio {
              #address-cells = <0x1>;
              #size-cells = <0x0>;
              eth_phy: ethernet-phy@1 {
                reg = <1>;
                microchip,led-modes = <
                  LAN78XX_LINK_1000_ACTIVITY
                  LAN78XX_LINK_10_100_ACTIVITY
                >;
              };
            };
          };
        };
      };
    };
