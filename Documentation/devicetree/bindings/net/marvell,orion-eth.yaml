%YAML 1.2
---
$id: http://devicetree.org/schemas/net/marvell,orion-eth.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Marvell Orion/Discovery ethernet controller

maintainers:
  - Grant Likely <grant.likely@linaro.org>
  - Jason Gunthorpe <jgg@ziepe.ca>
  - Sebastian Hesselbarth <sebastian.hesselbarth@gmail.com>
  - Sergei Shtylyov <sergei.shtylyov@cogentembedded.com>

description: |
  Marvell Orion/Discovery ethernet controller

  The Marvell Discovery ethernet controller can be found on Marvell Orion SoCs
  (Kirkwood, Dove, Orion5x, and Discovery Innovation) and as part of Marvell
  Discovery system controller chips (mv64[345]60).

  The Discovery ethernet controller is described with two levels of nodes. The
  first level describes the ethernet controller itself and the second level
  describes up to 3 ethernet port nodes within that controller. The reason for
  the multiple levels is that the port registers are interleaved within a single
  set of controller registers. Each port node describes port-specific properties.

  Note: The above separation is only true for Discovery system controllers.
  For Orion SoCs we stick to the separation, although there each controller has
  only one port associated. Multiple ports are implemented as multiple single-port
  controllers. As Kirkwood has some issues with proper initialization after reset,
  an extra compatible string is added for it.

properties:
  compatible:
    items:
      - enum:
          - marvell,orion-eth
          - marvell,kirkwood-eth

  reg:
    maxItems: 1

  interrupts:
    maxItems: 1

  clocks:
    maxItems: 1

  marvell,tx-checksum-limit:
    description: Maximum transmit packet size for hardware checksum.
    $ref: /schemas/types.yaml#/definitions/uint32

  "#address-cells":
    description: Number of address cells for the controller node.
    const: 1

  "#size-cells":
    description: Number of size cells for the controller node.
    const: 0

patternProperties:
  "^ethernet@[0-9a-fA-F]+$":
    description: Ethernet port child node.
    type: object
    additionalProperties: false
    properties:
      compatible:
        items:
          - enum:
              - marvell,orion-eth-port
              - marvell,kirkwood-eth-port

      reg:
        description: Port number relative to ethernet controller.
        items:
          - description: Port index (0, 1, or 2).

      interrupts:
        maxItems: 1

      phy-handle:
        description: PHY device handle for the port.
        $ref: /schemas/types.yaml#/definitions/phandle

      phy-mode:
        description: PHY mode if no PHY-controller is present.
        $ref: /schemas/types.yaml#/definitions/string

      marvell,tx-queue-size:
        description: Size of the transmit ring buffer.
        $ref: /schemas/types.yaml#/definitions/uint32

      marvell,tx-sram-addr:
        description: Address of transmit descriptor buffer located in SRAM.
        $ref: /schemas/types.yaml#/definitions/uint32

      marvell,tx-sram-size:
        description: Size of transmit descriptor buffer located in SRAM.
        $ref: /schemas/types.yaml#/definitions/uint32

      marvell,rx-queue-size:
        description: Size of the receive ring buffer.
        $ref: /schemas/types.yaml#/definitions/uint32

      marvell,rx-sram-addr:
        description: Address of receive descriptor buffer located in SRAM.
        $ref: /schemas/types.yaml#/definitions/uint32

      marvell,rx-sram-size:
        description: Size of receive descriptor buffer located in SRAM.
        $ref: /schemas/types.yaml#/definitions/uint32

      speed:
        description: Port speed if no PHY-controller connected.
        enum:
          - 10
          - 100
          - 1000

      duplex:
        description: Port duplex mode if no PHY-controller connected.
        enum:
          - half
          - full

    required:
      - compatible
      - reg
      - interrupts
      - local-mac-address

additionalProperties: false

examples:
  - |
    mdio-bus {
        ethphy: ethernet-phy@8 {
            /* PHY node omitted */
        };

        eth: ethernet-controller@72000 {
            compatible = "marvell,orion-eth";
            #address-cells = <1>;
            #size-cells = <0>;
            reg = <0x72000 0x2000>;
            clocks = <&gate_clk 2>;
            marvell,tx-checksum-limit = <1600>;
            interrupts = <29>;

            ethernet@0 {
                compatible = "marvell,orion-eth-port";
                reg = <0>;
                interrupts = <29>;
                phy-handle = <&ethphy>;
                local-mac-address = [00 00 00 00 00 00];
            };
        };
    };
