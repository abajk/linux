%YAML 1.2
---
$id: http://devicetree.org/schemas/xillybus,xillybus-1.00.a.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Xillybus driver for generic FPGA interface

maintainers:
  - Eli Billauer <eli.billauer@gmail.com>
  - Rob Herring <robh@kernel.org>

description: |
  * Xillybus driver for generic FPGA interface

properties:
  compatible:
    # Exactly one compatible string supported
    items:
      - enum: ["xillybus,xillybus-1.00.a"]

  reg:
    items:
      - description: Base address of register set
      - description: Length of register set

  interrupts:
    items:
      - description: Interrupt controller phandle
      - description: Interrupt number
      - description: Interrupt flags
    description: Contains one interrupt specifier, typically consisting of three cells.

  dma-coherent:
    type: boolean
    description: DMA operations are coherent

required:
  - compatible
  - reg
  - interrupts

additionalProperties: false

examples:
  - |
    xillybus@ff200400 {
        compatible = "xillybus,xillybus-1.00.a";
        reg = <0xff200400 0x00000080>;
        interrupts = <0 40 1>;
        dma-coherent;
    };
