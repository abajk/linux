%YAML 1.2
---
$id: http://devicetree.org/schemas/cpufreq/nvidia,tegra124-cpufreq.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Tegra124 CPU frequency scaling

maintainers:
  - Joseph Lo <josephl@nvidia.com>
  - Thierry Reding <treding@nvidia.com>

description: |
  Tegra124 CPU frequency scaling

  Both required and optional properties listed below must be defined
  under node /cpus/cpu@0.

properties:
  compatible:
    # Must match driver binding identifier
    items:
      - const: nvidia,tegra124-cpufreq

  clocks:
    description: Clock sources required for CPU frequency scaling.
    # Fixed order of required clocks
    items:
      - description: CPU cluster clock mux
      - description: Fast PLL clocksource
      - description: Auxiliary PLL used during fast PLL rate changes
      - description: Fast DFLL clocksource that also automatically scales CPU voltage

  clock-names:
    description: Names for each clock entry corresponding to the 'clocks' property.
    items:
      - const: cpu_g
      - const: pll_x
      - const: pll_p
      - const: dfll

  clock-latency:
    description: Specify the possible maximum transition latency for clock, in unit of nanoseconds.
    $ref: /schemas/types.yaml#/definitions/uint32

additionalProperties: false

required:
  - compatible
  - clocks
  - clock-names
