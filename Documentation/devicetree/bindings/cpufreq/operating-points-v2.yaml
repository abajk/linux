%YAML 1.2
---
$id: http://devicetree.org/schemas/cpufreq/operating-points-v2.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: i.MX CPU Operating Performance Points

maintainers:
  - Leonard Crestez <cdleonard@gmail.com>

description: |
  Certain i.MX SoCs support different OPPs depending on the "market segment" and
  "speed grading" value which are written in fuses. These bits are combined with
  the opp-supported-hw values for each OPP to check if the OPP is allowed.

properties:
  compatible:
    const: operating-points-v2

patternProperties:
  "^opp-\\d+$":
    description: An operating performance point entry
    type: object
    required:
      - opp-hz
      - opp-supported-hw
    properties:
      opp-hz:
        description: Frequency in Hz for this operating point
      opp-microvolt:
        description: Operating voltage in microvolts
      opp-supported-hw:
        description: Selector bitmaps for speed grade and market segment
        items:
          - $ref: /schemas/types.yaml#/definitions/uint32
            description: Supported speed grade mask
          - $ref: /schemas/types.yaml#/definitions/uint32
            description: Supported market segment mask
        $ref: /schemas/types.yaml#/definitions/uint32-array
    additionalProperties: false

additionalProperties: false

examples:
  - |
    opp_table {
        compatible = "operating-points-v2";
        opp-1000000000 {
            opp-hz = /bits/ 64 <1000000000>;
            /* grade >= 0, consumer only */
            opp-supported-hw = <0xf>, <0x3>;
        };

        opp-1300000000 {
            opp-hz = /bits/ 64 <1300000000>;
            opp-microvolt = <1000000>;
            /* grade >= 1, all segments */
            opp-supported-hw = <0xe>, <0x7>;
        };
    };
