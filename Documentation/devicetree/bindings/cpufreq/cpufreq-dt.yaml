%YAML 1.2
---
$id: http://devicetree.org/schemas/cpufreq/cpufreq-dt.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Generic cpufreq driver

maintainers:
  - Amit Kucheria <amit.kucheria@linaro.org>
  - Richard Genoud <richard.genoud@bootlin.com>
  - Rob Herring <robh@kernel.org>
  - Viresh Kumar <viresh.kumar@linaro.org>

description: |
  Generic cpufreq driver

  It is a generic DT based cpufreq driver for frequency management. It supports
  both uniprocessor (UP) and symmetric multiprocessor (SMP) systems which share
  clock and voltage across all CPUs.

  Both required and optional properties listed below must be defined
  under node /cpus/cpu@0.

properties:
  compatible:
    description: List of CPU compatible strings
    $ref: /schemas/types.yaml#/definitions/string-array

  reg:
    description: CPU index for cpufreq driver
    items:
      - description: CPU index

  next-level-cache:
    description: Phandle to the next-level cache node

  operating-points:
    description: |
      List of operating points as <frequency in kHz voltage in microvolts> pairs.
      Refer to Documentation/devicetree/bindings/opp/opp-v1.yaml for details.
      OPPs *must* be supplied either via DT or populated at runtime.
    items:
      - description: CPU frequency (kHz)
      - description: CPU voltage (µV)

  clock-latency:
    description: Maximum transition latency for clock in nanoseconds

  voltage-tolerance:
    description: CPU voltage tolerance in percentage

  '#cooling-cells':
    description: |
      Number of cooling cells; see Documentation/devicetree/bindings/thermal/thermal-cooling-devices.yaml

additionalProperties: false

examples:
  - |
    cpus {
        #address-cells = <1>;
        #size-cells = <0>;

        cpu@0 {
            compatible = "arm,cortex-a9";
            reg = <0>;
            next-level-cache = <&L2>;
            operating-points = <
                /* kHz    uV */
                792000  1100000
                396000  950000
                198000  850000
            >;
            clock-latency = <61036>; /* two CLK32 periods */
            #cooling-cells = <2>;
        };

        cpu@1 {
            compatible = "arm,cortex-a9";
            reg = <1>;
            next-level-cache = <&L2>;
        };

        cpu@2 {
            compatible = "arm,cortex-a9";
            reg = <2>;
            next-level-cache = <&L2>;
        };

        cpu@3 {
            compatible = "arm,cortex-a9";
            reg = <3>;
            next-level-cache = <&L2>;
        };
    };
