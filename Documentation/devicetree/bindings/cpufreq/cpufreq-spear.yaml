%YAML 1.2
---
$id: http://devicetree.org/schemas/cpufreq/cpufreq-spear.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: SPEAr cpufreq driver

maintainers:
  - Deepak Sikri <deepak.sikri@st.com>

description: |
  SPEAr SoC cpufreq driver for CPU frequency scaling.
  It supports both uniprocessor (UP) and symmetric multiprocessor (SMP) systems
  which share clock across all CPUs.

  Both required and optional properties listed above must be defined under node
  /cpus/cpu@0.

properties:
  compatible:
    items:
      - const: st,spear-cpufreq

  cpufreq_tbl:
    description: Table of frequencies CPU could be transitioned into, in the increasing order.
    $ref: /schemas/types.yaml#/definitions/uint32-array

  clock-latency:
    description: Specify the possible maximum transition latency for clock, in unit of nanoseconds.
    $ref: /schemas/types.yaml#/definitions/uint32

required:
  - compatible
  - cpufreq_tbl

additionalProperties: false
