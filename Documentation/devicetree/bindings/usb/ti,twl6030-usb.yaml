%YAML 1.2
---
$id: http://devicetree.org/schemas/ti,twl6030-usb.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: TI TWL6030 USB comparator

maintainers:
  - Graeme Gregory <gg@slimlogic.co.uk>
  - Kishon Vijay Abraham I <kishon@kernel.org>
  - NeilBrown <neilb@suse.de>

properties:
  compatible:
    items:
      - const: ti,twl6030-usb

  interrupts:
    description:
      Two interrupt numbers to the cpu. First interrupt number is the OTG
      interrupt number that raises ID interrupts when the controller has to act
      as host. Second interrupt number is the USB interrupt number that raises
      VBUS interrupts when the controller has to act as device.
    items:
      - description: OTG and ID interrupt
      - description: USB VBUS interrupt

  usb-supply:
    $ref: /schemas/types.yaml#/definitions/phandle
    description: Phandle to the regulator device tree node. It should be &vusb for TWL6030.

additionalProperties: false

examples:
  - |
    twl6030-usb {
        compatible = "ti,twl6030-usb";
        interrupts = <4 10>;
        usb-supply = <&vusb>;
    };
