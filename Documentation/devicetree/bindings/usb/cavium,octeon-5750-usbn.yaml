%YAML 1.2
---
$id: http://devicetree.org/schemas/cavium,octeon-5750-usbn.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Cavium OCTEON-5750 USB Main Block
maintainers:
  - Aaro Koskinen <aaro.koskinen@iki.fi>
description: |
  OCTEON/OCTEON+ USB block. This binding describes a USB block with main node
  and its child controller node. The main node compatible must be
  "cavium,octeon-5750-usbn" and the child node compatible must be
  "cavium,octeon-5750-usbc". The main node properties include the physical
  base address, memory mapping, translation settings, reference clock, and
  clock frequency. The child node describes the built-in USB controller with
  its own address, length, and interrupts.

properties:
  compatible:
    items:
      - enum: ["cavium,octeon-5750-usbn"]
  reg:
    description: Physical base address and length of the memory mapped region
    items:
      - description: Address (high 32 bits)
      - description: Address (low 32 bits)
      - description: Size (high 32 bits)
      - description: Size (low 32 bits)
  "#address-cells":
    const: 2
  "#size-cells":
    const: 2
  ranges:
    description: Translation between child and parent address space
  clock-frequency:
    description: Speed of the USB reference clock in Hz
    enum: [12000000, 24000000, 48000000]
  cavium,refclk-type:
    description: Type of the USB reference clock
    enum: [crystal, external]
  refclk-frequency:
    description: Deprecated, use "clock-frequency"
    $ref: /schemas/types.yaml#/definitions/uint32
    deprecated: true
  refclk-type:
    description: Deprecated, use "cavium,refclk-type"
    enum: [crystal, external]
    deprecated: true

patternProperties:
  "^usbc@.*$":
    description: Built-in USB controller node
    type: object
    additionalProperties: false
    properties:
      compatible:
        items:
          - enum: ["cavium,octeon-5750-usbc"]
      reg:
        description: Physical base address and length of the USBC block
        items:
          - description: Address (high 32 bits)
          - description: Address (low 32 bits)
          - description: Size (high 32 bits)
          - description: Size (low 32 bits)
      interrupts:
        description: Interrupt controller specifier and interrupt number for the USB controller
        items:
          - description: Interrupt controller specifier cells
          - description: Interrupt number
    required:
      - compatible
      - reg
      - interrupts

required:
  - compatible
  - reg
  - "#address-cells"
  - "#size-cells"
  - ranges
  - clock-frequency
  - cavium,refclk-type

additionalProperties: false

examples:
  - |
    usbn: usbn@1180068000000 {
        compatible = "cavium,octeon-5750-usbn";
        reg = <0x11800 0x68000000 0x0 0x1000>;
        ranges; /* Direct mapping */
        #address-cells = <2>;
        #size-cells = <2>;
        clock-frequency = <12000000>;
        cavium,refclk-type = "crystal";

        usbc@16f0010000000 {
            compatible = "cavium,octeon-5750-usbc";
            reg = <0x16f00 0x10000000 0x0 0x80000>;
            interrupts = <0 56>;
        };
    };
