%YAML 1.2
---
$id: http://devicetree.org/schemas/usb/atmel-usb.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Atmel SOC USB controllers

maintainers:
  - Alexandre Belloni <alexandre.belloni@bootlin.com>
  - Boris Brezillon <bbrezillon@kernel.org>
  - Cristian Birsan <cristian.birsan@microchip.com>
  - Gregory CLEMENT <gregory.clement@bootlin.com>
  - Herve Codina <herve.codina@bootlin.com>
  - Jean-Christophe PLAGNIOL-VILLARD <plagnioj@jcrosoft.com>
  - Marco Franchi <marco.franchi@nxp.com>
  - Nicolas Ferre <nicolas.ferre@microchip.com>
  - Peter Rosin <peda@axentia.se>

description: |
  Atmel SOC USB controllers

  OHCI

  EHCI

  AT91 USB device controller

  Atmel High-Speed USB device controller

properties:
  compatible:
    description: >
      Compatible strings for Atmel SOC USB controllers.
    oneOf:
      - items:
          - const: atmel,at91rm9200-ohci
          - const: usb-ohci
      - items:
          - const: atmel,at91sam9g45-ehci
          - const: usb-ehci
      - items:
          - enum:
              - atmel,at91rm9200-udc
              - atmel,at91sam9260-udc
              - atmel,at91sam9261-udc
              - atmel,at91sam9263-udc
      - items:
          - enum:
              - atmel,at91sam9rl-udc
              - atmel,at91sam9g45-udc
              - atmel,sama5d3-udc
              - microchip,sam9x60-udc
              - microchip,lan9662-udc

  reg:
    items:
      - description: Address and size of the controller’s register window
    description: >
      Register address and length pairs.

  interrupts:
    items:
      - description: Interrupt specifier (<IRQ> <trigger> [<flags>])
    description: >
      Interrupt specifier(s) for the controller.

  clocks:
    description: >
      Phandle list of required clocks (peripheral, PHY/host, system/AHB).

  clock-names:
    items:
      - const: peripheral
      - const: utmi
      - const: hclk
    description: >
      Names for the clocks: peripheral, PHY/host, system/AHB.

  num-ports:
    $ref: /schemas/types.yaml#/definitions/uint32
    description: Number of USB ports supported.

  phy_type:
    description: >
      PHY type for multi-port EHCI controllers: “utmi” or “hsic”.
    enum:
      - utmi
      - hsic

  atmel,vbus-gpio:
    description: GPIO to enable VBUS power.

  atmel,oc-gpio:
    description: GPIO to enable over-current detection.

required:
  - compatible
  - reg
  - interrupts
  - clocks
  - clock-names

additionalProperties: false

examples:
  - |
    usb0: ohci@500000 {
        compatible = "atmel,at91rm9200-ohci", "usb-ohci";
        reg = <0x00500000 0x100000>;
        clocks = <&uhphs_clk>, <&uhphs_clk>, <&uhpck>;
        clock-names = "ohci_clk", "hclk", "uhpck";
        interrupts = <20 4>;
        num-ports = <2>;
        atmel,vbus-gpio = <&pioA 3 0>;
        atmel,oc-gpio = <&pioA 4 0>;
    };
  - |
    usb1: ehci@800000 {
        compatible = "atmel,at91sam9g45-ehci", "usb-ehci";
        reg = <0x00800000 0x100000>;
        clocks = <&utmi>, <&uhphs_clk>;
        clock-names = "usb_clk", "ehci_clk";
        interrupts = <22 4>;
        phy_type = "utmi";
    };
  - |
    usb1: gadget@fffa4000 {
        compatible = "atmel,at91rm9200-udc";
        reg = <0xfffa4000 0x4000>;
        clocks = <&udc_clk>, <&udpck>;
        clock-names = "pclk", "hclk";
        interrupts = <10 4>;
        atmel,vbus-gpio = <&pioC 5 0>;
    };
  - |
    usb2: gadget@fff78000 {
        compatible = "atmel,at91sam9rl-udc";
        reg = <0x00600000 0x80000
               0xfff78000 0x400>;
        clocks = <&utmi>, <&udphs_clk>;
        clock-names = "hclk", "pclk";
        interrupts = <27 4 0>;
        atmel,vbus-gpio = <&pioB 19 0>;
    };
