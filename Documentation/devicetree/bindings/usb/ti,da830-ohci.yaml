%YAML 1.2
---
$id: http://devicetree.org/schemas/ti,da830-ohci.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: TI DA830 OHCI USB controller

maintainers:
  - Axel Haslam <ahaslam@baylibre.com>
  - Marco Franchi <marco.franchi@nxp.com>

description: |
  DA8XX USB OHCI controller

  Required properties:
    - compatible: Should be "ti,da830-ohci"
    - reg: Should contain one register range (start and length)
    - interrupts: Description of the interrupt line
    - phys: Phandle for the PHY device
    - phy-names: Should be "usb-phy"

  Optional properties:
    - vbus-supply: phandle of regulator that controls VBUS power/over-current

properties:
  compatible:
    const: ti,da830-ohci

  reg:
    items:
      - description: Register address and length

  interrupts:
    items:
      - description: USB OHCI interrupt line

  phys:
    description: Phandle and argument for the USB PHY instance
    items:
      - description: Phandle to USB PHY
      - description: PHY index

  phy-names:
    items:
      - const: usb-phy

  vbus-supply:
    description: Phandle of regulator controlling VBUS power/over-current

required:
  - compatible
  - reg
  - interrupts
  - phys
  - phy-names

additionalProperties: false

examples:
  - |
    usb@225000 {
        compatible = "ti,da830-ohci";
        reg = <0x225000 0x1000>;
        interrupts = <59>;
        phys = <&usb_phy 1>;
        phy-names = "usb-phy";
        vbus-supply = <&reg_usb_ohci>;
    };
