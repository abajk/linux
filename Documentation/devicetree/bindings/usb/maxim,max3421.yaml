%YAML 1.2
---
$id: http://devicetree.org/schemas/usb/maxim,max3421.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Maxim MAX3421E USB 2.0 host controller

maintainers:
  - Jules Maselbas <jules.maselbas@grenoble-inp.org>
  - Rob Herring <robh@kernel.org>

description: |
  Maxim Integrated SPI-based USB 2.0 host controller MAX3421E

properties:
  compatible:
    items:
      - const: maxim,max3421

  reg:
    description: Chip select number to which this device is connected.
    items:
      - description: Chip select

  spi-max-frequency:
    description: Maximum SPI clock frequency for this device in Hz, must not exceed 26 MHz.
    $ref: /schemas/types.yaml#/definitions/uint32
    maximum: 26000000

  maxim,vbus-en-pin:
    description: GPOUT pin number and active level to drive Vbus.
    $ref: /schemas/types.yaml#/definitions/phandle-array
    items:
      - description: "GPOUTx: pin number (1–8)"
        minimum: 1
        maximum: 8
      - description: "ACTIVE_LEVEL: level (0=inactive, 1=active)"
        enum: [0, 1]

  interrupts:
    description: Interrupt line for this controller (active low level).
    maxItems: 1

required:
  - compatible
  - reg
  - spi-max-frequency
  - maxim,vbus-en-pin
  - interrupts

additionalProperties: false

examples:
  - |
    usb@0 {
        compatible = "maxim,max3421";
        reg = <0>;
        spi-max-frequency = <26000000>;
        maxim,vbus-en-pin = <3 1>;
        interrupts = <42>;
    };
