%YAML 1.2
---
$id: http://devicetree.org/schemas/ti,am33xx-usb.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: TI AM33xx MUSB

maintainers:
  - Afzal Mohammed <afzal@ti.com>
  - Ajay Kumar Gupta <ajay.gupta@ti.com>
  - Anatol Pomozov <anatol.pomozov@gmail.com>
  - Geert Uytterhoeven <geert+renesas@glider.be>
  - Krzysztof Kozlowski <krzysztof.kozlowski@linaro.org>
  - Marco Franchi <marco.franchi@nxp.com>
  - Rob Herring <robh@kernel.org>
  - Sebastian Andrzej Siewior <bigeasy@linutronix.de>

description: |
  AM33xx MUSB

  The glue layer contains multiple child nodes. It is required to have
  at least a control module node, USB node and a PHY node. The second USB
  node and its PHY node are optional. The DMA node is also optional.

  The PHY should have a "phy" alias numbered properly in the alias
  node.

  The controller should have an "usb" alias numbered properly in the alias
  node.

properties:
  compatible:
    const: ti,am33xx-usb

  reg:
    items:
      - description: Offset and length of the USBSS register sets

  ti,hwmods:
    description: Hardware module to enable
    type: string
    enum:
      - usb_otg_hs

  ranges:
    description: Empty ranges for USB controller
    type: array
    maxItems: 0

  #address-cells:
    const: 1

  #size-cells:
    const: 1

  ctrl_mod:
    description: Reset module node
    type: object
    properties:
      compatible:
        const: ti,am335x-usb-ctrl-module
      reg:
        items:
          - description: USB control registers
          - description: USB wake up control registers
      reg-names:
        items:
          - const: phy_ctrl
          - const: wakeup
    required:
      - compatible
      - reg
      - reg-names
    additionalProperties: false

  usb_phy:
    description: USB PHY node
    type: object
    properties:
      compatible:
        const: ti,am335x-usb-phy
      reg:
        items:
          - description: USB PHY register space
      reg-names:
        items:
          - const: phy
      ti,ctrl_mod:
        description: Reference to the reset module node
        type: phandle
      #phy-cells:
        const: 0
    required:
      - compatible
      - reg
      - reg-names
      - ti,ctrl_mod
    additionalProperties: false

  usb:
    description: USB controller node
    type: object
    properties:
      compatible:
        const: ti,musb-am33xx
      reg:
        items:
          - description: USB Controller Registers
          - description: USB Core register space
      reg-names:
        items:
          - const: mc
          - const: control
      interrupts:
        items:
          - description: USB interrupt number
      interrupt-names:
        items:
          - const: mc
      dr_mode:
        description: USB controller mode
        enum: [host, peripheral, otg]
      mentor,multipoint:
        description: MUSB multipoint support
        const: 1
      mentor,num-eps:
        description: Number of endpoints
        const: 16
      mentor,ram-bits:
        description: RAM address size
        const: 12
      mentor,power:
        description: Supply current in mA
        const: 500
      phys:
        description: Reference to the USB PHY node
        type: phandle
      dmas:
        description: DMA channels
        items:
          minimum: 0
          maximum: 30
      dma-names:
        description: Names for DMA channels
        items:
          - enum: [rx1, rx2, rx3, rx4, rx5, rx6, rx7, rx8, rx9, rx10, rx11, rx12, rx13, rx14, rx15]
          - enum: [tx1, tx2, tx3, tx4, tx5, tx6, tx7, tx8, tx9, tx10, tx11, tx12, tx13, tx14, tx15]
    required:
      - compatible
      - reg
      - reg-names
      - interrupts
      - interrupt-names
      - dr_mode
      - mentor,multipoint
      - mentor,num-eps
      - mentor,ram-bits
      - mentor,power
      - phys
      - dmas
      - dma-names
    additionalProperties: false

  cppi41dma:
    description: DMA controller node
    type: object
    properties:
      compatible:
        const: ti,am3359-cppi41
      reg:
        items:
          - description: USBSS register space
          - description: USB CPPI DMA Controller register space
          - description: USB CPPI DMA Scheduler register space
          - description: USB Queue Manager register space
      reg-names:
        items:
          - const: glue
          - const: controller
          - const: scheduler
          - const: queuemgr
      interrupts:
        items:
          - description: DMA interrupt
      interrupt-names:
        items:
          - const: glue
      #dma-cells:
        const: 2
      dma-channels:
        description: Number of DMA channels
        const: 30
      dma-requests:
        description: Number of DMA requests
        const: 256
    required:
      - compatible
      - reg
      - reg-names
      - interrupts
      - interrupt-names
      - #dma-cells
      - dma-channels
    additionalProperties: false

required:
  - compatible
  - reg
  - ti,hwmods

additionalProperties: false

examples:
  - |
    aliases {
    	usb0 = &usb0;
    	usb1 = &usb1;
    	phy0 = &usb0_phy;
    	phy1 = &usb1_phy;
    };

    usb: usb@47400000 {
    	compatible = "ti,am33xx-usb";
    	reg = <0x47400000 0x1000>;
    	ranges;
    	#address-cells = <1>;
    	#size-cells = <1>;
    	ti,hwmods = "usb_otg_hs";

    	ctrl_mod: control@44e10000 {
    		compatible = "ti,am335x-usb-ctrl-module";
    		reg = <0x44e10620 0x10
    			0x44e10648 0x4>;
    		reg-names = "phy_ctrl", "wakeup";
    	};

    	usb0_phy: usb-phy@47401300 {
    		compatible = "ti,am335x-usb-phy";
    		reg = <0x47401300 0x100>;
    		reg-names = "phy";
    		ti,ctrl_mod = <&ctrl_mod>;
    		#phy-cells = <0>;
    	};

    	usb0: usb@47401000 {
    		compatible = "ti,musb-am33xx";
    		reg = <0x47401400 0x400
    			0x47401000 0x200>;
    		reg-names = "mc", "control";

    		interrupts = <18>;
    		interrupt-names = "mc";
    		dr_mode = "otg";
    		mentor,multipoint = <1>;
    		mentor,num-eps = <16>;
    		mentor,ram-bits = <12>;
    		mentor,power = <500>;
    		phys = <&usb0_phy>;

    		dmas = <&cppi41dma  0 0 &cppi41dma  1 0
    			&cppi41dma  2 0 &cppi41dma  3 0
    			&cppi41dma  4 0 &cppi41dma  5 0
    			&cppi41dma  6 0 &cppi41dma  7 0
    			&cppi41dma  8 0 &cppi41dma  9 0
    			&cppi41dma 10 0 &cppi41dma 11 0
    			&cppi41dma 12 0 &cppi41dma 13 0
    			&cppi41dma 14 0 &cppi41dma  0 1
    			&cppi41dma  1 1 &cppi41dma  2 1
    			&cppi41dma  3 1 &cppi41dma  4 1
    			&cppi41dma  5 1 &cppi41dma  6 1
    			&cppi41dma  7 1 &cppi41dma  8 1
    			&cppi41dma  9 1 &cppi41dma 10 1
    			&cppi41dma 11 1 &cppi41dma 12 1
    			&cppi41dma 13 1 &cppi41dma 14 1>;
    		dma-names =
    			"rx1", "rx2", "rx3", "rx4", "rx5", "rx6", "rx7",
    			"rx8", "rx9", "rx10", "rx11", "rx12", "rx13",
    			"rx14", "rx15",
    			"tx1", "tx2", "tx3", "tx4", "tx5", "tx6", "tx7",
    			"tx8", "tx9", "tx10", "tx11", "tx12", "tx13",
    			"tx14", "tx15";
    	};

    	usb1_phy: usb-phy@47401b00 {
    		compatible = "ti,am335x-usb-phy";
    		reg = <0x47401b00 0x100>;
    		reg-names = "phy";
    		ti,ctrl_mod = <&ctrl_mod>;
    		#phy-cells = <0>;
    	};

    	usb1: usb@47401800 {
    		compatible = "ti,musb-am33xx";
    		reg = <0x47401c00 0x400
    			0x47401800 0x200>;
    		reg-names = "mc", "control";
    		interrupts = <19>;
    		interrupt-names = "mc";
    		dr_mode = "host";
    		mentor,multipoint = <1>;
    		mentor,num-eps = <16>;
    		mentor,ram-bits = <12>;
    		mentor,power = <500>;
    		phys = <&usb1_phy>;

    		dmas = <&cppi41dma 15 0 &cppi41dma 16 0
    			&cppi41dma 17 0 &cppi41dma 18 0
    			&cppi41dma 19 0 &cppi41dma 20 0
    			&cppi41dma 21 0 &cppi41dma 22 0
    			&cppi41dma 23 0 &cppi41dma 24 0
    			&cppi41dma 25 0 &cppi41dma 26 0
    			&cppi41dma 27 0 &cppi41dma 28 0
    			&cppi41dma 29 0 &cppi41dma 15 1
    			&cppi41dma 16 1 &cppi41dma 17 1
    			&cppi41dma 18 1 &cppi41dma 19 1
    			&cppi41dma 20 1 &cppi41dma 21 1
    			&cppi41dma 22 1 &cppi41dma 23 1
    			&cppi41dma 24 1 &cppi41dma 25 1
    			&cppi41dma 26 1 &cppi41dma 27 1
    			&cppi41dma 28 1 &cppi41dma 29 1>;
    		dma-names =
    			"rx1", "rx2", "rx3", "rx4", "rx5", "rx6", "rx7",
    			"rx8", "rx9", "rx10", "rx11", "rx12", "rx13",
    			"rx14", "rx15",
    			"tx1", "tx2", "tx3", "tx4", "tx5", "tx6", "tx7",
    			"tx8", "tx9", "tx10", "tx11", "tx12", "tx13",
    			"tx14", "tx15";
    	};

    	cppi41dma: dma-controller@7402000 {
    		compatible = "ti,am3359-cppi41";
    		reg =  <0x47400000 0x1000
    			0x47402000 0x1000
    			0x47403000 0x1000
    			0x47404000 0x4000>;
    		reg-names = "glue", "controller", "scheduler", "queuemgr";
    		interrupts = <17>;
    		interrupt-names = "glue";
    		#dma-cells = <2>;
    		dma-channels = <30>;
    		dma-requests = <256>;
    	};
    };
