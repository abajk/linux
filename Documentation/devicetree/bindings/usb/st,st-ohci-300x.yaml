%YAML 1.2
---
$id: http://devicetree.org/schemas/usb/st,st-ohci-300x.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: ST USB OHCI controller

maintainers:
  - Mathieu Malaterre <malat@debian.org>
  - Mauro Carvalho Chehab <mchehab@kernel.org>
  - Peter Griffin <peter.griffin@linaro.org>
  - Rob Herring <robh@kernel.org>

description: |
  ST USB OHCI controller

  Required properties:

   - compatible       : must be "st,st-ohci-300x"
   - reg              : physical base addresses of the controller and length of memory mapped
                       region
   - interrupts       : one OHCI controller interrupt should be described here
   - clocks           : phandle list of usb clocks
   - clock-names      : should be "ic" for interconnect clock and "clk48"
  See: Documentation/devicetree/bindings/clock/clock-bindings.txt

   - phys             : phandle for the PHY device
   - phy-names        : should be "usb"

   - resets           : phandle to the powerdown and reset controller for the USB IP
   - reset-names      : should be "power" and "softreset"
  See: Documentation/devicetree/bindings/reset/st,stih407-powerdown.yaml
  See: Documentation/devicetree/bindings/reset/reset.txt

properties:
  compatible:
    const: st,st-ohci-300x

  reg:
    items:
      - description: physical base address and length of memory mapped region

  interrupts:
    maxItems: 1
    description: OHCI controller interrupt

  clocks:
    items:
      - description: interconnect clock phandle
      - description: 48MHz clock phandle

  clock-names:
    items:
      - const: ic
      - const: clk48

  phys:
    maxItems: 1
    description: phandle for the PHY device

  phy-names:
    items:
      - const: usb

  resets:
    minItems: 2
    maxItems: 2
    description: phandles for the powerdown and softreset controllers

  reset-names:
    items:
      - const: power
      - const: softreset

required:
  - compatible
  - reg
  - interrupts
  - clocks
  - clock-names
  - phys
  - phy-names
  - resets
  - reset-names

additionalProperties: false

examples:
  - |
    ohci0: usb@fe1ffc00 {
        compatible = "st,st-ohci-300x";
        reg = <0xfe1ffc00 0x100>;
        interrupts = <GIC_SPI 149 IRQ_TYPE_NONE>;
        clocks = <&clk_s_a1_ls 0>,
                 <&clockgen_b0 0>;
        clock-names = "ic", "clk48";
        phys = <&usb2_phy>;
        phy-names = "usb";

        resets = <&powerdown STIH416_USB0_POWERDOWN>,
                 <&softreset STIH416_USB0_SOFTRESET>;
        reset-names = "power", "softreset";
    };
