$id: http://devicetree.org/schemas/usb/marvell,pxa270-udc.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: PXA USB controllers UDC
maintainers:
  - Daniel Mack <zonque@gmail.com>
  - Robert Jarzmik <robert.jarzmik@free.fr>
  - Rob Herring <robh@kernel.org>
description: |
  PXA USB controllers

  UDC

properties:
  compatible:
    items:
      - const: marvell,pxa270-udc
    description: Compatible string for the PXA270 UDC USB controller.
  reg:
    maxItems: 1

  interrupts:
    maxItems: 1

  clocks:
    maxItems: 1

  gpios:
    maxItems: 1
    description: GPIO used to control the USB D+ pull-up.

required:
  - compatible
  - reg
  - interrupts
  - clocks

additionalProperties: false

examples:
  - |
    pxa27x_udc: udc@40600000 {
        compatible = "marvell,pxa270-udc";
        reg = <0x40600000 0x10000>;
        interrupts = <11>;
        clocks = <&pxa2xx_clks 11>;
        gpios = <&gpio 22 GPIO_ACTIVE_LOW>;
    };
