%YAML 1.2
---
$id: http://devicetree.org/schemas/usb/richtek,rt1711h.yaml#
# $schema is the meta-schema this schema should be validated with.
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Richtek RT1711H Type-C PD Controller
maintainers:
  - John Stultz <john.stultz@linaro.org>
  - Prashant Malani <pmalani@chromium.org>
  - Rob Herring <robh@kernel.org>
  - ShuFan Lee <shufan_lee@richtek.com>

description: |
  Richtek RT1711H TypeC PD Controller.

  Required sub-node:
  - connector: The "usb-c-connector" attached to the tcpci chip, the bindings
    of connector node are specified in
    Documentation/devicetree/bindings/connector/usb-connector.yaml

properties:
  compatible:
    items:
      - const: richtek,rt1711h

  reg:
    items:
      - description: I2C slave address of the RT1711H

  interrupts:
    description: Interrupt number and type for the controller.
    items:
      - description: IRQ number
      - description: Sense and level encoding

  connector:
    description: USB Type-C connector node.
    $ref: /schemas/connector/usb-connector.yaml

required:
  - compatible
  - reg
  - interrupts

additionalProperties: false

examples:
  - |
    rt1711h@4e {
        compatible = "richtek,rt1711h";
        reg = <0x4e>;
        interrupts = <0 IRQ_TYPE_LEVEL_LOW>;

        usb_con: connector {
            compatible = "usb-c-connector";
            label = "USB-C";
            data-role = "dual";
            power-role = "dual";
            try-power-role = "sink";
            source-pdos = <PDO_FIXED(5000, 2000, PDO_FIXED_USB_COMM)>;
            sink-pdos = <PDO_FIXED(5000, 2000, PDO_FIXED_USB_COMM)
                         PDO_VAR(5000, 12000, 2000)>;
            op-sink-microwatt = <10000000>;

            ports {
                #address-cells = <1>;
                #size-cells = <0>;

                port@1 {
                    reg = <1>;
                    usb_con_ss: endpoint {
                        remote-endpoint = <&usb3_data_ss>;
                    };
                };
            };
        };
    };
