%YAML 1.2
---
$id: http://devicetree.org/schemas/usb/hisilicon,hi3798cv200-xhci.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: HiSilicon STB xHCI

maintainers:
  - Jianguo Sun <sunjianguo1@huawei.com>

properties:
  compatible:
    items:
      - const: hisilicon,hi3798cv200-xhci

  reg:
    maxItems: 1

  interrupts:
    maxItems: 1

  clocks:
    items:
      - description: Bus clock.
      - description: UTMI clock.
      - description: PIPE clock.
      - description: Suspend clock.

  clock-names:
    items:
      - const: bus
      - const: utmi
      - const: pipe
      - const: suspend

  resets:
    maxItems: 1

  reset-names:
    items:
      - const: soft

  phys:
    items:
      - description: Inno USB2 PHY.
      - description: Combo USB3 PHY.

  phy-names:
    items:
      - const: inno
      - const: combo

  usb2-lpm-disable:
    type: boolean
    description: Disable USB2 hardware low-power mode.
  usb3-lpm-capable:
    type: boolean
    description: Platform USB3 link power management capability.
  imod-interval-ns:
    description: Interrupt moderation interval in nanoseconds.

required:
  - compatible
  - reg
  - interrupts
  - clocks
  - clock-names
  - resets
  - reset-names
  - phys
  - phy-names

additionalProperties: false

examples:
  - |
    xhci0: xchi@f98a0000 {
      compatible = "hisilicon,hi3798cv200-xhci";
      reg = <0xf98a0000 0x10000>;
      interrupts = <GIC_SPI 69 IRQ_TYPE_LEVEL_HIGH>;
      clocks = <&crg HISTB_USB3_BUS_CLK>,
               <&crg HISTB_USB3_UTMI_CLK>,
               <&crg HISTB_USB3_PIPE_CLK>,
               <&crg HISTB_USB3_SUSPEND_CLK>;
      clock-names = "bus", "utmi", "pipe", "suspend";
      resets = <&crg 0xb0 12>;
      reset-names = "soft";
      phys = <&usb2_phy1_port1 0>, <&combphy0 PHY_TYPE_USB3>;
      phy-names = "inno", "combo";
    };
