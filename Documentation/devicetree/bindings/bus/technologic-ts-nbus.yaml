%YAML 1.2
---
$id: http://devicetree.org/schemas/bus/technologic-ts-nbus.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Technologic Systems NBUS

maintainers:
  - Sebastien Bourdelin <sebastien.bourdelin@savoirfairelinux.com>

description: |
  Technologic Systems NBUS

  The NBUS is a bus used to interface with peripherals in the Technologic
  Systems FPGA on the TS-4600 SoM.

  Child nodes:

  The NBUS node can contain zero or more child nodes representing peripherals
  on the bus.

properties:
  compatible:
    items:
      - const: "technologic,ts-nbus"
    description: Device compatible string

  '#address-cells':
    const: 1
    description: Number of address cells for the NBUS

  '#size-cells':
    const: 0
    description: Number of size cells for the NBUS

  pwms:
    $ref: /schemas/types.yaml#/definitions/phandle-array
    description: PWM bound to the FPGA

  ts,data-gpios:
    description: The 8 GPIO pins connected to the data lines on the FPGA
    items:
      - description: Data bit 0
      - description: Data bit 1
      - description: Data bit 2
      - description: Data bit 3
      - description: Data bit 4
      - description: Data bit 5
      - description: Data bit 6
      - description: Data bit 7

  ts,csn-gpios:
    maxItems: 1
    description: The GPIO pin connected to the CSN line on the FPGA

  ts,txrx-gpios:
    maxItems: 1
    description: The GPIO pin connected to the TXRX line on the FPGA

  ts,strobe-gpios:
    maxItems: 1
    description: The GPIO pin connected to the strobe line on the FPGA

  ts,ale-gpios:
    maxItems: 1
    description: The GPIO pin connected to the ALE line on the FPGA

  ts,rdy-gpios:
    maxItems: 1
    description: The GPIO pin connected to the RDY line on the FPGA

required:
  - compatible
  - "#address-cells"
  - "#size-cells"
  - pwms
  - ts,data-gpios
  - ts,csn-gpios
  - ts,txrx-gpios
  - ts,strobe-gpios
  - ts,ale-gpios
  - ts,rdy-gpios

additionalProperties: false
