%YAML 1.2
---
$id: http://devicetree.org/schemas/marvell,mbus-controller.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Marvell MBus Controller

maintainers:
  - Carlos Garcia <carlos@cgarcia.org>
  - Ezequiel Garcia <ezequiel.garcia@free-electrons.com>
  - Thomas Petazzoni <thomas.petazzoni@free-electrons.com>

description:
  Marvell MBus controller nodes appear under a Marvell MBus bus and provide the
  register interfaces for controlling decoding windows and the MBus bridge.

properties:
  compatible:
    const: marvell,mbus-controller

  reg:
    minItems: 2
    items:
      - description: Decoding window register address and size.
      - description: SDRAM window register address and size.
      - description: MBus bridge register address and size.

required:
  - compatible
  - reg

additionalProperties: false

examples:
  - |
    mbus-controller@20000 {
        compatible = "marvell,mbus-controller";
        reg = <0x20000 0x100>, <0x20180 0x20>, <0x20250 0x8>;
    };
