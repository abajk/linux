%YAML 1.2
---
$id: http://devicetree.org/schemas/bindings/bus/ti,omap-ocp2scp.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: OMAP OCP2SCP Controller
maintainers:
  - Kishon Vijay Abraham I <kishon@kernel.org>

description: |
  OMAP OCP2SCP - ocp interface to scp interface

  Sub-nodes:
  All the devices connected to ocp2scp are described using sub-node to ocp2scp

properties:
  compatible:
    oneOf:
      - items:
          - enum:
              - ti,am437x-ocp2scp
          - const: ti,omap-ocp2scp
      - items:
          - const: ti,omap-ocp2scp
  reg:
    maxItems: 1

  "#address-cells":
    const: 1

  "#size-cells":
    const: 1

  ranges:
    description: The child address space is mapped 1:1 onto the parent address space

  ti,hwmods:
    description: Must be "ocp2scp_usb_phy"
    items:
      - const: ocp2scp_usb_phy

additionalProperties:
  type: object

examples:
  - |
    ocp2scp@4a0ad000 {
        compatible = "ti,omap-ocp2scp";
        reg = <0x4a0ad000 0x1f>;
        #address-cells = <1>;
        #size-cells = <1>;
        ranges;
        ti,hwmods = "ocp2scp_usb_phy";

        subnode1 {
        };

        subnode2 {
        };
    };
