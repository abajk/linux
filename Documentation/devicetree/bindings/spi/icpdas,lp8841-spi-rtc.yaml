%YAML 1.2
---
$id: http://devicetree.org/schemas/icpdas,lp8841-spi-rtc.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: ICP DAS LP-8841 SPI Controller for RTC

maintainers:
  - Sergei Ianovich <ynvich@gmail.com>

description: |
  * ICP DAS LP-8841 SPI Controller for RTC

  ICP DAS LP-8841 contains a DS-1302 RTC. RTC is connected to an IO
  memory register, which acts as an SPI master device.

  The device uses the standard MicroWire half-duplex transfer timing.
  Master output is set on low clock and sensed by the RTC on the rising
  edge. Master input is set by the RTC on the trailing edge and is sensed
  by the master on low clock.

properties:
  compatible:
    items:
      - const: icpdas,lp8841-spi-rtc

  reg:
    maxItems: 1

  '#address-cells':
    const: 1

  '#size-cells':
    const: 0

patternProperties:
  '^rtc@[0-9]+$':
    description: SPI slave node for DS1302 RTC.
    type: object
    additionalProperties: false
    properties:
      compatible:
        items:
          - const: maxim,ds1302
        description: Compatible string for Maxim DS1302 RTC.
      reg:
        maxItems: 1
      spi-max-frequency:
        $ref: /schemas/types.yaml#/definitions/uint32
        description: Maximum SPI transfer frequency in Hz.
      spi-3wire:
        type: boolean
        description: Use MicroWire 3-wire mode (shared MISO/MOSI).
      spi-lsb-first:
        type: boolean
        description: Transfer least-significant bit first.
      spi-cs-high:
        type: boolean
        description: Use active high chip select.
    required:
      - compatible
      - reg
      - spi-max-frequency
      - spi-3wire
      - spi-lsb-first
      - spi-cs-high

required:
  - '#address-cells'
  - '#size-cells'
  - compatible
  - reg

additionalProperties: false

examples:
  - |
    spi@901c {
        #address-cells = <1>;
        #size-cells = <0>;
        compatible = "icpdas,lp8841-spi-rtc";
        reg = <0x901c 0x1>;

        rtc@0 {
            compatible = "maxim,ds1302";
            reg = <0>;
            spi-max-frequency = <500000>;
            spi-3wire;
            spi-lsb-first;
            spi-cs-high;
        };
    };
