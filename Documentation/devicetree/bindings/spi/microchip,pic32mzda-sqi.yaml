%YAML 1.2
---
$id: http://devicetree.org/schemas/microchip,pic32mzda-sqi.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Microchip PIC32 Quad SPI controller

maintainers:
  - Purna Chandra Mandal <purna.mandal@microchip.com>

description: |
  Microchip PIC32 Quad SPI controller

properties:
  compatible:
    $ref: /schemas/types.yaml#/definitions/string-array
    items:
      - const: microchip,pic32mzda-sqi

  reg:
    # The core schema already checks that reg values are numbers, so device
    # specific schema don't need to do those checks.
    # The description of each element defines the order and implicitly defines
    # the number of reg entries.
    items:
      - description: SQI controller register base address
      - description: SQI controller register space length
    # minItems/maxItems equal to 2 is implied

  interrupts:
    description: Interrupt for SQI.
    items:
      - description: SQI interrupt

  clocks:
    description: Clocks used by SQI controller.
    items:
      - description: SPI bus clock
      - description: SQI controller clock

  clock-names:
    items:
      - const: spi_ck
      - const: reg_ck

required:
  - compatible
  - reg
  - interrupts
  - clocks
  - clock-names

additionalProperties: false

examples:
  - |
    sqi1: spi@1f8e2000 {
        compatible = "microchip,pic32mzda-sqi";
        reg = <0x1f8e2000 0x200>;
        clocks = <&rootclk REF2CLK>, <&rootclk PB5CLK>;
        clock-names = "spi_ck", "reg_ck";
        interrupts = <169 IRQ_TYPE_LEVEL_HIGH>;
    };
