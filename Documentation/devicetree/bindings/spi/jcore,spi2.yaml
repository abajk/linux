%YAML 1.2
---
$id: http://devicetree.org/schemas/jcore,spi2.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: J-Core SPI master

maintainers:
  - Rich Felker <dalias@libc.org>

description: |
  J-Core SPI master

  See spi-bus.txt for additional properties not specific to this device.

properties:
  compatible:
    const: jcore,spi2

  reg:
    description: Memory region for registers.

  '#address-cells':
    description: Number of address cells (must be 1).
    const: 1

  '#size-cells':
    description: Number of size cells (must be 0).
    const: 0

  spi-max-frequency:
    description: Maximum SPI clock frequency in Hz.
    $ref: /schemas/types.yaml#/definitions/uint32

  clocks:
    maxItems: 1
    description: Reference clock phandle for SPI speed programming.

  clock-names:
    items:
      - const: ref_clk

additionalProperties: false

examples:
  - |
    spi@40 {
        compatible = "jcore,spi2";
        #address-cells = <1>;
        #size-cells = <0>;
        reg = <0x40 0x8>;
        spi-max-frequency = <25000000>;
        clocks = <&bus_clk>;
        clock-names = "ref_clk";
    };
