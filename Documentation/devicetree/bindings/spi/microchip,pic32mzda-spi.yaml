%YAML 1.2
---
$id: http://devicetree.org/schemas/spi/microchip,pic32mzda-spi.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Microchip PIC32 SPI Master controller

maintainers:
  - Purna Chandra Mandal <purna.mandal@microchip.com>

description: |
  Microchip PIC32 SPI Master controller

properties:
  compatible:
    items:
      - const: microchip,pic32mzda-spi
  reg:
    description: Register block address and size
    items:
      - description: Base address of SPI registers
      - description: Size of the register space
  interrupts:
    description: SPI fault, receive, and transmit interrupts
    items:
      - description: Fault interrupt (IRQ_TYPE_LEVEL_HIGH)
      - description: Receive interrupt (IRQ_TYPE_LEVEL_HIGH)
      - description: Transmit interrupt (IRQ_TYPE_LEVEL_HIGH)
  interrupt-names:
    items:
      - const: fault
      - const: rx
      - const: tx
  clocks:
    maxItems: 1
    description: Peripheral clock for SPI master
  clock-names:
    items:
      - const: mck0
  cs-gpios:
    description: GPIOs used for chipselects
  dmas:
    minItems: 2
    description: DMA channels for SPI master
  dma-names:
    items:
      - const: spi-rx
      - const: spi-tx

required:
  - compatible
  - reg
  - interrupts
  - interrupt-names
  - clocks
  - clock-names
  - cs-gpios

additionalProperties: false

examples:
  - |
    spi1: spi@1f821000 {
        compatible = "microchip,pic32mzda-spi";
        reg = <0x1f821000 0x200>;
        interrupts = <109 IRQ_TYPE_LEVEL_HIGH>,
                     <110 IRQ_TYPE_LEVEL_HIGH>,
                     <111 IRQ_TYPE_LEVEL_HIGH>;
        interrupt-names = "fault", "rx", "tx";
        clocks = <&PBCLK2>;
        clock-names = "mck0";
        cs-gpios = <&gpio3 4 GPIO_ACTIVE_LOW>;
        dmas = <&dma 134>, <&dma 135>;
        dma-names = "spi-rx", "spi-tx";
    };
