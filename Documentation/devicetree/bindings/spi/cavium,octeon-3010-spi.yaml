%YAML 1.2
---
$id: http://devicetree.org/schemas/spi/cavium,octeon-3010-spi.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Cavium Octeon 3010 SPI master controller

maintainers:
  - David Daney <david.daney@cavium.com>

description: |
  Cavium, Inc. OCTEON SOC SPI master controller.

  Child nodes as per the generic SPI binding.

properties:
  compatible:
    items:
      - const: cavium,octeon-3010-spi

  reg:
    description: The register base for the controller.
    items:
      - description: Register base for the controller.

  interrupts:
    description: Controller interrupt.
    items:
      - description: Controller interrupt.

  '#address-cells':
    description: Number of address cells for child nodes.
    const: 1

  '#size-cells':
    description: Number of size cells for child nodes.
    const: 0

additionalProperties: false

required:
  - compatible
  - reg
  - interrupts
  - '#address-cells'
  - '#size-cells'

examples:
  - |
    spi@1070000001000 {
        compatible = "cavium,octeon-3010-spi";
        reg = <0x10700 0x00001000 0x0 0x100>;
        interrupts = <0 58>;
        #address-cells = <1>;
        #size-cells = <0>;

        eeprom@0 {
            compatible = "st,m95256", "atmel,at25";
            reg = <0>;
            spi-max-frequency = <5000000>;
            spi-cpha;
            spi-cpol;

            pagesize = <64>;
            size = <32768>;
            address-width = <16>;
        };
    };
