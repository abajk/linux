%YAML 1.2
---
$id: http://devicetree.org/schemas/spi/qca,ar7100-spi.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Qualcomm Atheros AR7xxx/AR9xxx SPI controller

maintainers:
  - Alban Bedel <albeu@free.fr>

allOf:
  - $ref: /schemas/spi/spi-controller.yaml#

properties:
  compatible:
    oneOf:
      - items:
          - pattern: '^qca,.*-spi$'
          - const: qca,ar7100-spi
      - items:
          - const: qca,ar7100-spi

  reg:
    maxItems: 1

  clocks:
    maxItems: 1

  clock-names:
    items:
      - const: ahb

unevaluatedProperties: false

examples:
  - |
    spi@1f000000 {
      compatible = "qca,ar9132-spi", "qca,ar7100-spi";
      reg = <0x1f000000 0x10>;
      clocks = <&pll 2>;
      clock-names = "ahb";
      #address-cells = <1>;
      #size-cells = <0>;
    };
