%YAML 1.2
---
$id: http://devicetree.org/schemas/i2c/altr,softip-i2c-v1.0.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Altera I2C Controller

maintainers:
  - Thor Thayer <thor.thayer@linux.intel.com>

description: |
  Altera I2C Controller
  This is Altera's synthesizable logic block I2C Controller for use
  in Altera's FPGAs.

properties:
  compatible:
    items:
      - const: altr,softip-i2c-v1.0
  reg:
    maxItems: 1

  interrupts:
    maxItems: 1

  clocks:
    maxItems: 1

  clock-names:
    items:
      - const: bus

  fifo-size:
    description: Size of the RX and TX FIFOs in bytes
    $ref: /schemas/types.yaml#/definitions/uint32

required:
  - compatible
  - reg
  - interrupts
  - clocks
  - '#address-cells'
  - '#size-cells'

allOf:
  - $ref: /schemas/i2c/i2c-controller.yaml#

unevaluatedProperties: false

examples:
  - |
    i2c@100080000 {
        compatible = "altr,softip-i2c-v1.0";
        reg = <0x00000001 0x00080000 0x00000040>;
        interrupts = <0 43 4>;
        clocks = <&clk_0>;
        clock-frequency = <100000>;
        #address-cells = <1>;
        #size-cells = <0>;
        fifo-size = <4>;

        eeprom@51 {
            compatible = "atmel,24c32";
            reg = <0x51>;
            pagesize = <32>;
        };
    };
