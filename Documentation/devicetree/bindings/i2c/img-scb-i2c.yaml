%YAML 1.2
---
$id: http://devicetree.org/schemas/i2c/img-scb-i2c.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: IMG Serial Control Bus (SCB) I2C Controller

maintainers:
  - James Hogan <jhogan@kernel.org>

description: |
  IMG Serial Control Bus (SCB) I2C Controller

  Required Properties:
  - compatible: "img,scb-i2c"
  - reg: Physical base address and length of controller registers
  - interrupts: Interrupt number used by the controller
  - clocks: Should contain a clock specifier for each entry in clock-names
  - clock-names: Should contain the following entries:
    - "scb", for the SCB core clock.
    - "sys", for the system clock.
  - clock-frequency: The I2C bus frequency in Hz
  - #address-cells: Should be <1>
  - #size-cells: Should be <0>

properties:
  compatible:
    items:
      - const: img,scb-i2c

  reg:
    description: Physical base address and length of controller registers
    items:
      - description: Physical base address and size

  interrupts:
    description: Interrupt number used by the controller
    items:
      - description: Interrupt specifier consisting of interrupt-parent phandle and IRQ specifier cells

  clocks:
    description: Should contain a clock specifier for each entry in clock-names
    items:
      - description: SCB core clock
      - description: System clock

  clock-names:
    items:
      - const: scb
      - const: sys

  clock-frequency:
    description: The I2C bus frequency in Hz

  '#address-cells':
    const: 1

  '#size-cells':
    const: 0

required:
  - compatible
  - reg
  - interrupts
  - clocks
  - clock-names
  - clock-frequency
  - '#address-cells'
  - '#size-cells'

additionalProperties: false

examples:
  - |
    i2c@18100000 {
      compatible = "img,scb-i2c";
      reg = <0x18100000 0x200>;
      interrupts = <GIC_SHARED 2 IRQ_TYPE_LEVEL_HIGH>;
      clocks = <&i2c0_clk>, <&system_clk>;
      clock-names = "scb", "sys";
      clock-frequency = <400000>;
      #address-cells = <1>;
      #size-cells = <0>;
    };
