%YAML 1.2
---
$id: http://devicetree.org/schemas/i2c/intel,iop3xx-i2c.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: I2C Controller on XScale platforms such as IOP3xx and IXP4xx

maintainers:
  - Wolfram Sang <wsa@kernel.org>

description: |
  i2c Controller on XScale platforms such as IOP3xx and IXP4xx

properties:
  compatible:
    items:
      - enum:
          - "intel,iop3xx-i2c"
          - "intel,ixp4xx-i2c"

  reg:
    description: Controller register address and size.
    items:
      - description: Base address
      - description: Size of register space

  "#address-cells":
    description: Number of address cells for child nodes.
    const: 1

  "#size-cells":
    description: Number of size cells for child nodes.
    const: 0

  interrupts:
    description: Controller interrupt and trigger type.
    items:
      - description: Interrupt specifier

required:
  - compatible
  - reg
  - "#address-cells"
  - "#size-cells"

additionalProperties: false

examples:
  - |
    i2c@c8011000 {
        compatible = "intel,ixp4xx-i2c";
        reg = <0xc8011000 0x18>;
        interrupts = <33 IRQ_TYPE_LEVEL_LOW>;
    };
