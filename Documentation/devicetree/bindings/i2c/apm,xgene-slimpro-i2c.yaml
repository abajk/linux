%YAML 1.2
---
$id: http://devicetree.org/schemas/apm,xgene-slimpro-i2c.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: APM X-Gene SLIMpro Mailbox I2C Driver

maintainers:
  - Feng Kan <fkan@apm.com>

description: |
  APM X-Gene SLIMpro Mailbox I2C Driver

  An I2C controller accessed over the "SLIMpro" mailbox.

properties:
  compatible:
    items:
      - enum:
          - apm,xgene-slimpro-i2c

  mboxes:
    description: SLIMpro mailbox phandle and channel number.
    items:
      - $ref: /schemas/types.yaml#/definitions/phandle
      - $ref: /schemas/types.yaml#/definitions/uint32
        description: SLIMpro channel number

required:
  - compatible
  - mboxes

additionalProperties: false

examples:
  - |
    i2cslimpro {
        compatible = "apm,xgene-slimpro-i2c";
        mboxes = <&mailbox 0>;
    };
