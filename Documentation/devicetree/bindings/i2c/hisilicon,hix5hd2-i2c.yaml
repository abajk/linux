%YAML 1.2
---
$id: http://devicetree.org/schemas/i2c/hisilicon,hix5hd2-i2c.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: hisilicon,hix5hd2-i2c

maintainers:
  - Wei Yan <sledge.yanwei@huawei.com>

description: |
  I2C for Hisilicon hix5hd2 chipset platform

allOf:
  - $ref: /schemas/i2c/i2c-controller.yaml#

properties:
  compatible:
    const: hisilicon,hix5hd2-i2c

  reg:
    maxItems: 1

  interrupts:
    maxItems: 1

  clocks:
    maxItems: 1

  clock-frequency:
    description: Desired I2C bus frequency in Hz, defaults to 100000
    default: 100000

unevaluatedProperties: false

examples:
  - |
    i2c@f8b10000 {
        compatible = "hisilicon,hix5hd2-i2c";
        reg = <0xf8b10000 0x1000>;
        interrupts = <0 38 4>;
        clocks = <&clock HIX5HD2_I2C0_RST>;
        #address-cells = <1>;
        #size-cells = <0>;
    };
