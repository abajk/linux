%YAML 1.2
---
$id: http://devicetree.org/schemas/i2c/lsi,api2c.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: LSI Axxia I2C

maintainers:
  - Anders Berg <anders.berg@avagotech.com>
  - Marco Franchi <marco.franchi@nxp.com>

description: |
  LSI Axxia I2C

properties:
  compatible:
    items:
      - const: lsi,api2c

  device_type:
    const: i2c

  "#address-cells":
    const: 1

  "#size-cells":
    const: 0

  reg:
    items:
      - description: Offset of the register set
      - description: Length of the register set

  interrupts:
    items:
      - description: Interrupt specifier (IRQ and flags)

  clocks:
    maxItems: 1
    description: Phandle to i2c clock

  clock-names:
    items:
      - const: i2c

  clock-frequency:
    description: Desired I2C bus clock frequency in Hz
    enum: [100000, 400000]
    default: 100000

required:
  - compatible
  - device_type
  - "#address-cells"
  - "#size-cells"
  - reg
  - interrupts
  - clocks
  - clock-names

additionalProperties: false

examples:
  - |
    i2c@2010084000 {
        compatible = "lsi,api2c";
        device_type = "i2c";
        #address-cells = <1>;
        #size-cells = <0>;
        reg = <0x20 0x10084000 0x00 0x1000>;
        interrupts = <0 19 4>;
        clocks = <&clk_per>;
        clock-names = "i2c";
        clock-frequency = <400000>;
    };
