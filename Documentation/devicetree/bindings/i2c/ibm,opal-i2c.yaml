%YAML 1.2
---
$id: http://devicetree.org/schemas/ibm,opal-i2c.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: IBM OPAL I2C Controller

maintainers:
  - Neelesh Gupta <neelegup@linux.vnet.ibm.com>

description: |
  Device-tree bindings for I2C OPAL driver

  Most of the device node and properties layout is specific to the firmware and
  used by the firmware itself for configuring the port. From the Linux
  perspective, the properties of use are "ibm,port-name" and "ibm,opal-id".

properties:
  compatible:
    oneOf:
      - items:
          - enum:
              - ibm,power8-i2c-port
          - const: ibm,opal-i2c
      - items:
          - const: ibm,opal-i2c

  reg:
    items:
      - description: Port-id within a given master

  ibm,opal-id:
    description: Refers to a specific bus and used to identify it when calling
      the relevant OPAL functions.
    $ref: /schemas/types.yaml#/definitions/uint32

  bus-frequency:
    description: Operating frequency of the I2C bus (in Hz). Informational
      for Linux, used by the firmware.
    $ref: /schemas/types.yaml#/definitions/uint32

  ibm,port-name:
    description: Firmware-provided name that uniquely identifies the I2C port.
    $ref: /schemas/types.yaml#/definitions/string

required:
  - compatible
  - reg
  - ibm,opal-id
  - bus-frequency

additionalProperties: false

examples:
  - |
    i2c-bus@0 {
        compatible = "ibm,power8-i2c-port", "ibm,opal-i2c";
        reg = <0x0>;
        bus-frequency = <0x61a80>;
        ibm,opal-id = <0x1>;
        ibm,port-name = "p8_00000000_e1p0";
        #address-cells = <0x1>;
        phandle = <0x10000006>;
        #size-cells = <0x0>;
        linux,phandle = <0x10000006>;
    };
