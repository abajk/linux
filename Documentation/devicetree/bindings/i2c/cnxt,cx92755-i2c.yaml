%YAML 1.2
---
$id: http://devicetree.org/schemas/i2c/cnxt,cx92755-i2c.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Conexant Digicolor I2C controller

maintainers:
  - Baruch Siach <baruch@tkos.co.il>

description: |
  Conexant Digicolor I2C controller

properties:
  compatible:
    items:
      - const: cnxt,cx92755-i2c

  reg:
    items:
      - description: Device registers

  interrupts:
    description: Interrupt line for the controller
    items:
      - description: Interrupt specifier

  clocks:
    maxItems: 1
    description: Clock for the I2C bus

  "#address-cells":
    const: 1

  "#size-cells":
    const: 0

  clock-frequency:
    description: Desired I2C bus clock frequency in Hz
    default: 100000

required:
  - compatible
  - reg
  - interrupts
  - clocks
  - "#address-cells"
  - "#size-cells"

additionalProperties: false

examples:
  - |
    i2c@f0000120 {
        compatible = "cnxt,cx92755-i2c";
        reg = <0xf0000120 0x10>;
        interrupts = <28>;
        clocks = <&main_clk>;
        clock-frequency = <100000>;
        #address-cells = <1>;
        #size-cells = <0>;
    };
