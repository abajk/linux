%YAML 1.2
---
$id: http://devicetree.org/schemas/ti,davinci-i2c.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: TI Davinci/Keystone I2C Controller

maintainers:
  - Alexander Sverdlin <alexander.sverdlin@gmail.com>
  - Franklin S Cooper Jr <fcooper@ti.com>
  - Grygorii Strashko <grygorii.strashko@ti.com>
  - Mauro Carvalho Chehab <mchehab+huawei@kernel.org>
  - Wolfram Sang <wolfram@the-dreams.de>
  - Wolfram Sang <wsa+renesas@sang-engineering.com>

description: |
  * Texas Instruments Davinci/Keystone I2C

  This file provides information about the device node for the
  davinci/keystone i2c interface.

properties:
  compatible:
    description: Supported compatible strings for Davinci/Keystone I2C.
    items:
      - enum:
          - ti,davinci-i2c
          - ti,keystone-i2c
  reg:
    description: Offset and length of the register set for the device.
    items:
      - description: Register region.
  clocks:
    description: I2C functional clock phandle. For 66AK2G this property should be set per binding,
      see Documentation/devicetree/bindings/clock/ti,sci-clk.yaml.
    maxItems: 1
  clock-frequency:
    description: Desired I2C bus clock frequency in Hz.
  interrupts:
    description: Standard interrupt property.
    maxItems: 1
  ti,has-pfunc:
    type: boolean
    description: >
      If defined, indicates that SoC supports PFUNC registers. PFUNC
      registers allow switching I2C pins to GPIO to be toggled manually.
  power-domains:
    description: >
      Should contain a phandle to a PM domain provider node and an args
      specifier containing the I2C device id value. This property is
      as per the binding, Documentation/devicetree/bindings/soc/ti/sci-pm-domain.yaml
    items:
      - description: PM domain phandle and args specifier.
  "#address-cells":
    const: 1
  "#size-cells":
    const: 0

required:
  - compatible
  - reg
  - clocks

allOf:
  - if:
      properties:
        compatible:
          contains:
            const: ti,keystone-i2c
    then:
      required:
        - power-domains

additionalProperties: false

examples:
  - |
    i2c@1c22000 {
      compatible = "ti,davinci-i2c";
      reg = <0x22000 0x1000>;
      clock-frequency = <100000>;
      interrupts = <15>;
      #address-cells = <1>;
      #size-cells = <0>;

      dtt@48 {
        compatible = "national,lm75";
        reg = <0x48>;
      };
    };
