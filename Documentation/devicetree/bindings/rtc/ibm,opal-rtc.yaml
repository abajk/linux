%YAML 1.2
---
$id: http://devicetree.org/schemas/rtc/ibm,opal-rtc.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: IBM OPAL real-time clock

maintainers:
  - Michael Ellerman <mpe@ellerman.id.au>
  - Neelesh Gupta <neelegup@linux.vnet.ibm.com>
  - Sudeep Holla <sudeep.holla@arm.com>

description: |
  IBM OPAL real-time clock
  ------------------------

  Required properties:
  - compatible: Should be "ibm,opal-rtc"

  Optional properties:
  - wakeup-source: Decides if the wakeup is supported or not
      (Legacy property supported: "has-tpo")

properties:
  compatible:
    items:
      - const: ibm,opal-rtc

  wakeup-source:
    description: Decides if the wakeup is supported
    type: boolean

  has-tpo:
    description: Legacy alias for wakeup-source
    type: boolean

required:
  - compatible

additionalProperties: false

examples:
  - |
    rtc {
        compatible = "ibm,opal-rtc";
        wakeup-source;
        phandle = <0x10000029>;
        linux,phandle = <0x10000029>;
    };
