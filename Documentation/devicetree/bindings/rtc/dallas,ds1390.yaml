%YAML 1.2
---
$id: http://devicetree.org/schemas/dallas,ds1390.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Dallas DS1390 SPI Serial Real-Time Clock

maintainers:
  - Fabio Estevam <fabio.estevam@nxp.com>
  - Ivan Grimaldi <grimaldi.ivan@gmail.com>

description: |
  Dallas DS1390 SPI Serial Real-Time Clock

properties:
  compatible:
    items:
      - const: dallas,ds1390

  reg:
    items:
      - description: SPI bus chip select specification

  trickle-resistor-ohms:
    description: |
      Selected resistor for trickle charger.
      Values usable for ds1390 are 250, 2000, 4000.
      Should be given if trickle charger should be enabled.
    enum: [250, 2000, 4000]

  trickle-diode-disable:
    description: |
      Do not use internal trickle charger diode.
      Should be given if internal trickle charger diode should be disabled.
    type: boolean

required:
  - compatible
  - reg

additionalProperties: false

examples:
  - |
    ds1390: rtc@0 {
        compatible = "dallas,ds1390";
        trickle-resistor-ohms = <250>;
        reg = <0>;
    };
