%YAML 1.2
---
$id: http://devicetree.org/schemas/epson,rx6110.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Epson RX6110 Real Time Clock

maintainers:
  - Steffen Trumtrar <s.trumtrar@pengutronix.de>

description: |
  The Epson RX6110 can be used with SPI or I2C busses. The kind of
  bus depends on the SPISEL pin and can not be configured via software.

  I2C mode

  SPI mode

properties:
  compatible:
    items:
      - enum: ["epson,rx6110"]
  reg:
    description: "Address of the device: I2C slave address in I2C mode or chip select number in SPI mode."
    items:
      - description: Register cell.
  spi-cs-high:
    description: RX6110 needs chip-select active high in SPI mode.
    type: boolean
  spi-cpha:
    description: RX6110 works with shifted clock phase in SPI mode.
    type: boolean
  spi-cpol:
    description: RX6110 works with inverse clock polarity in SPI mode.
    type: boolean

required:
  - compatible
  - reg

additionalProperties: false

examples:
  - |
    rtc: rtc@32 {
      compatible = "epson,rx6110";
      reg = <0x32>;
    };
  - |
    rtc: rtc@3 {
      compatible = "epson,rx6110";
      reg = <3>;
      spi-cs-high;
      spi-cpha;
      spi-cpol;
    };
