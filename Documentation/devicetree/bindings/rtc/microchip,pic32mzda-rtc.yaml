%YAML 1.2
---
$id: http://devicetree.org/schemas/microchip,pic32mzda-rtc.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Microchip PIC32 Real Time Clock and Calendar

maintainers:
  - Joshua Henderson <joshua.henderson@microchip.com>

description: |
  The RTCC keeps time in hours, minutes, and seconds, and one half second.
  It provides a calendar in weekday, date, month, and year. It also provides a
  configurable alarm.

properties:
  compatible:
    items:
      - const: "microchip,pic32mzda-rtc"
    description: Device compatible with the Microchip PIC32 RTCC.

  reg:
    items:
      - description: Physical base address of the controller.
      - description: Length of memory mapped region.

  interrupts:
    items:
      - description: RTC alarm/event interrupt.

  clocks:
    maxItems: 1
    description: Clock source for the RTCC.

required:
  - compatible
  - reg
  - interrupts
  - clocks

additionalProperties: false

examples:
  - |
    rtc: rtc@1f8c0000 {
        compatible = "microchip,pic32mzda-rtc";
        reg = <0x1f8c0000 0x60>;
        interrupts = <166 IRQ_TYPE_EDGE_RISING>;
        clocks = <&PBCLK6>;
    };
