%YAML 1.2
---
$id: http://devicetree.org/schemas/motorola,cpcap-rtc.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Motorola CPCAP PMIC RTC

maintainers:
  - Sebastian Reichel <sre@kernel.org>

description: |
  Motorola CPCAP PMIC RTC

  This module is part of the CPCAP. For more details about the whole
  chip see Documentation/devicetree/bindings/mfd/motorola-cpcap.txt.

properties:
  compatible:
    contains:
      const: motorola,cpcap-rtc

  interrupts:
    description: Interrupt specifier for alarm and periodic 1 Hz tick
    items:
      - description: Alarm interrupt
      - description: Periodic 1 Hz interrupt

  interrupt-names:
    items:
      - const: alarm
      - const: 1hz

required:
  - compatible
  - interrupts

additionalProperties: false

examples:
  - |
    &cpcap {
        cpcap_rtc: rtc {
            compatible = "motorola,cpcap-rtc";
            interrupts = <39 IRQ_TYPE_NONE>, <26 IRQ_TYPE_NONE>;
        };
    };
