%YAML 1.2
---
$id: http://devicetree.org/schemas/rtc/realtek,rtd1295-rtc.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Realtek RTD129x Real-Time Clock
maintainers:
  - Andreas Färber <afaerber@suse.de>

description: |
  Realtek RTD129x Real-Time Clock

properties:
  compatible:
    items:
      - const: "realtek,rtd1295-rtc"
    description: Device compatible string.
  reg:
    items:
      - description: Physical base address and size of the RTC registers.
    description: Register base address and size.
  clocks:
    maxItems: 1
    description: Specifies the clock gate.

required:
  - compatible
  - reg
  - clocks

additionalProperties: false

examples:
  - |
    rtc@9801b600 {
        compatible = "realtek,rtd1295-rtc";
        reg = <0x9801b600 0x100>;
        clocks = <&clkc RTD1295_CLK_EN_MISC_RTC>;
    };
