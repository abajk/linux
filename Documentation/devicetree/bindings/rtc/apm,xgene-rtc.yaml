%YAML 1.2
---
$id: http://devicetree.org/schemas/apm,xgene-rtc.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: APM X-Gene Real Time Clock

maintainers:
  - Loc Ho <lho@apm.com>

description: |
  * APM X-Gene Real Time Clock

  RTC controller for the APM X-Gene Real Time Clock

properties:
  compatible:
    description: Binding compatible string
    items:
      - const: apm,xgene-rtc

  reg:
    items:
      - description: Physical base address of the controller
      - description: Length of the memory mapped region

  interrupts:
    description: IRQ line for the RTC
    items:
      - description: Interrupt specifier for the RTC

  '#clock-cells':
    const: 1
    description: Number of cells in clocks specifier

  clocks:
    maxItems: 1
    description: Reference to the clock entry

required:
  - compatible
  - reg
  - interrupts
  - '#clock-cells'
  - clocks

additionalProperties: false

examples:
  - |
    rtcclk: rtcclk {
        compatible = "fixed-clock";
        #clock-cells = <1>;
        clock-frequency = <100000000>;
        clock-output-names = "rtcclk";
    };

    rtc: rtc@10510000 {
        compatible = "apm,xgene-rtc";
        reg = <0x0 0x10510000 0x0 0x400>;
        interrupts = <0x0 0x46 0x4>;
        #clock-cells = <1>;
        clocks = <&rtcclk 0>;
    };
