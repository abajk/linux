%YAML 1.2
---
$id: http://devicetree.org/schemas/mfd/hisilicon,hi6421-pmic.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: HI6421 Multi-Functional Device PMIC

maintainers:
  - Guodong Xu <guodong.xu@linaro.org>

description: |
  HI6421 Multi-Functional Device (MFD), by HiSilicon Ltd.

properties:
  compatible:
    enum:
      - hisilicon,hi6421-pmic
      - hisilicon,hi6421v530-pmic

  reg:
    maxItems: 1

  regulators:
    description: Container for regulator child nodes.
    type: object
    additionalProperties: false
    patternProperties:
      ".*":
        $ref: /schemas/regulator/regulator.yaml#

required:
  - compatible
  - reg

additionalProperties: false

examples:
  - |
    hi6421 {
        compatible = "hisilicon,hi6421-pmic";
        reg = <0xfcc00000 0x0180>;
        regulators {
            hi6421_vout0_reg: hi6421_vout0 {
                regulator-name = "VOUT0";
                regulator-min-microvolt = <2850000>;
                regulator-max-microvolt = <2850000>;
            };
            hi6421_vout1_reg: hi6421_vout1 {
                regulator-name = "VOUT1";
                regulator-min-microvolt = <1700000>;
                regulator-max-microvolt = <2000000>;
                regulator-boot-on;
                regulator-always-on;
            };
        };
    };
