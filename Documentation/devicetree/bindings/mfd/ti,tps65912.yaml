%YAML 1.2
---
$id: http://devicetree.org/schemas/mfd/ti,tps65912.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: TI TPS65912 Power Management Integrated Circuit

maintainers:
  - Andrew F. Davis <afd@ti.com>

description: |
  TPS65912 Power Management Integrated Circuit bindings

  Required properties:
    - compatible: Must be "ti,tps65912".
    - reg: Slave address or chip select number (I2C/SPI).
    - interrupts: A two-cell array describing the IRQ number and flags.
    - interrupt-controller: Marks the device node as an interrupt controller.
    - #interrupt-cells: Must be 2.
    - gpio-controller: Marks the node as a GPIO controller.
    - #gpio-cells: Must be 2.
    - regulators: List of child nodes specifying regulator initialization data.

properties:
  compatible:
    items:
      - const: ti,tps65912

  reg:
    maxItems: 1

  interrupts:
    maxItems: 1

  interrupt-controller:
    description: Marks the node as an interrupt controller

  '#interrupt-cells':
    const: 2

  gpio-controller:
    description: Marks the node as a GPIO controller

  '#gpio-cells':
    const: 2

  regulators:
    description: >-
      List of child nodes specifying regulator initialization data.
      Child nodes must be named dcdc1–dcdc4 and ldo1–ldo10.
    type: object
    additionalProperties:
        $ref: /schemas/regulator/regulator.yaml#
        unevaluatedProperties: false

required:
  - compatible
  - reg
  - interrupts
  - interrupt-controller
  - '#interrupt-cells'
  - gpio-controller
  - '#gpio-cells'
  - regulators

additionalProperties: false

examples:
  - |
    pmic: tps65912@2d {
        compatible = "ti,tps65912";
        reg = <0x2d>;
        interrupts = <28 IRQ_TYPE_LEVEL_LOW>;
        interrupt-controller;
        #interrupt-cells = <2>;
        gpio-controller;
        #gpio-cells = <2>;

        regulators {
            dcdc1 {
                regulator-name = "vdd_core";
                regulator-min-microvolt = <912000>;
                regulator-max-microvolt = <1144000>;
                regulator-boot-on;
                regulator-always-on;
            };

            ldo1 {
                regulator-name = "ldo1";
                regulator-min-microvolt = <1900000>;
                regulator-max-microvolt = <1900000>;
            };
        };
    };
