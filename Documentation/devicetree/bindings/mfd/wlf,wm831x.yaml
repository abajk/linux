%YAML 1.2
---
$id: http://devicetree.org/schemas/wlf,wm831x.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: wm831x PMICs

maintainers:
  - Baolin Wang <baolin.wang@linux.alibaba.com>
  - Charles Keepax <ckeepax@opensource.wolfsonmicro.com>
  - Rob Herring <robh@kernel.org>

description: |
  Cirrus Logic/Wolfson Microelectronics wm831x PMICs

  System PMICs with a wide range of additional features.

properties:
  compatible:
    items:
      - enum: [wlf, wm8310]
      - enum: [wlf, wm8311]
      - enum: [wlf, wm8312]
      - enum: [wlf, wm8320]
      - enum: [wlf, wm8321]
      - enum: [wlf, wm8325]
      - enum: [wlf, wm8326]
    description: Identify the PMIC variant.

  reg:
    items:
      - description: I2C slave address or SPI chip select.
    description: Register bus address specifier.

  gpio-controller: true

  '#gpio-cells':
    const: 2

  interrupts:
    items:
      - description: Interrupt line specifier (IRQ number and flags).
    description: List of interrupt specifiers.

  interrupt-controller: true

  '#interrupt-cells':
    const: 2

  phys:
    description: USB PHY phandle.
    $ref: /schemas/types.yaml#/definitions/phandle

  regulators:
    type: object
    description: Sub-nodes for configuring PMIC regulators.
    additionalProperties: false
    patternProperties:
      '^[a-z0-9]+$':
        type: object
        additionalProperties: false
        properties:
          regulator-name:
            enum:
              - DCDC1
              - DCDC2
              - DCDC3
              - DCDC4
              - ISINK1
              - ISINK2
              - LDO1
              - LDO2
              - LDO3
              - LDO4
              - LDO5
              - LDO7
              - LDO11
            description: Human-readable regulator name.
          regulator-min-microvolt:
            description: Minimum output voltage in microvolts.
          regulator-max-microvolt:
            description: Maximum output voltage in microvolts.
        required:
          - regulator-name
          - regulator-min-microvolt
          - regulator-max-microvolt

required:
  - compatible
  - reg
  - gpio-controller
  - '#gpio-cells'
  - interrupts
  - interrupt-controller
  - '#interrupt-cells'

additionalProperties: false

examples:
  - |
    wm8310: pmic@36 {
        compatible = "wlf,wm8310";
        reg = <0x36>;
        gpio-controller;
        #gpio-cells = <2>;
        interrupts = <347>;
        interrupt-controller;
        #interrupt-cells = <2>;
        regulators {
            dcdc1: dcdc1 {
                regulator-name = "DCDC1";
                regulator-min-microvolt = <600000>;
                regulator-max-microvolt = <600000>;
            };
            ldo1: ldo1 {
                regulator-name = "LDO1";
                regulator-min-microvolt = <1700000>;
                regulator-max-microvolt = <1700000>;
            };
        };
    };
