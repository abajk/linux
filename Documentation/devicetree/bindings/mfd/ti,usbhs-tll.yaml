%YAML 1.2
---
$id: http://devicetree.org/schemas/ti,usbhs-tll.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: OMAP HS USB Host TLL

maintainers:
  - Roger Quadros <rogerq@ti.com>

description: |
  OMAP HS USB Host TLL (Transceiver-Less Interface)

properties:
  compatible:
    items:
      - const: ti,usbhs-tll

  reg:
    items:
      - description: Controller register base address and size

  interrupts:
    items:
      - description: TLL module interrupt

  ti,hwmods:
    description: Hardware modules associated with USB TLL
    $ref: /schemas/types.yaml#/definitions/string-array
    items:
      - enum: [usb_tll_hs]

  clocks:
    description: Phandles and specifiers for USB TLL channel clocks
    items:
      - description: USB TLL channel 0 clock
      - description: USB TLL channel 1 clock
      - description: USB TLL channel 2 clock

  clock-names:
    description: Names for USB TLL channel clocks
    items:
      - const: usb_tll_hs_usb_ch0_clk
      - const: usb_tll_hs_usb_ch1_clk
      - const: usb_tll_hs_usb_ch2_clk

required:
  - compatible
  - reg
  - interrupts
  - ti,hwmods

additionalProperties: false

examples:
  - |
    usbhstll: usbhstll@4a062000 {
        compatible = "ti,usbhs-tll";
        reg = <0x4a062000 0x1000>;
        interrupts = <78>;
        ti,hwmods = "usb_tll_hs";
    };
