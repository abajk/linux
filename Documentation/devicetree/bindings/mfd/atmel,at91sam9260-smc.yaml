%YAML 1.2
---
$id: http://devicetree.org/schemas/mfd/atmel,at91sam9260-smc.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Atmel SMC Static Memory Controller
maintainers:
  - Boris Brezillon <bbrezillon@kernel.org>
  - Claudiu Beznea <claudiu.beznea@tuxon.dev>
  - Ludovic Desroches <ludovic.desroches@microchip.com>
  - Varshini Rajendran <varshini.rajendran@microchip.com>

description: |
  Device tree bindings for Atmel SMC (Static Memory Controller)

  The SMC registers are used to configure Atmel EBI (External Bus Interface)
  to interface with standard memory devices (NAND, NOR, SRAM or specialized
  devices like FPGAs).

properties:
  compatible:
    description: List of compatible strings for the SMC controller.
    items:
      - enum:
          - atmel,at91sam9260-smc
          - syscon
          - atmel,sama5d3-smc
          - atmel,sama5d2-smc
          - microchip,sam9x60-smc
          - microchip,sam9x7-smc

  reg:
    description: Contains offset/length value of the SMC memory region.
    items:
      - description: Memory region offset and length.

required:
  - compatible
  - reg

additionalProperties: false

examples:
  - |
    smc: smc@ffffc000 {
        compatible = "atmel,sama5d3-smc", "syscon";
        reg = <0xffffc000 0x1000>;
    };
