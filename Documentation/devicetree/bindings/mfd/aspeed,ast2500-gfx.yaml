%YAML 1.2
---
$id: http://devicetree.org/schemas/aspeed,ast2500-gfx.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Aspeed SoC Display Controller (GFX)

maintainers:
  - Andrew Jeffery <andrew@aj.id.au>

description: |
  * Device tree bindings for Aspeed SoC Display Controller (GFX)

  The Aspeed SoC Display Controller primarily does as its name suggests, but also
  participates in pinmux requests on the g5 SoCs. It is therefore considered a
  syscon device.

properties:
  compatible:
    items:
      - const: aspeed,ast2500-gfx
      - const: syscon
  reg:
    description: Offset and length of the GFX memory region
    items:
      - description: GFX memory region offset
      - description: GFX memory region length

required:
  - compatible
  - reg

additionalProperties: false

examples:
  - |
    gfx: display@1e6e6000 {
        compatible = "aspeed,ast2500-gfx", "syscon";
        reg = <0x1e6e6000 0x1000>;
    };
