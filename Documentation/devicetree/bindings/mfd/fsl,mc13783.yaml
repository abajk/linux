%YAML 1.2
---
$id: http://devicetree.org/schemas/mfd/fsl,mc13783.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Freescale MC13783/MC13892 Power Management IC (PMIC)

maintainers:
  - Alexander Shiyan <shc_work@mail.ru>
  - Fabio Estevam <fabio.estevam@freescale.com>
  - Fabio Estevam <fabio.estevam@nxp.com>
  - Rob Herring <robh@kernel.org>
  - Shawn Guo <shawn.guo@linaro.org>

description: |
  * Freescale MC13783/MC13892 Power Management Integrated Circuit (PMIC)

  Sub-nodes:
  - codec: Contain the Audio Codec node.
    - adc-port: Contain PMIC SSI port number used for ADC.
    - dac-port: Contain PMIC SSI port number used for DAC.
  - leds: Contain the LED nodes and initial register values in property
    "led-control". Number of registers depends on IC: MC13783=6, MC13892=4,
    MC34708=1.
  - regulators: Contain the regulator nodes. The regulators are bound using
    their names as listed below with their registers and bits for enabling.

properties:
  compatible:
    description: Hardware identifiers for the PMIC.
    items:
      - enum:
          - fsl,mc13783
          - fsl,mc13892

  reg:
    description: Base register offset within the parent bus (chip select).
    maxItems: 1

  spi-max-frequency:
    description: Maximum SPI clock frequency supported by the PMIC, in Hz.
    $ref: /schemas/types.yaml#/definitions/uint32

  interrupts:
    description: GPIO interrupt number connected to PMIC interrupt pin.
    maxItems: 1

  fsl,mc13xxx-uses-adc:
    description: Indicate the ADC is being used.
    type: boolean

  fsl,mc13xxx-uses-codec:
    description: Indicate the Audio Codec is being used.
    type: boolean

  fsl,mc13xxx-uses-rtc:
    description: Indicate the RTC is being used.
    type: boolean

  fsl,mc13xxx-uses-touch:
    description: Indicate the touchscreen controller is being used.
    type: boolean

  codec:
    description: Audio Codec sub-node.
    type: object
    additionalProperties: false
    properties:
      adc-port:
        description: PMIC SSI port node for ADC.
        type: object
        additionalProperties: false
      dac-port:
        description: PMIC SSI port node for DAC.
        type: object
        additionalProperties: false

  leds:
    description: LED sub-node container.
    type: object
    additionalProperties: false
    properties:
      "#address-cells":
        const: 1
      "#size-cells":
        const: 0
      led-control:
        description: Initial register values for the LEDs.
        $ref: /schemas/types.yaml#/definitions/uint32-array
        oneOf:
          - items:
              - description: Register value for LED 0.
              - description: Register value for LED 1.
              - description: Register value for LED 2.
              - description: Register value for LED 3.
              - description: Register value for LED 4.
              - description: Register value for LED 5.
          - items:
              - description: Register value for LED 0.
              - description: Register value for LED 1.
              - description: Register value for LED 2.
              - description: Register value for LED 3.
          - items:
              - description: Register value for LED 0.

  regulators:
    description: Regulator sub-nodes for the PMIC.
    type: object
    additionalProperties:
      $ref: /schemas/regulator/regulator.yaml#
      unevaluatedProperties: false

required:
  - compatible
  - reg

additionalProperties: false

examples:
  - |
    ecspi@70010000 { /* ECSPI1 */
        cs-gpios = <&gpio4 24 0>, /* GPIO4_24 */
                   <&gpio4 25 0>; /* GPIO4_25 */

        pmic: mc13892@0 {
            #address-cells = <1>;
            #size-cells = <0>;
            compatible = "fsl,mc13892";
            spi-max-frequency = <6000000>;
            reg = <0>;
            interrupts = <8>;

            codec: codec {
                adc-port;
                dac-port;
            };

            leds {
                #address-cells = <1>;
                #size-cells = <0>;
                led-control = <0x000 0x000 0x0e0 0x000>;

                sysled@3 {
                    reg = <3>;
                    label = "system:red:live";
                    linux,default-trigger = "heartbeat";
                };
            };

            regulators {
                sw1_reg: mc13892__sw1 {
                    regulator-min-microvolt = <600000>;
                    regulator-max-microvolt = <1375000>;
                    regulator-boot-on;
                    regulator-always-on;
                };

                sw2_reg: mc13892__sw2 {
                    regulator-min-microvolt = <900000>;
                    regulator-max-microvolt = <1850000>;
                    regulator-boot-on;
                    regulator-always-on;
                };
            };
        };
    };
