%YAML 1.2
---
$id: http://devicetree.org/schemas/mfd/dlg,da9052.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Dialog DA9052/53 Power Management Integrated Circuit (PMIC)

maintainers:
  - Rob Herring <robh@kernel.org>
  - Sebastian Reichel <sre@kernel.org>
  - Steve Twiss <stwiss.opensource@diasemi.com>
  - Ying-Chun Liu (PaulLiu) <paul.liu@linaro.org>

description: |
  Dialog DA9052/53 Power Management Integrated Circuit (PMIC)

properties:
  compatible:
    items:
      - enum: ["dlg,da9052", "dlg,da9053-aa", "dlg,da9053-ab", "dlg,da9053-bb"]

  reg:
    description: I2C address of the PMIC.
    items:
      - description: Slave I2C address of the PMIC

  dlg,tsi-as-adc:
    description: If true, touchscreen X+, X-, Y+, Y- lines are used as ADC inputs.
    type: boolean

  tsiref-supply:
    description: Regulator providing reference voltage for the TSIREF pin.

  regulators:
    description: Container for regulator sub-nodes.
    type: object
    additionalProperties: false
    patternProperties:
      "^buck[1-4]$|^ldo([1-9]|10)$":
        $ref: /schemas/regulator/regulator.yaml#

required:
  - compatible
  - reg

additionalProperties: false

examples:
  - |
    i2c@63fc8000 { /* I2C1 */
        pmic: dialog@48 {
            compatible = "dlg,da9053-aa";
            reg = <0x48>;

            regulators {
                buck1 {
                    regulator-min-microvolt = <500000>;
                    regulator-max-microvolt = <2075000>;
                };

                buck2 {
                    regulator-min-microvolt = <500000>;
                    regulator-max-microvolt = <2075000>;
                };

                buck3 {
                    regulator-min-microvolt = <925000>;
                    regulator-max-microvolt = <2500000>;
                };

                buck4 {
                    regulator-min-microvolt = <925000>;
                    regulator-max-microvolt = <2500000>;
                };
            };
        };
    };
