%YAML 1.2
---
$id: http://devicetree.org/schemas/ti,twl6040.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Texas Instruments TWL6040 family

maintainers:
  - Peter Ujfalusi <peter.ujfalusi@ti.com>
  - Rob Herring <robh@kernel.org>
  - Yu-Chun Lin <eleanor15x@gmail.com>

description: |
  The TWL6040s are 8-channel high quality low-power audio codecs providing audio,
  vibra and GPO functionality on OMAP4+ platforms.
  They are connected to the host processor via i2c for commands, McPDM for audio
  data and commands.

properties:
  compatible:
    items:
      - enum:
          - ti,twl6040
          - ti,twl6041

  reg:
    items:
      - const: 0x4b
    description: I2C bus address for the TWL6040
  interrupts:
    items:
      - description: Interrupt line to the main SoC
    description: Interrupt line
  gpio-controller: true
  '#gpio-cells':
    const: 1

  '#clock-cells':
    const: 0

  twl6040,audpwron-gpio:
    maxItems: 1
    description: Power-on GPIO line for the TWL6040

  vio-supply: true
  v2v1-supply: true

  enable-active-high:
    type: boolean
    description: Power on the TWL6040 during boot when present

  clocks:
    maxItems: 1

  clock-names:
    items:
      - const: clk32k
      - const: mclk
    description: Names for the clk32k and MCLK clocks
  vddvibl-supply: true
  vddvibr-supply: true
  vibra:
    type: object
    additionalProperties: false
    description: Configuration for vibra parameters
    properties:
      ti,vibldrv-res:
        $ref: /schemas/types.yaml#/definitions/uint32
        description: Resistance parameter for left vibra driver
      ti,vibrdrv-res:
        $ref: /schemas/types.yaml#/definitions/uint32
        description: Resistance parameter for right vibra driver
      ti,viblmotor-res:
        $ref: /schemas/types.yaml#/definitions/uint32
        description: Resistance parameter for left vibra motor
      ti,vibrmotor-res:
        $ref: /schemas/types.yaml#/definitions/uint32
        description: Resistance parameter for right vibra motor
      vddvibl-uV:
        $ref: /schemas/types.yaml#/definitions/uint32
        description: Adjust default left vibra voltage in microvolts
      vddvibr-uV:
        $ref: /schemas/types.yaml#/definitions/uint32
        description: Adjust default right vibra voltage in microvolts
    required:
      - ti,vibldrv-res
      - ti,vibrdrv-res
      - ti,viblmotor-res
      - ti,vibrmotor-res

required:
  - compatible
  - reg
  - interrupts
  - gpio-controller
  - '#gpio-cells'
  - '#clock-cells'
  - twl6040,audpwron-gpio
  - vio-supply
  - v2v1-supply
  - vddvibl-supply
  - vddvibr-supply
  - vibra

additionalProperties: false

examples:
  - |
    &i2c1 {
        twl6040: twl@4b {
            compatible = "ti,twl6040";
            interrupts = <0 119 4>;
            twl6040,audpwron-gpio = <&gpio4 31 0>;
            vio-supply = <&v1v8>;
            v2v1-supply = <&v2v1>;
            enable-active-high;
            vddvibl-supply = <&vbat>;
            vddvibr-supply = <&vbat>;
            vibra {
                ti,vibldrv-res = <8>;
                ti,vibrdrv-res = <3>;
                ti,viblmotor-res = <10>;
                ti,vibrmotor-res = <10>;
            };
        };
    };
