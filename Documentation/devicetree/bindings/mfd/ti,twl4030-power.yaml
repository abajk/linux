%YAML 1.2
---
$id: http://devicetree.org/schemas/mfd/ti,twl4030-power.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#
title: TI TWL4030 power management
maintainers:
  - Florian Vaussard <florian.vaussard@epfl.ch>
  - Nishanth Menon <nm@ti.com>
  - Tony Lindgren <tony@atomide.com>
description: |
  Texas Instruments TWL family (twl4030) reset and power management module

  The power management module inside the TWL family provides several facilities
  to control the power resources, including power scripts. For now, the
  binding only supports the complete shutdown of the system after poweroff.

properties:
  compatible:
    description: Device compatible string. Must be one of the following values.
    items:
      - enum:
          - ti,twl4030-power
          - ti,twl4030-power-reset
          - ti,twl4030-power-idle
          - ti,twl4030-power-idle-osc-off

  ti,system-power-controller:
    description: Indicates that TWL4030 is the power supply master of the system.
    type: boolean

  ti,use_poweroff:
    description: Deprecated alias for ti,system-power-controller.
    type: boolean

additionalProperties: false

examples:
  - |
    power {
        compatible = "ti,twl4030-power";
        ti,system-power-controller;
    };
