%YAML 1.2
---
$id: http://devicetree.org/schemas/mfd/fsl,imx25-tsadc.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Freescale MX25 ADC/TSC MultiFunction Device (MFD)

maintainers:
  - Markus Schneider-Pargmann <msp@baylibre.com>

description: |
  Freescale MX25 ADC/TSC MultiFunction Device (MFD)

  This device combines two general purpose conversion queues one used for general
  ADC and the other used for touchscreens.

  This device includes two conversion queues which can be added as subnodes.
  The first queue is for the touchscreen, the second for general purpose ADC.

properties:
  compatible:
    description: Compatible string for this device.
    items:
      - const: fsl,imx25-tsadc

  reg:
    maxItems: 1

  interrupts:
    maxItems: 1

  interrupt-controller: true

  '#interrupt-cells':
    const: 1

  '#address-cells':
    const: 1

  '#size-cells':
    const: 1

  ranges: true

  clocks:
    description: Bus clock for this device.
    maxItems: 1

  clock-names:
    items:
      - const: ipg

required:
  - compatible
  - reg
  - interrupts
  - interrupt-controller

additionalProperties: false

examples:
  - |
    tscadc: tscadc@50030000 {
        compatible = "fsl,imx25-tsadc";
        reg = <0x50030000 0xc>;
        interrupts = <46>;
        clocks = <&clks 119>;
        clock-names = "ipg";
        interrupt-controller;
        #interrupt-cells = <1>;
        #address-cells = <1>;
        #size-cells = <1>;
        ranges;

        tsc: tcq@50030400 {
            compatible = "fsl,imx25-tcq";
            reg = <0x50030400 0x60>;
            ...
        };

        adc: gcq@50030800 {
            compatible = "fsl,imx25-gcq";
            reg = <0x50030800 0x60>;
            ...
        };
    };
