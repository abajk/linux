%YAML 1.2
---
$id: http://devicetree.org/schemas/pwm/ti,pwm-tipwmss.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: TI SOC based PWM Subsystem

maintainers:
  - Franklin S Cooper Jr <fcooper@ti.com>
  - Philip, Avinash <avinashphilip@ti.com>
  - Vignesh R <vigneshr@ti.com>

properties:
  compatible:
    oneOf:
      - items:
          - const: "ti,am33xx-pwmss"
      - items:
          - const: "ti,am4372-pwmss"
          - const: "ti,am33xx-pwmss"
      - items:
          - const: "ti,dra746-pwmss"
          - const: "ti,am33xx-pwmss"

  reg:
    maxItems: 1

  '#address-cells':
    const: 1

  '#size-cells':
    const: 1

  ranges:
    if:
      not:
        type: boolean
    then:
      items:
        - description: ECAP register space
        - description: EQEP register space
        - description: EHRPWM register space

  ti,hwmods:
    description: Hardware module identifier for this PWMSS instance
    $ref: /schemas/types.yaml#/definitions/string

required:
  - compatible
  - reg
  - '#address-cells'
  - '#size-cells'
  - ranges

additionalProperties: false

examples:
  - |
    epwmss0: epwmss@48300000 { /* PWMSS for am33xx */
      compatible = "ti,am33xx-pwmss";
      reg = <0x48300000 0x10>;
      ti,hwmods = "epwmss0";
      #address-cells = <1>;
      #size-cells = <1>;
      ranges = <0x48300100 0x48300100 0x80   /* ECAP */
                0x48300180 0x48300180 0x80   /* EQEP */
                0x48300200 0x48300200 0x80>; /* EHRPWM */

      /* child nodes go here */
    };

  - |
    epwmss0: epwmss@48300000 { /* PWMSS for am4372 */
      compatible = "ti,am4372-pwmss","ti,am33xx-pwmss";
      reg = <0x48300000 0x10>;
      ti,hwmods = "epwmss0";
      #address-cells = <1>;
      #size-cells = <1>;
      ranges = <0x48300100 0x48300100 0x80   /* ECAP */
                0x48300180 0x48300180 0x80   /* EQEP */
                0x48300200 0x48300200 0x80>; /* EHRPWM */

      /* child nodes go here */
    };

  - |
    epwmss0: epwmss@4843e000 { /* PWMSS for DRA7xx */
      compatible = "ti,dra746-pwmss", "ti,am33xx-pwmss";
      reg = <0x4843e000 0x30>;
      ti,hwmods = "epwmss0";
      #address-cells = <1>;
      #size-cells = <1>;
      ranges;

      /* child nodes go here */
    };
