%YAML 1.2
---
$id: http://devicetree.org/schemas/pwm/st,pwm.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: STMicroelectronics PWM controller
maintainers:
  - Lee Jones <lee@kernel.org>

description: |
  STMicroelectronics PWM driver bindings

properties:
  compatible:
    description: Must be "st,pwm".
    const: "st,pwm"

  reg:
    description: Physical base address and length of the controller's registers.
    items:
      - description: Base address
      - description: Size of register region

  "#pwm-cells":
    description: |
      Number of cells used to specify a PWM.
      First cell is the per-chip index, second is the period in nanoseconds.
    const: 2

  pinctrl-names:
    items:
      - const: default

  pinctrl-0:
    description: Phandles to pin configuration nodes for the PWM module.
    $ref: /schemas/types.yaml#/definitions/phandle-array

  clock-names:
    items:
      - const: pwm
      - const: capture

  clocks:
    description: Phandles to the clocks used by the PWM module.
    $ref: /schemas/types.yaml#/definitions/phandle-array

  interrupts:
    description: IRQ for the capture device.
    items:
      - description: Capture interrupt number

  st,pwm-num-chan:
    description: Number of available PWM channels.
    $ref: /schemas/types.yaml#/definitions/uint32
    default: 0

  st,capture-num-chan:
    description: Number of available Capture channels.
    $ref: /schemas/types.yaml#/definitions/uint32
    default: 0

required:
  - compatible
  - reg
  - "#pwm-cells"
  - pinctrl-names
  - pinctrl-0
  - clock-names
  - clocks
  - interrupts

additionalProperties: false

examples:
  - |
    pwm1: pwm@fe510000 {
      compatible = "st,pwm";
      reg = <0xfe510000 0x68>;
      #pwm-cells = <2>;
      pinctrl-names = "default";
      pinctrl-0 = <&pinctrl_pwm1_chan0_default
                   &pinctrl_pwm1_chan1_default
                   &pinctrl_pwm1_chan2_default
                   &pinctrl_pwm1_chan3_default>;
      clocks = <&clk_sysin>;
      clock-names = "pwm";
      st,pwm-num-chan = <4>;
      st,capture-num-chan = <2>;
    };
