%YAML 1.2
---
$id: http://devicetree.org/schemas/remoteproc/ti,keystone-rproc.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: TI Keystone DSP remote processor

maintainers:
  - Mauro Carvalho Chehab <mchehab+huawei@kernel.org>
  - Rob Herring <robh@kernel.org>
  - Suman Anna <s-anna@ti.com>

description: |
  TI Keystone DSP devices

  The TI Keystone 2 family of SoCs usually have one or more (up to 8) TI DSP Core
  sub-systems that are used to offload some of the processor-intensive tasks or
  algorithms, for achieving various system level goals.

  These processor sub-systems usually contain additional sub-modules like L1
  and/or L2 caches/SRAMs, an Interrupt Controller, an external memory controller,
  a dedicated local power/sleep controller etc. The DSP processor core in
  Keystone 2 SoCs is usually a TMS320C66x CorePac processor.

properties:
  compatible:
    items:
      - enum: ["ti,k2hk-dsp", "ti,k2l-dsp", "ti,k2e-dsp", "ti,k2g-dsp"]

  reg:
    description: Regions for L2 SRAM, L1 PRAM and L1 DRAM
    items:
      - description: L2 SRAM region
      - description: L1 PRAM region
      - description: L1 DRAM region

  reg-names:
    description: Memory region names
    items:
      - const: l2sram
      - const: l1pram
      - const: l1dram

  clocks:
    maxItems: 1

  power-domains:
    description: Power domain phandle and device ID (Keystone 2 66AK2G)
    items:
      - description: PM domain phandle
      - description: DSP device ID

  ti,syscon-dev:
    description: Phandle and offset of the DSP boot address register
    items:
      - description: Keystone device‐state-control phandle
      - description: boot address register offset

  resets:
    maxItems: 1

  interrupts:
    maxItems: 2

  interrupt-names:
    description: Interrupt names
    items:
      - const: vring
      - const: exception

  kick-gpios:
    description: GPIO for virtio IPC kick
    maxItems: 1

  memory-region:
    description: Reserved memory region for remoteproc
    maxItems: 1

required:
  - compatible
  - reg
  - reg-names
  - ti,syscon-dev
  - resets
  - interrupts
  - interrupt-names
  - kick-gpios

additionalProperties: false

examples:
  - |
    dsp0: dsp@10800000 {
        compatible = "ti,k2hk-dsp";
        reg = <0x10800000 0x00100000>,
              <0x10e00000 0x00008000>,
              <0x10f00000 0x00008000>;
        reg-names = "l2sram", "l1pram", "l1dram";
        clocks = <&clkgem0>;
        ti,syscon-dev = <&devctrl 0x40>;
        resets = <&pscrst 0>;
        interrupts = <0 8>;
        interrupt-names = "vring", "exception";
        kick-gpios = <&dspgpio0 27 0>;
        memory-region = <&dsp_common_memory>;
    };

  - |
    dsp0: dsp@10800000 {
        compatible = "ti,k2g-dsp";
        reg = <0x10800000 0x00100000>,
              <0x10e00000 0x00008000>,
              <0x10f00000 0x00008000>;
        reg-names = "l2sram", "l1pram", "l1dram";
        power-domains = <&k2g_pds 0x0046>;
        ti,syscon-dev = <&devctrl 0x40>;
        resets = <&k2g_reset 0x0046 0x1>;
        interrupts = <0 8>;
        interrupt-names = "vring", "exception";
        kick-gpios = <&dspgpio0 27 0>;
        memory-region = <&dsp_common_memory>;
    };
