%YAML 1.2
---
$id: http://devicetree.org/schemas/remoteproc/st,st231-rproc.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: STMicroelectronics Co-Processor

maintainers:
  - Lee Jones <lee@kernel.org>

description: |
  This binding provides support for adjunct processors found on ST SoCs.

  Co-processors can be controlled from the bootloader or the primary OS. If
  the bootloader starts a co-processor, the primary OS must detect its state
  and act accordingly.

properties:
  compatible:
    description: Co-processor compatible string.
    items:
      - enum:
          - st,st231-rproc
          - st,st40-rproc

  memory-region:
    description: Reserved memory region for the co-processor.
    $ref: /schemas/types.yaml#/definitions/phandle

  resets:
    description: Reset lines for the co-processor.
    items:
      - description: sw_reset reset phandle and specifier.
      - description: pwr_reset reset phandle and specifier.

  reset-names:
    description: Names for each reset line.
    items:
      - const: sw_reset
      - const: pwr_reset

  clocks:
    maxItems: 1
    description: Clock for the co-processor.

  clock-frequency:
    description: Clock frequency to set the co-processor if the bootloader hasn't already done so.

  "st,syscfg":
    description: System configuration register which holds the boot vector for the co-processor.
    items:
      - description: Phandle to syscon block.
      - description: Boot vector register offset.

required:
  - compatible
  - memory-region
  - resets
  - reset-names
  - clocks
  - clock-frequency
  - "st,syscfg"

additionalProperties: false

examples:
  - |
    audio_reserved: rproc@42000000 {
        compatible = "shared-dma-pool";
        reg = <0x42000000 0x01000000>;
        no-map;
    };

  - |
    st231-audio {
        compatible = "st,st231-rproc";
        memory-region = <&audio_reserved>;
        resets = <&softreset STIH407_ST231_AUD_SOFTRESET>;
        reset-names = "sw_reset";
        clocks = <&clk_s_c0_flexgen CLK_ST231_AUD_0>;
        clock-frequency = <600000000>;
        st,syscfg = <&syscfg_core 0x228>;
    };
