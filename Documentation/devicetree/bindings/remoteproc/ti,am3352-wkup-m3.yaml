%YAML 1.2
---
$id: http://devicetree.org/schemas/remoteproc/ti,am3352-wkup-m3.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: TI Wakeup M3 Remoteproc Driver

maintainers:
  - Dave Gerlach <d-gerlach@ti.com>

description: |
  TI Wakeup M3 Remoteproc Driver

  The TI AM33xx and AM43xx family of devices use a small Cortex M3
  co-processor (commonly referred to as Wakeup M3 or CM3) to help
  with various low power tasks that cannot be controlled from the MPU.
  This CM3 processor requires a firmware binary to accomplish this.
  The wkup_m3 remoteproc driver handles the loading of the firmware
  and booting of the CM3.

  Wkup M3 Device Node:

  A wkup_m3 device node is used to represent the Wakeup M3 processor
  instance within the SoC. It is added as a child node of the parent
  interconnect bus (l4_wkup) through which it is accessible to the MPU.

properties:
  compatible:
    description: Hardware compatibility string for Wakeup M3 co-processor.
    oneOf:
      - items:
          - enum:
              - ti,am3352-wkup-m3
              - ti,am4372-wkup-m3

  reg:
    description: Internal memory address ranges for the Wakeup M3 firmware.
    items:
      - description: Address and size of UMEM region
      - description: Address and size of DMEM region

  reg-names:
    description: Names of the two memory regions.
    items:
      - const: umem
      - const: dmem

  ti,hwmods:
    description: Name of the hardware module associated with the wkup M3 device.
    $ref: /schemas/types.yaml#/definitions/string

  ti,pm-firmware:
    description: Name of the firmware file to load and boot the wkup M3.
    $ref: /schemas/types.yaml#/definitions/string

required:
  - compatible
  - reg
  - reg-names
  - ti,hwmods
  - ti,pm-firmware

additionalProperties: false

examples:
  - |
    /* AM33xx */
    ocp {
        l4_wkup: l4_wkup@44c00000 {
            compatible = "am335-l4-wkup", "simple-bus";
            ranges = <0 0x44c00000 0x400000>;
            #address-cells = <1>;
            #size-cells = <1>;

            wkup_m3: wkup_m3@100000 {
                compatible = "ti,am3352-wkup-m3";
                reg = <0x100000 0x4000>,
                      <0x180000 0x2000>;
                reg-names = "umem", "dmem";
                ti,hwmods = "wkup_m3";
                ti,pm-firmware = "am335x-pm-firmware.elf";
            };
        };

        ...
    };
