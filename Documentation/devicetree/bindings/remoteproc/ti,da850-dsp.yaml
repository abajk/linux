%YAML 1.2
---
$id: http://devicetree.org/schemas/remoteproc/ti,da850-dsp.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: TI Davinci DSP devices

maintainers:
  - Krzysztof Kozlowski <krzysztof.kozlowski@linaro.org>
  - Rob Herring <robh@kernel.org>
  - Suman Anna <s-anna@ti.com>

description: |
  The TI Davinci family of SoCs usually contains a TI DSP Core sub-system that
  is used to offload some of the processor-intensive tasks or algorithms, for
  achieving various system level goals.

  The processor cores in the sub-system usually contain additional sub-modules
  like L1 and/or L2 caches/SRAMs, an Interrupt Controller, an external memory
  controller, a dedicated local power/sleep controller etc. The DSP processor
  core used in Davinci SoCs is usually a C674x DSP CPU.

  DSP Device Node:
  Each DSP Core sub-system is represented as a single DT node.

properties:
  compatible:
    items:
      - enum: [ti, da850-dsp]
  reg:
    items:
      - description: L2 SRAM memory region
      - description: L1 PRAM memory region
      - description: L1 DRAM memory region
      - description: HOST1CFG register space
      - description: CHIPSIG_BASE register space
  reg-names:
    items:
      - const: l2sram
      - const: l1pram
      - const: l1dram
      - const: host1cfg
      - const: chipsig_base
  interrupts:
    items:
      - description: DSP interrupt line
  memory-region:
    $ref: /schemas/types.yaml#/definitions/phandle

required:
  - compatible
  - reg
  - reg-names
  - interrupts
  - memory-region

additionalProperties: false

examples:
  - |
    reserved-memory {
      #address-cells = <1>;
      #size-cells = <1>;
      ranges;

      dsp_memory_region: dsp-memory@c3000000 {
        compatible = "shared-dma-pool";
        reg = <0xc3000000 0x1000000>;
        reusable;
      };
    };

    dsp: dsp@11800000 {
      compatible = "ti,da850-dsp";
      reg = <0x11800000 0x40000>,
            <0x11e00000 0x8000>,
            <0x11f00000 0x8000>,
            <0x01c14044 0x4>,
            <0x01c14174 0x8>;
      reg-names = "l2sram", "l1pram", "l1dram", "host1cfg", "chipsig_base";
      interrupts = <28>;
      memory-region = <&dsp_memory_region>;
    };
