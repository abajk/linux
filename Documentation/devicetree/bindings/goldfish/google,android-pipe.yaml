%YAML 1.2
---
$id: http://devicetree.org/schemas/google,android-pipe.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Android Goldfish QEMU Pipe

maintainers:
  - Greg Hackmann <ghackmann@google.com>

description: |
  Android Goldfish QEMU Pipe

  Andorid pipe virtual device generated by android emulator.

properties:
  compatible:
    items:
      - const: google,android-pipe

  reg:
    items:
      - description: Base address of the pipe registers
      - description: Size of the pipe register region

  interrupts:
    items:
      - description: Interrupt mapping for the pipe device

required:
  - compatible
  - reg
  - interrupts

additionalProperties: false

examples:
  - |
    android_pipe@a010000 {
        compatible = "google,android-pipe";
        reg = <ff018000 0x2000>;
        interrupts = <0x12>;
    };
