%YAML 1.2
---
$id: http://devicetree.org/schemas/google,goldfish-tty.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Android Goldfish TTY

maintainers:
  - Miodrag Dinic <miodrag.dinic@mips.com>

description: |
  Android Goldfish TTY

  Android goldfish tty device generated by android emulator.

properties:
  compatible:
    items:
      - const: google,goldfish-tty

  reg:
    description: Base address and size mapping of the goldfish tty registers.
    items:
      - description: TTY register region.

  interrupts:
    description: Interrupt mapping for the goldfish tty device.
    items:
      - description: Interrupt line.

required:
  - compatible
  - reg
  - interrupts

additionalProperties: false

examples:
  - |
      goldfish_tty@1f004000 {
          compatible = "google,goldfish-tty";
          reg = <0x1f004000 0x1000>;
          interrupts = <0xc>;
      };
