%YAML 1.2
---
$id: http://devicetree.org/schemas/google,goldfish-audio.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Google Goldfish Audio
maintainers:
  - Greg Hackmann <ghackmann@google.com>

description: |
  Android Goldfish Audio

  Android goldfish audio device generated by android emulator.

properties:
  compatible:
    items:
      - const: google,goldfish-audio
    description: Emulator’s goldfish-audio compatible string.

  reg:
    description: Address and size of the audio registers.
    items:
      - description: Base register address and register block size.

  interrupts:
    description: Interrupt mapping for the audio device.
    items:
      - description: Interrupt number for audio events.

required:
  - compatible
  - reg
  - interrupts

additionalProperties: false

examples:
  - |
    goldfish_audio@9030000 {
        compatible = "google,goldfish-audio";
        reg = <0x9030000 0x100>;
        interrupts = <0x4>;
    };
