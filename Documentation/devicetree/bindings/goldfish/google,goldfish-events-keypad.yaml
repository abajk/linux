%YAML 1.2
---
$id: http://devicetree.org/schemas/google,goldfish-events-keypad.yaml#
# $schema is the meta-schema this schema should be validated with.
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: google,goldfish-events-keypad

maintainers:
  - Greg Hackmann <ghackmann@google.com>

description: |
  Android Goldfish Events Keypad

  Android goldfish events keypad device generated by android emulator.

properties:
  compatible:
    items:
      - const: google,goldfish-events-keypad

  reg:
    items:
      - description: Device registers mapping

  interrupts:
    items:
      - description: Interrupt mapping

required:
  - compatible
  - reg
  - interrupts

additionalProperties: false

examples:
  - |
    goldfish-events@9040000 {
        compatible = "google,goldfish-events-keypad";
        reg = <0x9040000 0x1000>;
        interrupts = <0x5>;
    };
