%YAML 1.2
---
$id: http://devicetree.org/schemas/mtd/nvidia-tegra20-nand.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: NVIDIA Tegra NAND Flash controller

maintainers:
  - Kamal Dasu <kdasu.kdev@gmail.com>
  - Nayab Sayed <nayabbasha.sayed@microchip.com>
  - Stefan Agner <stefan@agner.ch>

description: |
  NVIDIA Tegra NAND Flash controller

  Optional children nodes:
  Individual NAND chips are children of the NAND controller node. Currently
  only one NAND chip supported.

  Optional child node of NAND chip nodes:
  Partitions: see mtd.yaml

properties:
  compatible:
    items:
      - const: nvidia,tegra20-nand

  reg:
    description: MMIO address range for the NAND controller
    items:
      - description: base address and size of controller registers

  interrupts:
    description: interrupt output of the NFC controller
    items:
      - description: interrupt specifier

  clocks:
    description: NFC controller clock
    maxItems: 1

  clock-names:
    items:
      - const: nand

  resets:
    description: NFC controller reset
    items:
      - description: reset specifier

  reset-names:
    items:
      - const: nand

additionalProperties: false

patternProperties:
  "^nand@\\d+$":
    type: object
    description: Individual NAND chip instance
    properties:
      reg:
        description: chip-select line index (0–5)
        items:
          - description: CS line number
      "#address-cells":
        const: 1
      "#size-cells":
        const: 1
      nand-bus-width:
        description: NAND data bus width in bits
        items:
          - enum: [8]
      nand-on-flash-bbt:
        description: enable on-flash bad block table
        type: boolean
      nand-ecc-mode:
        description: operation mode of the NAND ECC
        items:
          - enum: [hw]
      nand-ecc-algo:
        description: algorithm used by the NAND ECC
        items:
          - enum: [rs, bch]
      nand-ecc-strength:
        description: number of bits corrected per ECC step
        items:
          - enum: [4, 6, 8, 14, 16]
      nand-ecc-maximize:
        description: maximize ECC strength when possible
        type: boolean
      nand-is-boot-medium:
        description: restrict ECC strengths to boot-ROM-supported values
        type: boolean
      wp-gpios:
        description: GPIO specifier for the write-protect pin
        maxItems: 1
    required:
      - reg
    additionalProperties: true

examples:
  - |
    nand-controller@70008000 {
        compatible = "nvidia,tegra20-nand";
        reg = <0x70008000 0x100>;
        interrupts = <GIC_SPI 24 IRQ_TYPE_LEVEL_HIGH>;
        clocks = <&tegra_car TEGRA20_CLK_NDFLASH>;
        clock-names = "nand";
        resets = <&tegra_car 13>;
        reset-names = "nand";

        nand@0 {
            reg = <0>;
            #address-cells = <1>;
            #size-cells = <1>;
            nand-bus-width = <8>;
            nand-on-flash-bbt;
            nand-ecc-algo = "bch";
            nand-ecc-strength = <8>;
            wp-gpios = <&gpio TEGRA_GPIO(S, 0) GPIO_ACTIVE_LOW>;
        };
    };
