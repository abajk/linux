%YAML 1.2
---
$id: http://devicetree.org/schemas/mtd/samsung-s3c2410-nand.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Samsung S3C2410 and compatible NAND flash controller

maintainers:
  - Kamal Dasu <kdasu.kdev@gmail.com>
  - Nayab Sayed <nayabbasha.sayed@microchip.com>
  - Sergio Prado <sergio.prado@e-labworks.com>

description: |
  Samsung S3C2410 and compatible NAND flash controller

properties:
  compatible:
    description: Compatibility strings for Samsung S3C NAND controller
    $ref: /schemas/types.yaml#/definitions/string-array
    items:
      - enum:
          - samsung,s3c2410-nand
          - samsung,s3c2412-nand
          - samsung,s3c2440-nand

  reg:
    description: Controller register base address and length
    items:
      - description: Controller register base address
      - description: Controller register length in bytes

  '#address-cells':
    description: Number of address cells for child nodes
    const: 1

  '#size-cells':
    description: Number of size cells for child nodes
    const: 0

  clocks:
    description: Phandle to the NAND controller clock
    maxItems: 1

  clock-names:
    description: Names for the controller clocks
    items:
      - const: nand

  nand-ecc-mode:
    description: NAND ECC mode for the flash chip
    enum:
      - soft
      - hw

  nand-on-flash-bbt:
    description: Enable on-flash bad block table
    type: boolean

additionalProperties: false

examples:
  - |
    nand-controller@4e000000 {
        compatible = "samsung,s3c2440-nand";
        reg = <0x4e000000 0x40>;

        #address-cells = <1>;
        #size-cells = <0>;

        clocks = <&clocks HCLK_NAND>;
        clock-names = "nand";

        nand {
            nand-ecc-mode = "soft";
            nand-on-flash-bbt;

            partitions {
                compatible = "fixed-partitions";
                #address-cells = <1>;
                #size-cells = <1>;

                partition@0 {
                    label = "u-boot";
                    reg = <0 0x040000>;
                };

                partition@40000 {
                    label = "kernel";
                    reg = <0x040000 0x500000>;
                };
            };
        };
    };
