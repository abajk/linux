%YAML 1.2
---
$id: http://devicetree.org/schemas/mtd/marvell,orion-nand.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: NAND support for Marvell Orion SoC platforms

maintainers:
  - Andrew Lunn <andrew@lunn.ch>
  - Jamie Lentin <jm@lentin.co.uk>
  - Nayab Sayed <nayabbasha.sayed@microchip.com>

description: |
  NAND support for Marvell Orion SoC platforms

  The device tree may optionally contain sub-nodes describing partitions of the
  address space. See mtd.yaml for more detail.

properties:
  compatible:
    items:
      - const: marvell,orion-nand

  reg:
    items:
      - description: Base physical address of the NAND
      - description: Length of memory mapped region

  cle:
    description: Address line number connected to CLE
    $ref: /schemas/types.yaml#/definitions/uint32
    default: 0

  ale:
    description: Address line number connected to ALE
    $ref: /schemas/types.yaml#/definitions/uint32
    default: 1

  bank-width:
    description: Width in bytes of the device
    $ref: /schemas/types.yaml#/definitions/uint32
    default: 1

  chip-delay:
    description: Chip dependent delay for transferring data from array to read registers in microseconds
    $ref: /schemas/types.yaml#/definitions/uint32

required:
  - compatible
  - reg

additionalProperties: false

examples:
  - |
    nand@f4000000 {
        #address-cells = <1>;
        #size-cells = <1>;
        cle = <0>;
        ale = <1>;
        bank-width = <1>;
        chip-delay = <25>;
        compatible = "marvell,orion-nand";
        reg = <0xf4000000 0x400>;

        partition@0 {
            label = "u-boot";
            reg = <0x0000000 0x100000>;
            read-only;
        };

        partition@100000 {
            label = "uImage";
            reg = <0x0100000 0x200000>;
        };

        partition@300000 {
            label = "dtb";
            reg = <0x0300000 0x100000>;
        };

        partition@400000 {
            label = "root";
            reg = <0x0400000 0x7d00000>;
        };
    };
