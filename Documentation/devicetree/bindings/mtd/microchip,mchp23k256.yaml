%YAML 1.2
---
$id: http://devicetree.org/schemas/mtd/microchip,mchp23k256.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Microchip 23K256 serial SRAM

maintainers:
  - Chris Packham <chris.packham@alliedtelesis.co.nz>

description: |
  MTD SPI driver for Microchip 23K256 (and similar) serial SRAM

properties:
  compatible:
    description: Supported compatible strings for this device.
    items:
      - enum:
          - microchip,mchp23k256
          - microchip,mchp23lcv1024

  reg:
    description: Chip-select number
    items:
      - description: Chip-select number

  '#address-cells':
    description: Must be present if the device has sub-nodes representing partitions.

  '#size-cells':
    description: Must be present if the device has sub-nodes representing partitions.

  spi-max-frequency:
    description: Maximum frequency of the SPI bus the chip can operate at

required:
  - compatible
  - reg

additionalProperties: false

examples:
  - |
    spi-sram@0 {
        #address-cells = <1>;
        #size-cells = <1>;
        compatible = "microchip,mchp23k256";
        reg = <0>;
        spi-max-frequency = <20000000>;
    };
