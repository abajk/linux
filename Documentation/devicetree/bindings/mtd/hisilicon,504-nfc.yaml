%YAML 1.2
---
$id: http://devicetree.org/schemas/mtd/hisilicon,504-nfc.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Hisilicon Hip04 Soc NAND controller

maintainers:
  - Kamal Dasu <kdasu.kdev@gmail.com>
  - Nayab Sayed <nayabbasha.sayed@microchip.com>
  - Zhou Wang <wangzhou1@hisilicon.com>

description: |
  Hisilicon Hip04 Soc NAND controller DT binding

  Flash chip may optionally contain additional sub-nodes describing partitions of
  the address space. See mtd.yaml for more detail.

properties:
  compatible:
    items:
      - const: hisilicon,504-nfc

  reg:
    items:
      - description: NAND controller registers
      - description: NAND controller buffer

  interrupts:
    maxItems: 1

  nand-bus-width:
    description: NAND bus width in bits
    $ref: /schemas/types.yaml#/definitions/uint32

  nand-ecc-mode:
    description: NAND ECC mode
    $ref: /schemas/types.yaml#/definitions/string
    enum:
      - none
      - hw

  nand-ecc-strength:
    description: Number of bits to correct per ECC step
    $ref: /schemas/types.yaml#/definitions/uint32

  nand-ecc-step-size:
    description: Number of data bytes covered by a single ECC step
    $ref: /schemas/types.yaml#/definitions/uint32

  '#address-cells':
    description: Partition address cell count
    const: 1

  '#size-cells':
    description: Partition size cell count
    const: 1

required:
  - compatible
  - reg
  - interrupts
  - nand-bus-width
  - nand-ecc-mode
  - '#address-cells'
  - '#size-cells'

additionalProperties: false

examples:
  - |
    nand: nand@4020000 {
        compatible = "hisilicon,504-nfc";
        reg = <0x4020000 0x10000>, <0x5000000 0x1000>;
        interrupts = <0 379 4>;
        nand-bus-width = <8>;
        nand-ecc-mode = "hw";
        nand-ecc-strength = <16>;
        nand-ecc-step-size = <1024>;
        #address-cells = <1>;
        #size-cells = <1>;

        partition@0 {
            label = "nand_text";
            reg = <0x00000000 0x00400000>;
        };

        ...
    };
