%YAML 1.2
---
$id: http://devicetree.org/schemas/mtd/nxp,lpc3220-slc.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: NXP LPC32xx SoC NAND SLC controller

maintainers:
  - Miquel Raynal <miquel.raynal@bootlin.com>
  - Roland Stigge <stigge@antcom.de>

description: |
  NXP LPC32xx SoC NAND SLC controller

  The following required properties are very controller specific. See the LPC32xx
  User Manual:

  (The following values are specified in Hz, to make them independent of actual
  clock speed:)

  Optional subnodes: Partitions, see Documentation/devicetree/bindings/mtd/mtd.yaml

properties:
  compatible:
    const: "nxp,lpc3220-slc"

  reg:
    description: Controller base address and size.

  nand-on-flash-bbt:
    description: Use bad block table on flash.
    type: boolean

  gpios:
    description: GPIO specification for NAND write protect.
    $ref: /schemas/types.yaml#/definitions/phandle-array

  nxp,wdr-clks:
    description: Delay before Ready signal is tested on write (W_RDY).
    $ref: /schemas/types.yaml#/definitions/uint32

  nxp,rdr-clks:
    description: Delay before Ready signal is tested on read (R_RDY).
    $ref: /schemas/types.yaml#/definitions/uint32

  nxp,wwidth:
    description: Write pulse width (W_WIDTH) in Hz.
    $ref: /schemas/types.yaml#/definitions/uint32

  nxp,whold:
    description: Write hold time (W_HOLD) in Hz.
    $ref: /schemas/types.yaml#/definitions/uint32

  nxp,wsetup:
    description: Write setup time (W_SETUP) in Hz.
    $ref: /schemas/types.yaml#/definitions/uint32

  nxp,rwidth:
    description: Read pulse width (R_WIDTH) in Hz.
    $ref: /schemas/types.yaml#/definitions/uint32

  nxp,rhold:
    description: Read hold time (R_HOLD) in Hz.
    $ref: /schemas/types.yaml#/definitions/uint32

  nxp,rsetup:
    description: Read setup time (R_SETUP) in Hz.
    $ref: /schemas/types.yaml#/definitions/uint32

additionalProperties: false

examples:
  - |
    slc: flash@20020000 {
      compatible = "nxp,lpc3220-slc";
      reg = <0x20020000 0x1000>;
      #address-cells = <1>;
      #size-cells = <1>;

      nxp,wdr-clks = <14>;
      nxp,wwidth = <40000000>;
      nxp,whold = <100000000>;
      nxp,wsetup = <100000000>;
      nxp,rdr-clks = <14>;
      nxp,rwidth = <40000000>;
      nxp,rhold = <66666666>;
      nxp,rsetup = <100000000>;
      nand-on-flash-bbt;
      gpios = <&gpio 5 19 1>; /* GPO_P3 19, active low */

      mtd0@00000000 {
        label = "phy3250-boot";
        reg = <0x00000000 0x00064000>;
        read-only;
      };
    };
