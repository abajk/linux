%YAML 1.2
---
$id: http://devicetree.org/schemas/m-systems,diskonchip-g3.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Sandisk/M-Systems DiskOnChip G3

maintainers:
  - Robert Jarzmik <robert.jarzmik@free.fr>

description: |
  M-Systems and Sandisk DiskOnChip devices

  The Sandisk (formerly M-Systems) docg3 is a nand device of 64M to 256MB.

properties:
  compatible:
    items:
      - enum:
          - m-systems,diskonchip-g3

  reg:
    items:
      - description: register base address
      - description: register size

required:
  - compatible
  - reg

additionalProperties: false

examples:
  - |
    docg3: flash@0 {
        compatible = "m-systems,diskonchip-g3";
        reg = <0x0 0x2000>;
    };
