%YAML 1.2
---
$id: http://devicetree.org/schemas/renesas,shmobile-flctl-sh7372.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: FLCTL NAND controller

maintainers:
  - Bastian Hecht <hechtb@googlemail.com>
  - Nayab Sayed <nayabbasha.sayed@microchip.com>

description: |
  FLCTL NAND controller

  The DMA fields are not used yet in the driver but are listed here for
  completing the bindings.

  The device tree may optionally contain sub-nodes describing partitions of the
  address space. See mtd.yaml for more detail.

properties:
  compatible:
    items:
      - const: renesas,shmobile-flctl-sh7372

  reg:
    maxItems: 1

  interrupts:
    maxItems: 1

  nand-bus-width:
    description: Bus width to NAND chip.
    $ref: /schemas/types.yaml#/definitions/uint32

  dmas:
    description: DMA specifier(s) for data and ECC transfers.

  dma-names:
    description: Name for each DMA specifier.
    items:
      - enum: [data_tx, data_rx, ecc_tx, ecc_rx]

  '#address-cells':
    description: Number of address cells for partitions.
    const: 1

  '#size-cells':
    description: Number of size cells for partitions.
    const: 1

patternProperties:
  '^[a-z0-9,._-]+@[0-9A-Za-z]+$':
    description: Partition nodes of the NAND address space.
    type: object
    additionalProperties: false
    properties:
      label:
        description: Partition label.
        $ref: /schemas/types.yaml#/definitions/string
      reg:
        description: Partition address and size.
        maxItems: 1
    required:
      - reg

required:
  - compatible
  - reg
  - interrupts
  - nand-bus-width

additionalProperties: false

examples:
  - |
    flctl@e6a30000 {
      #address-cells = <1>;
      #size-cells = <1>;
      compatible = "renesas,shmobile-flctl-sh7372";
      reg = <0xe6a30000 0x100>;
      interrupts = <0x0d80>;
      nand-bus-width = <16>;
      dmas = <&dmac 1 /* data_tx */
         &dmac 2 /* data_rx */>;
      dma-names = "data_tx", "data_rx";

      system@0 {
        label = "system";
        reg = <0x0 0x8000000>;
      };

      userdata@8000000 {
        label = "userdata";
        reg = <0x8000000 0x10000000>;
      };

      cache@18000000 {
        label = "cache";
        reg = <0x18000000 0x8000000>;
      };
    };
