%YAML 1.2
---
$id: http://devicetree.org/schemas/mtd/gpio-control-nand.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: GPIO Assisted NAND flash

maintainers:
  - Christophe Leroy <christophe.leroy@c-s.fr>
  - Gerhard Sittig <gsi@denx.de>
  - Jamie Iles <jamie@jamieiles.com>
  - Jamie Lentin <jm@lentin.co.uk>
  - Nayab Sayed <nayabbasha.sayed@microchip.com>

description: |
  GPIO assisted NAND flash

  The GPIO assisted NAND flash uses a memory mapped interface to
  read/write the NAND commands and data and GPIO pins for the control
  signals.

  The device tree may optionally contain sub-nodes describing partitions of the
  address space. See mtd.yaml for more detail.

properties:
  compatible:
    const: gpio-control-nand

  "#address-cells":
    description: Number of address cells for partition sub-nodes.
    $ref: /schemas/types.yaml#/definitions/uint32

  "#size-cells":
    description: Number of size cells for partition sub-nodes.
    $ref: /schemas/types.yaml#/definitions/uint32

  reg:
    description: Localbus chip select and size used for the chip.
    items:
      - description: localbus chip select
      - description: size

  gpios:
    description: |
      GPIO pins to control the NAND device. Order: RDY, nCE (optional), ALE, CLE, nWP (optional).
    minItems: 3
    maxItems: 5

  bank-width:
    description: Width (in bytes) of the device.
    $ref: /schemas/types.yaml#/definitions/uint32
    default: 1

  chip-delay:
    description: Chip dependent delay for transferring data from array to read registers (tR).
    $ref: /schemas/types.yaml#/definitions/uint32
    default: 20

  gpio-control-nand,io-sync-reg:
    description: 64-bit physical address for I/O sync register to guard against bus reordering.
    $ref: /schemas/types.yaml#/definitions/uint64


required:
  - compatible
  - reg
  - gpios

additionalProperties: false

examples:
  - |
    gpio-nand@1,0 {
      compatible = "gpio-control-nand";
      #address-cells = <1>;
      #size-cells = <1>;
      reg = <1 0x0000 0x2>;
      gpios = <&banka 1 0>,   /* RDY */
          <0>,        /* nCE */
          <&banka 3 0>,   /* ALE */
          <&banka 4 0>,   /* CLE */
          <0>;        /* nWP */

      partition@0 {
      };
    };
