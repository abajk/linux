%YAML 1.2
---
$id: http://devicetree.org/schemas/ibm,ndfc.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: AMCC NDFC (NanD Flash Controller)

maintainers:
  - Rob Herring <robh@kernel.org>

description: |
  AMCC NDFC (NanD Flash Controller)

  Notes:
  - partition(s) - follows the OF MTD standard for partitions

properties:
  compatible:
    const: ibm,ndfc

  reg:
    description: specify chip select and size used for the chip
    items:
      - description: chip select
      - description: size of the chip

  ccr:
    description: NDFC config and control register value
    $ref: /schemas/types.yaml#/definitions/uint32
    default: 0

  bank-settings:
    description: NDFC bank configuration register value
    $ref: /schemas/types.yaml#/definitions/uint32
    default: 0

  "#address-cells":
    description: number of address cells for child nodes
    const: 1

  "#size-cells":
    description: number of size cells for child nodes
    const: 1

  nand:
    description: NAND flash subnode
    type: object
    additionalProperties: false
    properties:
      "#address-cells":
        description: number of address cells for partitions
        const: 1
      "#size-cells":
        description: number of size cells for partitions
        const: 1
    patternProperties:
      "^partition@.*":
        description: MTD partition child nodes
        type: object
        additionalProperties: false
        properties:
          label:
            description: partition label
            $ref: /schemas/types.yaml#/definitions/string
          reg:
            description: partition offset and size
            items:
              - description: offset address
              - description: size of partition
        required:
          - label
          - reg

required:
  - compatible
  - reg

additionalProperties: false

examples:
  - |
    ndfc@1,0 {
        compatible = "ibm,ndfc";
        reg = <0x00000001 0x00000000 0x00002000>;
        ccr = <0x00001000>;
        bank-settings = <0x80002222>;
        #address-cells = <1>;
        #size-cells = <1>;
        nand {
            #address-cells = <1>;
            #size-cells = <1>;
            partition@0 {
                label = "kernel";
                reg = <0x00000000 0x00200000>;
            };
            partition@200000 {
                label = "root";
                reg = <0x00200000 0x03E00000>;
            };
        };
    };
