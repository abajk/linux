%YAML 1.2
---
$id: http://devicetree.org/schemas/mtd/nxp,lpc3220-mlc.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: NXP LPC32xx SoC NAND MLC controller

maintainers:
  - Miquel Raynal <miquel.raynal@bootlin.com>
  - Rob Herring <robh@kernel.org>
  - Roland Stigge <stigge@antcom.de>

description: |
  NXP LPC32xx SoC NAND MLC controller

  The following required properties are very controller specific. See the LPC32xx
  User Manual 7.5.14 MLC NAND Timing Register (the values here are specified in
  Hz, to make them independent of actual clock speed and to provide for good
  accuracy:)

properties:
  compatible:
    enum:
      - nxp,lpc3220-mlc

  reg:
    items:
      - description: Address and size of the controller

  interrupts:
    items:
      - description: NAND interrupt specification

  '#address-cells':
    description: Number of address cells for child partitions
    const: 1

  '#size-cells':
    description: Number of size cells for child partitions
    const: 1

  nxp,tcea-delay:
    description: TCEA_DELAY timing parameter in Hz
    $ref: /schemas/types.yaml#/definitions/uint32

  nxp,busy-delay:
    description: BUSY_DELAY timing parameter in Hz
    $ref: /schemas/types.yaml#/definitions/uint32

  nxp,nand-ta:
    description: NAND_TA timing parameter in Hz
    $ref: /schemas/types.yaml#/definitions/uint32

  nxp,rd-high:
    description: RD_HIGH timing parameter in Hz
    $ref: /schemas/types.yaml#/definitions/uint32

  nxp,rd-low:
    description: RD_LOW timing parameter in Hz
    $ref: /schemas/types.yaml#/definitions/uint32

  nxp,wr-high:
    description: WR_HIGH timing parameter in Hz
    $ref: /schemas/types.yaml#/definitions/uint32

  nxp,wr-low:
    description: WR_LOW timing parameter in Hz
    $ref: /schemas/types.yaml#/definitions/uint32

  gpios:
    description: GPIO specification for NAND write protect
    $ref: /schemas/types.yaml#/definitions/phandle-array

patternProperties:
  '^mtd[0-9]+@[^ ]+$':
    description: Partition subnode
    $ref: /schemas/mtd/mtd.yaml

additionalProperties: false

required:
  - compatible
  - reg
  - interrupts
  - gpios

examples:
  - |
    mlc: flash@200a8000 {
        compatible = "nxp,lpc3220-mlc";
        reg = <0x200A8000 0x11000>;
        interrupts = <11 0>;
        #address-cells = <1>;
        #size-cells = <1>;

        nxp,tcea-delay = <333333333>;
        nxp,busy-delay = <10000000>;
        nxp,nand-ta = <18181818>;
        nxp,rd-high = <31250000>;
        nxp,rd-low = <45454545>;
        nxp,wr-high = <40000000>;
        nxp,wr-low = <83333333>;
        gpios = <&gpio 5 19 1>; /* GPO_P3 19, active low */

        mtd0@00000000 {
            label = "boot";
            reg = <0x00000000 0x00064000>;
            read-only;
        };

        ...
    };
