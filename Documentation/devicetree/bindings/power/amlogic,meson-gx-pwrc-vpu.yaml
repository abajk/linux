%YAML 1.2
---
$id: http://devicetree.org/schemas/power/amlogic,meson-gx-pwrc-vpu.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Amlogic Meson Power Controller VPU Power Domain

maintainers:
  - Krzysztof Kozlowski <krzk@kernel.org>
  - Neil Armstrong <neil.armstrong@linaro.org>

description: |
  Amlogic Meson Power Controller (deprecated)

  The Amlogic Meson SoCs embeds an internal Power domain controller.

  VPU Power Domain

  The Video Processing Unit power domain is controlled by this power controller,
  but the domain requires some external resources to meet the correct power
  sequences. The bindings must respect the power domain bindings as described
  in the file power-domain.yaml

properties:
  compatible:
    description: Device compatibility strings.
    oneOf:
      - items:
          - const: amlogic,meson-gx-pwrc-vpu
          - const: amlogic,meson-g12a-pwrc-vpu

  '#power-domain-cells':
    description: Number of power-domain cells.
    const: 0

  amlogic,hhi-sysctrl:
    description: Phandle to the HHI sysctrl node.
    $ref: /schemas/types.yaml#/definitions/phandle

  resets:
    description: >
      Phandles to the reset lines needed for this power domain sequence as
      described in ../reset/reset.yaml
    items:
      - $ref: /schemas/types.yaml#/definitions/phandle
        description: RESET_VIU
      - $ref: /schemas/types.yaml#/definitions/phandle
        description: RESET_VENC
      - $ref: /schemas/types.yaml#/definitions/phandle
        description: RESET_VCBUS
      - $ref: /schemas/types.yaml#/definitions/phandle
        description: RESET_BT656
      - $ref: /schemas/types.yaml#/definitions/phandle
        description: RESET_DVIN_RESET
      - $ref: /schemas/types.yaml#/definitions/phandle
        description: RESET_RDMA
      - $ref: /schemas/types.yaml#/definitions/phandle
        description: RESET_VENCI
      - $ref: /schemas/types.yaml#/definitions/phandle
        description: RESET_VENCP
      - $ref: /schemas/types.yaml#/definitions/phandle
        description: RESET_VDAC
      - $ref: /schemas/types.yaml#/definitions/phandle
        description: RESET_VDI6
      - $ref: /schemas/types.yaml#/definitions/phandle
        description: RESET_VENCL
      - $ref: /schemas/types.yaml#/definitions/phandle
        description: RESET_VID_LOCK

  clocks:
    description: Clocks for the VPU and VAPB domains.
    items:
      - $ref: /schemas/types.yaml#/definitions/phandle
        description: VPU clock
      - $ref: /schemas/types.yaml#/definitions/phandle
        description: VAPB clock

  clock-names:
    description: Names for the VPU and VAPB clocks.
    items:
      - const: vpu
      - const: vapb

required:
  - compatible
  - '#power-domain-cells'
  - amlogic,hhi-sysctrl
  - resets
  - clocks
  - clock-names

additionalProperties: false

examples:
  - |
    ao_sysctrl: sys-ctrl@0 {
        compatible = "amlogic,meson-gx-ao-sysctrl", "syscon", "simple-mfd";
        reg =  <0x0 0x0 0x0 0x100>;

        pwrc_vpu: power-controller-vpu {
            compatible = "amlogic,meson-gx-pwrc-vpu";
            #power-domain-cells = <0>;
            amlogic,hhi-sysctrl = <&sysctrl>;
            resets = <&reset RESET_VIU>,
                     <&reset RESET_VENC>,
                     <&reset RESET_VCBUS>,
                     <&reset RESET_BT656>,
                     <&reset RESET_DVIN_RESET>,
                     <&reset RESET_RDMA>,
                     <&reset RESET_VENCI>,
                     <&reset RESET_VENCP>,
                     <&reset RESET_VDAC>,
                     <&reset RESET_VDI6>,
                     <&reset RESET_VENCL>,
                     <&reset RESET_VID_LOCK>;
            clocks = <&clkc CLKID_VPU>,
                     <&clkc CLKID_VAPB>;
            clock-names = "vpu", "vapb";
        };
    };
