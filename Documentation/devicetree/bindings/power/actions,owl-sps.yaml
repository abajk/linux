%YAML 1.2
---
$id: http://devicetree.org/schemas/power/actions,owl-sps.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Actions Semi Owl Smart Power System (SPS)

maintainers:
  - Andreas Färber <afaerber@suse.de>
  - Manivannan Sadhasivam <manivannan.sadhasivam@linaro.org>

description: |
  Actions Semi Owl Smart Power System (SPS)

properties:
  compatible:
    description: >
      Device compatible string. Should be one of:
      actions, s500-sps (S500), actions, s700-sps (S700), actions, s900-sps (S900).
    items:
      - enum: ["actions,s500-sps", "actions,s700-sps", "actions,s900-sps"]

  reg:
    description: Register base address and size.
    items:
      - description: Register base address.
      - description: Register length.

  '#power-domain-cells':
    description: >
      Number of power-domain cells for the device. Must be 1.
    const: 1

required:
  - compatible
  - reg
  - '#power-domain-cells'

additionalProperties: false

examples:
  - |
    sps: power-controller@b01b0100 {
        compatible = "actions,s500-sps";
        reg = <0xb01b0100 0x100>;
        #power-domain-cells = <1>;
    };
