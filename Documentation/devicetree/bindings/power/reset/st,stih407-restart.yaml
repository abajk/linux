%YAML 1.2
---
$id: http://devicetree.org/schemas/power/reset/st,stih407-restart.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: ST SW reset controller for STIH407

maintainers:
  - Lee Jones <lee@kernel.org>
  - Peter Griffin <peter.griffin@linaro.org>
  - Rob Herring <robh@kernel.org>

description: |
  *Device-Tree bindings for ST SW reset functionality

properties:
  compatible:
    items:
      - const: st,stih407-restart
    description: ST SW reset controller compatible string.
  st,syscfg:
    description: Phandle to the ST syscfg register block controlling resets.
    $ref: /schemas/types.yaml#/definitions/phandle

required:
  - compatible
  - st,syscfg

additionalProperties: false

examples:
  - |
    restart {
      compatible = "st,stih407-restart";
      st,syscfg = <&syscfg_sbc_reg>;
    };
