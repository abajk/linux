%YAML 1.2
---
$id: http://devicetree.org/schemas/power/reset/ti,keystone-reset.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: TI Keystone Reset Controller

maintainers:
  - Ivan Khoronzhuk <ivan.khoronzhuk@ti.com>
  - Marco Franchi <marco.franchi@nxp.com>

description: |
  * Device tree bindings for Texas Instruments keystone reset

  This node is intended to allow SoC reset in case of software reset
  of selected watchdogs.

  The Keystone SoCs can contain up to 4 watchdog timers to reset
  SoC. Each watchdog timer event input is connected to the Reset Mux
  block. The Reset Mux block can be configured to cause reset or not.

  Additionally soft or hard reset can be configured.

properties:
  compatible:
    description: Must be "ti,keystone-reset".
    items:
      - const: ti,keystone-reset

  ti,soft-reset:
    description: Boolean option indicating soft reset; if absent hard reset is used.
    type: boolean

  ti,syscon-dev:
    description: Phandle and offset pair for device state control registers.
    items:
      - $ref: /schemas/types.yaml#/definitions/phandle
      - type: integer

  ti,syscon-pll:
    description: Phandle and offset pair for PLL controller registers.
    items:
      - $ref: /schemas/types.yaml#/definitions/phandle
      - type: integer

  ti,wdt-list:
    description: List of watchdog timers that can trigger SoC reset.
    $ref: /schemas/types.yaml#/definitions/uint32-array
    items:
      minimum: 0
      maximum: 3

required:
  - compatible
  - ti,syscon-pll
  - ti,syscon-dev

additionalProperties: false

examples:
  - |
    pllctrl: pll-controller@2310000 {
      compatible = "ti,keystone-pllctrl", "syscon";
      reg = <0x02310000 0x200>;
    };

    devctrl: device-state-control@2620000 {
      compatible = "ti,keystone-devctrl", "syscon";
      reg = <0x02620000 0x1000>;
    };

    rstctrl: reset-controller {
      compatible = "ti,keystone-reset";
      ti,syscon-pll = <&pllctrl 0xe4>;
      ti,syscon-dev = <&devctrl 0x328>;
      ti,wdt-list = <0>;
    };

  - |
    rstctrl: reset-controller {
      compatible = "ti,keystone-reset";
      ti,syscon-pll = <&pllctrl 0xe4>;
      ti,syscon-dev = <&devctrl 0x328>;
      ti,wdt-list = <0>, <2>;
      ti,soft-reset;
    };
