%YAML 1.2
---
$id: http://devicetree.org/schemas/iio/adc/xlnx,zynq-xadc-1.00.a.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Xilinx XADC and System Monitor controller
maintainers:
  - Lars-Peter Clausen <lars@metafoo.de>
  - Masanari Iida <standby24x7@gmail.com>
  - Rob Herring <robh@kernel.org>

description: |
  Xilinx XADC device driver

  This binding document describes the bindings for the Xilinx 7 Series XADC as well
  as the UltraScale/UltraScale+ System Monitor.

  The Xilinx XADC is an ADC that can be found in the Series 7 FPGAs from Xilinx.
  The XADC has a DRP interface for communication. Currently two different
  frontends for the DRP interface exist. One that is only available on the ZYNQ
  family as a hardmacro in the SoC portion of the ZYNQ. The other one is available
  on all series 7 platforms and is a softmacro with a AXI interface. This binding
  document describes the bindings for both of them since the bindings are very
  similar.

properties:
  compatible:
    description: List of compatible strings.
    items:
      - enum:
          - "xlnx,zynq-xadc-1.00.a"
          - "xlnx,axi-xadc-1.00.a"
          - "xlnx,system-management-wiz-1.3"
  reg:
    maxItems: 1

  interrupts:
    maxItems: 1

  clocks:
    description: Clock that provides the AXI or PCAP interface clock.
    maxItems: 1

  xlnx,external-mux:
    description: External multiplexer mode.
    $ref: /schemas/types.yaml#/definitions/string
    enum:
      - none
      - single
      - dual
  xlnx,external-mux-channel:
    description: Channel selection for external multiplexer mode.
    $ref: /schemas/types.yaml#/definitions/uint32
  channels:
    description: Configuration of external ADC channels.
    type: object
    additionalProperties: false
    properties:
      '#address-cells':
        const: 1
      '#size-cells':
        const: 0
    patternProperties:
      "^channel@\\d+$":
        description: Channel node configuration.
        type: object
        additionalProperties: false
        properties:
          reg:
            description: Channel number.
            maxItems: 1
          xlnx,bipolar:
            description: Use bipolar mode.
            type: boolean
        required:
          - reg

required:
  - compatible
  - reg
  - interrupts
  - clocks

additionalProperties: false

examples:
  - |
    xadc@f8007100 {
        compatible = "xlnx,zynq-xadc-1.00.a";
        reg = <0xf8007100 0x20>;
        interrupts = <0 7 4>;
        clocks = <&pcap_clk>;
        channels {
            #address-cells = <1>;
            #size-cells = <0>;
            channel@0 {
                reg = <0>;
            };
        };
    };
  - |
    xadc@43200000 {
        compatible = "xlnx,axi-xadc-1.00.a";
        reg = <0x43200000 0x1000>;
        interrupts = <0 53 4>;
        clocks = <&fpga1_clk>;
        channels {
            #address-cells = <1>;
            #size-cells = <0>;
            channel@0 {
                reg = <0>;
                xlnx,bipolar;
            };
        };
    };
  - |
    adc@80000000 {
        compatible = "xlnx,system-management-wiz-1.3";
        reg = <0x80000000 0x1000>;
        interrupts = <0 81 4>;
        clocks = <&fpga1_clk>;
        channels {
            #address-cells = <1>;
            #size-cells = <0>;
            channel@0 {
                reg = <0>;
                xlnx,bipolar;
            };
        };
    };
