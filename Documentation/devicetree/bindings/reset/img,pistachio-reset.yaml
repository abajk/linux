%YAML 1.2
---
$id: http://devicetree.org/schemas/reset/img,pistachio-reset.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Pistachio Reset Controller

maintainers:
  - Damien Horsley <Damien.Horsley@imgtec.com>

description: |
  This binding describes a reset controller device that is used to enable and
  disable individual IP blocks within the Pistachio SoC using "soft reset"
  control bits found in the Pistachio SoC top level registers.

  The actual action taken when soft reset is asserted is hardware dependent.
  However, when asserted it may not be possible to access the hardware's
  registers, and following an assert/deassert sequence the hardware's previous
  state may no longer be valid.

  Please refer to Documentation/devicetree/bindings/reset/reset.txt
  for common reset controller binding usage.

properties:
  compatible:
    description: Identifies this node as a Pistachio reset controller.
    items:
      - enum: [img, pistachio-reset]

  '#reset-cells':
    description: Number of cells in a reset specifier.
    const: 1

  reset-controller: true

required:
  - compatible
  - '#reset-cells'

additionalProperties: false

examples:
  - |
    pistachio_reset: reset-controller {
      compatible = "img,pistachio-reset";
      #reset-cells = <1>;
    };
