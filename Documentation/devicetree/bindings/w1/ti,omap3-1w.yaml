%YAML 1.2
---
$id: http://devicetree.org/schemas/w1/ti,omap3-1w.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: OMAP HDQ One wire bus master controller

maintainers:
  - NeilBrown <neilb@suse.de>
  - Vignesh R <vigneshr@ti.com>

description: |
  * OMAP HDQ One wire bus master controller

properties:
  compatible:
    description: Device compatibility string.
    items:
      - enum: ["ti,omap3-1w", "ti,am4372-hdq"]

  reg:
    description: Register region location and size.
    items:
      - description: Base address
      - description: Register region size

  interrupts:
    description: Interrupt line for HDQ transactions.
    items:
      - description: Interrupt number

  ti,hwmods:
    description: Hardware module name for the HDQ controller.
    $ref: /schemas/types.yaml#/definitions/string-array
    items:
      - const: hdq1w

  ti,mode:
    description: Operation mode of the controller.
    enum: [hdq, 1w]

additionalProperties: false

examples:
  - |
      hdqw1w: 1w@480b2000 {
          compatible = "ti,omap3-1w";
          reg = <0x480b2000 0x1000>;
          interrupts = <58>;
          ti,hwmods = "hdq1w";
          ti,mode = "hdq";
      };
