%YAML 1.2
---
$id: http://devicetree.org/schemas/w1/w1-gpio.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Generic one-wire bus controller (w1-gpio)

maintainers:
  - Daniel Mack <daniel@zonque.org>

description: |
  Generic devicetree bindings for onewire (w1) busses

  Onewire busses are described through nodes of their master bus controller.
  Slave devices are listed as sub-nodes of such master devices. For now, only
  one slave is allowed per bus master.

properties:
  compatible:
    # Single compatible string identifying the bus controller driver
    items:
      - enum:
          - w1-gpio

  gpios:
    description: GPIOs used to bit-bang the 1-Wire bus
    $ref: /schemas/types.yaml#/definitions/phandle-array

patternProperties:
  ".*":
    description: Slave device sub-nodes on the 1-Wire bus
    type: object
    additionalProperties: false
    properties:
      compatible:
        items:
          - enum:
              - maxim,ds2760
      power-supplies:
        description: Power supply phandles for the slave device
        $ref: /schemas/types.yaml#/definitions/phandle-array
    required:
      - compatible

additionalProperties: false

examples:
  - |
    charger: charger {
      compatible = "gpio-charger";
      charger-type = "mains";
      gpios = <&gpio 1 GPIO_ACTIVE_LOW>;
    };

    onewire {
      compatible = "w1-gpio";
      gpios = <&gpio 100 0>, <&gpio 101 0>;

      battery {
        compatible = "maxim,ds2760";
        power-supplies = <&charger>;
      };
    };
