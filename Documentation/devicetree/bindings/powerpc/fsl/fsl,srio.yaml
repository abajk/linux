%YAML 1.2
---
$id: http://devicetree.org/schemas/powerpc/fsl/fsl,srio.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Freescale Serial RapidIO (SRIO) Controller

maintainers:
  - Liu Gang <Gang.Liu@freescale.com>
  - Masanari Iida <standby24x7@gmail.com>

properties:
  compatible:
    description: >
      Must include "fsl,srio" for IP blocks with IP Block Revision Register
      (SRIO IPBRR1) Major ID equal to 0x01c0. Optionally, a compatible string
      of "fsl,srio-vX.Y" where X is Major version and Y is Minor version.
    oneOf:
      - items:
          - pattern: '^fsl,srio-v[0-9]+\.[0-9]+$'
          - const: fsl,srio
      - items:
          - const: fsl,srio

  reg:
    maxItems: 1

  interrupts:
    maxItems: 1

  fsl,srio-rmu-handle:
    description:
      A single phandle value that points to the RMU, required if the RMU node is
      defined.
    $ref: /schemas/types.yaml#/definitions/phandle

  "#address-cells":
    const: 2

  "#size-cells":
    const: 2

  ranges: true

patternProperties:
  "^port[0-9]+$":
    type: object
    description: SRIO port child node
    additionalProperties: false

    properties:
      cell-index:
        description: Matches the port id
        $ref: /schemas/types.yaml#/definitions/uint32

      "#address-cells":
        const: 2

      "#size-cells":
        const: 2

      fsl,liodn:
        description: >
          The logical I/O device number for the PAMU (IOMMU) to be correctly
          configured for SRIO accesses.
        $ref: /schemas/types.yaml#/definitions/uint32

      ranges:
        description: Memory mapped IO space utilized by this port

    required:
      - cell-index
      - "#address-cells"
      - "#size-cells"

additionalProperties: false

examples:
  - |
    rapidio: rapidio@ffe0c0000 {
      #address-cells = <2>;
      #size-cells = <2>;
      reg = <0xf 0xfe0c0000 0 0x11000>;
      compatible = "fsl,srio";
      interrupts = <16 2 1 11>;
      fsl,srio-rmu-handle = <&rmu>;
      ranges;

      port1 {
        cell-index = <1>;
        #address-cells = <2>;
        #size-cells = <2>;
        fsl,liodn = <34>;
        ranges = <0 0 0xc 0x20000000 0 0x10000000>;
      };

      port2 {
        cell-index = <2>;
        #address-cells = <2>;
        #size-cells = <2>;
        fsl,liodn = <48>;
        ranges = <0 0 0xc 0x30000000 0 0x10000000>;
      };
    };
