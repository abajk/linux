%YAML 1.2
---
$id: http://devicetree.org/schemas/powerpc/fsl/fsl,mcm.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Freescale MPX LAW & Coherency Module

maintainers:
  - Grant Likely <grant.likely@secretlab.ca>
  - Rob Herring <robh@kernel.org>

description: |
  =====================================================================
  MPX LAW & Coherency Module Device Tree Binding
  Copyright (C) 2009 Freescale Semiconductor Inc.
  =====================================================================

  Local Access Window (LAW) Node

  The LAW node represents the region of CCSR space where local access
  windows are configured.  For MCM based devices this is the first 4k
  of CCSR space that includes CCSRBAR, ALTCBAR, ALTCAR, BPTR, and some
  number of local access windows as specified by fsl,num-laws.

  MPX Coherency Module Node

  The MPX LAW node represents the region of CCSR space where MCM config
  and error reporting registers exist, this is the second 4k (0x1000)
  of CCSR space.

properties:
  compatible:
    description: Device compatibility strings
    oneOf:
      - items:
          - const: fsl,mcm-law
      - items:
          - pattern: ^fsl,[a-z0-9]+-mcm$
          - const: fsl,mcm
  reg:
    maxItems: 1

  fsl,num-laws:
    description: Number of local access windows for this device
    $ref: /schemas/types.yaml#/definitions/uint32

  interrupts:
    maxItems: 1

additionalProperties: false

allOf:
  - if:
      properties:
        compatible:
          contains:
            const: fsl,mcm-law
    then:
      required:
        - fsl,num-laws
    else:
      properties:
        fsl,num-laws: false
  - if:
      properties:
        compatible:
          contains:
            const: fsl,mcm
    then:
      required:
        - interrupts
    else:
      properties:
        interrupts: false
