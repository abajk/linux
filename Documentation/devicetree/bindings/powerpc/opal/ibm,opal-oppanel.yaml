%YAML 1.2
---
$id: http://devicetree.org/schemas/powerpc/opal/ibm,opal-oppanel.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: IBM OPAL Operator Panel

maintainers:
  - Suraj Jitindar Singh <sjitindarsingh@gmail.com>

description: |
  IBM OPAL Operator Panel Binding
  -------------------------------

properties:
  compatible:
    items:
      - const: ibm,opal-oppanel

  '#lines':
    description: Number of lines on the operator panel.

  '#length':
    description: Number of characters per line of the operator panel.

required:
  - compatible
  - '#lines'
  - '#length'

additionalProperties: false

examples:
  - |
    oppanel {
      compatible = "ibm,opal-oppanel";
      #lines = <0x2>;
      #length = <0x10>;
    };
