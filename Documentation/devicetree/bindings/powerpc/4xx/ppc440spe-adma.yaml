---
$schema: http://devicetree.org/meta-schemas/core.yaml#
$id: http://devicetree.org/schemas/powerpc/4xx/ppc440spe-adma.yaml#
title: PPC440SPe DMA/XOR (DMA Controller and XOR Accelerator)
maintainers:
  - Grant Likely <grant.likely@secretlab.ca>
  - Rob Herring <robh@kernel.org>
description: |
  Device nodes needed for operation of the ppc440spe-adma driver
  are specified hereby. These are I2O/DMA, DMA and XOR nodes
  for DMA engines and Memory Queue Module node. The latter is used
  by ADMA driver for configuration of RAID-6 H/W capabilities of
  the PPC440SPe. In addition to the nodes and properties described
  below, the ranges property of PLB node must specify ranges for
  DMA devices.

properties:
  compatible:
    items:
      - enum:
          - ibm,i2o-440spe
          - ibm,dma-440spe
          - amcc,xor-accelerator
          - ibm,mq-440spe

  reg:
    maxItems: 1

  dcr-reg:
    $ref: /schemas/types.yaml#/definitions/uint32-array
    minItems: 2
    maxItems: 2
    description: DCR register base address and size.

  cell-index:
    $ref: /schemas/types.yaml#/definitions/uint32
    description: Hardware index of the DMA engine.

  interrupts:
    items:
      - description: FIFO needs service interrupt.
      - description: DMA error interrupt.

  '#interrupt-cells':
    const: 1

  '#address-cells':
    const: 0

  '#size-cells':
    const: 0

  interrupt-map: true

required:
  - compatible
  - reg
  - interrupts

additionalProperties: false

examples:
  - |
    i2o@400100000 {
        compatible = "ibm,i2o-440spe";
        reg = <0x00000004 0x00100000 0x100>;
        dcr-reg = <0x060 0x020>;
    };
  - |
    dma0@400100100 {
        compatible = "ibm,dma-440spe";
        cell-index = <0>;
        reg = <0x00000004 0x00100100 0x100>;
        dcr-reg = <0x060 0x020>;
        interrupts = <0 1>;
        #interrupt-cells = <1>;
        #address-cells = <0>;
        #size-cells = <0>;
        interrupt-map = <
            0 &UIC0 0x14 4
            1 &UIC1 0x16 4>;
    };
  - |
    xor-accel@400200000 {
        compatible = "amcc,xor-accelerator";
        reg = <0x00000004 0x00200000 0x400>;
        interrupts = <0x1f 4>;
    };
  - |
    mq {
        compatible = "ibm,mq-440spe";
        dcr-reg = <0x040 0x020>;
    };
