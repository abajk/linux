%YAML 1.2
---
$id: http://devicetree.org/schemas/hwmon/zyxel,nsa320-mcu.yaml#
# $schema is the meta‐schema this schema should be validated with.
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Zyxel NSA320 MCU fan and temperature monitor

maintainers:
  - Adam Baker <linux@baker-net.org.uk>

description: |
  Bindings for the fan / temperature monitor microcontroller used on
  the Zyxel NSA 320 and several subsequent models.

properties:
  compatible:
    items:
      - const: zyxel,nsa320-mcu
  pinctrl-0:
    description: Pin multiplexing configuration for the MCU data, clock, and active lines.
    $ref: /schemas/types.yaml#/definitions/phandle-array
  pinctrl-names:
    description: Names for the pin control states.
    $ref: /schemas/types.yaml#/definitions/string-array
    items:
      - const: default
  act-gpios:
    description: The GPIO pin connected to the active line on the MCU
  clk-gpios:
    description: The GPIO pin connected to the clock line on the MCU
  data-gpios:
    description: The GPIO pin connected to the data line on the MCU

required:
  - compatible
  - pinctrl-0
  - pinctrl-names
  - act-gpios
  - clk-gpios
  - data-gpios

additionalProperties: false

examples:
  - |
    hwmon {
        compatible = "zyxel,nsa320-mcu";
        pinctrl-0 = <&pmx_mcu_data &pmx_mcu_clk &pmx_mcu_act>;
        pinctrl-names = "default";

        data-gpios = <&gpio0 14 GPIO_ACTIVE_HIGH>;
        clk-gpios = <&gpio0 16 GPIO_ACTIVE_HIGH>;
        act-gpios = <&gpio0 17 GPIO_ACTIVE_LOW>;
    };
