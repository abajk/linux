%YAML 1.2
---
$id: http://devicetree.org/schemas/hwmon/apm-xgene-slimpro-hwmon.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: APM X-Gene SLIMpro hwmon driver

maintainers:
  - hotran <hotran@apm.com>

description: |
  APM X-Gene hwmon driver

  APM X-Gene SOC sensors are accessed over the "SLIMpro" mailbox.

properties:
  compatible:
    items:
      - const: apm,xgene-slimpro-hwmon

  mboxes:
    description: |
      Use the label reference for the mailbox as the first parameter.
      The second parameter is the channel number.
    $ref: /schemas/types.yaml#/definitions/phandle-array

required:
  - compatible
  - mboxes

additionalProperties: false

examples:
  - |
    hwmonslimpro {
        compatible = "apm,xgene-slimpro-hwmon";
        mboxes = <&mailbox 7>;
    };
