%YAML 1.2
---
$id: http://devicetree.org/schemas/hwmon/vexpress.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Versatile Express hwmon sensors

maintainers:
  - Mauro Carvalho Chehab <mchehab@kernel.org>
  - Pawel Moll <pawel.moll@arm.com>

description: |
  Versatile Express hardware monitoring sensors.
  Requires a compatible value of one of:
    "arm,vexpress-volt",
    "arm,vexpress-amp",
    "arm,vexpress-temp",
    "arm,vexpress-power",
    "arm,vexpress-energy".
  When controlled via vexpress-sysreg, the "arm,vexpress-sysreg,func" property
  specifies the system register function to monitor.
  The label property can be used to describe the monitored value.

properties:
  compatible:
    description: Sensor type.
    items:
      - enum:
          - arm,vexpress-volt
          - arm,vexpress-amp
          - arm,vexpress-temp
          - arm,vexpress-power
          - arm,vexpress-energy

  arm,vexpress-sysreg,func:
    description: System register function specifier for monitoring via vexpress-sysreg.
    $ref: /schemas/types.yaml#/definitions/phandle-array
    items:
      - description: phandle to the vexpress-sysreg controller
      - description: function identifier

  label:
    description: Descriptive string for the monitored value.
    $ref: /schemas/types.yaml#/definitions/string

required:
  - compatible

additionalProperties: false

examples:
  - |
    energy@0 {
      compatible = "arm,vexpress-energy";
      arm,vexpress-sysreg,func = <13 0>;
      label = "A15 Jcore";
    };
