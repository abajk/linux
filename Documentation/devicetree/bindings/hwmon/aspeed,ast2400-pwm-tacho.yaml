%YAML 1.2
---
$id: http://devicetree.org/schemas/aspeed,ast2400-pwm-tacho.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: ASPEED AST2400/AST2500 PWM and Fan Tacho controller
maintainers:
  - Bjorn Helgaas <bhelgaas@google.com>
  - Jaghathiswari Rankappagounder Natarajan <jaghu@google.com>
  - Joel <joel@jms.id.au>
  - Mykola Kostenok <c_mykolak@mellanox.com>

description: |
  ASPEED AST2400/AST2500 PWM and Fan Tacho controller device driver

  The ASPEED PWM controller can support upto 8 PWM outputs. The ASPEED Fan Tacho
  controller can support upto 16 Fan tachometer inputs.

  There can be upto 8 fans supported. Each fan can have one PWM output and
  one/two Fan tach inputs.

properties:
  compatible:
    oneOf:
      - items:
          - const: aspeed,ast2400-pwm-tacho
      - items:
          - const: aspeed,ast2500-pwm-tacho

  # Bus access
  reg:
    items:
      - description: Register block base address
      - description: Register block size

  # Cell counts
  '#address-cells':
    const: 1
  '#size-cells':
    const: 1
  '#cooling-cells':
    const: 2

  # Pin control
  pinctrl-names:
    items:
      - const: default
  pinctrl-0: true

  # Clocks
  clocks:
    description: Clock provider phandle and clock specifier
    items:
      - description: Clock provider phandle
      - description: Clock number

  # Resets
  resets:
    description: Reset controller phandle and reset specifier
    items:
      - description: Reset controller phandle
      - description: Reset number

patternProperties:
  '^fan@.*$':
    description: Fan subnode
    type: object
    additionalProperties: false
    properties:
      reg:
        description: PWM source port index (0 = PWM A, ..., 7 = PWM H)
        items:
          - minimum: 0
            maximum: 7
      cooling-levels:
        description: PWM duty cycle values for cooling states (0–255)
        $ref: /schemas/types.yaml#/definitions/uint32-array
        items:
          minimum: 0
          maximum: 255
      'aspeed,fan-tach-ch':
        description: Fan tachometer input channel numbers (0–15)
        $ref: /schemas/types.yaml#/definitions/uint32-array
        minItems: 1
        items:
          minimum: 0
          maximum: 15
    required:
      - reg
      - aspeed,fan-tach-ch

required:
  - compatible
  - reg
  - '#address-cells'
  - '#size-cells'
  - '#cooling-cells'
  - pinctrl-names
  - pinctrl-0
  - clocks
  - resets

additionalProperties: false

examples:
  - |
    pwm_tacho: pwmtachocontroller@1e786000 {
        #address-cells = <1>;
        #size-cells = <1>;
        #cooling-cells = <2>;
        reg = <0x1E786000 0x1000>;
        compatible = "aspeed,ast2500-pwm-tacho";
        clocks = <&syscon ASPEED_CLK_APB>;
        resets = <&syscon ASPEED_RESET_PWM>;
        pinctrl-names = "default";
        pinctrl-0 = <&pinctrl_pwm0_default &pinctrl_pwm1_default>;

        fan@0 {
            reg = <0x00>;
            cooling-levels = /bits/ 8 <125 151 177 203 229 255>;
            aspeed,fan-tach-ch = /bits/ 8 <0x00>;
        };

        fan@1 {
            reg = <0x01>;
            aspeed,fan-tach-ch = /bits/ 8 <0x01 0x02>;
        };
    };
