%YAML 1.2
---
$id: http://devicetree.org/schemas/nuvoton,npcm750-pwm-fan.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Nuvoton NPCM PWM and Fan Tacho controller
maintainers:
  - Bjorn Helgaas <bhelgaas@google.com>
  - Tomer Maimon <tmaimon77@gmail.com>

description: |
  Nuvoton NPCM PWM and Fan Tacho controller device

  The Nuvoton BMC NPCM7XX supports 8 Pulse-width modulation (PWM)
  controller outputs and 16 Fan tachometer controller inputs.

  The Nuvoton BMC NPCM8XX supports 12 Pulse-width modulation (PWM)
  controller outputs and 16 Fan tachometer controller inputs.

properties:
  compatible:
    description: Device compatible string.
    items:
      - enum:
          - nuvoton,npcm750-pwm-fan
          - nuvoton,npcm845-pwm-fan

  '#address-cells':
    description: Must be 1.
    const: 1

  '#size-cells':
    description: Must be 0.
    const: 0

  reg:
    items:
      - description: PWM controller registers (address and size).
      - description: Fan controller registers (address and size).

  reg-names:
    description: Names for reg entries.
    items:
      - const: pwm
      - const: fan

  clocks:
    items:
      - description: PWM controller clock.
      - description: Fan controller clock.

  clock-names:
    items:
      - const: pwm
      - const: fan

  interrupts:
    description: Fan tachometer interrupts with falling-edge flags.
    minItems: 1

patternProperties:
  '^fan@[0-9]+$':
    type: object
    description: Fan subnode describing PWM channel and tachometer channel(s).
    properties:
      reg:
        description: PWM output channel number (0–7).
        minimum: 0
        maximum: 7

      fan-tach-ch:
        description: Fan tachometer channel number(s) (0–15).
        $ref: /schemas/types.yaml#/definitions/uint32-array
        minItems: 1
        items:
          minimum: 0
          maximum: 15

      cooling-levels:
        description: PWM duty cycle values for thermal cooling states (0–255).
        $ref: /schemas/types.yaml#/definitions/uint32-array
        items:
          minimum: 0
          maximum: 255

    required:
      - reg
      - fan-tach-ch
    additionalProperties: false

required:
  - compatible
  - '#address-cells'
  - '#size-cells'
  - reg
  - reg-names
  - clocks
  - clock-names
  - interrupts
  - pinctrl-names
  - pinctrl-0

additionalProperties: false

examples:
  - |
    pwm_fan:pwm-fan-controller@103000 {
      #address-cells = <1>;
      #size-cells = <0>;
      compatible = "nuvoton,npcm750-pwm-fan";
      reg = <0x103000 0x2000>,
            <0x180000 0x8000>;
      reg-names = "pwm", "fan";
      clocks = <&clk NPCM7XX_CLK_APB3>,
               <&clk NPCM7XX_CLK_APB4>;
      clock-names = "pwm", "fan";
      interrupts = <GIC_SPI 96 IRQ_TYPE_LEVEL_HIGH>,
                   <GIC_SPI 97 IRQ_TYPE_LEVEL_HIGH>,
                   <GIC_SPI 98 IRQ_TYPE_LEVEL_HIGH>,
                   <GIC_SPI 99 IRQ_TYPE_LEVEL_HIGH>,
                   <GIC_SPI 100 IRQ_TYPE_LEVEL_HIGH>,
                   <GIC_SPI 101 IRQ_TYPE_LEVEL_HIGH>,
                   <GIC_SPI 102 IRQ_TYPE_LEVEL_HIGH>,
                   <GIC_SPI 103 IRQ_TYPE_LEVEL_HIGH>;
      pinctrl-names = "default";
      pinctrl-0 = <&pwm0_pins &pwm1_pins &pwm2_pins
                   &fanin0_pins &fanin1_pins &fanin2_pins
                   &fanin3_pins &fanin4_pins>;
      fan@0 {
        reg = <0x00>;
        fan-tach-ch = /bits/ 8 <0x00 0x01>;
        cooling-levels = <127 255>;
      };
      fan@1 {
        reg = <0x01>;
        fan-tach-ch = /bits/ 8 <0x02 0x03>;
      };
      fan@2 {
        reg = <0x02>;
        fan-tach-ch = /bits/ 8 <0x04>;
      };
    };
