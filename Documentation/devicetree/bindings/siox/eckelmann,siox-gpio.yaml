%YAML 1.2
---
$id: http://devicetree.org/schemas/siox/eckelmann,siox-gpio.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Eckelmann SIOX GPIO bus
maintainers:
  - Uwe Kleine-König <u.kleine-koenig@pengutronix.de>

description: |
  Eckelmann SIOX GPIO bus

properties:
  compatible:
    const: eckelmann,siox-gpio

  din-gpios:
    description: GPIO for data-in signal
    maxItems: 1

  dout-gpios:
    description: GPIO for data-out signal
    maxItems: 1

  dclk-gpios:
    description: GPIO for clock signal
    maxItems: 1

  dld-gpios:
    description: GPIO for data-load signal
    maxItems: 1

required:
  - compatible
  - pinctrl-names
  - pinctrl-0
  - din-gpios
  - dout-gpios
  - dclk-gpios
  - dld-gpios

additionalProperties: false

examples:
  - |
    siox {
      compatible = "eckelmann,siox-gpio";
      pinctrl-names = "default";
      pinctrl-0 = <&pinctrl_siox>;

      din-gpios = <&gpio6 11 0>;
      dout-gpios = <&gpio6 8 0>;
      dclk-gpios = <&gpio6 9 0>;
      dld-gpios = <&gpio6 10 0>;
    };
