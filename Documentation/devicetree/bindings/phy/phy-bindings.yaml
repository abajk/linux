%YAML 1.2
---
$id: http://devicetree.org/schemas/phy-bindings.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Generic PHY

maintainers:
  - Baruch Siach <baruch@tkos.co.il>
  - Hayato Suzuki <hytszk@gmail.com>
  - Kishon Vijay Abraham I <kishon@kernel.org>
  - Mauro Carvalho Chehab <mchehab+samsung@kernel.org>
  - Roger Quadros <rogerq@ti.com>

description: |
  This document explains only the device tree data binding. For general
  information about PHY subsystem refer to Documentation/driver-api/phy/phy.rst

  PHY device node
  ===============

  That node describes an IP block (PHY provider) that implements two
  different PHYs. In order to differentiate between these two PHYs, an
  additional specifier should be given while trying to get a reference to it.

  PHY user node
  =============

  This node represents a controller that uses two PHYs, one for usb2 and
  one for usb3.

  This node represents a controller that uses one of the PHYs of the
  PHY provider device defined previously. Note that the phy handle has an
  additional specifier "1" to differentiate between the two PHYs.

properties:
  compatible:
    items:
      - const: xxx
  reg:
    description: Register space of the PHY provider.
  '#phy-cells':
    description: Number of cells in a PHY specifier; The meaning of all
      those cells is defined by the binding for the phy node. The PHY
      provider can use the values in cells to find the appropriate PHY.
    $ref: /schemas/types.yaml#/definitions/uint32
  phy-supply:
    description: Regulator that provides power to the PHY.
  phys:
    description: The phandle(s) for the PHY device (used by the PHY
      subsystem; not to be confused with the Ethernet-specific 'phy' and
      'phy-handle' properties—see Documentation/devicetree/bindings/net/ethernet.txt)
  phy-names:
    description: Names of the PHY corresponding to the PHYs present in
      the phys phandle.

oneOf:
  - required: [compatible, reg, "#phy-cells"]
  - required: [compatible, phys, phy-names]

additionalProperties: false

examples:
  - |
    phy: phy {
        compatible = "xxx";
        reg = <0x...>;
        #phy-cells = <1>;
        phy-supply = <&vcc_phy>;
    };
  - |
    usb1: usb_otg_ss@xxx {
        compatible = "xxx";
        phys = <&usb2_phy>, <&usb3_phy>;
        phy-names = "usb2phy", "usb3phy";
    };
