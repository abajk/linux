%YAML 1.2
---
$id: http://devicetree.org/schemas/watchdog/mpc8xxx-wdt.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Freescale mpc8xxx watchdog driver

maintainers:
  - Christophe Leroy <christophe.leroy@c-s.fr>

description: |
  Freescale mpc8xxx watchdog driver (For 83xx, 86xx and 8xx)

properties:
  compatible:
    description: Hardware compatibility string for the mpc8xxx watchdog.
    items:
      - enum:
          - mpc83xx_wdt
          - fsl,mpc8610-wdt
          - fsl,mpc823-wdt

  reg:
    description: >
      Base physical address and length of the watchdog timer registers, and
      optional reset status register.
    oneOf:
      - items:
          - description: Watchdog timer registers (base and size)
      - items:
          - description: Watchdog timer registers (base and size)
          - description: Reset status register (base and size)

  reg-names:
    description: Names for the watchdog timer and reset status registers.
    items:
      - const: wdt
      - const: reset-status

additionalProperties: false

examples:
  - |
    watchdog@0 {
        compatible = "fsl,mpc823-wdt";
        reg = <0x0 0x10 0x288 0x4>;
    };
