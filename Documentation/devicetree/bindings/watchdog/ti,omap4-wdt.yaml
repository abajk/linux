%YAML 1.2
---
$id: http://devicetree.org/schemas/watchdog/ti,omap4-wdt.yaml#
# $schema is the meta-schema this schema should be validated with.
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: TI OMAP Watchdog Timer Controller

maintainers:
  - Uwe Kleine-König <u.kleine-koenig@pengutronix.de>
  - Xiao Jiang <jgq516@gmail.com>

description: >-
  TI Watchdog Timer (WDT) Controller for OMAP

properties:
  compatible:
    description: List of compatible strings for the TI OMAP Watchdog Timer controller.
    oneOf:
      - items:
          - enum: ["ti,omap4-wdt"]
      - items:
          - enum: ["ti,omap3-wdt"]

  ti,hwmods:
    description: Name of the hardware module associated with the watchdog.
    $ref: /schemas/types.yaml#/definitions/string

  timeout-sec:
    description: Default watchdog timeout in seconds.

required:
  - compatible
  - ti,hwmods

additionalProperties: false

examples:
  - |
    wdt2: wdt@4a314000 {
        compatible = "ti,omap4-wdt", "ti,omap3-wdt";
        ti,hwmods = "wd_timer2";
    };
