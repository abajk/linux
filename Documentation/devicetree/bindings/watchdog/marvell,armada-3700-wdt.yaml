%YAML 1.2
---
$id: http://devicetree.org/schemas/watchdog/marvell,armada-3700-wdt.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Armada 37xx CPU Watchdog Timer Controller

maintainers:
  - Marek Behún <kabel@kernel.org>

description: |
  * Armada 37xx CPU Watchdog Timer Controller

properties:
  compatible:
    items:
      - const: marvell,armada-3700-wdt

  reg:
    items:
      - description: base physical address of the controller
      - description: length of memory mapped region

  clocks:
    maxItems: 1
    description: clock feeding the watchdog timer. See clock-bindings.txt

  marvell,system-controller:
    description: reference to syscon node for the CPU Miscellaneous Registers
    $ref: /schemas/types.yaml#/definitions/phandle

required:
  - compatible
  - reg
  - clocks
  - marvell,system-controller

additionalProperties: false

examples:
  - |
    cpu_misc: system-controller@d000 {
        compatible = "marvell,armada-3700-cpu-misc", "syscon";
        reg = <0xd000 0x1000>;
    };

    wdt: watchdog@8300 {
        compatible = "marvell,armada-3700-wdt";
        reg = <0x8300 0x40>;
        marvell,system-controller = <&cpu_misc>;
        clocks = <&xtalclk>;
    };
