%YAML 1.2
---
$id: http://devicetree.org/schemas/watchdog/marvell,orion-wdt.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Marvell Orion Watchdog Time

maintainers:
  - Andrew Lunn <andrew@lunn.ch>
  - Ezequiel Garcia <ezequiel.garcia@free-electrons.com>
  - Fabio Porcedda <fabio.porcedda@gmail.com>
  - Rob Herring <robh@kernel.org>

description: |
  * Marvell Orion Watchdog Time

properties:
  compatible:
    items:
      - enum:
          - "marvell,orion-wdt"
          - "marvell,armada-370-wdt"
          - "marvell,armada-xp-wdt"
          - "marvell,armada-375-wdt"
          - "marvell,armada-380-wdt"

  reg:
    description: Register addresses for watchdog operations.
    items:
      - description: Timer control register address.
      - description: RSTOUT enable register address.

  clocks:
    description: Input clock for watchdog.
    items:
      - description: Primary clock input.

  clock-names:
    items:
      - const: fixed
      - const: nbclk

  interrupts:
    description: IRQ for watchdog expiration.
    items:
      - description: Interrupt number.

  timeout-sec:
    description: Watchdog timeout in seconds.

allOf:
  - if:
      properties:
        compatible:
          contains:
            enum:
              - "marvell,armada-375-wdt"
              - "marvell,armada-380-wdt"
    then:
      properties:
        reg:
          items:
            - description: Timer control register address.
            - description: RSTOUT enable register address.
            - description: Shared mask/unmask RSTOUT register address.
    else:
      properties:
        reg:
          maxItems: 2

  - if:
      properties:
        compatible:
          contains:
            enum:
              - "marvell,armada-xp-wdt"
              - "marvell,armada-375-wdt"
              - "marvell,armada-380-wdt"
    then:
      properties:
        clocks:
          items:
            - description: Reference 25 MHz fixed-clock supply.
            - description: L2/coherency fabric clock input ("nbclk").
        clock-names:
          items:
            - const: fixed
            - const: nbclk
      required:
        - clock-names

required:
  - compatible
  - reg
  - clocks

additionalProperties: false

examples:
  - |
    wdt@20300 {
        compatible = "marvell,orion-wdt";
        reg = <0x20300 0x28>, <0x20108 0x4>;
        interrupts = <3>;
        timeout-sec = <10>;
        clocks = <&gate_clk 7>;
    };
