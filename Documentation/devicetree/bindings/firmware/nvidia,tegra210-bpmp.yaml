%YAML 1.2
---
$id: http://devicetree.org/schemas/nvidia,tegra210-bpmp.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: NVIDIA Tegra210 Boot and Power Management Processor (BPMP)

maintainers:
  - Timo Alho <talho@nvidia.com>

description: |
  The Boot and Power Management Processor (BPMP) is a co-processor found
  in Tegra210 SoC. It is designed to handle the early stages of the boot
  process as well as to assisting in entering deep low power state
  (suspend to ram), and also offloading DRAM memory clock scaling on
  some platforms. The binding document defines the resources that would
  be used by the BPMP T210 firmware driver, which can create the
  interprocessor communication (IPC) between the CPU and BPMP.

properties:
  compatible:
    items:
      - const: nvidia,tegra210-bpmp

  reg:
    items:
      - description: Physical base address and length to Tegra atomics hardware
      - description: Physical base address and length to Tegra semaphore hardware

  interrupts:
    description: Specifies interrupt numbers for triggering ("tx") and receiving ("rx") messages
    items:
      - description: Interrupt for triggering messages ("tx")
      - description: Interrupt for receiving messages ("rx")

  interrupt-names:
    items:
      - const: tx
      - const: rx

  '#clock-cells':
    description: Should be 1 for platforms where DRAM clock control is offloaded to bpmp
    const: 1

additionalProperties: false

required:
  - compatible
  - reg
  - interrupts

examples:
  - |
    bpmp@70016000 {
        compatible = "nvidia,tegra210-bpmp";
        reg = <0x0 0x70016000 0x0 0x2000
               0x0 0x60001000 0x0 0x1000>;
        interrupts = <GIC_SPI 6 IRQ_TYPE_EDGE_RISING>,
                     <GIC_SPI 4 IRQ_TYPE_EDGE_RISING>;
        interrupt-names = "tx", "rx";
    };
