%YAML 1.2
---
$id: http://devicetree.org/schemas/gpio/ad,gpio-adnp.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Avionic Design N-bit GPIO expander

maintainers:
  - Rob Herring <robh@kernel.org>
  - Thierry Reding <thierry.reding@avionic-design.de>

description: |
  Avionic Design N-bit GPIO expander bindings

  The GPIO expander can optionally be used as an interrupt controller, in
  which case it uses the default two cell specifier as described in
  Documentation/devicetree/bindings/interrupt-controller/interrupts.txt.

properties:
  compatible:
    description: GPIO expander compatible string.
    $ref: /schemas/types.yaml#/definitions/string-array
    items:
      - const: "ad,gpio-adnp"
  reg:
    description: I2C slave address for the GPIO expander.
    items:
      - description: I2C slave address.
  interrupts:
    description: Interrupt specifier for the GPIO expander.
    items:
      - description: Interrupt number.
      - description: Interrupt flags.
  gpio-controller: true
  "#gpio-cells":
    const: 2
  nr-gpios:
    description: Number of GPIO pins supported by the controller.
    $ref: /schemas/types.yaml#/definitions/uint32
  interrupt-controller: true
  "#interrupt-cells":
    const: 2

required:
  - compatible
  - reg
  - interrupts
  - gpio-controller
  - "#gpio-cells"
  - nr-gpios

additionalProperties: false

examples:
  - |
    gpioext: gpio-controller@41 {
        compatible = "ad,gpio-adnp";
        reg = <0x41>;
        interrupts = <160 1>;
        gpio-controller;
        #gpio-cells = <2>;
        interrupt-controller;
        #interrupt-cells = <2>;
        nr-gpios = <64>;
    };
