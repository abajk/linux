%YAML 1.2
---
$id: http://devicetree.org/schemas/cdns,gpio-r1p02.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Cadence GPIO controller

maintainers:
  - Jan Kotas <jank@cadence.com>

description: |
  Cadence GPIO controller bindings

properties:
  compatible:
    items:
      - const: cdns,gpio-r1p02

  reg:
    items:
      - description: register base address and size

  gpio-controller: true

  '#gpio-cells':
    const: 2

  clocks:
    maxItems: 1
    description: peripheral clock driving the GPIO controller

  ngpios:
    description: number of GPIO lines supported by this controller, up to 32
    $ref: /schemas/types.yaml#/definitions/uint32
    maximum: 32

  interrupt-controller: true

  '#interrupt-cells':
    const: 2

  interrupts:
    items:
      - description: GPIO number to use as interrupt source
      - description: IRQ type, as defined in <dt-bindings/interrupt-controller/irq.h>

dependencies:
  interrupt-controller: [interrupts, '#interrupt-cells']

required:
  - compatible
  - reg
  - gpio-controller
  - '#gpio-cells'

additionalProperties: false

examples:
  - |
    gpio0: gpio-controller@fd060000 {
        compatible = "cdns,gpio-r1p02";
        reg = <0xfd060000 0x1000>;
        clocks = <&gpio_clk>;
        gpio-controller;
        #gpio-cells = <2>;
        interrupt-controller;
        interrupts = <0 5 IRQ_TYPE_LEVEL_HIGH>;
        #interrupt-cells = <2>;
    };
