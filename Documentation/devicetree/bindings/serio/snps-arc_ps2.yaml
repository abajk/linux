%YAML 1.2
---
$id: http://devicetree.org/schemas/serio/snps-arc_ps2.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Synopsys ARC PS/2 driver
maintainers:
  - Mischa Jonker <Mischa.Jonker@synopsys.com>

description: |
  ARC PS/2 driver: PS/2 block used in some ARC FPGA's & nSIM OSCI model

properties:
  compatible:
    items:
      - const: snps,arc_ps2

  reg:
    items:
      - description: Register base address
      - description: Length of registers (must be 0x14)
        const: 20

  interrupts:
    description: Interrupt input for PS/2 controller
    items:
      - description: Interrupt line for PS/2 controller

  interrupt-names:
    description: Name of the PS/2 interrupt
    items:
      - const: arc_ps2_irq

required:
  - compatible
  - reg
  - interrupts
  - interrupt-names

additionalProperties: false

examples:
  - |
    serio@c9000400 {
        compatible = "snps,arc_ps2";
        reg = <0xc9000400 0x14>;
        interrupts = <13>;
        interrupt-names = "arc_ps2_irq";
    };
