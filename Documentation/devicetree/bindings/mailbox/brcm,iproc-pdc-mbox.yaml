%YAML 1.2
---
$id: http://devicetree.org/schemas/brcm,iproc-pdc-mbox.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Broadcom iProc PDC mailbox

maintainers:
  - Mathieu Malaterre <malat@debian.org>
  - Rob Rice <rrice@broadcom.com>
  - Steve Lin <steven.lin1@broadcom.com>

description: |
  The PDC driver manages data transfer to and from various offload engines
  on some Broadcom SoCs. An SoC may have multiple PDC hardware blocks. There is
  one device tree entry per block. On some chips, the PDC functionality is
  handled by the FA2 (Northstar Plus).

properties:
  compatible:
    items:
      - enum:
          - brcm,iproc-pdc-mbox
          - brcm,iproc-fa2-mbox
    description: >
      Compatible string selecting PDC mailbox for Broadcom iProc SoCs.
  reg:
    maxItems: 1

  interrupts:
    items:
      - description: PDC interrupt line


  '#mbox-cells':
    const: 1

  brcm,rx-status-len:
    description: >
      Length of metadata preceding received frames, in bytes.
    $ref: /schemas/types.yaml#/definitions/uint32

  brcm,use-bcm-hdr:
    type: boolean
    description: >
      Present if a BCM header precedes each frame.

required:
  - compatible
  - reg
  - interrupts
  - '#mbox-cells'
  - brcm,rx-status-len

additionalProperties: false

examples:
  - |
    pdc0: iproc-pdc0@612c0000 {
        compatible = "brcm,iproc-pdc-mbox";
        reg = <0 0x612c0000 0 0x445>;
        interrupts = <GIC_SPI 187 IRQ_TYPE_LEVEL_HIGH>;
        #mbox-cells = <1>;
        brcm,rx-status-len = <32>;
        brcm,use-bcm-hdr;
    };
