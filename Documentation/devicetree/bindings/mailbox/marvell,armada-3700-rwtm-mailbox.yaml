%YAML 1.2
---
$id: http://devicetree.org/schemas/mailbox/marvell,armada-3700-rwtm-mailbox.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Marvell Armada 3700 rWTM Mailbox

maintainers:
  - Marek Behún <kabel@kernel.org>

description: |
  rWTM BIU Mailbox driver for Armada 37xx

properties:
  compatible:
    items:
      - const: marvell,armada-3700-rwtm-mailbox

  reg:
    description: Physical base address of the mailbox and length of memory mapped region
    items:
      - description: physical base address of the mailbox
      - description: length of memory mapped region

  interrupts:
    description: IRQ line for the mailbox
    items:
      - description: interrupt controller specifier
      - description: interrupt number
      - description: IRQ type

  '#mbox-cells':
    description: Number of mailbox cells
    const: 1

required:
  - compatible
  - reg
  - interrupts
  - '#mbox-cells'

additionalProperties: false

examples:
  - |
    rwtm: mailbox@b0000 {
        compatible = "marvell,armada-3700-rwtm-mailbox";
        reg = <0xb0000 0x100>;
        interrupts = <GIC_SPI 18 IRQ_TYPE_LEVEL_HIGH>;
        #mbox-cells = <1>;
    };
