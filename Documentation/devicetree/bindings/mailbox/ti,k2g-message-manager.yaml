%YAML 1.2
---
$id: http://devicetree.org/schemas/ti,k2g-message-manager.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Texas Instruments Message Manager Driver
maintainers:
  - Marco Franchi <marco.franchi@nxp.com>
  - Nishanth Menon <nm@ti.com>

description: |
  Texas Instruments' Message Manager is a mailbox controller that has configurable
  queues selectable at SoC (System on Chip) integration. The Message Manager is broken
  up into queues in different address regions that are called "proxies" - each instance
  is unidirectional and is instantiated at SoC integration level to indicate receive or
  transmit path.

properties:
  compatible:
    items:
      - const: ti,k2g-message-manager
    description: Device compatible string.

  reg-names:
    items:
      - const: queue_proxy_region
      - const: queue_state_debug_region
    description: Names of the queue proxy and queue state debug regions.

  reg:
    items:
      - description: queue proxy region register map
      - description: queue state debug region register map
    description: Register map for queue proxy and state debug regions.

  '#mbox-cells':
    const: 2
    description: "Number of mbox cells: queue ID and proxy ID in that order."

  interrupt-names:
    items:
      - const: rx_005
      - const: rx_057
    description: Interrupt names matching the receive transfer path.

  interrupts:
    items:
      - description: interrupt definition for rx_005
      - description: interrupt definition for rx_057
    description: Interrupt information corresponding to interrupt-names.

required:
  - compatible
  - reg-names
  - reg
  - '#mbox-cells'
  - interrupt-names
  - interrupts

additionalProperties: false

examples:
  - |
    msgmgr: msgmgr@2a00000 {
        compatible = "ti,k2g-message-manager";
        #mbox-cells = <2>;
        reg-names = "queue_proxy_region", "queue_state_debug_region";
        reg = <0x02a00000 0x400000>, <0x028c3400 0x400>;
        interrupt-names = "rx_005", "rx_057";
        interrupts = <GIC_SPI 324 IRQ_TYPE_LEVEL_HIGH>,
                     <GIC_SPI 327 IRQ_TYPE_LEVEL_HIGH>;
    };
