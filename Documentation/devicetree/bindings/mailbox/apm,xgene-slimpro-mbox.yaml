%YAML 1.2
---
$id: http://devicetree.org/schemas/apm,xgene-slimpro-mbox.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: APM X-Gene SLIMpro mailbox

maintainers:
  - Duc Dang <dhdang@apm.com>

description: |
  The APM X-Gene SLIMpro mailbox is used to communicate messages between
  the ARM64 processors and the Cortex M3 (dubbed SLIMpro). It uses a simple
  interrupt based door bell mechanism and can exchange simple messages using the
  internal registers.

  There are total of 8 interrupts in this mailbox. Each used for an individual
  door bell (or mailbox channel).

properties:
  compatible:
    description: Should be "apm,xgene-slimpro-mbox".
    items:
      - const: apm,xgene-slimpro-mbox

  reg:
    description: Mailbox register address range.
    items:
      - description: mailbox registers

  interrupts:
    description: List of interrupts, one for each mailbox channel.
    items:
      - description: interrupt for mailbox channel 0
      - description: interrupt for mailbox channel 1
      - description: interrupt for mailbox channel 2
      - description: interrupt for mailbox channel 3
      - description: interrupt for mailbox channel 4
      - description: interrupt for mailbox channel 5
      - description: interrupt for mailbox channel 6
      - description: interrupt for mailbox channel 7

  '#mbox-cells':
    description: Number of mailbox channel.
    const: 1

required:
  - compatible
  - reg
  - interrupts
  - '#mbox-cells'

additionalProperties: false

examples:
  - |
    mailbox@10540000 {
        compatible = "apm,xgene-slimpro-mbox";
        reg = <0x0 0x10540000 0x0 0xa000>;
        #mbox-cells = <1>;
        interrupts = <0x0 0x0 0x4>,
                     <0x0 0x1 0x4>,
                     <0x0 0x2 0x4>,
                     <0x0 0x3 0x4>,
                     <0x0 0x4 0x4>,
                     <0x0 0x5 0x4>,
                     <0x0 0x6 0x4>,
                     <0x0 0x7 0x4>;
    };
