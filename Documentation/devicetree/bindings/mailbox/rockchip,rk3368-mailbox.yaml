%YAML 1.2
---
$id: http://devicetree.org/schemas/mailbox/rockchip,rk3368-mailbox.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Rockchip RK3368 Mailbox Controller
maintainers:
  - Caesar Wang <wxt@rock-chips.com>

description: |
  Rockchip mailbox

  The Rockchip mailbox is used by the Rockchip CPU cores to communicate
  requests to MCU processor.

  Refer to ./mailbox.txt for generic information about mailbox device-tree
  bindings.

properties:
  compatible:
    items:
      - enum:
          - rockchip,rk3368-mailbox
    description: |
      The compatible string for the Rockchip RK3368 mailbox controller.

  reg:
    maxItems: 1
    description: |
      Physical base address and length of the controller's memory-mapped region.

  interrupts:
    minItems: 1
    items:
      description: Interrupt specifier; format depends on interrupt controller.
    description: |
      Interrupt specifiers to CPU.

  '#mbox-cells':
    const: 1
    description: |
      Number of cells required for mailbox specifier; should be 1.

required:
  - compatible
  - reg
  - interrupts
  - '#mbox-cells'

additionalProperties: false

examples:
  - |
    mbox: mbox@ff6b0000 {
        compatible = "rockchip,rk3368-mailbox";
        reg = <0x0 0xff6b0000 0x0 0x1000>;
        interrupts = <GIC_SPI 146 IRQ_TYPE_LEVEL_HIGH>,
                     <GIC_SPI 147 IRQ_TYPE_LEVEL_HIGH>,
                     <GIC_SPI 148 IRQ_TYPE_LEVEL_HIGH>,
                     <GIC_SPI 149 IRQ_TYPE_LEVEL_HIGH>;
        #mbox-cells = <1>;
    };
