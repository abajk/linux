%YAML 1.2
---
$id: http://devicetree.org/schemas/hisilicon,hix5hd2-ir.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: HiSilicon HIX5HD2 IR controller

maintainers:
  - Guoxiong Yan <yanguoxiong@huawei.com>
  - Ruqiang Ju <juruqiang@huawei.com>
  - Sean Wang <sean.wang@mediatek.com>
  - Shawn Guo <shawn.guo@linaro.org>

description: |
  Device-Tree bindings for HIX5HD2 infrared (IR) IP.

  Optional properties:
    * linux,rc-map-name: see rc.txt file in the same directory.
    * hisilicon,power-syscon: DEPRECATED. Don't use this in new DTS files.
      Provide correct clocks instead.

properties:
  compatible:
    items:
      - enum:
          - hisilicon,hix5hd2-ir
          - hisilicon,hi3796cv300-ir

  reg:
    items:
      - description: Base physical address of the controller and length of memory mapped region.

  interrupts:
    items:
      - description: Interrupt specifier for the sole interrupt generated by the device.

  clocks:
    items:
      - description: Clock phandle and specifier pair.

  linux,rc-map-name:
    $ref: /schemas/types.yaml#/definitions/string
    description: Remote controller map name; see rc.txt file in the same directory.

  hisilicon,power-syscon:
    description: DEPRECATED. Don't use this in new DTS files. Provide correct clocks instead.
    $ref: /schemas/types.yaml#/definitions/phandle

required:
  - compatible
  - reg
  - interrupts
  - clocks

additionalProperties: false

examples:
  - |
      ir: ir@f8001000 {
          compatible = "hisilicon,hix5hd2-ir";
          reg = <0xf8001000 0x1000>;
          interrupts = <0 47 4>;
          clocks = <&clock HIX5HD2_IR_CLOCK>;
          linux,rc-map-name = "rc-tivo";
      };
