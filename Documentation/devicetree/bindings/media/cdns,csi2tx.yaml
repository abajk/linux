%YAML 1.2
---
$id: http://devicetree.org/schemas/media/cdns,csi2tx.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Cadence MIPI-CSI2 TX controller

maintainers:
  - Jan Kotas <jank@cadence.com>
  - Maxime Ripard <mripard@kernel.org>

description: |
  Cadence MIPI-CSI2 TX controller
  ===============================

  The Cadence MIPI-CSI2 TX controller is a CSI-2 bridge supporting up to
  4 CSI lanes in output, and up to 4 different pixel streams in input.

properties:
  compatible:
    enum:
      - cdns,csi2tx
      - cdns,csi2tx-1.3
      - cdns,csi2tx-2.1

  reg:
    maxItems: 1

  clocks:
    maxItems: 6

  clock-names:
    items:
      - const: p_clk
      - const: esc_clk
      - const: pixel_if0_clk
      - const: pixel_if1_clk
      - const: pixel_if2_clk
      - const: pixel_if3_clk

  phys:
    maxItems: 1

  phy-names:
    items:
      - const: dphy

  ports:
    description: A ports node with one port child node per device input and output port
    type: object
    additionalProperties: false
    properties:
      "#address-cells":
        description: Number of address cells for port nodes
        const: 1
      "#size-cells":
        description: Number of size cells for port nodes
        const: 0
    patternProperties:
      "^port@[0-9]+$":  true

required:
  - compatible
  - reg
  - clocks
  - clock-names
  - ports

additionalProperties: false

examples:
  - |
    csi2tx: csi-bridge@0d0e1000 {
        compatible = "cdns,csi2tx";
        reg = <0x0d0e1000 0x1000>;
        clocks = <&byteclock>, <&byteclock>,
                <&coreclock>, <&coreclock>,
                <&coreclock>, <&coreclock>;
        clock-names = "p_clk", "esc_clk",
                      "pixel_if0_clk", "pixel_if1_clk",
                      "pixel_if2_clk", "pixel_if3_clk";

        ports {
            #address-cells = <1>;
            #size-cells = <0>;

            port@0 {
                reg = <0>;

                csi2tx_out: endpoint {
                    remote-endpoint = <&remote_in>;
                    clock-lanes = <0>;
                    data-lanes = <1 2>;
                };
            };

            port@1 {
                reg = <1>;

                csi2tx_in_stream0: endpoint {
                    remote-endpoint = <&stream0_out>;
                };
            };

            port@2 {
                reg = <2>;

                csi2tx_in_stream1: endpoint {
                    remote-endpoint = <&stream1_out>;
                };
            };

            port@3 {
                reg = <3>;

                csi2tx_in_stream2: endpoint {
                    remote-endpoint = <&stream2_out>;
                };
            };

            port@4 {
                reg = <4>;

                csi2tx_in_stream3: endpoint {
                    remote-endpoint = <&stream3_out>;
                };
            };
        };
    };
