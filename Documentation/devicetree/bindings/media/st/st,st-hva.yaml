%YAML 1.2
---
$id: http://devicetree.org/schemas/media/st/st,st-hva.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: ST HVA

maintainers:
  - Jean-Christophe Trotin <jean-christophe.trotin@st.com>

description: |
  multi-format video encoder for STMicroelectronics SoC.

properties:
  compatible:
    items:
      - const: st,st-hva

  reg:
    items:
      - description: HVA physical address location and length
      - description: esram physical address location and length

  reg-names:
    items:
      - const: hva_registers
      - const: hva_esram

  interrupts:
    description: HVA interrupt lines
    items:
      - description: HVA interrupt line
      - description: esram interrupt line

  clocks:
    description: Hardware IP needed clocks. The number of clocks may depend on the SoC type.
      See ../clock/clock-bindings.txt for details.

  clock-names:
    items:
      - const: clk_hva

required:
  - compatible
  - reg
  - reg-names
  - interrupts
  - clocks
  - clock-names

additionalProperties: false

examples:
  - |
    hva@8c85000 {
        compatible = "st,st-hva";
        reg = <0x8c85000 0x400>, <0x6000000 0x40000>;
        reg-names = "hva_registers", "hva_esram";
        interrupts = <GIC_SPI 58 IRQ_TYPE_NONE>,
                     <GIC_SPI 59 IRQ_TYPE_NONE>;
        clock-names = "clk_hva";
        clocks = <&clk_s_c0_flexgen CLK_HVA>;
    };
