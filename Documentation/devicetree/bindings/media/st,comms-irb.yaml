%YAML 1.2
---
$id: http://devicetree.org/schemas/st,comms-irb.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: ST Comms IRB controller

maintainers:
  - Srinivas Kandagatla <srinivas.kandagatla@st.com>

description: |
  Device-Tree bindings for ST IRB IP

properties:
  compatible:
    description: Driver compatible string; must contain st,comms-irb
    items:
      - enum: [st, comms-irb]

  reg:
    description: Base physical address of the controller and length of memory mapped region
    items:
      - description: Base physical address of the controller
      - description: Length of memory mapped region

  interrupts:
    description: Interrupt specifier for the sole interrupt generated by the device
    items:
      - description: Interrupt specifier; format depends on the interrupt controller parent

  rx-mode:
    description: >
      Specifies the L1 protocol used for receiving remote control signals;
      required if rx pins are wired up
    enum:
      - infrared
      - uhf

  tx-mode:
    description: >
      Specifies the L1 protocol used for transmitting remote control signals;
      required if tx pins are wired up
    enum:
      - infrared

  pinctrl-names:
    description: Pin control names for multiplexing IRB pins

  pinctrl-0:
    description: Phandle and specifier for pinctrl configuration 0

  clocks:
    description: Phandle with clock specifier for IRB
    maxItems: 1

required:
  - compatible
  - reg
  - interrupts

additionalProperties: false

examples:
  - |
    rc@fe518000 {
        compatible = "st,comms-irb";
        reg = <0xfe518000 0x234>;
        interrupts = <0 203 0>;
        rx-mode = "infrared";
    };
