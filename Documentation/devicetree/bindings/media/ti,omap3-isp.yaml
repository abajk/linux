%YAML 1.2
---
$id: http://devicetree.org/schemas/media/ti,omap3-isp.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: OMAP 3 ISP

maintainers:
  - Sakari Ailus <sakari.ailus@linux.intel.com>

description: |
  OMAP 3 ISP Device Tree bindings

  The DT definitions can be found in include/dt-bindings/media/omap3-isp.h.

  Port nodes (optional)

  More documentation on these bindings is available in
  video-interfaces.txt in the same directory.

properties:
  compatible:
    items:
      - const: ti,omap3-isp

  reg:
    items:
      - description: core ISP registers up to end of SBL block
      - description: CSI PHYs and receivers registers

  interrupts:
    maxItems: 1

  iommus:
    description: Phandle and IOMMU specifier for the IOMMU that serves the ISP.
    maxItems: 1

  syscon:
    description: Phandle and register offset to the Complex I/O or CSI-PHY register.
    $ref: /schemas/types.yaml#/definitions/phandle-array

  ti,phy-type:
    description: "Select the PHY type: 0 = OMAP3ISP_PHY_TYPE_COMPLEX_IO, 1 = OMAP3ISP_PHY_TYPE_CSIPHY."
    $ref: /schemas/types.yaml#/definitions/uint32
    enum: [0, 1]

  "#clock-cells":
    const: 1

  vdd-csiphy1-supply: true

  vdd-csiphy2-supply: true

  ports:
    description: Port nodes
    type: object
    additionalProperties: false
    properties:
      "#address-cells":
        const: 1
      "#size-cells":
        const: 0

required:
  - compatible
  - reg
  - interrupts
  - iommus
  - syscon
  - ti,phy-type
  - "#clock-cells"

additionalProperties: false

examples:
  - |
    isp@480bc000 {
        compatible = "ti,omap3-isp";
        reg = <0x480bc000 0x12fc
               0x480bd800 0x0600>;
        interrupts = <24>;
        iommus = <&mmu_isp>;
        syscon = <&scm_conf 0x2f0>;
        ti,phy-type = <OMAP3ISP_PHY_TYPE_CSIPHY>;
        #clock-cells = <1>;
        ports {
            #address-cells = <1>;
            #size-cells = <0>;
        };
    };
