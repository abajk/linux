%YAML 1.2
---
$id: http://devicetree.org/schemas/media/atmel-at91sam9g45-isi.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Atmel Image Sensor Interface

maintainers:
  - Claudiu Beznea <claudiu.beznea@tuxon.dev>
  - Fabio Estevam <fabio.estevam@freescale.com>
  - Hans Verkuil <hans.verkuil@cisco.com>
  - Josh Wu <josh.wu@atmel.com>

description: |
  Atmel Image Sensor Interface (ISI)

  Required properties for ISI:
  - compatible: must be "atmel,at91sam9g45-isi" or "microchip,sam9x60-isi".
  - reg: physical base address and length of the registers set for the device.
  - interrupts: should contain IRQ line for the ISI.
  - clocks: list of clock specifiers, corresponding to entries in the clock-names
    property; please refer to clock-bindings.txt.
  - clock-names: required elements: "isi_clk".
  - pinctrl-names, pinctrl-0: please refer to pinctrl-bindings.txt.

  ISI supports a single port node with parallel bus. It shall contain one 'port'
  child node with child 'endpoint' node. Please refer to the bindings defined in
  Documentation/devicetree/bindings/media/video-interfaces.txt.

  Endpoint node properties:

  - bus-width: <8> or <10> (mandatory)
  - hsync-active (default: active high)
  - vsync-active (default: active high)
  - pclk-sample (default: sample on falling edge)
  - remote-endpoint: A phandle to the bus receiver's endpoint node (mandatory).

properties:
  compatible:
    items:
      - const: atmel,at91sam9g45-isi
      - const: microchip,sam9x60-isi
    description: >
      Compatible strings for the ISI controller.

  reg:
    items:
      - description: Base address of the ISI registers
      - description: Size of the ISI register block
    description: >
      Register address and size for the ISI controller.

  interrupts:
    items:
      - description: IRQ line for the ISI controller
    description: >
      Interrupt specifier for the ISI controller.

  clocks:
    maxItems: 1
    description: >
      Main clock for the ISI controller.

  clock-names:
    items:
      - const: isi_clk
    description: >
      Name corresponding to the ISI clock.

  pinctrl-names:
    $ref: /schemas/types.yaml#/definitions/string-array
    items:
      - const: default
    description: >
      Pinctrl state name for default configuration.

  pinctrl-0:
    items:
      - $ref: /schemas/types.yaml#/definitions/phandle
    description: >
      Pinctrl settings for ISI signal pins.

  port:
    type: object
    description: >
      Port node describing the ISI parallel bus interface.
    properties:
      endpoint:
        type: object
        description: Endpoint configuration for the ISI port.
        properties:
          remote-endpoint:
            $ref: /schemas/types.yaml#/definitions/phandle
            description: Link to the sensor endpoint.
          bus-width:
            items:
              - const: 8
              - const: 10
            description: >
              Number of data lines on the parallel bus.
          vsync-active:
            type: boolean
            description: >
              Polarity of the VSYNC signal.
            default: true
          hsync-active:
            type: boolean
            description: >
              Polarity of the HSYNC signal.
            default: true
          pclk-sample:
            items:
              - const: rising-edge
              - const: falling-edge
            description: >
              Edge of pixel clock for data sampling.
            default: falling-edge
        required:
          - remote-endpoint
          - bus-width
        additionalProperties: false
    required:
      - endpoint
    additionalProperties: false

required:
  - compatible
  - reg
  - interrupts
  - clocks
  - clock-names
  - pinctrl-names
  - pinctrl-0
  - port

additionalProperties: false

examples:
  - |
    isi: isi@f0034000 {
      compatible = "atmel,at91sam9g45-isi";
      reg = <0xf0034000 0x4000>;
      interrupts = <37 IRQ_TYPE_LEVEL_HIGH 5>;
      pinctrl-names = "default";
      pinctrl-0 = <&pinctrl_isi_data_0_7>;
      clocks = <&isi_clk>;
      clock-names = "isi_clk";
      port {
        isi_0: endpoint {
          remote-endpoint = <&ov2640_0>;
          bus-width = <8>;
          vsync-active = <1>;
          hsync-active = <1>;
        };
      };
    };
