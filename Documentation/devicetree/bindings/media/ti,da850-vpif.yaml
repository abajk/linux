%YAML 1.2
---
$id: http://devicetree.org/schemas/ti,da850-vpif.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Texas Instruments VPIF

maintainers:
  - Bartosz Golaszewski <brgl@bgdev.pl>
  - Kevin Hilman <khilman@baylibre.com>
  - Rob Herring <robh@kernel.org>

description: |
  The TI Video Port InterFace (VPIF) is the primary component for video
  capture and display on the DA850/AM18x family of TI DaVinci/Sitara SoCs.

  TI Document reference: SPRUH82C, Chapter 35
  http://www.ti.com/lit/pdf/spruh82

properties:
  compatible:
    items:
      - const: ti,da850-vpif
  reg:
    items:
      - description: physical base address of the register set
      - description: size of the register set
  interrupts:
    description: IRQ line for the VPIF
    items:
      - description: VPIF interrupt

patternProperties:
  "^port@[0-9]+$":
    type: object
    description: Port channels, input or output
    additionalProperties: false
    patternProperties:
      "^endpoint(@[0-9]+)?$":
        type: object
        description: Endpoint configuration
        additionalProperties: false
        properties:
          reg:
            description: Endpoint identifier
            items:
              - description: endpoint index
          bus-width:
            description: Width of the data bus
            $ref: /schemas/types.yaml#/definitions/uint32
          remote-endpoint:
            description: Remote endpoint phandle
            $ref: /schemas/types.yaml#/definitions/phandle
          data-shift:
            description: Data shift for second 8-bit channel
            $ref: /schemas/types.yaml#/definitions/uint32
        required:
          - bus-width
        unevaluatedProperties: false
    unevaluatedProperties: false

additionalProperties: false

examples:
  - |
    vpif: vpif@217000 {
        compatible = "ti,da850-vpif";
        reg = <0x217000 0x1000>;
        interrupts = <92>;
        port@0 {
            vpif_input_ch0: endpoint@0 {
                reg = <0>;
                bus-width = <8>;
                remote-endpoint = <&composite_in>;
            };
            vpif_input_ch1: endpoint@1 {
                reg = <1>;
                bus-width = <8>;
                data-shift = <8>;
            };
        };
        port@1 {
            vpif_output_ch0: endpoint {
                bus-width = <8>;
                remote-endpoint = <&composite_out>;
            };
        };
    };
  - |
    vpif: vpif@217000 {
        compatible = "ti,da850-vpif";
        reg = <0x217000 0x1000>;
        interrupts = <92>;
        port {
            vpif_ch0: endpoint {
                bus-width = <16>;
            };
        };
    };
