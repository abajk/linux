%YAML 1.2
---
$id: http://devicetree.org/schemas/media/xilinx/xlnx,v-tpg.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Xilinx Video Test Pattern Generator (TPG)

maintainers:
  - Akinobu Mita <akinobu.mita@gmail.com>
  - Laurent Pinchart <laurent.pinchart@ideasonboard.com>

description: |
  Xilinx Video Test Pattern Generator (TPG)
  -----------------------------------------

  The xlnx,vtc and timing-gpios properties are mandatory when the TPG is
  synthesized with two ports and forbidden when synthesized with one port.

properties:
  compatible:
    oneOf:
      - items:
          - const: xlnx,v-tpg-6.0
          - const: xlnx,v-tpg-5.0
      - items:
          - const: xlnx,v-tpg-5.0
  reg:
    description: Physical base address and length of the registers set for the device.
    maxItems: 1

  clocks:
    description: Reference to the video core clock.
    maxItems: 1

  xlnx,video-format:
    description: Video format, as defined in video.txt.
    $ref: /schemas/types.yaml#/definitions/uint32

  xlnx,video-width:
    description: Video width, as defined in video.txt.
    $ref: /schemas/types.yaml#/definitions/uint32

  xlnx,vtc:
    description: A phandle referencing the Video Timing Controller that generates timings for the TPG.
    $ref: /schemas/types.yaml#/definitions/phandle

  timing-gpios:
    description: GPIO specifier for timing mux at TPG input; active level selects VTC timings.
    maxItems: 1

required:
  - compatible
  - reg
  - clocks
  - xlnx,video-format
  - xlnx,video-width

additionalProperties: false

examples:
  - |
    tpg_0: tpg@40050000 {
        compatible = "xlnx,v-tpg-6.0", "xlnx,v-tpg-5.0";
        reg = <0x40050000 0x10000>;
        clocks = <&clkc 15>;
        xlnx,vtc = <&vtc_3>;
        timing-gpios = <&ps7_gpio_0 55 GPIO_ACTIVE_LOW>;

        ports {
            #address-cells = <1>;
            #size-cells = <0>;

            port@0 {
                reg = <0>;

                xlnx,video-format = <XVIP_VF_YUV_422>;
                xlnx,video-width = <8>;

                tpg_in: endpoint {
                    remote-endpoint = <&adv7611_out>;
                };
            };
            port@1 {
                reg = <1>;

                xlnx,video-format = <XVIP_VF_YUV_422>;
                xlnx,video-width = <8>;

                tpg1_out: endpoint {
                    remote-endpoint = <&switch_in0>;
                };
            };
        };
    };
