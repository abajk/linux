%YAML 1.2
---
$id: http://devicetree.org/schemas/media/xilinx/xlnx,video.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Xilinx Video IP Pipeline (VIPP)

maintainers:
  - Laurent Pinchart <laurent.pinchart@ideasonboard.com>

description: |
  Xilinx Video IP Pipeline (VIPP)
  -------------------------------

  General concept

  Xilinx video IP pipeline processes video streams through one or more Xilinx
  video IP cores. Each video IP core is represented as documented in video.txt
  and IP core specific documentation, xlnx,v-*.txt, in this directory. The DT
  node of the VIPP represents as a top level node of the pipeline and defines
  mappings between DMAs and the video IP cores.

properties:
  compatible:
    items:
      - const: xlnx,video

  dmas:
    description: DMA specifiers per port, each consisting of a phandle and specifier.

  dma-names:
    description: DMA names for each port in the form port<N>.

  ports:
    description: Video stream ports of the pipeline.
    $ref: /schemas/media/xilinx/video-interfaces.yaml#

required:
  - compatible
  - dmas
  - dma-names
  - ports

additionalProperties: false

examples:
  - |
    video_cap {
        compatible = "xlnx,video";
        dmas = <&vdma_1 1>, <&vdma_3 1>;
        dma-names = "port0", "port1";

        ports {
            #address-cells = <1>;
            #size-cells = <0>;

            port@0 {
                reg = <0>;
                direction = "input";
                vcap0_in0: endpoint {
                    remote-endpoint = <&scaler0_out>;
                };
            };
            port@1 {
                reg = <1>;
                direction = "input";
                vcap0_in1: endpoint {
                    remote-endpoint = <&switch_out1>;
                };
            };
        };
    };
