%YAML 1.2
---
$id: http://devicetree.org/schemas/media/i2c/toshiba,et8ek8.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Toshiba et8ek8 5MP sensor

maintainers:
  - Pavel Machek <pavel@ucw.cz>

description: |
  Toshiba et8ek8 5MP sensor

  Toshiba et8ek8 5MP sensor is an image sensor found in Nokia N900 device

  More detailed documentation can be found in
  Documentation/devicetree/bindings/media/video-interfaces.txt .

properties:
  compatible:
    items:
      - const: toshiba,et8ek8

  reg:
    items:
      - description: I2C address of the sensor

  vana-supply: true

  clocks:
    maxItems: 1
    description: External clock to the sensor

  clock-frequency:
    description: Pre-determined frequency for the external clock to the sensor

  reset-gpios:
    maxItems: 1
    description: XSHUTDOWN GPIO; active low, hardware standby when low

  flash-leds:
    description: See ../video-interfaces.txt

  lens-focus:
    description: See ../video-interfaces.txt

  remote-endpoint:
    description: A phandle to the bus receiver's endpoint node
    $ref: /schemas/types.yaml#/definitions/phandle

additionalProperties: false

examples:
  - |
    &i2c3 {
        clock-frequency = <400000>;

        cam1: camera@3e {
            compatible = "toshiba,et8ek8";
            reg = <0x3e>;
            vana-supply = <&vaux4>;
            clocks = <&isp 0>;
            clock-frequency = <9600000>;
            reset-gpio = <&gpio4 6 GPIO_ACTIVE_HIGH>; /* 102 */
            port {
                csi_cam1: endpoint {
                    remote-endpoint = <&csi_out1>;
                };
            };
        };
    };
