%YAML 1.2
---
$id: http://devicetree.org/schemas/media/i2c/melexis,mlx90640.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Melexis MLX90640 FIR Sensor

maintainers:
  - Matt Ranostay <matt@ranostay.sg>

description: |
  * Melexis MLX90640 FIR Sensor

  Melexis MLX90640 FIR sensor support which allows recording of thermal data
  with 32x24 resolution excluding 2 lines of coefficient data that is used by
  userspace to render processed frames.

properties:
  compatible:
    items:
      - const: melexis,mlx90640

  reg:
    description: I2C address of the device
    items:
      - description: The I2C address

required:
  - compatible
  - reg

additionalProperties: false

examples:
  - |
    i2c0@1c22000 {
        ...
        mlx90640@33 {
            compatible = "melexis,mlx90640";
            reg = <0x33>;
        };
        ...
    };
