---
$id: http://devicetree.org/schemas/st,stih407-bdisp.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: STMicroelectronics stih4xx bdisp

maintainers:
  - Fabien Dessenne <fabien.dessenne@st.com>

description: |
  STMicroelectronics stih4xx platforms

  bdisp: 2D blitter for STMicroelectronics SoC.

  Aliases:
  Each BDISP should have a numbered alias in the aliases node, in the form of
  bdispN, N = 0 or 1.

properties:
  compatible:
    const: "st,stih407-bdisp"

  reg:
    items:
      - description: Physical address and length of the BDISP register block

  interrupts:
    items:
      - description: BDISP interrupt number

  clocks:
    description: Hardware IP needed clocks; see common clock binding for details

  clock-names:
    items:
      - const: bdisp

required:
  - compatible
  - reg
  - interrupts
  - clocks
  - clock-names


additionalProperties: false

examples:
  - |
    bdisp0:bdisp@9f10000 {
      compatible = "st,stih407-bdisp";
      reg = <0x9f10000 0x1000>;
      interrupts = <GIC_SPI 38 IRQ_TYPE_NONE>;
      clocks = <&clk_s_c0_flexgen CLK_IC_BDISP_0>;
      clock-names = "bdisp";
    };
