%YAML 1.2
---
$id: http://devicetree.org/schemas/nvmem/brcm,ocotp.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Broadcom OTP memory controller

maintainers:
  - Jonathan Richardson <jonathar@broadcom.com>
  - Marco Franchi <marco.franchi@nxp.com>

description: |
  Broadcom OTP memory controller

properties:
  compatible:
    $ref: /schemas/types.yaml#/definitions/string-array
    description: >-
      Must be "brcm,ocotp" for first-generation Broadcom OTP controllers or
      "brcm,ocotp-v2" for second-generation controllers.
    items:
      - enum: ["brcm,ocotp", "brcm,ocotp-v2"]

  reg:
    items:
      - description: Base address of the OTP controller registers
      - description: Size of the OTP controller register window

  brcm,ocotp-size:
    description: Amount of memory available, in 32-bit words
    $ref: /schemas/types.yaml#/definitions/uint32

required:
  - compatible
  - reg
  - brcm,ocotp-size

additionalProperties: false

examples:
  - |
    otp: otp@301c800 {
        compatible = "brcm,ocotp";
        reg = <0x0301c800 0x2c>;
        brcm,ocotp-size = <2048>;
    };
