%YAML 1.2
---
$id: http://devicetree.org/schemas/brcm,sr-thermal.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Broadcom Stingray Thermal
maintainers:
  - Pramod Kumar <pramod.kumar@broadcom.com>

description: |
  Broadcom Stingray Thermal.

  This binding describes thermal sensors that are part of Stingray SoCs.

properties:
  compatible:
    items:
      - const: brcm,sr-thermal

  reg:
    description: Memory where tmon data will be available.
    items:
      - description: register address
      - description: size in bytes

  brcm,tmon-mask:
    description: A one-cell bit mask of valid TMON sources. Each bit represents a single TMON source.
    items:
      - description: TMON source mask

  '#thermal-sensor-cells':
    description: Thermal sensor phandler count.
    const: 1

  polling-delay:
    description: Max number of milliseconds to wait between polls.

  thermal-sensors:
    description: >
      A list of thermal sensor phandles and specifiers. The specifier value is the
      TMON ID and it must correspond with brcm,tmon-mask.
    items:
      - description: Thermal sensor phandle
      - description: TMON channel ID

  temperature:
    description: Trip temperature threshold in millidegree celsius.
    items:
      - description: temperature in millidegree celsius

required:
  - compatible
  - reg
  - brcm,tmon-mask
  - '#thermal-sensor-cells'
  - polling-delay
  - thermal-sensors
  - temperature

additionalProperties: false

examples:
  - |
    tmons {
      compatible = "simple-bus";
      #address-cells = <1>;
      #size-cells = <1>;
      ranges = <0x0 0x0 0x8f100000 0x100>;

      tmon: tmon@0 {
        compatible = "brcm,sr-thermal";
        reg = <0x0 0x40>;
        brcm,tmon-mask = <0x3f>;
        #thermal-sensor-cells = <1>;
      };
    };

    thermal-zones {
      ihost0_thermal: ihost0-thermal {
        polling-delay-passive = <0>;
        polling-delay = <1000>;
        thermal-sensors = <&tmon 0>;
        trips {
          cpu-crit {
            temperature = <105000>;
            hysteresis = <0>;
            type = "critical";
          };
        };
      };
      ihost1_thermal: ihost1-thermal {
        polling-delay-passive = <0>;
        polling-delay = <1000>;
        thermal-sensors = <&tmon 1>;
        trips {
          cpu-crit {
            temperature = <105000>;
            hysteresis = <0>;
            type = "critical";
          };
        };
      };
      ihost2_thermal: ihost2-thermal {
        polling-delay-passive = <0>;
        polling-delay = <1000>;
        thermal-sensors = <&tmon 2>;
        trips {
          cpu-crit {
            temperature = <105000>;
            hysteresis = <0>;
            type = "critical";
          };
        };
      };
      ihost3_thermal: ihost3-thermal {
        polling-delay-passive = <0>;
        polling-delay = <1000>;
        thermal-sensors = <&tmon 3>;
        trips {
          cpu-crit {
            temperature = <105000>;
            hysteresis = <0>;
            type = "critical";
          };
        };
      };
      crmu_thermal: crmu-thermal {
        polling-delay-passive = <0>;
        polling-delay = <1000>;
        thermal-sensors = <&tmon 4>;
        trips {
          cpu-crit {
            temperature = <105000>;
            hysteresis = <0>;
            type = "critical";
          };
        };
      };
      nitro_thermal: nitro-thermal {
        polling-delay-passive = <0>;
        polling-delay = <1000>;
        thermal-sensors = <&tmon 5>;
        trips {
          cpu-crit {
            temperature = <105000>;
            hysteresis = <0>;
            type = "critical";
          };
        };
      };
    };
