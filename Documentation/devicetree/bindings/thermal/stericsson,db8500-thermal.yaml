%YAML 1.2
---
$id: http://devicetree.org/schemas/stericsson,db8500-thermal.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: ST-Ericsson DB8500 Thermal

maintainers:
  - hongbo.zhang <hongbo.zhang@linaro.com>

description: |
  ST-Ericsson DB8500 Thermal

  Usually the num-trips and tripN-*** are separated in board related dts files.

properties:
  compatible:
    items:
      - const: stericsson,db8500-thermal

  reg:
    description: Registers address range of the thermal sensor
    items:
      - description: Address and size of the thermal sensor registers

  interrupts:
    description: Interrupts generated from PRCMU
    minItems: 1
    items:
      description: Interrupt specifier

  interrupt-names:
    description: Names for the interrupts
    items:
      - const: IRQ_HOTMON_LOW
      - const: IRQ_HOTMON_HIGH

  num-trips:
    description: Number of total trip points, set to 0 if none
    $ref: /schemas/types.yaml#/definitions/uint32

patternProperties:
  ^trip[0-9]+-temp$:
    description: Temperature of trip point N, in millidegree Celsius
    $ref: /schemas/types.yaml#/definitions/int32

  ^trip[0-9]+-type$:
    description: Type of trip point N
    enum:
      - active
      - passive
      - hot
      - critical

  ^trip[0-9]+-cdev-num$:
    description: Number of cooling devices bound to trip point N
    $ref: /schemas/types.yaml#/definitions/uint32

  ^trip[0-9]+-cdev-name[0-9]+$:
    description: Name of the cooling device M for trip point N
    $ref: /schemas/types.yaml#/definitions/string

required:
  - compatible
  - reg
  - interrupts
  - interrupt-names
  - num-trips

additionalProperties: false

examples:
  - |
    thermal@801573c0 {
        compatible = "stericsson,db8500-thermal";
        reg = <0x801573c0 0x40>;
        interrupts = <21 0x4>, <22 0x4>;
        interrupt-names = "IRQ_HOTMON_LOW", "IRQ_HOTMON_HIGH";
        num-trips = <3>;
        trip0-temp = <75000>;
        trip0-type = "active";
        trip0-cdev-num = <1>;
        trip0-cdev-name0 = "thermal-cpufreq-0";
        trip1-temp = <80000>;
        trip1-type = "active";
        trip1-cdev-num = <2>;
        trip1-cdev-name0 = "thermal-cpufreq-0";
        trip1-cdev-name1 = "thermal-fan";
        trip2-temp = <85000>;
        trip2-type = "critical";
        trip2-cdev-num = <0>;
    };
