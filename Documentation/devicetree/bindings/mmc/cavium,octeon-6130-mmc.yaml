%YAML 1.2
---
$id: http://devicetree.org/schemas/mmc/cavium,octeon-6130-mmc.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Cavium MMC controller

maintainers:
  - Jan Glauber <jan.glauber@gmail.com>

description: |
  The highspeed MMC host controller on Cavium's SoCs provides an interface
  for MMC and SD types of memory cards.

  Supported maximum speeds are the ones of the eMMC standard 4.41 as well
  as the speed of SD standard 4.0. Only 3.3 V is supported.

properties:
  compatible:
    items:
      - enum:
          - cavium,octeon-6130-mmc
          - cavium,octeon-7890-mmc
          - cavium,thunder-8190-mmc
          - cavium,thunder-8390-mmc

  reg:
    items:
      - description: MMC controller base registers

  clocks:
    maxItems: 1
    description: phandle to bus clock

  mmc-slot:
    description: MMC slot child node
    type: object
    additionalProperties: false
    properties:
      compatible:
        items:
          - enum:
              - mmc-slot
      reg:
        items:
          - description: slot index
      vmmc-supply:
        description: regulator supply for the MMC slot
      max-frequency:
        description: max. data clock frequency for the slot in Hz
      bus-width:
        description: data bus width for the slot in bits
      cap-sd-highspeed:
        description: indicates SD high-speed capability
        type: boolean
      cap-mmc-highspeed:
        description: indicates MMC high-speed capability
        type: boolean
      non-removable:
        description: slot is non-removable
        type: boolean
    required:
      - compatible
      - reg
      - vmmc-supply
      - max-frequency
      - bus-width

  cavium,cmd-clk-skew:
    description: number of coprocessor clocks before sampling command
    $ref: /schemas/types.yaml#/definitions/uint32

  cavium,dat-clk-skew:
    description: number of coprocessor clocks before sampling data
    $ref: /schemas/types.yaml#/definitions/uint32

  spi-max-frequency:
    description: deprecated, use max-frequency instead
    deprecated: true

  max-frequency:
    description: maximum data clock frequency in Hz

  bus-width:
    description: data bus width in bits

  power-gpios:
    description: deprecated, use vmmc-supply instead
    deprecated: true

  vmmc-supply:
    description: regulator supply for the MMC slot

  cavium,bus-max-width:
    description: deprecated, use bus-width instead
    deprecated: true

required:
  - compatible
  - reg
  - clocks

additionalProperties: false

examples:
  - |
    mmc_1_4: mmc@1,4 {
        compatible = "cavium,thunder-8390-mmc";
        reg = <0x0c00 0 0 0 0>;
        #address-cells = <1>;
        #size-cells = <0>;
        clocks = <&sclk>;

        mmc-slot@0 {
            compatible = "mmc-slot";
            reg = <0>;
            vmmc-supply = <&mmc_supply_3v3>;
            max-frequency = <42000000>;
            bus-width = <4>;
            cap-sd-highspeed;
        };

        mmc-slot@1 {
            compatible = "mmc-slot";
            reg = <1>;
            vmmc-supply = <&mmc_supply_3v3>;
            max-frequency = <42000000>;
            bus-width = <8>;
            cap-mmc-highspeed;
            non-removable;
        };
    };
