%YAML 1.2
---
$id: http://devicetree.org/schemas/mmc/socionext,milbeaut-m10v-sdhci-3.0.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Socionext Milbeaut M10V SDHCI 3.0 Controller

maintainers:
  - Takao Orito <orito.takao@socionext.com>

properties:
  compatible:
    items:
      - const: socionext,milbeaut-m10v-sdhci-3.0
  reg:
    maxItems: 1

  interrupts:
    maxItems: 1

  clock-names:
    items:
      - const: core
      - const: iface

  clocks:
    maxItems: 2

  bus-width:
    $ref: /schemas/types.yaml#/definitions/uint32
    description: Width of the data bus in bits.
  voltage-ranges:
    description: Supported voltage range in millivolts.
    items:
      - description: Minimum voltage.
      - description: Maximum voltage.
  cap-sdio-irq:
    type: boolean
    description: Indicates support for SDIO IRQ.
  fujitsu,cmd-dat-delay-select:
    type: boolean
    description: Requires CMD_DAT_DELAY control.

required:
  - compatible
  - reg
  - interrupts
  - interrupt-controller
  - clocks
  - clock-names

additionalProperties: false

examples:
  - |
    sdhci3: mmc@1b010000 {
        compatible = "socionext,milbeaut-m10v-sdhci-3.0";
        reg = <0x1b010000 0x10000>;
        interrupts = <0 265 0x4>;
        voltage-ranges = <3300 3300>;
        bus-width = <4>;
        clocks = <&clk 7>, <&ahb_clk>;
        clock-names = "core", "iface";
        cap-sdio-irq;
        fujitsu,cmd-dat-delay-select;
    };
