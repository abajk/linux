%YAML 1.2
---
$id: http://devicetree.org/schemas/mmc/st,spear300-sdhci.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: SPEAr SDHCI Controller

maintainers:
  - Viresh Kumar <viresh.kumar@linaro.org>

properties:
  compatible:
    items:
      - const: st,spear300-sdhci

  reg:
    items:
      - description: Register block for the SPEAr SDHCI controller

required:
  - compatible

additionalProperties: false

examples:
  - |
    sdhci@fc000000 {
        compatible = "st,spear300-sdhci";
        reg = <0xfc000000 0x1000>;
        cd-gpios = <&gpio0 6 0>;
    };
