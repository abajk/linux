---
$id: http://devicetree.org/schemas/mmc/st,sdhci.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: STMicroelectronics sdhci-st MMC/SD controller
maintainers:
  - Lee Jones <lee@kernel.org>
  - Marco Franchi <marco.franchi@nxp.com>
  - Masanari Iida <standby24x7@gmail.com>
  - Mauro Carvalho Chehab <mchehab+samsung@kernel.org>
  - Peter Griffin <peter.griffin@linaro.org>
  - Rob Herring <robh@kernel.org>
  - Simon Horman <horms+renesas@verge.net.au>
description: |
  STMicroelectronics sdhci-st MMC/SD controller

  This file documents the differences between the core properties in
  Documentation/devicetree/bindings/mmc/mmc.txt and the properties
  used by the sdhci-st driver.
properties:
  compatible:
    oneOf:
      - items:
          - enum: [st, sdhci-stih407]
          - const: st, sdhci
      - items:
          - const: st,sdhci
  reg:
    items:
      - description: host controller base address
      - description: FlashSS Top register for TX/RX delay used by the driver to configure DLL inside FlashSS
  reg-names:
    items:
      - const: mmc
      - const: top-mmc-delay
  interrupts:
    items:
      - description: MMC interrupt
  interrupt-names:
    items:
      - const: mmcirq
  clocks:
    items:
      - description: MMC bus clock
      - description: internal clock (icn)
  clock-names:
    items:
      - const: mmc
      - const: icn
  resets:
    description: softreset line of host controller IP
    maxItems: 1
  vqmmc-supply:
    description: regulator supply for MMC I/O
  pinctrl-names:
    items:
      - const: default
  pinctrl-0:
    allOf:
      - $ref: /schemas/types.yaml#/definitions/phandle
    description: default pinctrl state for data pins
  bus-width:
    allOf:
      - $ref: /schemas/types.yaml#/definitions/uint32
    description: number of data lines
  max-frequency:
    allOf:
      - $ref: /schemas/types.yaml#/definitions/uint32
    description: maximum bus frequency
    enum: [200000000, 100000000, 50000000]
  non-removable:
    type: boolean
    description: slot is non-removable
  sd-uhs-sdr50:
    type: boolean
    description: enable SDR50 in mmcss
  sd-uhs-sdr104:
    type: boolean
    description: enable SDR104 in mmcss
  sd-uhs-ddr50:
    type: boolean
    description: enable DDR50 in mmcss
required:
  - compatible
  - reg
  - interrupts
  - interrupt-names
  - pinctrl-names
  - pinctrl-0
  - clocks
  - clock-names
additionalProperties: false
examples:
  - |
    mmc0: sdhci@fe81e000 {
      compatible = "st,sdhci";
      reg = <0xfe81e000 0x1000>;
      interrupts = <GIC_SPI 127 IRQ_TYPE_NONE>;
      interrupt-names = "mmcirq";
      pinctrl-names = "default";
      pinctrl-0 = <&pinctrl_mmc0>;
      clock-names = "mmc";
      clocks = <&clk_s_a1_ls 1>;
      bus-width = <8>;
    };
  - |
    mmc1: sdhci@9080000 {
      compatible = "st,sdhci-stih407", "st,sdhci";
      reg = <0x09080000 0x7ff>;
      reg-names = "mmc";
      interrupts = <GIC_SPI 90 IRQ_TYPE_NONE>;
      interrupt-names = "mmcirq";
      pinctrl-names = "default";
      pinctrl-0 = <&pinctrl_sd1>;
      clock-names = "mmc";
      clocks = <&clk_s_c0_flexgen CLK_MMC_1>;
      resets = <&softreset STIH407_MMC1_SOFTRESET>;
      bus-width = <4>;
    };
  - |
    mmc0: sdhci@9060000 {
      compatible = "st,sdhci-stih407", "st,sdhci";
      reg = <0x09060000 0x7ff>, <0x9061008 0x20>;
      reg-names = "mmc", "top-mmc-delay";
      interrupts = <GIC_SPI 92 IRQ_TYPE_NONE>;
      interrupt-names = "mmcirq";
      pinctrl-names = "default";
      pinctrl-0 = <&pinctrl_mmc0>;
      clock-names = "mmc";
      clocks = <&clk_s_c0_flexgen CLK_MMC_0>;
      vqmmc-supply = <&vmmc_reg>;
      max-frequency = <200000000>;
      bus-width = <8>;
      non-removable;
      sd-uhs-sdr50;
      sd-uhs-sdr104;
      sd-uhs-ddr50;
    };
