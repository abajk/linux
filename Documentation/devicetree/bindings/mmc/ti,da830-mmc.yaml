%YAML 1.2
---
$id: http://devicetree.org/schemas/mmc/ti,da830-mmc.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: TI DaVinci MMC Host Controller
maintainers:
  - Manjunathappa, Prakash <prakash.pm@ti.com>
  - Rob Herring <robh@kernel.org>

description: |
  * TI Highspeed MMC host controller for DaVinci

  The Highspeed MMC Host Controller on TI DaVinci family
  provides an interface for MMC, SD and SDIO types of memory cards.

  This file documents the properties used by the davinci_mmc driver.

properties:
  compatible:
    description: Hardware compatibility string.
    items:
      - enum:
          - ti,da830-mmc
          - ti,dm355-mmc

  reg:
    description: Register base address and size.
    items:
      - description: Base address
      - description: Size of register region

  interrupts:
    description: Interrupt line for the MMC host controller.
    items:
      - description: Interrupt

  bus-width:
    description: Number of data lines.
    items:
      - enum: [1, 4, 8]
    default: 1

  max-frequency:
    description: Maximum operating clock frequency.
    items:
      - description: Frequency in Hz
    default: 25000000

  dmas:
    description: >
      List of DMA specifiers with the controller specific format.
      A tx and rx specifier is required.
    items:
      $ref: /schemas/types.yaml#/definitions/phandle-array
    minItems: 2
    maxItems: 2

  dma-names:
    description: RX and TX DMA request names corresponding to specifiers in 'dmas'.
    $ref: /schemas/types.yaml#/definitions/string-array
    items:
      - const: rx
      - const: tx

required:
  - compatible
  - reg
  - interrupts

additionalProperties: false

examples:
  - |
    mmc0: mmc@1c40000 {
        compatible = "ti,da830-mmc";
        reg = <0x40000 0x1000>;
        interrupts = <16>;
        bus-width = <4>;
        max-frequency = <50000000>;
        dmas = <&edma 16
            &edma 17>;
        dma-names = "rx", "tx";
    };
