%YAML 1.2
---
$id: http://devicetree.org/schemas/mmc/sdhci-omap.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: TI OMAP SDHCI Controller

maintainers:
  - Chunyan Zhang <zhang.chunyan@linaro.org>
  - Faiz Abbas <faiz_abbas@ti.com>
  - Kishon Vijay Abraham I <kishon@kernel.org>
  - Tony Lindgren <tony@atomide.com>

description: |
  TI OMAP SDHCI Controller

  Refer to mmc.txt for standard MMC bindings.

  For UHS devices which require tuning, the device tree should have a "cpu_thermal" node
  which maps to the appropriate thermal zone. This is used to get the temperature of the zone during tuning.

properties:
  compatible:
    items:
      - enum:
          - "ti,omap2430-sdhci"
          - "ti,omap3-sdhci"
          - "ti,omap4-sdhci"
          - "ti,omap5-sdhci"
          - "ti,dra7-sdhci"
          - "ti,k2g-sdhci"
          - "ti,am335-sdhci"
          - "ti,am437-sdhci"

  reg:
    description: Base address and size of the controller register region.
    items:
      - description: Register base address
      - description: Register region length

  ti,hwmods:
    description: >
      Must be "mmc<n>", where <n> is the controller instance number starting from 1.
    pattern: '^mmc[1-9][0-9]*$'

  pinctrl-names:
    description: >
      Pinctrl state names. Allowed values include "default", "hs", "sdr12",
      "sdr25", "sdr50", "ddr50-rev11", "sdr104-rev11", "ddr50", "sdr104",
      "ddr_1_8v-rev11", "ddr_1_8v", "ddr_3_3v", "hs200_1_8v-rev11", "hs200_1_8v".
    $ref: /schemas/types.yaml#/definitions/string-array
    items:
      - enum:
          - default
          - hs
          - sdr12
          - sdr25
          - sdr50
          - ddr50-rev11
          - sdr104-rev11
          - ddr50
          - sdr104
          - ddr_1_8v-rev11
          - ddr_1_8v
          - ddr_3_3v
          - hs200_1_8v-rev11
          - hs200_1_8v

  dmas:
    description: DMA specifiers for TX and RX.
    $ref: /schemas/types.yaml#/definitions/phandle-array

  dma-names:
    description: DMA request names corresponding to "dmas".
    $ref: /schemas/types.yaml#/definitions/string-array
    items:
      - const: tx
      - const: rx

  bus-width:
    description: Data bus width.
    $ref: /schemas/types.yaml#/definitions/uint32

  vmmc-supply: true

  ti,non-removable:
    description: Deprecated alias for the generic "non-removable" property.
    type: boolean

patternProperties:
  "^pinctrl-[0-9]+$":
    description: >
      Pinctrl phandle-array for a given state as defined by "pinctrl-names".
    $ref: /schemas/types.yaml#/definitions/phandle-array

allOf:
  - if:
      properties:
        compatible:
          contains:
            const: "ti,k2g-sdhci"
    then:
      # ti,hwmods not required for K2G
      properties:
        ti,hwmods: {}
    else:
      required:
        - ti,hwmods

required:
  - compatible
  - reg

additionalProperties: false

examples:
  - |
    mmc1: mmc@4809c000 {
        compatible = "ti,dra7-sdhci";
        reg = <0x4809c000 0x400>;
        ti,hwmods = "mmc1";
        bus-width = <4>;
        vmmc-supply = <&vmmc>;
        dmas = <&sdma 61 &sdma 62>;
        dma-names = "tx", "rx";
    };
