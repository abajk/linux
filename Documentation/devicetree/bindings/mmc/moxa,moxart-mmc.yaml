%YAML 1.2
---
$id: http://devicetree.org/schemas/moxa,moxart-mmc.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: MOXA ART MMC Host Controller Interface

maintainers:
  - Jonas Jensen <jonas.jensen@gmail.com>

description: |
  MOXA ART MMC Host Controller Interface

  Inherits from mmc binding[1].

  [1] Documentation/devicetree/bindings/mmc/mmc.txt

properties:
  compatible:
    items:
      - enum: [moxa, moxart-mmc, faraday, ftsdc010]

  reg:
    description: Register base address and size.
    items:
      - description: register base address
      - description: register size

  interrupts:
    description: Interrupt specifier.
    items:
      - description: interrupt number
      - description: interrupt flags

  interrupt-controller: true

  clocks:
    maxItems: 1
    description: Clock feeding the MMC controller.

  dmas:
    description: DMA channels specifier. Two entries for TX and RX channels, both requesting line number 5.
    items:
      - description: TX DMA channel specifier
      - description: RX DMA channel specifier

  dma-names:
    description: Names for the DMA channels.
    $ref: /schemas/types.yaml#/definitions/string-array
    items:
      - enum: [tx]
      - enum: [rx]

required:
  - compatible
  - reg
  - interrupts
  - interrupt-controller
  - clocks

additionalProperties: false

examples:
  - |
    mmc: mmc@98e00000 {
        compatible = "moxa,moxart-mmc";
        reg = <0x98e00000 0x5C>;
        interrupts = <5 0>;
        clocks = <&clk_apb>;
        dmas =  <&dma 5>,
            <&dma 5>;
        dma-names = "tx", "rx";
    };
