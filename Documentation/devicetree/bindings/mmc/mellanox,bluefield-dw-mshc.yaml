%YAML 1.2
---
$id: http://devicetree.org/schemas/mmc/mellanox,bluefield-dw-mshc.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Mellanox Bluefield SoC DW MSHC
maintainers:
  - Liming Sun <lsun@mellanox.com>

description: |
  Mellanox Bluefield SoC specific extensions to the Synopsys Designware
  Mobile Storage Host Controller

  Read synopsys-dw-mshc.txt for more details

  The Synopsys designware mobile storage host controller is used to interface
  a SoC with storage medium such as eMMC or SD/MMC cards. This file documents
  differences between the core Synopsys dw mshc controller properties described
  by synopsys-dw-mshc.txt and the properties used by the Mellanox Bluefield SoC
  specific extensions to the Synopsys Designware Mobile Storage Host Controller.

properties:
  compatible:
    items:
      - const: "mellanox,bluefield-dw-mshc"
  reg:
    description: 'Controller registers: base address and size.'
    items:
      - description: Controller registers
  interrupts:
    description: Controller interrupt
    items:
      - description: Controller interrupt
  fifo-depth:
    description: Depth of the FIFO in bytes.
    $ref: /schemas/types.yaml#/definitions/uint32
  clock-frequency:
    description: MMC bus clock frequency in Hz.
  bus-width:
    description: Width of the MMC bus in bits.
    $ref: /schemas/types.yaml#/definitions/uint32
  cap-mmc-highspeed:
    description: Controller supports MMC high-speed mode.
    type: boolean

required:
  - compatible
  - reg
  - interrupts

additionalProperties: false

examples:
  - |
    mmc@6008000 {
        compatible = "mellanox,bluefield-dw-mshc";
        reg = <0x6008000 0x400>;
        interrupts = <32>;
        fifo-depth = <0x100>;
        clock-frequency = <24000000>;
        bus-width = <8>;
        cap-mmc-highspeed;
    };
