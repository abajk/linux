%YAML 1.2
---
$id: http://devicetree.org/schemas/mmc/ti-omap-hsmmc.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: TI Highspeed MMC host controller for OMAP and 66AK2G family

maintainers:
  - Andreas Fenkart <afenkart@gmail.com>
  - Arnd Bergmann <arnd@arndb.de>
  - Bjorn Helgaas <bhelgaas@google.com>
  - Chris Ball <cjb@laptop.org>
  - Hebbar, Gururaja <gururaja.hebbar@ti.com>
  - Kishon Vijay Abraham I <kishon@kernel.org>
  - Lokesh Vutla <lokeshvutla@ti.com>
  - Mathieu Malaterre <malat@debian.org>
  - Matt Porter <mporter@ti.com>
  - Mauro Carvalho Chehab <mchehab+huawei@kernel.org>
  - Nishanth Menon <nm@ti.com>
  - Rajendra Nayak <rnayak@ti.com>
  - Tomas Paukrt <tomaspaukrt@email.cz>
description: |
  * TI Highspeed MMC host controller for OMAP and 66AK2G family.

  The Highspeed MMC Host Controller on TI OMAP and 66AK2G family
  provides an interface for MMC, SD, and SDIO types of memory cards.

  This file documents differences between the core properties described
  by mmc.txt and the properties used by the omap_hsmmc driver.

  [workaround for missing swakeup on am33xx]

  This SOC is missing the swakeup line, it will not detect SDIO irq
  while in suspend.

                               ------
                               | PRCM |
                                ------
                                 ^ |
                         swakeup | | fclk
                                 | v
         ------                -------               -----
        | card | -- CIRQ -->  | hsmmc | -- IRQ -->  | CPU |
         ------                -------               -----

  In suspend the fclk is off and the module is dysfunctional. Even register reads
  will fail. A small logic in the host will request fclk restore, when an
  external event is detected. Once the clock is restored, the host detects the
  event normally. Since am33xx doesn't have this line it never wakes from
  suspend.

  The workaround is to reconfigure the dat1 line as a GPIO upon suspend. To make
  this work, we need to set the named pinctrl states "default" and "idle".
  Prepare idle to remux dat1 as a gpio, and default to remux it back as sdio
  dat1. The MMC driver will then toggle between idle and default state during
  runtime.

  In summary:
  1. select matching 'compatible' section, see example below.
  2. specify pinctrl states "default" and "idle", "sleep" is optional.
  3. specify the gpio irq used for detecting sdio irq in suspend

  If configuration is incomplete, a warning message is emitted "falling back to
  polling". Also check the "sdio irq mode" in /sys/kernel/debug/mmc0/regs. Mind
  not every application needs SDIO irq, e.g. MMC cards.

properties:
  compatible:
    enum:
      - ti,omap2-hsmmc
      - ti,omap3-hsmmc
      - ti,omap3-pre-es3-hsmmc
      - ti,omap4-hsmmc
      - ti,am33xx-hsmmc
      - ti,k2g-hsmmc

  ti,hwmods:
    description: Must be "mmc<n>", n is controller instance starting 1.
    pattern: '^mmc[0-9]+$'

  power-domains:
    description: |
      Should contain a phandle to a PM domain provider node and an args specifier
      containing the MMC device id value. This property is as per the binding
      Documentation/devicetree/bindings/soc/ti/sci-pm-domain.yaml
    $ref: /schemas/types.yaml#/definitions/phandle-array

  clocks:
    description: |
      Must contain an entry for each entry in clock-names. Should be defined as per
      the appropriate clock bindings consumer usage in
      Documentation/devicetree/bindings/clock/ti,sci-clk.yaml
    maxItems: 2

  clock-names:
    items:
      - const: fck
      - const: mmchsdb_fck

  ti,dual-volt:
    description: Supports dual voltage cards.
    type: boolean

  vmmc-supply:
    description: Phandle to the regulator device tree node.

  vmmc_aux-supply:
    description: Phandle to the regulator device tree node. Deprecated.
    deprecated: true

  vqmmc-supply:
    description: Phandle to the regulator device tree node.

  ti,non-removable:
    description: Non-removable slot (like eMMC).
    type: boolean

  ti,needs-special-reset:
    description: Requires a special softreset sequence.
    type: boolean

  ti,needs-special-hs-handling:
    description: HSMMC IP needs special setting for handling High Speed.
    type: boolean

  dmas:
    description: |
      List of DMA specifiers with the controller specific format as described in
      the generic DMA client binding. A tx and rx specifier is required.
    $ref: /schemas/types.yaml#/definitions/phandle-array

  dma-names:
    description: |
      List of DMA request names. These strings correspond 1:1 with the DMA specifiers
      listed in dmas. The string naming is to be "rx" and "tx" for RX and TX DMA
      requests, respectively.
    items:
      - const: rx
      - const: tx

  pinctrl-names:
    description: Pin controller state names.
    $ref: /schemas/types.yaml#/definitions/string-array
    items:
      - const: default
      - const: idle
      - const: sleep

  interrupts:
    description: GPIO IRQ used for detecting SDIO IRQ in suspend.
    maxItems: 1

required:
  - compatible

allOf:
  - if:
      properties:
        compatible:
          contains:
            const: ti,omap2-hsmmc
    then:
      required: [ti, hwmods]

  - if:
      properties:
        compatible:
          contains:
            const: ti,omap3-hsmmc
    then:
      required: [ti, hwmods]

  - if:
      properties:
        compatible:
          contains:
            const: ti,omap3-pre-es3-hsmmc
    then:
      required: [ti, hwmods]

  - if:
      properties:
        compatible:
          contains:
            const: ti,omap4-hsmmc
    then:
      required: [ti, hwmods]

  - if:
      properties:
        compatible:
          contains:
            const: ti,am33xx-hsmmc
    then:
      required: [ti, hwmods]

  - if:
      properties:
        compatible:
          contains:
            const: ti,k2g-hsmmc
    then:
      required: [power-domains, clocks, clock-names]

additionalProperties: false
