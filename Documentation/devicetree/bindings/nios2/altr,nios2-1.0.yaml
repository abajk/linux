%YAML 1.2
---
$id: http://devicetree.org/schemas/altr,nios2-1.0.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Nios II Processor

maintainers:
  - Bjorn Helgaas <bhelgaas@google.com>
  - Ley Foon Tan <lftan@altera.com>
  - Mathieu Malaterre <malat@debian.org>

description: |
  Nios II Processor Binding

  This binding specifies what properties available in the device tree
  representation of a Nios II Processor Core.

  Users can use sopc2dts tool for generating device tree sources (dts) from a
  Qsys system. See more detail in: http://www.alterawiki.com/wiki/Sopc2dts

properties:
  compatible:
    items:
      - const: altr,nios2-1.0

  device_type:
    description: Must be "cpu".
    items:
      - const: cpu

  reg:
    description: CPU index.
    items:
      - description: CPU index

  interrupt-controller: true

  '#interrupt-cells':
    const: 1

  clock-frequency:
    description: Contains the clock frequency for CPU, in Hz.

  dcache-line-size:
    description: Contains data cache line size.

  icache-line-size:
    description: Contains instruction cache line size.

  dcache-size:
    description: Contains data cache size.

  icache-size:
    description: Contains instruction cache size.

  altr,implementation:
    description: Nios II core implementation.
    enum:
      - fast

  altr,pid-num-bits:
    description: Specifies the number of bits to use to represent the process identifier (PID).

  altr,tlb-num-ways:
    description: Specifies the number of set-associativity ways in the TLB.

  altr,tlb-num-entries:
    description: Specifies the number of entries in the TLB.

  altr,tlb-ptr-sz:
    description: Specifies size of TLB pointer.

  altr,has-div:
    description: Specifies CPU hardware divide support.

  altr,has-mul:
    description: Specifies CPU hardware multiply support.
    const: 1

  altr,has-initda:
    description: Specifies CPU support for initda instruction.
    const: 1

  altr,has-mmu:
    description: Specifies CPU support for MMU.
    const: 1

  altr,reset-addr:
    description: Specifies CPU reset address.

  altr,fast-tlb-miss-addr:
    description: Specifies CPU fast TLB miss exception address.

  altr,exception-addr:
    description: Specifies CPU exception address.

required:
  - compatible
  - device_type
  - reg
  - interrupt-controller
  - '#interrupt-cells'
  - clock-frequency
  - dcache-line-size
  - icache-line-size
  - dcache-size
  - icache-size
  - altr,pid-num-bits
  - altr,tlb-num-ways
  - altr,tlb-num-entries
  - altr,tlb-ptr-sz
  - altr,has-mul
  - altr,has-initda
  - altr,has-mmu
  - altr,reset-addr
  - altr,fast-tlb-miss-addr
  - altr,exception-addr

additionalProperties: false

examples:
  - |
    cpu@0 {
      device_type = "cpu";
      compatible = "altr,nios2-1.0";
      reg = <0>;
      interrupt-controller;
      #interrupt-cells = <1>;
      clock-frequency = <125000000>;
      dcache-line-size = <32>;
      icache-line-size = <32>;
      dcache-size = <32768>;
      icache-size = <32768>;
      altr,implementation = "fast";
      altr,pid-num-bits = <8>;
      altr,tlb-num-ways = <16>;
      altr,tlb-num-entries = <128>;
      altr,tlb-ptr-sz = <7>;
      altr,has-div = <1>;
      altr,has-mul = <1>;
      altr,reset-addr = <0xc2800000>;
      altr,fast-tlb-miss-addr = <0xc7fff400>;
      altr,exception-addr = <0xd0000020>;
      altr,has-initda = <1>;
      altr,has-mmu = <1>;
    };
