%YAML 1.2
---
$id: http://devicetree.org/schemas/ipmi/aspeed,ast2400-ibt-bmc.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Aspeed BT IPMI interface

maintainers:
  - Cédric Le Goater <clg@kaod.org>
  - Jae Hyun Yoo <jae.hyun.yoo@linux.intel.com>
  - Joel Stanley <joel@jms.id.au>

description: |
  * Aspeed BT (Block Transfer) IPMI interface

  The Aspeed SOCs (AST2400 and AST2500) are commonly used as BMCs
  (BaseBoard Management Controllers) and the BT interface can be used to
  perform in-band IPMI communication with their host.

properties:
  compatible:
    items:
      - enum:
          - aspeed,ast2400-ibt-bmc
          - aspeed,ast2500-ibt-bmc
          - aspeed,ast2600-ibt-bmc

  reg:
    description: Physical address and size of the registers
    items:
      - description: register address
      - description: register size

  clocks:
    description: Clock for the device
    items:
      - description: bus clock

  interrupts:
    description: Interrupt generated by the BT interface; without an interrupt,
      the driver will operate in poll mode
    items:
      - description: interrupt number

required:
  - compatible
  - reg
  - clocks

additionalProperties: false

examples:
  - |
    ibt@1e789140 {
        compatible = "aspeed,ast2400-ibt-bmc";
        reg = <0x1e789140 0x18>;
        interrupts = <8>;
        clocks = <&syscon ASPEED_CLK_GATE_LCLK>;
    };
