%YAML 1.2
---
$id: http://devicetree.org/schemas/extcon/maxim,max3355.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Maxim Integrated MAX3355 USB OTG chip

maintainers:
  - Sergei Shtylyov <sergei.shtylyov@cogentembedded.com>

description:
  MAX3355 integrates a charge pump and comparators to enable a system with an
  integrated USB OTG dual-role transceiver to function as a USB OTG dual-role
  device.

properties:
  compatible:
    const: maxim,max3355

  id-gpios:
    description: GPIO specifier for the MAX3355 ID_OUT pin.
    maxItems: 1

  maxim,shdn-gpios:
    description: GPIO specifier for the MAX3355 SHDN# pin.
    maxItems: 1

required:
  - compatible
  - id-gpios
  - maxim,shdn-gpios

additionalProperties: false

examples:
  - |
    usb-otg {
      compatible = "maxim,max3355";
      maxim,shdn-gpios = <&gpio2 4 GPIO_ACTIVE_LOW>;
      id-gpios = <&gpio5 31 GPIO_ACTIVE_HIGH>;
    };
