%YAML 1.2
---
$id: http://devicetree.org/schemas/mips/cavium/cavium,octeon-7130-sata-uctl.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: UCTL SATA controller glue

maintainers:
  - Aleksey Makarov <aleksey.makarov@caviumnetworks.com>

description: |
  UCTL is the bridge unit between the I/O interconnect (an internal bus)
  and the SATA AHCI host controller (UAHC). It performs the following functions:
    - provides interfaces for the applications to access the UAHC AHCI
      registers on the CN71XX I/O space.
    - provides a bridge for UAHC to fetch AHCI command table entries and data
      buffers from Level 2 Cache.
    - posts interrupts to the CIU.
    - contains registers that:
        - control the behavior of the UAHC
        - control the clock/reset generation to UAHC
        - control endian swapping for all UAHC registers and DMA accesses

properties:
  compatible:
    items:
      - const: cavium,octeon-7130-sata-uctl

  reg:
    description: The base address of the UCTL register bank.
    maxItems: 1

  '#address-cells':
    description: Number of address cells used by child nodes.
    const: 2

  '#size-cells':
    description: Number of size cells used by child nodes.
    const: 2

  ranges:
    description: Direct mapping of child address space.

  dma-ranges:
    description: Direct mapping of DMA address space.

additionalProperties: false

examples:
  - |
    uctl@118006c000000 {
        compatible = "cavium,octeon-7130-sata-uctl";
        reg = <0x11800 0x6c000000 0x0 0x100>;
        ranges;
        dma-ranges;
        #address-cells = <2>;
        #size-cells = <2>;

        sata: sata@16c0000000000 {
            compatible = "cavium,octeon-7130-ahci";
            reg = <0x16c00 0x00000000 0x0 0x200>;
            interrupts = <2 4>; /* Bit: 2, level */
        };
    };
