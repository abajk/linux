%YAML 1.2
---
$id: http://devicetree.org/schemas/img,xilfpga.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Imagination University Program MIPSfpga

maintainers:
  - Zubair Lutfullah Kakakakhel <Zubair.Kakakhel@imgtec.com>

description: |
  Imagination University Program MIPSfpga

  Under the Imagination University Program, a microAptiv UP core has been
  released for academic usage.

  As we are dealing with a MIPS core instantiated on an FPGA, specifications
  are fluid and can be varied in RTL.

  This binding document is provided as baseline guidance for the example
  project provided by IMG.

  The example project runs on the Nexys4DDR board by Digilent powered by
  the ARTIX-7 FPGA by Xilinx.

  Boot protocol:

  The BootRAM is a writeable "RAM" in FPGA at 0x1FC0_0000.
  This is for easy reprogrammibility via JTAG.

  The BootRAM initializes the cache and the axi_uart peripheral.

  DDR initialization is already handled by a HW IP block.

  When the example project bitstream is loaded, the cpu_reset button
  needs to be pressed.

  The bootram initializes the cache and axi_uart.
  Then outputs MIPSFPGA\n\r on the serial port on the Nexys4DDR board.

  At this point, the board is ready to load the Linux kernel
  vmlinux file via JTAG.

properties:
  compatible:
    description: Must include both the IMG FPGA SoC and board identifiers.
    oneOf:
      - items:
          - const: img,xilfpga
          - const: digilent,nexys4ddr
      - items:
          - const: digilent,nexys4ddr
          - const: img,xilfpga

  cpus:
    description: CPU nodes container.
    type: object
    additionalProperties: false
    properties:
      "#address-cells":
        const: 1
      "#size-cells":
        const: 0
    patternProperties:
      "^cpu@[0-9]+$":
        description: CPU core node.
        type: object
        additionalProperties: false
        properties:
          device_type:
            const: cpu
          compatible:
            items:
              - const: mips,m14Kc
          reg:
            items:
              - description: CPU index.
          clocks:
            items:
              - $ref: /schemas/types.yaml#/definitions/phandle
        required:
          - device_type
          - compatible
          - reg
          - clocks

  ext:
    description: External fixed clock source for the CPU core.
    type: object
    additionalProperties: false
    properties:
      compatible:
        enum: [fixed-clock]
      "#clock-cells":
        const: 0
      clock-frequency:
        description: Frequency of the external clock in Hz.
        $ref: /schemas/types.yaml#/definitions/uint32

additionalProperties: false

examples:
  - |
    soc@0 {
        compatible = "img,xilfpga", "digilent,nexys4ddr";
        cpus {
            #address-cells = <1>;
            #size-cells = <0>;

            cpu0: cpu@0 {
                device_type = "cpu";
                compatible = "mips,m14Kc";
                reg = <0>;
                clocks = <&ext>;
            };
        };

        ext: ext {
            compatible = "fixed-clock";
            #clock-cells = <0>;
            clock-frequency = <50000000>;
        };
    };
