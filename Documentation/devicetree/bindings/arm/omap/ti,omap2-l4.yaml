%YAML 1.2
---
$id: http://devicetree.org/schemas/arm/omap/ti,omap2-l4.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: OMAP L4 interconnect bus

maintainers:
  - Tero Kristo <t-kristo@ti.com>
  - Tony Lindgren <tony@atomide.com>

description: |
  L4 interconnect bindings

  These bindings describe the OMAP SoCs L4 interconnect bus.

properties:
  compatible:
    oneOf:
      - items:
          - enum:
            - ti,omap2-l4
            - ti,omap2-l4-wkup
            - ti,omap3-l4-core
            - ti,omap4-l4-cfg
            - ti,omap4-l4-per
            - ti,omap4-l4-wkup
            - ti,omap5-l4-cfg
            - ti,omap5-l4-wkup
            - ti,dra7-l4-cfg
            - ti,dra7-l4-wkup
            - ti,am3-l4-wkup
            - ti,am4-l4-wkup
          - const: simple-bus
      - items:
          - enum:
            - ti,omap2-l4
            - ti,omap2-l4-wkup
            - ti,omap3-l4-core
            - ti,omap4-l4-cfg
            - ti,omap4-l4-per
            - ti,omap4-l4-wkup
            - ti,omap5-l4-cfg
            - ti,omap5-l4-wkup
            - ti,dra7-l4-cfg
            - ti,dra7-l4-wkup
            - ti,am3-l4-wkup
            - ti,am4-l4-wkup

  ranges: true

  reg:
    items:
      - description: link agent
      - description: interconnect agent 0
      - description: interconnect agent 1
      - description: interconnect agent 2
      - description: interconnect agent 3
      - description: access protection

  reg-names:
    items:
      - const: la
      - const: ia0
      - const: ia1
      - const: ia2
      - const: ia3
      - const: ap

additionalProperties: false

examples:
  - |
    l4: interconnect@48000000 {
        compatible = "ti,omap4-l4-per", "simple-bus";
        reg = <0x48000000 0x800>,
              <0x48000800 0x800>,
              <0x48001000 0x400>,
              <0x48001400 0x400>,
              <0x48001800 0x400>,
              <0x48001c00 0x400>;
        reg-names = "ap", "la", "ia0", "ia1", "ia2", "ia3";
        #address-cells = <1>;
        #size-cells = <1>;
        ranges = <0 0x48000000 0x100000>;
    };
