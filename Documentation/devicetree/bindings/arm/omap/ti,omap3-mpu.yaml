%YAML 1.2
---
$id: http://devicetree.org/schemas/arm/omap/ti,omap3-mpu.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: TI OMAP MPU

maintainers:
  - Benoit Cousson <b-cousson@ti.com>
  - Dave Gerlach <d-gerlach@ti.com>
  - Mauro Carvalho Chehab <mchehab+huawei@kernel.org>
  - Rajendra Nayak <rnayak@ti.com>
  - Sricharan R <r.sricharan@ti.com>

description: |
  TI - MPU (Main Processor Unit) subsystem
  The MPU subsystem contain one or several ARM cores depending of the version.
  The MPU contain CPUs, GIC, L2 cache and a local PRCM.

properties:
  compatible:
    description: The compatibility string for the MPU type
    items:
      - enum:
          - "ti,omap3-mpu"
          - "ti,omap4-mpu"
          - "ti,omap5-mpu"

  ti,hwmods:
    description: Hardware modules for the MPU, must be "mpu"
    items:
      - const: mpu

  sram:
    description: Phandle to the OCMCRAM node
    $ref: /schemas/types.yaml#/definitions/phandle

  pm-sram:
    description: >
      Phandles to OCMCRAM nodes for power management; first is protect-exec
      region, second is data region
    $ref: /schemas/types.yaml#/definitions/phandle-array
    minItems: 2
    maxItems: 2

required:
  - compatible
  - ti,hwmods

allOf:
  - if:
      properties:
        compatible:
          contains:
            const: "ti,omap3-mpu"
    then:
      required:
        - pm-sram
    else:
      properties:
        pm-sram: false

additionalProperties: false

examples:
  - |
    mpu {
        compatible = "ti,omap5-mpu";
        ti,hwmods = "mpu";
    };
  - |
    mpu {
        compatible = "ti,omap3-mpu";
        ti,hwmods = "mpu";
        pm-sram = <&pm_sram_code
                   &pm_sram_data>;
    };
