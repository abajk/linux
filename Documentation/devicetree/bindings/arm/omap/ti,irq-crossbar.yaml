%YAML 1.2
---
$id: http://devicetree.org/schemas/ti,irq-crossbar.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: TI IRQ Crossbar

maintainers:
  - Jon Hunter <jonathanh@nvidia.com>
  - Marc Zyngier <maz@kernel.org>
  - Mathieu Malaterre <malat@debian.org>
  - Mauro Carvalho Chehab <mchehab+samsung@kernel.org>
  - Nishanth Menon <nm@ti.com>
  - Rob Herring <robh@kernel.org>
  - Sricharan R <r.sricharan@ti.com>

description: |
  Some socs have a large number of interrupts requests to service
  the needs of its many peripherals and subsystems. All of the
  interrupt lines from the subsystems are not needed at the same
  time, so they have to be muxed to the irq-controller appropriately.
  In such places a interrupt controllers are preceded by an CROSSBAR
  that provides flexibility in muxing the device requests to the controller
  inputs.

properties:
  compatible:
    enum: ["ti,irq-crossbar"]
  reg:
    maxItems: 1

  interrupt-controller: true
  ti,max-irqs:
    description: Total number of IRQs available at the parent interrupt controller
    $ref: /schemas/types.yaml#/definitions/uint32
  ti,max-crossbar-sources:
    description: Maximum number of crossbar sources that can be routed
    $ref: /schemas/types.yaml#/definitions/uint32
  ti,reg-size:
    description: Size of each crossbar register in bytes (valid values are 1, 2, or 4)
    $ref: /schemas/types.yaml#/definitions/uint32
    enum: [1, 2, 4]
#  "ti,irqs-reserved":
#    description: List of reserved IRQ lines not muxed by the crossbar
#    $ref: /schemas/types.yaml#/definitions/uint32-array
  "ti,irqs-skip":
    description: SOC-specific hard-wired IRQs with crossbar registers that cannot be used
    $ref: /schemas/types.yaml#/definitions/uint32-array
  "ti,irqs-safe-map":
    description: Safe configuration map used when an interrupt is unused
    $ref: /schemas/types.yaml#/definitions/uint32

required:
  - compatible
  - reg
  - interrupt-controller
  - ti,max-irqs
  - ti,max-crossbar-sources
  - ti,reg-size
  - ti,irqs-reserved

additionalProperties: false

examples:
  - |
    crossbar_mpu: crossbar@4a002a48 {
      compatible = "ti,irq-crossbar";
      reg = <0x4a002a48 0x130>;
      ti,max-irqs = <160>;
      ti,max-crossbar-sources = <400>;
      ti,reg-size = <2>;
      ti,irqs-reserved = <0 1 2 3 5 6 131 132>;
      ti,irqs-skip = <10 133 139 140>;
    };
