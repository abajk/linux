description: |
  * Texas Instruments OMAP

  OMAP is currently using a static file per SoC family to describe the
  IPs present in the SoC.
  On top of that an omap_device is created to extend the platform_device
  capabilities and to allow binding with one or several hwmods.
  The hwmods will contain all the information to build the device:
  address range, irq lines, dma lines, interconnect, PRCM register,
  clock domain, input clocks.
  For the moment just point to the existing hwmod, the next step will be
  move data from hwmod to device-tree representation.

properties:
  compatible:
    description: System compatibility string for the OMAP device
    $ref: /schemas/types.yaml#/definitions/string-array
    items:
      - pattern: '^ti,.*$'
  reg:
    description: Address ranges for this module
    $ref: /schemas/types.yaml#/definitions/reg
  interrupts:
    description: Interrupt lines for this module
    $ref: /schemas/types.yaml#/definitions/interrupts
  interrupt-controller:
    type: boolean
    description: Marks this node as an interrupt controller
  interrupt-names:
    description: Names of the interrupts
    $ref: /schemas/types.yaml#/definitions/interrupt-names
  ti,hwmods:
    description: List of hardware-module names for this OMAP device
    $ref: /schemas/types.yaml#/definitions/string-array
  ti,no_idle_on_suspend:
    type: boolean
    description: Prevent idling of the module during suspend
  ti,no-reset-on-init:
    type: boolean
    description: Prevent reset of the module at initialization
  ti,no-idle-on-init:
    type: boolean
    description: Prevent idling of the module at initialization
  ti,no-idle:
    type: boolean
    description: Prevent idling of the module at any time

required:
  - compatible
  - ti,hwmods

additionalProperties: false

examples:
  - |
    spinlock@1 {
        compatible = "ti,omap4-spinlock";
        ti,hwmods = "spinlock";
    };
