%YAML 1.2
---
$id: http://devicetree.org/schemas/ti,omap3-c64.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: TI OMAP DSP
maintainers:
  - Benoit Cousson <b-cousson@ti.com>

description: |
  * TI - DSP (Digital Signal Processor)

  TI DSP included in OMAP SoC

properties:
  compatible:
    const: ti,omap3-c64

  ti,hwmods:
    description: Hardware modules string identifying the module.
    $ref: /schemas/types.yaml#/definitions/string-array
    items:
      - const: dsp

required:
  - compatible
  - ti,hwmods

additionalProperties: false

examples:
  - |
    dsp {
        compatible = "ti,omap3-c64";
        ti,hwmods = "dsp";
    };
