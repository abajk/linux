%YAML 1.2
---
$id: http://devicetree.org/schemas/arm/vexpress-scc.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: ARM Versatile Express Serial Configuration Controller

maintainers:
  - Pawel Moll <pawel.moll@arm.com>

description: |
  ARM Versatile Express Serial Configuration Controller
  -----------------------------------------------------

  Test chips for ARM Versatile Express platform implement SCC (Serial
  Configuration Controller) interface, used to set initial conditions
  for the test chip.

  In some cases its registers are also mapped in normal address space
  and can be used to obtain runtime information about the chip internals
  (like silicon temperature sensors) and as interface to other subsystems
  like platform configuration control and power management.

properties:
  compatible:
    oneOf:
      - items:
          - pattern: ^arm,vexpress-scc,.+
          - const: arm,vexpress-scc
      - items:
          - const: arm,vexpress-scc

  reg:
    description: Physical address and size of the memory-mapped registers window.
    items:
      - description: Base address
      - description: Size

  interrupts:
    description: Interrupt specifier for the system-level interrupt.
    items:
      - description: GIC controller phandle
      - description: Interrupt number
      - description: Interrupt flags

additionalProperties: false

required:
  - compatible

examples:
  - |
    scc@7fff0000 {
      compatible = "arm,vexpress-scc,v2p-ca15_a7", "arm,vexpress-scc";
      reg = <0 0x7fff0000 0 0x1000>;
      interrupts = <0 95 4>;
    };
