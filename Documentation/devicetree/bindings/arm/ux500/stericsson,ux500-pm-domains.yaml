%YAML 1.2
---
$id: http://devicetree.org/schemas/stericsson,ux500-pm-domains.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: ST-Ericsson UX500 PM Domains

maintainers:
  - Ulf Hansson <ulf.hansson@linaro.org>

description: |
  * ST-Ericsson UX500 PM Domains

  UX500 supports multiple PM domains which are used to gate power to one or
  more peripherals on the SOC.

  The implementation of PM domains for UX500 are based upon the generic PM domain
  and use the corresponding DT bindings.

properties:
  compatible:
    const: stericsson,ux500-pm-domains
    description: Must be "stericsson,ux500-pm-domains".
  "#power-domain-cells":
    description: Number of cells in a power domain specifier.
    const: 1

additionalProperties: false

examples:
  - |
    pm_domains: pm_domains0 {
        compatible = "stericsson,ux500-pm-domains";
        #power-domain-cells = <1>;
    };
