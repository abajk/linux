%YAML 1.2
---
$id: http://devicetree.org/schemas/arm/freescale/fsl,vf610-mscm-ir.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Freescale Vybrid Miscellaneous System Control - Interrupt Router

maintainers:
  - Rob Herring <robh@kernel.org>
  - Stefan Agner <stefan@agner.ch>

description:
  The MSCM IP contains multiple sub modules, this binding describes the second
  block of registers which control the interrupt router. The interrupt router
  allows to configure the recipient of each peripheral interrupt. Furthermore
  it controls the directed processor interrupts. The module is available in all
  Vybrid SoC's but is only really useful in dual core configurations (VF6xx
  which comes with a Cortex-A5/Cortex-M4 combination).

properties:
  compatible:
    const: fsl,vf610-mscm-ir

  reg:
    maxItems: 1

  interrupt-controller: true

  "#interrupt-cells":
    description: "Two cells: interrupt number and flags as defined by the GIC bindings"
    const: 2

  fsl,cpucfg:
    description:
      Handle to the MSCM CPU configuration node, required to get the current CPU
      ID.
    $ref: /schemas/types.yaml#/definitions/phandle

required:
  - compatible
  - reg
  - fsl,cpucfg
  - interrupt-controller
  - "#interrupt-cells"

additionalProperties: false

examples:
  - |
    interrupt-controller@40001800 {
        compatible = "fsl,vf610-mscm-ir";
        reg = <0x40001800 0x400>;
        interrupt-controller;
        #interrupt-cells = <2>;
        interrupt-parent = <&intc>;
        fsl,cpucfg = <&mscm_cpucfg>;
    };
