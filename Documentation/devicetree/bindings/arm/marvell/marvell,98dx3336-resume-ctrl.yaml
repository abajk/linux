%YAML 1.2
---
$id: http://devicetree.org/schemas/marvell,98dx3336-resume-ctrl.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Marvell 98DX3336 Resume Control

maintainers:
  - Chris Packham <chris.packham@alliedtelesis.co.nz>

description: |
  Resume Control
  --------------
  Available on Marvell SOCs: 98DX3336 and 98DX4251

properties:
  compatible:
    const: marvell,98dx3336-resume-ctrl
    description: Must be "marvell,98dx3336-resume-ctrl"

  reg:
    maxItems: 1

required:
  - compatible
  - reg

additionalProperties: false

examples:
  - |
    resume@20980 {
        compatible = "marvell,98dx3336-resume-ctrl";
        reg = <0x20980 0x10>;
    };
