%YAML 1.2
---
$id: http://devicetree.org/schemas/arm/marvell/marvell,armada-370-pmsu.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Marvell Armada 370/XP PMSU

maintainers:
  - Gregory CLEMENT <gregory.clement@bootlin.com>

description: |
  Power Management Service Unit(PMSU)
  -----------------------------------
  Available on Marvell SOCs: Armada 370, Armada 38x and Armada XP

properties:
  compatible:
    description: Supported compatible strings
    items:
      - enum:
          - marvell,armada-370-pmsu
          - marvell,armada-380-pmsu
          - marvell,armada-370-xp-pmsu

  reg:
    maxItems: 1

required:
  - compatible
  - reg

additionalProperties: false

examples:
  - |
    armada-370-xp-pmsu@22000 {
      compatible = "marvell,armada-370-pmsu";
      reg = <0x22000 0x1000>;
    };
