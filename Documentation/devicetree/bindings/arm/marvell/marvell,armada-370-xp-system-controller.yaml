---
$id: http://devicetree.org/schemas/marvell,armada-370-xp-system-controller.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: MVEBU System Controller

maintainers:
  - Gregory CLEMENT <gregory.clement@bootlin.com>

description: |
  MVEBU System Controller
  MVEBU (Marvell SOCs: Armada 370/375/XP, Dove, mv78xx0, Kirkwood, Orion5x)

properties:
  compatible:
    items:
      - enum:
          - marvell,orion-system-controller
          - marvell,armada-370-xp-system-controller
          - marvell,armada-375-system-controller

  reg:
    items:
      - description: System controller registers location and length

required:
  - compatible
  - reg

additionalProperties: false

examples:
  - |
    system-controller@d0018200 {
        compatible = "marvell,armada-370-xp-system-controller";
        reg = <0xd0018200 0x500>;
    };
