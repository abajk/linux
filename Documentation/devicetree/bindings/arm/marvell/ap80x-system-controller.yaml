%YAML 1.2
---
$id: http://devicetree.org/schemas/arm/marvell/ap80x-system-controller.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Marvell Armada AP80x System Controller

maintainers:
  - Amit Kucheria <amit.kucheria@linaro.org>
  - Baruch Siach <baruch@tkos.co.il>
  - Ben Peled <bpeled@marvell.com>
  - Chris Packham <chris.packham@alliedtelesis.co.nz>

description: |
  Marvell Armada AP80x System Controller

  The AP806/AP807 is one of the two core HW blocks of the Marvell Armada
  7K/8K/931x SoCs. It contains system controllers, which provide several
  registers giving access to numerous features: clocks, pin-muxing and
  many other SoC configuration items. This DT binding allows to describe
  these system controllers.

properties:
  compatible:
    items:
      - const: syscon
      - const: simple-mfd

  reg:
    description: Register area of the AP80x system controller
    items:
      - description: base address
      - description: size

patternProperties:
  "^.*$":
    anyOf:
      - $ref: "#/definitions/clock"
      - $ref: "#/definitions/pinctrl"
      - $ref: "#/definitions/gpio"
      - $ref: "#/definitions/thermal"
      - $ref: "#/definitions/clock-cpu"

additionalProperties: false

definitions:

  clock:
    description: System-controller clock subnode
    properties:
      compatible:
        items:
          - const: "marvell,ap806-clock"
          - const: "marvell,ap807-clock"
      "#clock-cells":
        const: 1
    required:
      - compatible
      - "#clock-cells"
    additionalProperties: false

  pinctrl:
    description: System-controller pinctrl subnode
    properties:
      compatible:
        const: "marvell,ap806-pinctrl"
    required:
      - compatible
    additionalProperties: false

  gpio:
    description: System-controller GPIO subnode
    properties:
      compatible:
        const: "marvell,armada-8k-gpio"
      offset:
        description: Offset address inside the syscon block
        $ref: /schemas/types.yaml#/definitions/uint32
      ngpios:
        description: Number of GPIOs
        $ref: /schemas/types.yaml#/definitions/uint32
      gpio-controller:
        description: GPIO controller flag
        type: boolean
      "#gpio-cells":
        const: 2
      gpio-ranges:
        description: GPIO ranges mapping
        $ref: /schemas/types.yaml#/definitions/phandle-array
      "marvell,pwm-offset":
        description: Offset of PWM duration control registers inside the syscon block
        $ref: /schemas/types.yaml#/definitions/uint32
      "#pwm-cells":
        const: 2
      clocks:
        description: GPIO source clock phandles
        $ref: /schemas/types.yaml#/definitions/phandle-array
    required:
      - compatible
      - offset
      - ngpios
      - gpio-controller
      - "#gpio-cells"
      - "#pwm-cells"
      - clocks
    additionalProperties: false

  thermal:
    description: Thermal sensor subnode of system-controller 1
    properties:
      compatible:
        const: "marvell,armada-ap806-thermal"
      reg:
        description: Register range for thermal functions
        items:
          - description: offset
          - description: size
      interrupt-parent:
        description: Overheat interrupt parent
        $ref: /schemas/types.yaml#/definitions/phandle
      interrupts:
        description: Overheat interrupt line
        $ref: /schemas/types.yaml#/definitions/uint32-array
      "#thermal-sensor-cells":
        const: 1
    required:
      - compatible
      - reg
      - "#thermal-sensor-cells"
    additionalProperties: false

  clock-cpu:
    description: Cluster-clock subnode
    properties:
      compatible:
        items:
          - const: "marvell,ap806-cpu-clock"
          - const: "marvell,ap807-cpu-clock"
      clocks:
        description: Input parent clocks (one per CPU cluster)
        items:
          - description: cluster 0 parent clock phandle
          - description: cluster 1 parent clock phandle
      "#clock-cells":
        const: 1
      reg:
        description: Register range for cluster clocks
        items:
          - description: offset
          - description: size
    required:
      - compatible
      - "#clock-cells"
      - clocks
      - reg
    additionalProperties: false
