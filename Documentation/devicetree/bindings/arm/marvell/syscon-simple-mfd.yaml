%YAML 1.2
---
$id: http://devicetree.org/schemas/arm/marvell/syscon-simple-mfd.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Marvell Armada CP110 System Controller

maintainers:
  - Amit Kucheria <amit.kucheria@linaro.org>
  - Bjorn Helgaas <bhelgaas@google.com>
  - Chris Packham <chris.packham@alliedtelesis.co.nz>
  - Grzegorz Jaszczyk <jaz@semihalf.com>
  - Konstantin Porotchkin <kostap@marvell.com>
  - Miquel Raynal <miquel.raynal@bootlin.com>

description: |
  Marvell Armada CP110 System Controller
  ======================================

  The CP110 is one of the two core HW blocks of the Marvell Armada 7K/8K
  SoCs. It contains system controllers, which provide several registers
  giving access to numerous features: clocks, pin-muxing and many other
  SoC configuration items. This DT binding allows to describe these
  system controllers.

  SYSTEM CONTROLLER 0
  ===================

  Clocks:
  -------

  The Device Tree node representing this System Controller 0 provides a
  number of clocks:

   - a set of core clocks
   - a set of gateable clocks

  Those clocks can be referenced by other Device Tree nodes using two
  cells:
   - The first cell must be 0 or 1. 0 for the core clocks and 1 for the
     gateable clocks.
   - The second cell identifies the particular core clock or gateable
     clocks.

  The following clocks are available:
   - Core clocks
     - 0 0 APLL
     - 0 1 PPv2 core
     - 0 2 EIP
     - 0 3 Core
     - 0 4 NAND core
     - 0 5 SDIO core
   - Gateable clocks
     - 1 0 Audio
     - 1 1 Comm Unit
     - 1 2 NAND
     - 1 3 PPv2
     - 1 4 SDIO
     - 1 5 MG Domain
     - 1 6 MG Core
     - 1 7 XOR1
     - 1 8 XOR0
     - 1 9 GOP DP
     - 1 11 PCIe x1 0
     - 1 12 PCIe x1 1
     - 1 13 PCIe x4
     - 1 14 PCIe / XOR
     - 1 15 SATA
     - 1 16 SATA USB
     - 1 17 Main
     - 1 18 SD/MMC/GOP
     - 1 21 Slow IO (SPI, NOR, BootROM, I2C, UART)
     - 1 22 USB3H0
     - 1 23 USB3H1
     - 1 24 USB3 Device
     - 1 25 EIP150
     - 1 26 EIP197

  Pinctrl:
  --------

  For common binding part and usage, refer to the file
  Documentation/devicetree/bindings/pinctrl/marvell,mvebu-pinctrl.txt.

  GPIO:
  -----

  For common binding part and usage, refer to
  Documentation/devicetree/bindings/gpio/gpio-mvebu.yaml.

  Thermal:
  --------

  For common binding part and usage, refer to
  Documentation/devicetree/bindings/thermal/thermal*.yaml

properties:
  compatible:
    items:
      - const: syscon
      - const: simple-mfd
    description: Compatibility strings for the CP110 System Controller.
  reg:
    description: Register window for the system controller.
    items:
      - description: Base address of register window.
      - description: Size of register window.

  clock:
    description: Clock provider subnode.
    type: object
    properties:
      compatible:
        const: "marvell,cp110-clock"
      "#clock-cells":
        const: 2
    required:
      - compatible
      - "#clock-cells"
    additionalProperties: false

  pinctrl:
    description: Pin controller subnode.
    type: object
    properties:
      compatible:
        items:
          - enum:
              - marvell,armada-7k-pinctrl
              - marvell,armada-8k-cpm-pinctrl
              - marvell,armada-8k-cps-pinctrl
              - marvell,cp115-standalone-pinctrl
    required:
      - compatible
    additionalProperties: false

patternProperties:
  "^gpio@.*":
    description: GPIO controller subnode.
    type: object
    properties:
      compatible:
        const: "marvell,armada-8k-gpio"
      offset:
        description: Offset address inside the system controller.
        $ref: /schemas/types.yaml#/definitions/uint32
      ngpios:
        description: Number of GPIOs.
        $ref: /schemas/types.yaml#/definitions/uint32
      gpio-controller:
        description: Must be set to indicate a GPIO controller.
        type: boolean
      "#gpio-cells":
        const: 2
      gpio-ranges:
        description: Mapping of GPIO controller ranges to pin controller.
        items:
          - description: Phandle to pinctrl provider.
          - description: GPIO controller base offset.
          - description: Pin controller base offset.
          - description: Number of GPIOs.
    required:
      - compatible
      - offset
      - ngpios
      - gpio-controller
      - "#gpio-cells"
      - gpio-ranges
    additionalProperties: false

  "^thermal-sensor@.*":
    description: Thermal sensor subnode.
    type: object
    properties:
      compatible:
        const: "marvell,armada-cp110-thermal"
      reg:
        description: Register range for thermal functions.
        items:
          - description: Offset of thermal registers.
          - description: Size of thermal register range.
      interrupts-extended:
        description: Overheat interrupt handle.
        items:
          - description: Phandle to ICU-SEI irqchip.
          - description: Interrupt number.
          - description: Interrupt type flags.
      "#thermal-sensor-cells":
        const: 1
    required:
      - compatible
      - reg
    additionalProperties: false

additionalProperties: false
