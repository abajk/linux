%YAML 1.2
---
$id: http://devicetree.org/schemas/marvell,armada-380-mpcore-soc-ctrl.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Marvell Armada 38x CA9 MPcore SoC Controller

maintainers:
  - Gregory CLEMENT <gregory.clement@bootlin.com>

description: |
  Marvell Armada 38x CA9 MPcore SoC Controller
  ============================================

properties:
  compatible:
    items:
      - const: marvell,armada-380-mpcore-soc-ctrl

  reg:
    items:
      - description: register base and size of the CA9 MPcore SoC control registers

required:
  - compatible
  - reg

additionalProperties: false

examples:
  - |
    mpcore-soc-ctrl@20d20 {
      compatible = "marvell,armada-380-mpcore-soc-ctrl";
      reg = <0x20d20 0x6c>;
    };
