%YAML 1.2
---
$id: http://devicetree.org/schemas/arm/marvell/marvell,coherency-fabric.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Marvell Coherency Fabric

maintainers:
  - Gregory CLEMENT <gregory.clement@bootlin.com>

description: |
  Coherency fabric
  ----------------
  Available on Marvell SOCs: Armada 370, Armada 375, Armada 38x and Armada XP

properties:
  compatible:
    items:
      - const: marvell,coherency-fabric
      - const: marvell,armada-375-coherency-fabric
      - const: marvell,armada-380-coherency-fabric

  reg:
    items:
      - description: coherency fabric registers
      - description: per-CPU fabric registers

  broken-idle:
    description: Set when Idle mode is not supported by the hardware.
    type: boolean

required:
  - compatible
  - reg

additionalProperties: false

allOf:
  - if:
      properties:
        compatible:
          contains:
            const: marvell,coherency-fabric
    then:
      properties:
        reg:
          items:
            - description: coherency fabric registers
            - description: per-CPU fabric registers
    else:
      properties:
        reg:
          items:
            - description: per-CPU fabric registers
