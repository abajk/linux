%YAML 1.2
---
$id: http://devicetree.org/schemas/arm/bcm/brcm,bcm63138.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: BCM63138 DSL System-on-a-Chip

maintainers:
  - Florian Fainelli <f.fainelli@gmail.com>
  - Ken Kurematsu <k.kurematsu@nskint.co.jp>
  - Mauro Carvalho Chehab <mchehab+huawei@kernel.org>
  - Scott Branden <sbranden@broadcom.com>

description: |
  Broadcom BCM63138 DSL System-on-a-Chip device tree bindings

  Boards compatible with the BCM63138 DSL System-on-a-Chip should have the
  following properties.

  An optional Boot lookup table Device Tree node is required for secondary CPU
  initialization as well as a 'resets' phandle to the correct PMB controller as
  defined in reset/brcm,bcm63138-pmb.txt for this secondary CPU, and an
  'enable-method' property.

  Two nodes are required for software reboot: a timer node and a syscon-reboot
  node.

  See Documentation/devicetree/bindings/power/reset/syscon-reboot.yaml for the
  detailed list of properties, the two values defined below are specific to the
  BCM6328-style timer.

properties:
  compatible:
    const: brcm,bcm63138

  bootlut:
    description: Boot lookup table Device Tree node
    type: object
    additionalProperties: false
    properties:
      compatible:
        items:
          - const: brcm,bcm63138-bootlut
      reg:
        items:
          - description: register base address
          - description: length for the Boot Lookup table
      enable-method:
        description: Method to enable secondary CPU initialization
        enum:
          - brcm,bcm63138
      resets:
        maxItems: 1

    required:
      - compatible
      - reg
      - enable-method
      - resets

  timer:
    description: Timer node for software reboot
    type: object
    additionalProperties: false
    properties:
      compatible:
        items:
          - enum:
              - brcm,bcm6328-timer
              - syscon
      reg:
        items:
          - description: register base address
          - description: register length
    required:
      - compatible
      - reg

  reboot:
    description: Syscon reboot node for software reboot
    type: object
    additionalProperties: false
    properties:
      compatible:
        const: syscon-reboot
      regmap:
        description: phandle to timer node
        items:
          - description: phandle to timer node
      offset:
        description: Offset of the TIMER_WD_TIMER_RESET register from the beginning of the TIMER block
      mask:
        description: SoftRst bit mask
    required:
      - compatible
      - regmap
      - offset
      - mask

additionalProperties: false
