%YAML 1.2
---
$id: http://devicetree.org/schemas/arm/altera/socfpga-sdram-edac.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Altera SOCFPGA SDRAM Error Detection & Correction [EDAC]
maintainers:
  - Thor Thayer <tthayer@opensource.altera.com>

description: |
  Altera SOCFPGA SDRAM Error Detection & Correction [EDAC]
  The EDAC accesses a range of registers in the SDRAM controller.

properties:
  compatible:
    description: Contains compatible string identifying the SDRAM EDAC controller.
    contains:
      enum:
        - altr,sdram-edac
        - altr,sdram-edac-a10

  altr,sdr-syscon:
    description: Phandle of the SDR module syscon.
    $ref: /schemas/types.yaml#/definitions/phandle

  interrupts:
    description: ECC interrupt request to the IRQ controller.
    items:
      - description: ECC IRQ specifier in the form <specifier irq flags>.

required:
  - compatible
  - altr,sdr-syscon
  - interrupts

additionalProperties: false

examples:
  - |
    sdramedac {
        compatible = "altr,sdram-edac";
        altr,sdr-syscon = <&sdr>;
        interrupts = <0 39 4>;
    };
