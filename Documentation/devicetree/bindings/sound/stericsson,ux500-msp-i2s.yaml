%YAML 1.2
---
$id: http://devicetree.org/schemas/sound/stericsson,ux500-msp-i2s.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: stericsson,ux500-msp-i2s

maintainers:
  - Lee Jones <lee@kernel.org>
  - Rob Herring <robh@kernel.org>

description: |
  * ux500 MSP (CPU-side Digital Audio Interface)

properties:
  compatible:
    const: stericsson,ux500-msp-i2s

  reg:
    description: Physical base address and length of the device's registers.

  interrupts:
    description: The interrupt output from the device.

patternProperties:
  ".*-supply":
    description: Phandle to the regulator <name> supply

additionalProperties: false

examples:
  - |
      msp1: msp@80124000 {
          compatible = "stericsson,ux500-msp-i2s";
          reg = <0x80124000 0x1000>;
          interrupts = <0 62 0x4>;
          v-ape-supply = <&db8500_vape_reg>;
      };

      msp3: msp@80125000 {
          compatible = "stericsson,ux500-msp-i2s";
          reg = <0x80125000 0x1000>;
          interrupts = <0 62 0x4>;
          v-ape-supply = <&db8500_vape_reg>;
      };
