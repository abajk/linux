%YAML 1.2
---
$id: http://devicetree.org/schemas/sound/cirrus,cs43130.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Cirrus Logic CS43130 DAC

maintainers:
  - Li Xu <li.xu@cirrus.com>

description: |
  CS43130 DAC

properties:
  compatible:
    items:
      - enum:
          - cirrus,cs43130
          - cirrus,cs4399
          - cirrus,cs43131
          - cirrus,cs43198

  reg:
    maxItems: 1

  reset-gpios:
    maxItems: 1

  VA-supply: true
  VP-supply: true
  VL-supply: true
  VCP-supply: true
  VD-supply: true

  interrupts:
    items:
      - description: TX or combined interrupt.
      - description: RX interrupt.

  cirrus,xtal-ibias:
    description: |
      When external MCLK is generated by external crystal oscillator, CS43130
      can be used to provide bias current for external crystal. Amount of
      bias current sent is set as:
      1 = 7.5uA
      2 = 12.5uA
      3 = 15uA
    $ref: /schemas/types.yaml#/definitions/uint32
    enum: [1, 2, 3]

  cirrus,dc-measure:
    description: Enable headphone DC impedance measurement.
    type: boolean

  cirrus,ac-measure:
    description: Enable headphone AC impedance measurement. DC impedance must
      also be enabled for AC impedance measurement.
    type: boolean

  cirrus,dc-threshold:
    description: |
      Define 2 DC impedance thresholds in ohms for HP output control. Default
      values are 50 and 120 Ohms.
    items:
      - description: Lower threshold in ohms.
      - description: Upper threshold in ohms.
    default: [50, 120]

  cirrus,ac-freq:
    description: |
      Define the frequencies at which to measure HP AC impedance. Only used if
      "cirrus,dc-measure" is defined. Exactly 10 frequencies must be defined.
      If this property is undefined, by default following frequencies are used:
      <24 43 93 200 431 928 2000 4309 9283 20000>. The above frequencies are
      logarithmically equally spaced.
    $ref: /schemas/types.yaml#/definitions/uint32-array
    minItems: 10
    maxItems: 10
    default: [24, 43, 93, 200, 431, 928, 2000, 4309, 9283, 20000]

required:
  - compatible
  - reg
  - VA-supply
  - VP-supply
  - VL-supply
  - VCP-supply
  - VD-supply

dependencies:
  cirrus,ac-measure:
    - cirrus,dc-measure

additionalProperties: false

examples:
  - |
    cs43130: audio-codec@30 {
        compatible = "cirrus,cs43130";
        reg = <0x30>;
        reset-gpios = <&axi_gpio 54 0>;
        VA-supply = <&dummy_vreg>;
        VP-supply = <&dummy_vreg>;
        VL-supply = <&dummy_vreg>;
        VCP-supply = <&dummy_vreg>;
        VD-supply = <&dummy_vreg>;
        cirrus,xtal-ibias = <2>;
        interrupts = <55 8>;
        cirrus,dc-measure;
        cirrus,ac-measure;
        cirrus,dc-threshold = /bits/ 16 <20 100>;
        cirrus,ac-freq = /bits/ 16 <24 43 93 200 431 928 2000 4309 9283 20000>;
    };
