%YAML 1.2
---
$id: http://devicetree.org/schemas/img,parallel-out.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Imagination Technologies Parallel Output Controller

maintainers:
  - Damien.Horsley <Damien.Horsley@imgtec.com>
  - Rob Herring <robh@kernel.org>

description: |
  Imagination Technologies Parallel Output Controller

properties:
  compatible:
    items:
      - const: img,parallel-out
  '#sound-dai-cells':
    description: Must be equal to 0.
    const: 0
  reg:
    maxItems: 1

  dmas:
    maxItems: 1

  dma-names:
    items:
      - const: tx
  clocks:
    maxItems: 2

  clock-names:
    items:
      - const: sys
      - const: ref

  resets:
    maxItems: 1

  reset-names:
    items:
      - const: rst

  interrupts:
    maxItems: 1

required:
  - compatible
  - '#sound-dai-cells'
  - reg
  - dmas
  - dma-names
  - clocks
  - clock-names
  - resets
  - reset-names

additionalProperties: false

examples:
  - |
    parallel_out: parallel-out@18100c00 {
        compatible = "img,parallel-out";
        #sound-dai-cells = <0>;
        reg = <0x18100C00 0x100>;
        dmas = <&mdc 16 0xffffffff 0>;
        dma-names = "tx";
        clocks = <&cr_periph SYS_CLK_PAUD_OUT>,
                 <&clk_core CLK_AUDIO_DAC>;
        clock-names = "sys", "ref";
        resets = <&pistachio_reset PISTACHIO_RESET_PRL_OUT>;
        reset-names = "rst";
        interrupts = <GIC_SHARED 19 IRQ_TYPE_LEVEL_HIGH>;
    };
