%YAML 1.2
---
$id: http://devicetree.org/schemas/cirrus,cs4349.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Cirrus CS4349 audio CODEC

maintainers:
  - Tim Howe <tim.howe@cirrus.com>

description: |
  CS4349 audio CODEC

properties:
  compatible:
    items:
      - enum: [cirrus, cs4349]
  reg:
    items:
      - description: I2C address of the device
  reset-gpios:
    maxItems: 1
    description: A connection for the reset pin.

additionalProperties: false

examples:
  - |
    codec: cs4349@48 {
        compatible = "cirrus,cs4349";
        reg = <0x48>;
        reset-gpios = <&gpio 54 0>;
    };
