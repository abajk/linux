%YAML 1.2
---
$id: http://devicetree.org/schemas/rockchip,rk3399-gru-sound.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: ROCKCHIP with MAX98357A/RT5514/DA7219 codecs on GRU boards

maintainers:
  - Jeffy Chen <jeffy.chen@rock-chips.com>
  - Wonjoon Lee <woojoo.lee@samsung.com>
  - Xing Zheng <zhengxing@rock-chips.com>

description: |
  ROCKCHIP with MAX98357A/RT5514/DA7219 codecs on GRU boards

properties:
  compatible:
    items:
      - const: rockchip,rk3399-gru-sound

  rockchip,cpu:
    description: The phandle of the Rockchip I2S controller that's connected to the codecs
    $ref: /schemas/types.yaml#/definitions/phandle

  rockchip,codec:
    description: Audio codec phandles in order.
    $ref: /schemas/types.yaml#/definitions/phandle-array
    items:
      - description: phandle to max98357a codec
      - description: phandle to rt5514 codec
      - description: phandle to da7219 codec

  dmic-wakeup-delay-ms:
    description: Delay time (ms) for DMIC ready, to avoid recording before DMIC sends valid data

additionalProperties: false

examples:
  - |
    sound {
        compatible = "rockchip,rk3399-gru-sound";
        rockchip,cpu = <&i2s0>;
        rockchip,codec = <&max98357a &rt5514 &da7219>;
        dmic-wakeup-delay-ms = <20>;
    };
