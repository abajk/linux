%YAML 1.2
---
$id: http://devicetree.org/schemas/sound/cirrus,cs42l52.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Cirrus Logic CS42L52 audio CODEC

maintainers:
  - Brian Austin <brian.austin@cirrus.com>

description: |
  CS42L52 audio CODEC

  Required properties:
    • compatible must be "cirrus,cs42l52"
    • reg must be the I2C address of the device

  Optional properties:
    • cirrus,reset-gpio: GPIO controller's phandle and the number of the GPIO used to reset the codec.
    • cirrus,chgfreq-divisor: Raw register value 0x00–0x0F used to set the Charge Pump Frequency.
      Frequency = (64 × Fs) / (N + 2).
    • cirrus,mica-differential-cfg: If true, configure MICA input as differential;
      if false or not present, single-ended input.
    • cirrus,micb-differential-cfg: If true, configure MICB input as differential;
      if false or not present, single-ended input.
    • cirrus,micbias-lvl: Output voltage level on MICBIAS pin:
        0 = 0.5 × VA
        1 = 0.6 × VA
        2 = 0.7 × VA
        3 = 0.8 × VA
        4 = 0.83 × VA
        5 = 0.91 × VA

properties:
  compatible:
    items:
      - const: cirrus,cs42l52

  reg:
    description: I2C address of the device
    items:
      - description: I2C device address

  cirrus,reset-gpio:
    description: GPIO controller's phandle and the number of the GPIO used to reset the codec
    maxItems: 1

  cirrus,chgfreq-divisor:
    description: Raw register value 0x00–0x0F used to set the Charge Pump Frequency
    $ref: /schemas/types.yaml#/definitions/uint8
    minimum: 0
    maximum: 15

  cirrus,mica-differential-cfg:
    description: Configure MICA input as differential when true; single-ended when false or absent
    type: boolean

  cirrus,micb-differential-cfg:
    description: Configure MICB input as differential when true; single-ended when false or absent
    type: boolean

  cirrus,micbias-lvl:
    description: Output voltage level on MICBIAS pin
    $ref: /schemas/types.yaml#/definitions/uint32
    enum: [0, 1, 2, 3, 4, 5]

required:
  - compatible
  - reg

additionalProperties: false

examples:
  - |
    codec: codec@4a {
        compatible = "cirrus,cs42l52";
        reg = <0x4a>;
        cirrus,reset-gpio = <&gpio 10 0>;
        cirrus,chgfreq-divisor = <0x05>;
        cirrus,mica-differential-cfg;
        cirrus,micbias-lvl = <5>;
    };
