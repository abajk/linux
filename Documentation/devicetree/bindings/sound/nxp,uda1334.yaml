%YAML 1.2
---
$id: http://devicetree.org/schemas/nxp,uda1334.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: UDA1334 Audio CODEC

maintainers:
  - Andra Danciu <andradanciu1997@gmail.com>

description: |
  UDA1334 audio CODEC

  This device uses simple GPIO pins for controlling codec settings.

properties:
  compatible:
    items:
      - const: nxp,uda1334

  nxp,mute-gpios:
    description: GPIO spec for the MUTE pin
    maxItems: 1

  nxp,deemph-gpios:
    description: GPIO spec for the De-emphasis pin
    maxItems: 1

required:
  - compatible
  - nxp,mute-gpios
  - nxp,deemph-gpios

additionalProperties: false

examples:
  - |
    uda1334: audio-codec {
        compatible = "nxp,uda1334";
        nxp,mute-gpios = <&gpio1 8 GPIO_ACTIVE_LOW>;
        nxp,deemph-gpios = <&gpio3 3 GPIO_ACTIVE_LOW>;
    };
