%YAML 1.2
---
$id: http://devicetree.org/schemas/wlf,wm8741.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: WM8741 audio CODEC

maintainers:
  - Fabio Estevam <fabio.estevam@nxp.com>
  - Mark Brown <broonie@opensource.wolfsonmicro.com>
  - Sergej Sawazki <ce3a@gmx.de>

description: |
  WM8741 audio CODEC

  This device supports both I2C and SPI (configured with pin strapping
  on the board).

properties:
  compatible:
    items:
      - const: "wlf,wm8741"
  reg:
    items:
      - description: The I2C address of the device for I2C, or the chip select number for SPI.
  diff-mode:
    description: |
      Differential output mode configuration. Default value for field DIFF in
      register R8 (MODE_CONTROL_2). If absent, the default is 0.
    $ref: /schemas/types.yaml#/definitions/uint32
    enum:
      - 0
      - 1
      - 2
      - 3
    default: 0

required:
  - compatible
  - reg

additionalProperties: false

examples:
  - |
    codec@1a {
        compatible = "wlf,wm8741";
        reg = <0x1a>;
        diff-mode = <3>;
    };
