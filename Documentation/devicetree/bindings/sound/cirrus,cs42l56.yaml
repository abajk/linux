%YAML 1.2
---
$id: http://devicetree.org/schemas/sound/cirrus,cs42l56.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: CS42L52 audio CODEC

maintainers:
  - Andrew F. Davis <afd@ti.com>
  - Brian Austin <brian.austin@cirrus.com>

description: |
  CS42L52 audio CODEC

properties:
  compatible:
    description: |
      Must be "cirrus,cs42l56".
    enum:
      - cirrus,cs42l56

  reg:
    description: |
      The I2C address of the device for I2C.
    items:
      - description: I2C address

  VA-supply: true

  VCP-supply: true

  VLDO-supply: true

  cirrus,gpio-nreset:
    description: |
      GPIO controller's phandle and the number of the GPIO used to reset the codec.
    items:
      - description: phandle to GPIO controller
      - description: GPIO line number

  cirrus,chgfreq-divisor:
    description: |
      Values used to set the Charge Pump Frequency.
      Allowable values of 0x00 through 0x0F.
      These are raw values written to the register, not the actual frequency.
      The frequency is determined by the following.
      Frequency = MCLK / 4 * (N+2)
      N = chgfreq_val
      MCLK = frequency of the mclk signal after the MCLKDIV2 circuit.
    $ref: /schemas/types.yaml#/definitions/uint32
    minimum: 0
    maximum: 15

  cirrus,ain1a-ref-cfg:
    description: |
      If present, AIN1A is configured as a pseudo-differential input referenced to AIN1REF/AIN3A.
    type: boolean

  cirrus,ain1b-ref-cfg:
    description: |
      If present, AIN1B is configured as a pseudo-differential input referenced to AIN1REF/AIN3A.
    type: boolean

  cirrus,ain2a-ref-cfg:
    description: |
      If present, AIN2A is configured as a pseudo-differential input referenced to AIN2REF/AIN3B.
    type: boolean

  cirrus,ain2b-ref-cfg:
    description: |
      If present, AIN2B is configured as a pseudo-differential input referenced to AIN2REF/AIN3B.
    type: boolean

  cirrus,micbias-lvl:
    description: |
      Set the output voltage level on the MICBIAS Pin.
      0 = 0.5 x VA
      1 = 0.6 x VA
      2 = 0.7 x VA
      3 = 0.8 x VA
      4 = 0.83 x VA
      5 = 0.91 x VA
    $ref: /schemas/types.yaml#/definitions/uint32
    enum: [0, 1, 2, 3, 4, 5]

  cirrus,adaptive-pwr-cfg:
    description: |
      Configures how the power to the Headphone and Lineout Amplifiers adapt to the output signal levels.
      0 = Adapt to Volume Mode. Voltage level determined by the sum of the relevant volume settings.
      1 = Fixed - Headphone and Line Amp supply = + or - VCP/2.
      2 = Fixed - Headphone and Line Amp supply = + or - VCP.
      3 = Adapted to Signal; Voltage level is dynamically determined by the output signal.
    $ref: /schemas/types.yaml#/definitions/uint32
    enum: [0, 1, 2, 3]

  cirrus,hpf-left-freq:
    description: |
      Sets the corner frequency (-3dB point) for the internal High-Pass Filter on the left channel.
      0 = 1.8Hz
      1 = 119Hz
      2 = 236Hz
      3 = 464Hz
    $ref: /schemas/types.yaml#/definitions/uint32
    enum: [0, 1, 2, 3]

  cirrus,hpf-right-freq:
    description: |
      Sets the corner frequency (-3dB point) for the internal High-Pass Filter on the right channel.
      0 = 1.8Hz
      1 = 119Hz
      2 = 236Hz
      3 = 464Hz
    $ref: /schemas/types.yaml#/definitions/uint32
    enum: [0, 1, 2, 3]

required:
  - compatible
  - reg
  - VA-supply
  - VCP-supply
  - VLDO-supply

additionalProperties: false

examples:
  - |
    codec: codec@4b {
        compatible = "cirrus,cs42l56";
        reg = <0x4b>;
        cirrus,gpio-nreset = <&gpio 10 0>;
        cirrus,chgfreq-divisor = <0x05>;
        cirrus.ain1_ref_cfg;
        cirrus,micbias-lvl = <5>;
        VA-supply = <&reg_audio>;
    };
