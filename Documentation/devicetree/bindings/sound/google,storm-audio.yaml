%YAML 1.2
---
$id: http://devicetree.org/schemas/google,storm-audio.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: google,storm-audio

maintainers:
  - Kenneth Westfield <quic_kwestfie@quicinc.com>

description: |
  * Sound complex for Storm boards
  Models a soundcard for Storm boards with the Qualcomm Technologies IPQ806x SOC
  connected to a MAX98357A DAC via I2S.

properties:
  compatible:
    description: Device compatibility string.
    items:
      - const: google,storm-audio

  cpu:
    description: Phandle of the CPU DAI.
    $ref: /schemas/types.yaml#/definitions/phandle

  codec:
    description: Phandle of the codec DAI.
    $ref: /schemas/types.yaml#/definitions/phandle

  qcom,model:
    description: The user-visible name of this sound card.
    $ref: /schemas/types.yaml#/definitions/string

required:
  - compatible
  - cpu
  - codec

additionalProperties: false

examples:
  - |
    sound {
        compatible = "google,storm-audio";
        qcom,model = "ipq806x-storm";
        cpu = <&lpass_cpu>;
        codec = <&max98357a>;
    };
