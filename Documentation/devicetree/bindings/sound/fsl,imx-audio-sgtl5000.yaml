%YAML 1.2
---
$id: http://devicetree.org/schemas/fsl,imx-audio-sgtl5000.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Freescale i.MX audio complex with SGTL5000 codec

maintainers:
  - Nicolin Chen <nicoleotsuka@gmail.com>
  - Shawn Guo <shawn.guo@linaro.org>

description: |
  Freescale i.MX audio complex with SGTL5000 codec

  Required properties:

    - compatible: "fsl,imx-audio-sgtl5000"
    - model: The user-visible name of this sound complex
    - ssi-controller: The phandle of the i.MX SSI controller
    - audio-codec: The phandle of the SGTL5000 audio codec
    - audio-routing: A list of the connections between audio components.
      Each entry is a pair of strings, the first being the connection's sink,
      the second being the connection's source. Valid names could be power supplies,
      SGTL5000 pins, and the jacks on the board:
        * Power supplies:
           - Mic Bias
        * SGTL5000 pins:
           - MIC_IN
           - LINE_IN
           - HP_OUT
           - LINE_OUT
        * Board connectors:
           - Mic Jack
           - Line In Jack
           - Headphone Jack
           - Line Out Jack
           - Ext Spk
    - mux-int-port: The internal port of the i.MX audio muxer (AUDMUX)
    - mux-ext-port: The external port of the i.MX audio muxer

properties:
  compatible:
    const: fsl,imx-audio-sgtl5000

  model:
    $ref: /schemas/types.yaml#/definitions/string
    description: A user-visible name for this audio complex.

  ssi-controller:
    $ref: /schemas/types.yaml#/definitions/phandle
    description: The phandle of the i.MX SSI controller.

  audio-codec:
    $ref: /schemas/types.yaml#/definitions/phandle
    description: The phandle of the SGTL5000 audio codec.

  audio-routing:
    $ref: /schemas/types.yaml#/definitions/string-array
    description: A list of the connections between audio components.
      Each entry is a pair of strings (sink, source).

  mux-int-port:
    $ref: /schemas/types.yaml#/definitions/uint32
    description: The internal port number of the i.MX audio muxer (AUDMUX).

  mux-ext-port:
    $ref: /schemas/types.yaml#/definitions/uint32
    description: The external port number of the i.MX audio muxer (AUDMUX).

required:
  - compatible
  - model
  - ssi-controller
  - audio-codec
  - audio-routing
  - mux-int-port
  - mux-ext-port

additionalProperties: false

examples:
  - |
    sound {
      compatible = "fsl,imx-audio-sgtl5000";
      model = "imx-sgtl5000-audio";
      ssi-controller = <&ssi1>;
      audio-codec = <&sgtl5000>;
      audio-routing = "MIC_IN", "Mic Jack",
                      "Mic Jack", "Mic Bias",
                      "Headphone Jack", "HP_OUT";
      mux-int-port = <1>;
      mux-ext-port = <3>;
    };
