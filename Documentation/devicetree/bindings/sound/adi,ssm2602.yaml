%YAML 1.2
---
$id: http://devicetree.org/schemas/adi,ssm2602.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Analog Devices SSM2602, SSM2603 and SSM2604 I2S audio CODEC devices
maintainers:
  - Stefan Kristiansson <stefan.kristiansson@saunalahti.fi>

description: |
  Analog Devices SSM2602, SSM2603 and SSM2604 I2S audio CODEC devices

  SSM2602 support both I2C and SPI as the configuration interface,
  the selection is made by the MODE strap-in pin.
  SSM2603 and SSM2604 only support I2C as the configuration interface.

properties:
  compatible:
    description: Device compatible identifier
    items:
      - enum: ["adi,ssm2602", "adi,ssm2603", "adi,ssm2604"]
  reg:
    description: I2C address for I2C or SPI chip select number for SPI
    items:
      - description: Address or chip select

required:
  - compatible
  - reg

additionalProperties: false

examples:
  - |
    ssm2602: ssm2602@1a {
        compatible = "adi,ssm2602";
        reg = <0x1a>;
    };
