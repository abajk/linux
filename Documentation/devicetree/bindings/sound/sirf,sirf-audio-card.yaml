%YAML 1.2
---
$id: http://devicetree.org/schemas/sound/sirf,sirf-audio-card.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: SiRF Audio Card

maintainers:
  - Rongjun Ying <rongjun.ying@csr.com>

description: |
  * SiRF atlas6 and prima2 internal audio codec and port based audio setups

  Available audio endpoints for the audio-routing table:

  Board connectors:
    * Headset Stereophone
    * Ext Spk
    * Line In
    * Mic

  SiRF internal audio codec pins:
    * HPOUTL
    * HPOUTR
    * SPKOUT
    * Ext Mic
    * Mic Bias

properties:
  compatible:
    items:
      - const: sirf,sirf-audio-card

  sirf,audio-codec:
    description: Phandle to the SiRF internal audio codec node.
    $ref: /schemas/types.yaml#/definitions/phandle

  sirf,audio-platform:
    description: Phandle to the audio platform (audio port) node.
    $ref: /schemas/types.yaml#/definitions/phandle

  hp-pa-gpios:
    maxItems: 1
    description: Control external headphone amplifier.

  spk-pa-gpios:
    maxItems: 1
    description: Control external speaker amplifier.

  hp-switch-gpios:
    maxItems: 1
    description: Detect headphone jack insertion/removal.

required:
  - compatible
  - sirf,audio-codec
  - sirf,audio-platform

additionalProperties: false

examples:
  - |
    sound {
        compatible = "sirf,sirf-audio-card";
        sirf,audio-codec = <&audiocodec>;
        sirf,audio-platform = <&audioport>;
        hp-pa-gpios = <&gpio 44 0>;
        spk-pa-gpios = <&gpio 46 0>;
        hp-switch-gpios = <&gpio 45 0>;
    };
