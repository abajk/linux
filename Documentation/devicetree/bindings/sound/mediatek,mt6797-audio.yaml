%YAML 1.2
---
$id: http://devicetree.org/schemas/sound/mediatek,mt6797-audio.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Mediatek AFE PCM controller for mt6797
maintainers:
  - Kai Chieh Chuang <kaichieh.chuang@mediatek.com>

description: |
  Mediatek AFE PCM controller for mt6797

properties:
  compatible:
    items:
      - const: mediatek,mt6797-audio

  reg:
    items:
      - description: register location and size

  interrupts:
    items:
      - description: AFE interrupt

  power-domains:
    description: Should define the power domain
    $ref: /schemas/types.yaml#/definitions/phandle-array

  clocks:
    description: Must contain an entry for each entry in clock-names
    items:
      - description: infra_sys_audio_clk clock
      - description: infra_sys_audio_26m clock
      - description: mtkaif_26m_clk clock
      - description: top_mux_audio clock
      - description: top_mux_aud_intbus clock
      - description: top_sys_pll3_d4 clock
      - description: top_sys_pll1_d4 clock
      - description: top_clk26m_clk clock

  clock-names:
    items:
      - const: infra_sys_audio_clk
      - const: infra_sys_audio_26m
      - const: mtkaif_26m_clk
      - const: top_mux_audio
      - const: top_mux_aud_intbus
      - const: top_sys_pll3_d4
      - const: top_sys_pll1_d4
      - const: top_clk26m_clk

required:
  - compatible
  - reg
  - interrupts
  - power-domains
  - clocks
  - clock-names

additionalProperties: false

examples:
  - |
    afe: mt6797-afe-pcm@11220000 {
        compatible = "mediatek,mt6797-audio";
        reg = <0 0x11220000 0 0x1000>;
        interrupts = <GIC_SPI 151 IRQ_TYPE_LEVEL_LOW>;
        power-domains = <&scpsys MT6797_POWER_DOMAIN_AUDIO>;
        clocks = <&infrasys CLK_INFRA_AUDIO>,
                 <&infrasys CLK_INFRA_AUDIO_26M>,
                 <&infrasys CLK_INFRA_AUDIO_26M_PAD_TOP>,
                 <&topckgen CLK_TOP_MUX_AUDIO>,
                 <&topckgen CLK_TOP_MUX_AUD_INTBUS>,
                 <&topckgen CLK_TOP_SYSPLL3_D4>,
                 <&topckgen CLK_TOP_SYSPLL1_D4>,
                 <&clk26m>;
        clock-names = "infra_sys_audio_clk",
                      "infra_sys_audio_26m",
                      "mtkaif_26m_clk",
                      "top_mux_audio",
                      "top_mux_aud_intbus",
                      "top_sys_pll3_d4",
                      "top_sys_pll1_d4",
                      "top_clk26m_clk";
    };
