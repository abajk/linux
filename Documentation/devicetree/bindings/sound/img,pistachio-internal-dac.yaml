%YAML 1.2
---
$id: http://devicetree.org/schemas/img,pistachio-internal-dac.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: IMG Pistachio Internal DAC

maintainers:
  - Damien.Horsley <Damien.Horsley@imgtec.com>

description: |
  Pistachio internal DAC DT bindings

properties:
  compatible:
    const: img,pistachio-internal-dac

  img,cr-top:
    description: |
      Must contain a phandle to the top level control syscon node which
      contains the internal DAC control registers
    $ref: /schemas/types.yaml#/definitions/phandle

  VDD-supply:
    description: Digital power supply regulator (+1.8V or +3.3V)

required:
  - compatible
  - img,cr-top
  - VDD-supply

additionalProperties: false

examples:
  - |
    internal_dac: internal-dac {
        compatible = "img,pistachio-internal-dac";
        img,cr-top = <&cr_top>;
        VDD-supply = <&supply3v3>;
    };
