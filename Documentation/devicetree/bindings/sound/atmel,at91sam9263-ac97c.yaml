%YAML 1.2
---
$id: http://devicetree.org/schemas/sound/atmel,at91sam9263-ac97c.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Atmel AC97 controller

maintainers:
  - Alexander Stein <alexanders83@web.de>

properties:
  compatible:
    items:
      - const: atmel,at91sam9263-ac97c

  reg:
    maxItems: 1

  interrupts:
    maxItems: 1

  ac97-gpios:
    description: Please refer to soc-ac97link.txt, only ac97-reset is used
    maxItems: 1

required:
  - compatible
  - reg
  - interrupts

additionalProperties: false

examples:
  - |
    sound@fffa0000 {
        compatible = "atmel,at91sam9263-ac97c";
        pinctrl-names = "default";
        pinctrl-0 = <&pinctrl_ac97>;
        reg = <0xfffa0000 0x4000>;
        interrupts = <18 IRQ_TYPE_LEVEL_HIGH 5>;
        ac97-gpios = <&pioB 0 0 &pioB 2 0 &pioC 29 GPIO_ACTIVE_LOW>;
    };
