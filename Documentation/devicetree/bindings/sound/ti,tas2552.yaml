%YAML 1.2
---
$id: http://devicetree.org/schemas/sound/ti,tas2552.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Texas Instruments tas2552 Codec module

maintainers:
  - Alexander A. Klimov <grandmaster@al2klimov.de>
  - Dan Murphy <dmurphy@ti.com>
  - Fabio Estevam <fabio.estevam@nxp.com>
  - Peter Ujfalusi <peter.ujfalusi@ti.com>

description: |
  Texas Instruments - tas2552 Codec module

  The tas2552 serial control bus communicates through I2C protocols

  Required properties:
    - compatible: "ti,tas2552" - TAS2552
    - reg: I2C slave address: it can be 0x40 if ADDR pin is 0 or 0x41 if ADDR pin is 1.
    - vbat-supply: battery voltage
    - iovdd-supply: I/O Voltage
    - avdd-supply: Analog DAC Voltage

  Optional properties:
    - enable-gpio: gpio pin to enable/disable the device

properties:
  compatible:
    items:
      - const: "ti,tas2552"

  reg:
    items:
      - description: I2C slave address

  vbat-supply: true
  iovdd-supply: true
  avdd-supply: true

  enable-gpio:
    maxItems: 1
    description: gpio pin to enable/disable the device

required:
  - compatible
  - reg
  - vbat-supply
  - iovdd-supply
  - avdd-supply

additionalProperties: false

examples:
  - |
    tas2552: tas2552@41 {
      compatible = "ti,tas2552";
      reg = <0x41>;
      vbat-supply = <&reg_vbat>;
      iovdd-supply = <&reg_iovdd>;
      avdd-supply = <&reg_avdd>;
      enable-gpio = <&gpio4 2 GPIO_ACTIVE_HIGH>;
    };
