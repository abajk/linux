%YAML 1.2
---
$id: http://devicetree.org/schemas/sound/rockchip,rk3288-hdmi-analog.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Rockchip RK3288 with HDMI and analog audio
maintainers:
  - Bjorn Helgaas <bhelgaas@google.com>
  - Ezequiel Garcia <ezequiel@collabora.co.uk>
  - Romain Perier <romain.perier@collabora.com>

properties:
  compatible:
    items:
      - const: rockchip,rk3288-hdmi-analog

  rockchip,model:
    description: The user-visible name of this sound complex
    $ref: /schemas/types.yaml#/definitions/string

  rockchip,i2s-controller:
    description: Phandle of the Rockchip I2S controller connected to the CODEC
    $ref: /schemas/types.yaml#/definitions/phandle

  rockchip,audio-codec:
    description: Phandle of the analog audio codec
    $ref: /schemas/types.yaml#/definitions/phandle

  rockchip,routing:
    description: A list of connections between audio components; each pair is sink then source.
    $ref: /schemas/types.yaml#/definitions/string-array

  rockchip,hp-en-gpios:
    description: GPIO controlling power up/down of headphone
    maxItems: 1

  rockchip,hp-det-gpios:
    description: GPIO detecting presence of headphone
    maxItems: 1

required:
  - compatible
  - rockchip,model
  - rockchip,i2s-controller
  - rockchip,audio-codec
  - rockchip,routing

additionalProperties: false

examples:
  - |
    sound {
      compatible = "rockchip,rk3288-hdmi-analog";
      rockchip,model = "Analog audio output";
      rockchip,i2s-controller = <&i2s>;
      rockchip,audio-codec = <&es8388>;
      rockchip,routing = "Analog", "LOUT2",
                         "Analog", "ROUT2";
      rockchip,hp-en-gpios = <&gpio8 0 GPIO_ACTIVE_HIGH>;
      rockchip,hp-det-gpios = <&gpio7 7 GPIO_ACTIVE_HIGH>;
      pinctrl-names = "default";
      pinctrl-0 = <&headphone>;
    };
