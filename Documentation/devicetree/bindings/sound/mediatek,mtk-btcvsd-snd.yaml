%YAML 1.2
---
$id: http://devicetree.org/schemas/mediatek,mtk-btcvsd-snd.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Mediatek ALSA BT SCO CVSD/MSBC Driver

maintainers:
  - KaiChieh Chuang <kaichieh.chuang@mediatek.com>

description: |
  Mediatek ALSA BT SCO CVSD/MSBC Driver

properties:
  compatible:
    items:
      - const: mediatek,mtk-btcvsd-snd
    description: Mediatek BT CVSD driver compatible string.
  reg:
    description: Register location and size of PKV and SRAM_BANK2.
    items:
      - description: PKV register
      - description: SRAM_BANK2 register
  interrupts:
    items:
      - description: BTSCO interrupt
    description: Should contain the BTSCO interrupt.
  mediatek,infracfg:
    $ref: /schemas/types.yaml#/definitions/phandle-array
    description: The phandles of INFRASYS.
  mediatek,offset:
    $ref: /schemas/types.yaml#/definitions/uint32-array
    description: Array of register offsets and masks.
    items:
      - description: infra_misc_offset
      - description: infra_conn_bt_cvsd_mask
      - description: cvsd_mcu_read_offset
      - description: cvsd_mcu_write_offset
      - description: cvsd_packet_indicator_offset

required:
  - compatible
  - reg
  - interrupts
  - mediatek,infracfg
  - mediatek,offset

additionalProperties: false

examples:
  - |
    mtk-btcvsd-snd@18000000 {
        compatible = "mediatek,mtk-btcvsd-snd";
        reg = <0 0x18000000 0 0x1000>,
              <0 0x18080000 0 0x8000>;
        interrupts = <GIC_SPI 286 IRQ_TYPE_LEVEL_LOW>;
        mediatek,infracfg = <&infrasys>;
        mediatek,offset = <0xf00 0x800 0xfd0 0xfd4 0xfd8>;
    };
