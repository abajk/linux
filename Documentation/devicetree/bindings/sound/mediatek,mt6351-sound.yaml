%YAML 1.2
---
$id: http://devicetree.org/schemas/mediatek,mt6351-sound.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Mediatek MT6351 Audio Codec

maintainers:
  - Kai Chieh Chuang <kaichieh.chuang@mediatek.com>

description: |
  Mediatek MT6351 Audio Codec

  The communication between MT6351 and SoC is through Mediatek PMIC wrapper.
  For more detail, please visit Mediatek PMIC wrapper documentation.

  Must be a child node of PMIC wrapper.

properties:
  compatible:
    items:
      - const: "mediatek,mt6351-sound"
    description: Identifies this node as a Mediatek MT6351 audio codec.

required:
  - compatible

additionalProperties: false

examples:
  - |
    mt6351_snd {
        compatible = "mediatek,mt6351-sound";
    };
