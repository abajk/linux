%YAML 1.2
---
$id: http://devicetree.org/schemas/sound/maxim,max9860.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: MAX9860 Mono Audio Voice Codec

maintainers:
  - Peter Rosin <peda@axentia.se>

description: |
  MAX9860 Mono Audio Voice Codec

properties:
  compatible:
    items:
      - const: maxim,max9860

  reg:
    description: The I2C address of the device
    items:
      - description: I2C register address

  AVDD-supply:
    description: Power supply for the analog domain

  DVDD-supply:
    description: Power supply for the digital core domain

  DVDDIO-supply:
    description: Power supply for the digital I/O domain

  clock-names:
    items:
      - const: mclk

  clocks:
    description: Master clock input for the codec
    items:
      - description: MCLK signal

additionalProperties: false

examples:
  - |
    max9860: max9860@10 {
        compatible = "maxim,max9860";
        reg = <0x10>;
        AVDD-supply = <&reg_1v8>;
        DVDD-supply = <&reg_1v8>;
        DVDDIO-supply = <&reg_3v0>;
        clock-names = "mclk";
        clocks = <&pck2>;
    };
