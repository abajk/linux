%YAML 1.2
---
$schema: http://devicetree.org/meta-schemas/core.yaml#
$id: http://devicetree.org/schemas/sound/ti,omap4-dmic.yaml#

title: Texas Instruments OMAP4+ Digital Microphone Module

maintainers:
  - Peter Ujfalusi <peter.ujfalusi@ti.com>
  - Rob Herring <robh@kernel.org>

description: |
  * Texas Instruments OMAP4+ Digital Microphone Module

properties:
  compatible:
    items:
      - enum: [ti, omap4-dmic]
    description: Device compatible with the TI OMAP4+ digital microphone.

  reg:
    items:
      - description: MPU private access registers.
      - description: L3 interconnect registers.
    description: Register location and size as an array.

  interrupts:
    items:
      - description: Interrupt number for the DMIC.
    description: Interrupt number for the digital microphone.

  ti,hwmods:
    description: Name of the hwmod associated with the OMAP DMIC IP.
    $ref: /schemas/types.yaml#/definitions/string

required:
  - compatible
  - reg
  - interrupts
  - ti,hwmods

additionalProperties: false

examples:
  - |
    dmic: dmic@4012e000 {
        compatible = "ti,omap4-dmic";
        reg = <0x4012e000 0x7f>,
              <0x4902e000 0x7f>;
        interrupts = <0 114 0x4>;
        ti,hwmods = "dmic";
    };
