%YAML 1.2
---
$id: http://devicetree.org/schemas/img,spdif-in.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Imagination Technologies SPDIF Input Controller

maintainers:
  - Damien.Horsley <Damien.Horsley@imgtec.com>
  - Rob Herring <robh@kernel.org>

description: |
  Imagination Technologies SPDIF Input Controller

properties:
  compatible:
    items:
      - const: img,spdif-in

  reg:
    maxItems: 1

  interrupts:
    maxItems: 1

  dmas:
    maxItems: 1

  dma-names:
    items:
      - const: rx

  clocks:
    maxItems: 1

  clock-names:
    items:
      - const: sys

  '#sound-dai-cells':
    const: 0

  resets:
    maxItems: 1

  reset-names:
    items:
      - const: rst

required:
  - compatible
  - reg
  - interrupts
  - dmas
  - dma-names
  - clocks
  - clock-names
  - '#sound-dai-cells'

additionalProperties: false

examples:
  - |
    spdif_in: spdif-in@18100e00 {
      compatible = "img,spdif-in";
      reg = <0x18100E00 0x100>;
      interrupts = <GIC_SHARED 20 IRQ_TYPE_LEVEL_HIGH>;
      dmas = <&mdc 15 0xffffffff 0>;
      dma-names = "rx";
      clocks = <&cr_periph SYS_CLK_SPDIF_IN>;
      clock-names = "sys";
      #sound-dai-cells = <0>;
    };
