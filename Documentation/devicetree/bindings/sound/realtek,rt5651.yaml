%YAML 1.2
---
$id: http://devicetree.org/schemas/realtek,rt5651.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Realtek RT5651 audio CODEC

maintainers:
  - Bard Liao <bardliao@realtek.com>
  - Fabio Estevam <fabio.estevam@nxp.com>
  - Hans de Goede <hdegoede@redhat.com>

description: |
  RT5651 audio CODEC

  This device supports I2C only.

  Pins on the device (for linking into audio routes) for RT5651:

    * DMIC L1
    * DMIC R1
    * IN1P
    * IN2P
    * IN2N
    * IN3P
    * HPOL
    * HPOR
    * LOUTL
    * LOUTR
    * PDML
    * PDMR

properties:
  compatible:
    items:
      - const: realtek,rt5651
    description: Must be "realtek,rt5651".
  reg:
    description: The I2C address of the device.
    items:
      - description: I2C address.
  realtek,in2-differential:
    type: boolean
    description: Indicate MIC2 input are differential, rather than single-ended.
  realtek,dmic-en:
    type: boolean
    description: True if DMIC is used.
  realtek,jack-detect-source:
    $ref: /schemas/types.yaml#/definitions/uint32
    description: Select jack-detect input pin.
    enum: [1, 2, 3]
  realtek,jack-detect-not-inverted:
    type: boolean
    description: |
      Normal jack-detect switches give an inverted (active-low) signal;
      set this bool in the rare case you've a jack-detect switch which is not inverted.
  realtek,over-current-threshold-microamp:
    description: Micbias over-current detection threshold in µA.
    enum: [600, 1500, 2000]
  realtek,over-current-scale-factor:
    $ref: /schemas/types.yaml#/definitions/uint32
    description: |
      Micbias over-current detection scale factor; 0: scale current by 0.5,
      1: scale current by 0.75, 2: scale current by 1.0, 3: scale current by 1.5.
    enum: [0, 1, 2, 3]

additionalProperties: false

examples:
  - |
    codec@1a {
      compatible = "realtek,rt5651";
      reg = <0x1a>;
      realtek,dmic-en;
      realtek,in2-differential;
    };
