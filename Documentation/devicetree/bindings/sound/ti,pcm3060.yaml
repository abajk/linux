%YAML 1.2
---
$id: http://devicetree.org/schemas/sound/ti,pcm3060.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: TI PCM3060 audio CODEC

maintainers:
  - Kirill Marinushkin <kmarinushkin@birdec.tech>

description: |
  PCM3060 audio CODEC

  This driver supports both I2C and SPI.

properties:
  compatible:
    items:
      - const: ti,pcm3060

  reg:
    items:
      - description: the I2C address of the device for I2C, the chip select number for SPI.

  ti,out-single-ended:
    description: if output is single-ended; false or not specified if output is differential.
    type: boolean

required:
  - compatible
  - reg

additionalProperties: false

examples:
  - |
    pcm3060: pcm3060@46 {
        compatible = "ti,pcm3060";
        reg = <0x46>;
        ti,out-single-ended;
    };
