%YAML 1.2
---
$id: http://devicetree.org/schemas/eukrea,asoc-tlv320.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Audio complex for Eukrea boards with tlv320aic23 codec.

maintainers:
  - Denis Carikli <denis@eukrea.com>
  - Nicolin Chen <nicoleotsuka@gmail.com>

description: |
  Audio complex for Eukrea boards with tlv320aic23 codec.

  Note: The AUDMUX port numbering should start at 1, which is consistent with
  hardware manual.

properties:
  compatible:
    items:
      - const: eukrea,asoc-tlv320

  eukrea,model:
    description: The user-visible name of this sound complex.
    $ref: /schemas/types.yaml#/definitions/string

  ssi-controller:
    description: The phandle of the SSI controller.
    $ref: /schemas/types.yaml#/definitions/phandle

  fsl,mux-int-port:
    description: The internal port of the i.MX audio muxer (AUDMUX).
    $ref: /schemas/types.yaml#/definitions/uint32

  fsl,mux-ext-port:
    description: The external port of the i.MX audio muxer.
    $ref: /schemas/types.yaml#/definitions/uint32

additionalProperties: false

examples:
  - |
    sound {
        compatible = "eukrea,asoc-tlv320";
        eukrea,model = "imx51-eukrea-tlv320aic23";
        ssi-controller = <&ssi2>;
        fsl,mux-int-port = <2>;
        fsl,mux-ext-port = <3>;
    };
