%YAML 1.2
---
$id: http://devicetree.org/schemas/sound/mediatek,mt8183_da7219_max98357.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: MT8183 with MT6358, DA7219, MAX98357, and RT1015 CODECS

maintainers:
  - Shunli Wang <shunli.wang@mediatek.com>
  - Tzung-Bi Shih <tzungbi@kernel.org>

description: |
  MT8183 with MT6358, DA7219, MAX98357, and RT1015 CODECS

properties:
  compatible:
    description: Device compatibility, selecting one of supported codecs.
    items:
      - enum:
          - mediatek,mt8183_da7219_max98357
          - mediatek,mt8183_da7219_rt1015
          - mediatek,mt8183_da7219_rt1015p

  mediatek,headset-codec:
    description: Phandles of DA7219 codecs.
    $ref: /schemas/types.yaml#/definitions/phandle-array

  mediatek,hdmi-codec:
    description: Phandles of HDMI codec.
    $ref: /schemas/types.yaml#/definitions/phandle-array

  mediatek,platform:
    description: Phandle of MT8183 ASoC platform.
    $ref: /schemas/types.yaml#/definitions/phandle

required:
  - compatible
  - mediatek,headset-codec
  - mediatek,platform

additionalProperties: false

examples:
  - |
    sound {
        compatible = "mediatek,mt8183_da7219_max98357";
        mediatek,headset-codec = <&da7219>;
        mediatek,hdmi-codec = <&it6505dptx>;
        mediatek,platform = <&afe>;
    };
