%YAML 1.2
---
$id: http://devicetree.org/schemas/sound/mediatek,mt8173-rt5650-rt5676.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: MT8173 with RT5650 RT5676 CODECS and HDMI via I2S

maintainers:
  - Koro Chen <koro.chen@mediatek.com>

description: |
  MT8173 with RT5650 RT5676 CODECS and HDMI via I2S

  Required properties:
  - compatible: "mediatek,mt8173-rt5650-rt5676"
  - mediatek,audio-codec: the phandles of rt5650 and rt5676 codecs and of the HDMI encoder node
  - mediatek,platform: the phandle of MT8173 ASoC platform

properties:
  compatible:
    items:
      - const: mediatek,mt8173-rt5650-rt5676

  mediatek,audio-codec:
    description: phandles for rt5650, rt5676 codecs and HDMI encoder node
    $ref: /schemas/types.yaml#/definitions/phandle-array
    items:
      - $ref: /schemas/types.yaml#/definitions/phandle
      - $ref: /schemas/types.yaml#/definitions/phandle
      - $ref: /schemas/types.yaml#/definitions/phandle

  mediatek,platform:
    description: phandle for the MT8173 ASoC platform
    $ref: /schemas/types.yaml#/definitions/phandle

required:
  - compatible
  - mediatek,audio-codec
  - mediatek,platform

additionalProperties: false

examples:
  - |
    sound {
      compatible = "mediatek,mt8173-rt5650-rt5676";
      mediatek,audio-codec = <&rt5650 &rt5676 &hdmi0>;
      mediatek,platform = <&afe>;
    };
