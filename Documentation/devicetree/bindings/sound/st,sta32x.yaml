%YAML 1.2
---
$id: http://devicetree.org/schemas/sound/st,sta32x.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: st,sta32x

maintainers:
  - Daniel Mack <daniel@zonque.org>
  - Thomas Niederprüm <niederp@physik.uni-kl.de>

description: |
  STA32X audio CODEC

  The driver for this device only supports I2C.

properties:
  compatible:
    description: Must be "st,sta32x"
    items:
      - const: st,sta32x

  reg:
    description: I2C address of the STA32X codec
    items:
      - description: I2C bus address of the codec

  reset-gpios:
    maxItems: 1
    description: Reset GPIO for the codec

  power-down-gpios:
    maxItems: 1
    description: Power-down GPIO for the codec

  Vdda-supply: true
  Vdd3-supply: true
  Vcc-supply: true

  clocks:
    maxItems: 1
    description: XTI input clock for the codec

  clock-names:
    items:
      - const: xti

  st,output-conf:
    description: Output configuration selection
    enum: [0, 1, 2, 3]
    default: 0

  st,ch1-output-mapping:
    description: Channel 1 output mapping
    $ref: /schemas/types.yaml#/definitions/uint32
    enum: [0, 1, 2]
    default: 0

  st,ch2-output-mapping:
    description: Channel 2 output mapping
    $ref: /schemas/types.yaml#/definitions/uint32
    enum: [0, 1, 2]
    default: 0

  st,ch3-output-mapping:
    description: Channel 3 output mapping
    $ref: /schemas/types.yaml#/definitions/uint32
    enum: [0, 1, 2]
    default: 0

  st,thermal-warning-recover:
    description: Thermal warning recovery enabled
    type: boolean

  st,fault-detect-recovery:
    description: Fault detect recovery enabled
    type: boolean

  st,thermal-warning-adjustment:
    description: Thermal warning adjustment enabled
    type: boolean

  st,drop-compensation-ns:
    description: Drop compensation in nanoseconds; only valid in variable-drop-compensation mode
    minimum: 0
    maximum: 300
    multipleOf: 20
    default: 140

  st,max-power-use-mpcc:
    description: Use MPCC bits for MPC coefficients
    type: boolean

  st,max-power-corr:
    description: Power bridge correction for THD reduction near maximum power
    type: boolean

  st,am-reduction-mode:
    description: AM reduction mode for FFX
    type: boolean

  st,odd-pwm-speed-mode:
    description: Odd PWM speed mode (341.3 kHz)
    type: boolean

  st,invalid-input-detect-mute:
    description: Automatic invalid input detect mute
    type: boolean

required:
  - compatible
  - reg
  - reset-gpios
  - power-down-gpios
  - Vdda-supply
  - Vdd3-supply
  - Vcc-supply

additionalProperties: false

examples:
  - |
    codec: sta32x@38 {
        compatible = "st,sta32x";
        reg = <0x1c>;
        clocks = <&clock>;
        clock-names = "xti";
        reset-gpios = <&gpio1 19 0>;
        power-down-gpios = <&gpio1 16 0>;
        st,output-conf = /bits/ 8 <0x3>; /* 2-channel output power/data-out */
        st,ch1-output-mapping = /bits/ 8 <0>; /* set channel 1 output ch 1 */
        st,ch2-output-mapping = /bits/ 8 <0>; /* set channel 2 output ch 1 */
        st,ch3-output-mapping = /bits/ 8 <0>; /* set channel 3 output ch 1 */
        st,max-power-correction; /* enables THD reduction near max power output */
        st,invalid-input-detect-mute; /* mute if no valid digital audio signal is provided. */
    };
