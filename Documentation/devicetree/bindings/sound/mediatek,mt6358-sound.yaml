%YAML 1.2
---
$id: http://devicetree.org/schemas/sound/mediatek,mt6358-sound.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Mediatek MT6358 Audio Codec

maintainers:
  - Jiaxin Yu <jiaxin.yu@mediatek.com>
  - Shunli Wang <shunli.wang@mediatek.com>

description: |
  Mediatek MT6358 Audio Codec

  The communication between MT6358 and SoC is through Mediatek PMIC wrapper.
  For more detail, please visit Mediatek PMIC wrapper documentation.

  Must be a child node of PMIC wrapper.

properties:
  compatible:
    description: Device compatible with Mediatek MT6358 or MT6366 audio codec.
    items:
      - enum:
          - mediatek,mt6358-sound
          - mediatek,mt6366-sound

  Avdd-supply: true

  mediatek,dmic-mode:
    description: Indicates how many data pins are used to transmit two channels of
      PDM signal. 0 means two wires, 1 means one wire.
    $ref: /schemas/types.yaml#/definitions/uint32
    default: 0

required:
  - compatible
  - Avdd-supply

additionalProperties: false

examples:
  - |
    mt6358_snd {
      compatible = "mediatek,mt6358-sound";
      Avdd-supply = <&mt6358_vaud28_reg>;
      mediatek,dmic-mode = <0>;
    };
