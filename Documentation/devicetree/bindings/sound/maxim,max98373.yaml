%YAML 1.2
---
$id: http://devicetree.org/schemas/maxim,max98373.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Maxim Integrated MAX98373 Speaker Amplifier

maintainers:
  - Ryan Lee <ryans.lee@maximintegrated.com>

description: |
  Maxim Integrated MAX98373 Speaker Amplifier

  This device supports I2C.

properties:
  compatible:
    items:
      - const: maxim,max98373

  reg:
    description: The I2C address of the device.
    items:
      - description: I2C bus device address

  maxim,vmon-slot-no:
    description: Slot number used to send voltage information or as interleave slot
    $ref: /schemas/types.yaml#/definitions/uint32
    default: 0

  maxim,imon-slot-no:
    description: Slot number used to send current information
    $ref: /schemas/types.yaml#/definitions/uint32
    default: 0

  maxim,spkfb-slot-no:
    description: Slot number used to send speaker feedback information
    $ref: /schemas/types.yaml#/definitions/uint32
    default: 0

  maxim,interleave-mode:
    description: Enable interleave mode to alternate current and voltage data output on a single channel
    type: boolean
    default: false

additionalProperties: false

required:
  - compatible
  - reg

examples:
  - |
    codec: max98373@31 {
        compatible = "maxim,max98373";
        reg = <0x31>;
        maxim,vmon-slot-no = <0>;
        maxim,imon-slot-no = <1>;
        maxim,spkfb-slot-no = <2>;
        maxim,interleave-mode;
    };
