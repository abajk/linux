%YAML 1.2
---
$id: http://devicetree.org/schemas/sound/cirrus,cs42l73.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: cirrus,cs42l73

maintainers:
  - Brian Austin <brian.austin@cirrus.com>
  - Geert Uytterhoeven <geert+renesas@glider.be>

description: |
  CS42L73 audio CODEC

properties:
  compatible:
    items:
      - const: cirrus,cs42l73

  reg:
    items:
      - description: The I2C address of the device.

  reset_gpio:
    description: A GPIO spec for the reset pin.

  chgfreq:
    description: Charge Pump Frequency values 0x00-0x0F
    $ref: /schemas/types.yaml#/definitions/uint32
    minimum: 0
    maximum: 15

required:
  - compatible
  - reg

additionalProperties: false

examples:
  - |
    cs42l73@4a {
        compatible = "cirrus,cs42l73";
        reg = <0x4a>;
        reset_gpio = <&gpio 10 0>;
        chgfreq = <0x05>;
    };
