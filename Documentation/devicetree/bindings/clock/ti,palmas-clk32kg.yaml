%YAML 1.2
---
$id: http://devicetree.org/schemas/ti,palmas-clk32kg.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Palmas 32KHz clocks

maintainers:
  - Peter Ujfalusi <peter.ujfalusi@ti.com>

description: |
  * Palmas 32KHz clocks *

  Palmas device has two clock output pins for 32KHz, KG and KG_AUDIO.

  This binding uses the common clock binding ./clock-bindings.txt.

properties:
  compatible:
    items:
      - enum:
          - ti,palmas-clk32kg
          - ti,palmas-clk32kgaudio

  '#clock-cells':
    description: Number of clock cells, must be 0
    const: 0

  ti,external-sleep-control:
    description: |
      External enable input pin controlling clock enable/disable
      missing or 0 means control via register access
    $ref: /schemas/types.yaml#/definitions/uint32
    enum:
      - 1
      - 2
      - 3

required:
  - compatible
  - '#clock-cells'

additionalProperties: false
