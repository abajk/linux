%YAML 1.2
---
$id: http://devicetree.org/schemas/clock/st/st,clkgen-pll.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#
title: ST PLL Clock Driver
maintainers:
  - Alain Volmat <avolmat@me.com>
  - Gabriel Fernandez <gabriel.fernandez@linaro.org>
  - Gabriel Fernandez <gabriel.fernandez@st.com>
  - Gabriel FERNANDEZ <gabriel.fernandez@st.com>
description: |
  Binding for a ST pll clock driver.

  This binding uses the common clock binding[1].
  Base address is located to the parent node. See clock binding[2]

  [1] Documentation/devicetree/bindings/clock/clock-bindings.txt
  [2] Documentation/devicetree/bindings/clock/st/st,clkgen.txt

properties:
  compatible:
    description: Allowed compatible strings for this ST PLL clock generator.
    $ref: /schemas/types.yaml#/definitions/string-array
    items:
      - enum:
          - st,clkgen-pll0
          - st,clkgen-pll0-a0
          - st,clkgen-pll0-c0
          - st,clkgen-pll1
          - st,clkgen-pll1-c0
          - st,stih407-clkgen-plla9
          - st,stih418-clkgen-plla9

  '#clock-cells':
    description: Number of clock cells; must be 1.
    const: 1

  clocks:
    description: Input parent clock.
    maxItems: 1

  clock-output-names:
    description: Names for output clock(s).
    $ref: /schemas/types.yaml#/definitions/string-array
    maxItems: 1

required:
  - compatible
  - '#clock-cells'
  - clocks
  - clock-output-names

additionalProperties: false

examples:
  - |
    clockgen-a9-pll {
      #clock-cells = <1>;
      compatible = "st,stih407-clkgen-plla9";
      clocks = <&clk_sysin>;
      clock-output-names = "clockgen-a9-pll-odf";
    };
