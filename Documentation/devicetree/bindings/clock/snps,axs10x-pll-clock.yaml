%YAML 1.2
---
$id: http://devicetree.org/schemas/clock/snps,axs10x-pll-clock.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: AXS10X Generic PLL clock

maintainers:
  - Eugeniy Paltsev <Eugeniy.Paltsev@synopsys.com>

properties:
  compatible:
    enum:
      - snps,axs10x-arc-pll-clock
      - snps,axs10x-i2s-pll-clock
      - snps,axs10x-pgu-pll-clock

  reg:
    minItems: 1
    items:
      - description: PLL configuration registers
      - description: Lock CGU register

  clocks:
    maxItems: 1

  clock-names:
    items:
      - const: input

  '#clock-cells':
    const: 0

required:
  - compatible
  - reg
  - clocks
  - '#clock-cells'

additionalProperties: false

examples:
  - |
    clock-controller@80 {
        compatible = "snps,axs10x-arc-pll-clock";
        reg = <0x80 0x10>, <0x100 0x10>;
        #clock-cells = <0>;
        clocks = <&input-clk>;
    };
