%YAML 1.2
---
$id: http://devicetree.org/schemas/clock/ti,keystone,psc-clock.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: TI Keystone PSC Clock

maintainers:
  - Krzysztof Kozlowski <krzysztof.kozlowski@linaro.org>
  - Santosh Shilimkar <santosh.shilimkar@ti.com>

description: |
  Binding for Keystone gate control driver which uses PSC controller IP.
  This binding uses the common clock binding[1].

  [1] Documentation/devicetree/bindings/clock/clock-bindings.txt

properties:
  compatible:
    items:
      - const: ti,keystone,psc-clock

  '#clock-cells':
    const: 0

  clocks:
    maxItems: 1
    description: Parent PSC controller clock.

  reg:
    items:
      - description: PSC control register.
      - description: PSC domain register.

  reg-names:
    items:
      - const: control
      - const: domain

  domain-id:
    description: PSC domain id needed to check the transition state register.
    $ref: /schemas/types.yaml#/definitions/uint32

  clock-output-names:
    description: Override default output clock name.
    $ref: /schemas/types.yaml#/definitions/string-array

required:
  - compatible
  - '#clock-cells'
  - clocks
  - reg
  - reg-names
  - domain-id

additionalProperties: false

examples:
  - |
    clock-controller@2350008 {
        #clock-cells = <0>;
        compatible = "ti,keystone,psc-clock";
        clocks = <&chipclk16>;
        clock-output-names = "usb";
        reg = <0x02350008 0xb00>, <0x02350000 0x400>;
        reg-names = "control", "domain";
        domain-id = <0>;
    };
