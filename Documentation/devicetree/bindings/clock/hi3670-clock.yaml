%YAML 1.2
---
$id: http://devicetree.org/schemas/clock/hi3670-clock.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Hisilicon Hi3670 Clock Controller
maintainers:
  - Manivannan Sadhasivam <manivannan.sadhasivam@linaro.org>

description: |
  * Hisilicon Hi3670 Clock Controller

  The Hi3670 clock controller generates and supplies clock to various
  controllers within the Hi3670 SoC.

  Required Properties:

  Each clock is assigned an identifier and client nodes use this identifier
  to specify the clock which they consume.

  All these identifier could be found in <dt-bindings/clock/hi3670-clock.h>.

properties:
  compatible:
    oneOf:
      - items:
          - enum:
              - hisilicon,hi3670-crgctrl
              - hisilicon,hi3670-pctrl
              - hisilicon,hi3670-pmuctrl
              - hisilicon,hi3670-sctrl
              - hisilicon,hi3670-iomcu
              - hisilicon,hi3670-media1-crg
              - hisilicon,hi3670-media2-crg
          - enum:
              - syscon
      - items:
          - enum:
              - hisilicon,hi3670-crgctrl
              - hisilicon,hi3670-pctrl
              - hisilicon,hi3670-pmuctrl
              - hisilicon,hi3670-sctrl
              - hisilicon,hi3670-iomcu
              - hisilicon,hi3670-media1-crg
              - hisilicon,hi3670-media2-crg

  reg:
    description: Physical base address and size of the memory mapped region.
    items:
      - description: Base address of the controller
      - description: Length of the memory region

  '#clock-cells':
    description: Number of clock cells provided by this controller.
    const: 1

required:
  - compatible
  - reg
  - '#clock-cells'

additionalProperties: false
