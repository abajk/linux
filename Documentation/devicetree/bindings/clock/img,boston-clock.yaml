%YAML 1.2
---
$id: http://devicetree.org/schemas/clock/img,boston-clock.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#
title: Imagination Technologies Boston Clock
maintainers:
  - Paul Burton <paulburton@kernel.org>
description: |
  Binding for Imagination Technologies MIPS Boston clock sources.

  This binding uses the common clock binding[1].

  [1] Documentation/devicetree/bindings/clock/clock-bindings.txt

  The device node must be a child node of the syscon node corresponding to the
  Boston system's platform registers.

properties:
  compatible:
    const: img,boston-clock
  '#clock-cells':
    const: 1
    description: Defines the number of clock specifier cells; must be 1.
  clock-output-names:
    $ref: /schemas/types.yaml#/definitions/string-array
    description: Optional list of names for each clock output.

additionalProperties: false
