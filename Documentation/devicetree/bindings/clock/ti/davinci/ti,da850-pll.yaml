%YAML 1.2
---
$id: http://devicetree.org/schemas/clock/ti/davinci/ti,da850-pll.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: TI DaVinci PLL controller

maintainers:
  - David Lechner <david@lechnology.com>
  - Slark Xiao <slark_xiao@163.com>

description:
  The PLL provides clocks to most of the components on the SoC. In addition to
  the PLL itself, this controller also contains bypasses, gates, dividers, and
  multiplexers for various clock signals.

properties:
  compatible:
    description: Device compatible property.
    enum:
      - ti,da850-pll0
      - ti,da850-pll1

  reg:
    maxItems: 1

  clocks:
    minItems: 1
    maxItems: 2

  clock-names:
    minItems: 1
    items:
      - const: clksrc
      - const: extclksrc

  ti,clkmode-square-wave:
    description:
      Indicates that the board is supplying a square wave input on the OSCIN pin
      instead of using a crystal oscillator.
    type: boolean

  pllout:
    description: Describes the main PLL clock output (before POSTDIV).
    type: object
    additionalProperties: false

    properties:
      '#clock-cells':
        const: 0

    required:
      - '#clock-cells'

  sysclk:
    description:
      Describes the PLLDIVn divider clocks that provide the SYSCLKn clock
      domains. Consumers of this node should use 'n' in SYSCLKn as the index
      parameter for the clock cell.
    type: object
    additionalProperties: false

    properties:
      '#clock-cells':
        const: 1

    required:
      - '#clock-cells'

  auxclk:
    description: Describes the AUXCLK output of the PLL. Only valid for ti,da850-pll0.
    type: object
    additionalProperties: false

    properties:
      '#clock-cells':
        const: 0

    required:
      - '#clock-cells'

  obsclk:
    description: Describes the OBSCLK output of the PLL.
    type: object
    additionalProperties: false

    properties:
      '#clock-cells':
        const: 0

    required:
      - '#clock-cells'

required:
  - compatible
  - reg
  - clocks
  - clock-names

additionalProperties: false

allOf:
  - if:
      properties:
        compatible:
          contains:
            const: ti,da850-pll0
    then:
      properties:
        ti,clkmode-square-wave: true
  - if:
      properties:
        compatible:
          contains:
            const: ti,da850-pll1
    then:
      properties:
        ti,clkmode-square-wave: false
        auxclk: false

examples:
  - |
    clock-controller@11000 {
        compatible = "ti,da850-pll0";
        reg = <0x11000 0x1000>;
        clocks = <&ref_clk>, <&pll1_sysclk 3>;
        clock-names = "clksrc", "extclksrc";
        ti,clkmode-square-wave;

        pllout {
            #clock-cells = <0>;
        };

        sysclk {
            #clock-cells = <1>;
        };

        auxclk {
            #clock-cells = <0>;
        };

        obsclk {
            #clock-cells = <0>;
        };
    };
  - |
    clock-controller@21a000 {
        compatible = "ti,da850-pll1";
        reg = <0x21a000 0x1000>;
        clocks = <&ref_clk>;
        clock-names = "clksrc";

        sysclk {
            #clock-cells = <1>;
        };

        obsclk {
            #clock-cells = <0>;
        };
    };
