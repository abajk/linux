%YAML 1.2
---
$id: http://devicetree.org/schemas/clock/ti/ti,dra7-apll-clock.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Texas Instruments APLL clock

maintainers:
  - J Keerthy <j-keerthy@ti.com>
  - Krzysztof Kozlowski <krzysztof.kozlowski@linaro.org>
  - Tero Kristo <t-kristo@ti.com>

description: |
  Binding for Texas Instruments APLL clock.

  This binding uses the common clock binding[1].  It assumes a
  register-mapped APLL with usually two selectable input clocks
  (reference clock and bypass clock), with analog phase locked
  loop logic for multiplying the input clock to a desired output
  clock. This clock also typically supports different operation
  modes (locked, low power stop etc.) APLL mostly behaves like
  a subtype of a DPLL [2], although a simplified one at that.

  [1] Documentation/devicetree/bindings/clock/clock-bindings.txt
  [2] Documentation/devicetree/bindings/clock/ti/dpll.txt

properties:
  compatible:
    items:
      - enum:
          - "ti,dra7-apll-clock"
          - "ti,omap2-apll-clock"
    description: Device compatible string.

  "#clock-cells":
    const: 0
    description: Must be set to 0 for this clock.

  clocks:
    description: Parent clock phandles.
    items:
      - description: Reference clock phandle.
      - description: Bypass clock phandle.

  reg:
    description: APLL control register offsets.
    items:
      - description: Control register offset.
      - description: Idlest register offset.
      - description: Autoidle register offset (OMAP2 only).

  ti,bit-shift:
    $ref: /schemas/types.yaml#/definitions/uint32
    description: Bit-shift for enable and autoidle fields (OMAP2 only).

  ti,idlest-shift:
    $ref: /schemas/types.yaml#/definitions/uint32
    description: Bit-shift for idlest field (OMAP2 only).

  ti,clock-frequency:
    $ref: /schemas/types.yaml#/definitions/uint32
    description: Static clock frequency in Hz (OMAP2 only).

required:
  - compatible
  - "#clock-cells"
  - clocks
  - reg

additionalProperties: false

allOf:
  - if:
      properties:
        compatible:
          contains:
            const: "ti,omap2-apll-clock"
    then:
      required:
        - ti,bit-shift
        - ti,idlest-shift
        - ti,clock-frequency
      properties:
        reg:
          minItems: 3
    else:
      properties:
        ti,bit-shift: false
        ti,idlest-shift: false
        ti,clock-frequency: false
        reg:
          maxItems: 2
