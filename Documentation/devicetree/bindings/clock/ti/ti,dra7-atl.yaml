%YAML 1.2
---
$id: http://devicetree.org/schemas/clock/ti/ti,dra7-atl.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: TI DRA7 ATL and ATL-clock

maintainers:
  - Peter Ujfalusi <peter.ujfalusi@ti.com>

description: |
  ATL (Audio Tracking Logic) Clocks of DRA7 SoC.

  The ATL IP is used to generate clock to be used to synchronize baseband and
  audio codec. A single ATL IP provides four ATL clock instances sharing the same
  functional clock but can be configured to provide different clocks.
  ATL can maintain a clock averages to some desired frequency based on the
  bws/aws signals - can compensate the drift between the two ws signal.

  In order to provide the support for ATL and its output clocks (which can be
  used internally within the SoC or external components) two sets of bindings
  are needed:

    * Clock tree binding:
      This binding uses the common clock binding[1].
      To be able to integrate the ATL clocks with DT clock tree.
      Provides ccf level representation of the ATL clocks to be used by drivers.
      Since the clock instances are part of a single IP this binding is used as
      a node for the DT clock tree, the IP driver is needed to handle the actual
      configuration of the IP.

    * Binding for the IP driver:
      This binding is used to configure the IP driver which is going to handle
      the configuration of the IP for the ATL clock instances.

  [1] Documentation/devicetree/bindings/clock/clock-bindings.txt

properties:
  compatible:
    enum:
      - ti,dra7-atl-clock
      - ti,dra7-atl

  reg:
    maxItems: 1

  "#clock-cells":
    const: 0

  clocks:
    maxItems: 1

  ti,hwmods:
    description: Hardware modules associated with ATL IP.
    enum:
      - atl

  ti,provided-clocks:
    description: Phandles to the clocks provided by ATL IP.
    $ref: /schemas/types.yaml#/definitions/phandle-array

    minItems: 1
    maxItems: 4
    items:
      items:
        - description: ATL provided clock phandle 0.

  clock-names:
    items:
      - const: fck

patternProperties:
  "^atl[0-3]$":
    description: Configuration node for an ATL instance.
    type: object
    additionalProperties: false
    properties:
      bws:
        description: Baseband word select signal selection.
        $ref: /schemas/types.yaml#/definitions/uint32
      aws:
        description: Audio word select signal selection.
        $ref: /schemas/types.yaml#/definitions/uint32
    required:
      - bws
      - aws

required:
  - compatible

allOf:
  - if:
      properties:
        compatible:
          contains:
            const: ti,dra7-atl-clock
    then:
      required:
        - "#clock-cells"
        - clocks
  - if:
      properties:
        compatible:
          contains:
            const: ti,dra7-atl
    then:
      required:
        - reg
        - ti,hwmods
        - ti,provided-clocks
        - clocks
        - clock-names

additionalProperties: false

examples:
  - |
    #include <dt-bindings/clock/ti-dra7-atl.h>

    atl_clkin0_ck: atl_clkin0_ck {
        #clock-cells = <0>;
        compatible = "ti,dra7-atl-clock";
        clocks = <&atl_gfclk_mux>;
    };
    atl_clkin1_ck: atl_clkin1_ck {
        #clock-cells = <0>;
        compatible = "ti,dra7-atl-clock";
        clocks = <&atl_gfclk_mux>;
    };
    atl_clkin2_ck: atl_clkin2_ck {
        #clock-cells = <0>;
        compatible = "ti,dra7-atl-clock";
        clocks = <&atl_gfclk_mux>;
    };
    atl_clkin3_ck: atl_clkin3_ck {
        #clock-cells = <0>;
        compatible = "ti,dra7-atl-clock";
        clocks = <&atl_gfclk_mux>;
    };

    atl@4843c000 {
        compatible = "ti,dra7-atl";
        reg = <0x4843c000 0x3ff>;
        ti,hwmods = "atl";
        ti,provided-clocks = <&atl_clkin0_ck>, <&atl_clkin1_ck>,
                             <&atl_clkin2_ck>, <&atl_clkin3_ck>;
        clocks = <&atl_gfclk_mux>;
        clock-names = "fck";

        atl2 {
            bws = <DRA7_ATL_WS_MCASP2_FSX>;
            aws = <DRA7_ATL_WS_MCASP3_FSX>;
        };
    };
