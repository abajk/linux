%YAML 1.2
---
$id: http://devicetree.org/schemas/clock/ti/ti,dm816-fapll-clock.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: TI DM816 FAPLL Clock

maintainers:
  - Krzysztof Kozlowski <krzysztof.kozlowski@linaro.org>
  - Tony Lindgren <tony@atomide.com>

description:
  It assumes a register-mapped FAPLL with usually two selectable input clocks
  (reference clock and bypass clock), and one or more child synthesizers.

properties:
  compatible:
    const: ti,dm816-fapll-clock

  "#clock-cells":
    const: 1

  reg:
    maxItems: 1

  clocks:
    description: Parent reference and bypass clocks.
    maxItems: 2

  clock-indices:
    description: Synthesizer output indices.
    items:
      - description: Index of child synthesizer output 1.
      - description: Index of child synthesizer output 2.
      - description: Index of child synthesizer output 3.
      - description: Index of child synthesizer output 4.
      - description: Index of child synthesizer output 5.
      - description: Index of child synthesizer output 6.
      - description: Index of child synthesizer output 7.

  clock-output-names:
    description: Names for each child synthesizer output.
    items:
      - description: Name of child clock output 1.
      - description: Name of child clock output 2.
      - description: Name of child clock output 3.
      - description: Name of child clock output 4.
      - description: Name of child clock output 5.
      - description: Name of child clock output 6.
      - description: Name of child clock output 7.

required:
  - compatible
  - reg
  - clocks
  - "#clock-cells"

additionalProperties: false

examples:
  - |
    clock-controller@400 {
        compatible = "ti,dm816-fapll-clock";
        reg = <0x400 0x40>;
        #clock-cells = <1>;
        clocks = <&sys_clkin_ck>, <&sys_clkin_ck>;
        clock-indices = <1>, <2>, <3>, <4>, <5>,
                         <6>, <7>;
        clock-output-names = "main_pll_clk1",
                             "main_pll_clk2",
                             "main_pll_clk3",
                             "main_pll_clk4",
                             "main_pll_clk5",
                             "main_pll_clk6",
                             "main_pll_clk7";
    };
