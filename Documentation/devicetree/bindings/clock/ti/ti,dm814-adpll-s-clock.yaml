%YAML 1.2
---
$id: http://devicetree.org/schemas/clock/ti/ti,dm814-adpll-s-clock.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: TI DM814 ADPLL Clock Controller

maintainers:
  - Krzysztof Kozlowski <krzysztof.kozlowski@linaro.org>
  - Tony Lindgren <tony@atomide.com>

description: |
  Binding for Texas Instruments ADPLL clock.

  This binding uses the common clock binding[1]. It assumes a
  register-mapped ADPLL with two to three selectable input clocks
  and three to four children.

properties:
  compatible:
    enum:
      - ti,dm814-adpll-s-clock
      - ti,dm814-adpll-lj-clock

  '#clock-cells':
    const: 1
    description: Number of cells in clock specifier; must be 1.

  reg:
    description: Address and length of the register set for controlling the ADPLL.
    items:
      - description: Register base address.
      - description: Register size.

  clocks:
    description: "Phandle list of parent clocks: clkinp, clkinpulow, and optional clkinphif."
    minItems: 2
    items:
      - description: Primary reference input clock.
      - description: Low-power reference input clock.
      - description: Optional high-frequency reference input clock.

  clock-names:
    description: Names corresponding to each parent clock phandle.
    minItems: 2
    items:
      - const: clkinp
      - const: clkinpulow
      - const: clkinphif

  clock-output-names:
    description: |
      Names of clocks generated by the ADPLL: DCO clock local oscillator output,
      primary output clock, double-frequency output clock, and optional
      high-frequency output clock.
    minItems: 3
    items:
      - description: DCO clock local oscillator output.
      - description: Primary output clock.
      - description: Double-frequency output clock.
      - description: Optional high-frequency output clock.

required:
  - compatible
  - '#clock-cells'
  - reg
  - clocks

additionalProperties: false
