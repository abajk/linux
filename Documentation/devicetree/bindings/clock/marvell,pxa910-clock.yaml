%YAML 1.2
---
$id: http://devicetree.org/schemas/clock/marvell,pxa910-clock.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Marvell PXA910 Clock Controller

maintainers:
  - Chao Xie <chao.xie@marvell.com>

description: |
  * Marvell PXA910 Clock Controller

  The PXA910 clock subsystem generates and supplies clock to various
  controllers within the PXA910 SoC.

  Each clock is assigned an identifier and client nodes use this identifier
  to specify the clock which they consume.

  All these identifier could be found in <dt-bindings/clock/marvell-pxa910.h>.

properties:
  compatible:
    description: controller compatible with PXA910 SoC.
    items:
      - const: marvell,pxa910-clock

  reg:
    description: |
      physical base address of the clock subsystem and the length of the
      memory mapped region. There are four places in the SoC that have clock
      control logic: "mpmu", "apmu", "apbc" and "apbcp". Therefore, four reg
      spaces need to be defined.
    items:
      - description: mpmu registers
      - description: apmu registers
      - description: apbc registers
      - description: apbcp registers

  '#clock-cells':
    description: should be 1.
    const: 1

  '#reset-cells':
    description: should be 1.
    const: 1

additionalProperties: false

required:
  - compatible
  - reg
  - '#clock-cells'
  - '#reset-cells'
