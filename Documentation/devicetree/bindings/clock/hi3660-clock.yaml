%YAML 1.2
---
$id: http://devicetree.org/schemas/clock/hi3660-clock.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Hisilicon Hi3660 Clock Controller

maintainers:
  - Leo Yan <leo.yan@linux.dev>
  - Zhangfei Gao <zhangfei.gao@linaro.org>

description: |
  The Hi3660 clock controller generates and supplies clock to various
  controllers within the Hi3660 SoC.

  Each clock is assigned an identifier and client nodes use this identifier
  to specify the clock which they consume.

  All these identifier could be found in <dt-bindings/clock/hi3660-clock.h>.

properties:
  compatible:
    description: List of compatible strings for this controller.
    items:
      - enum:
          - hisilicon,hi3660-crgctrl
          - hisilicon,hi3660-pctrl
          - hisilicon,hi3660-pmuctrl
          - hisilicon,hi3660-sctrl
          - hisilicon,hi3660-iomcu
          - hisilicon,hi3660-stub-clk
      - const: syscon

  reg:
    maxItems: 1

  '#clock-cells':
    const: 1

  mboxes:
    maxItems: 1

additionalProperties: false

examples:
  - |
    clock-controller@fff35000 {
        compatible = "hisilicon,hi3660-crgctrl", "syscon";
        reg = <0x0 0xfff35000 0x0 0x1000>;
        #clock-cells = <1>;
    };
