%YAML 1.2
---
$id: http://devicetree.org/schemas/clock/snps,axs10x-i2s-pll-clock.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Synopsys AXS10X I2S PLL clock

maintainers:
  - Jose Abreu <Jose.Abreu@synopsys.com>

properties:
  compatible:
    items:
      - const: snps,axs10x-i2s-pll-clock
    description: |
      Device compatible string

  reg:
    maxItems: 1

  clocks:
    maxItems: 1

  '#clock-cells':
    const: 0

required:
  - compatible
  - reg
  - clocks
  - '#clock-cells'

additionalProperties: false

examples:
  - |
    clock-controller@100a0 {
        compatible = "snps,axs10x-i2s-pll-clock";
        reg = <0x100a0 0x10>;
        clocks = <&pll_clock>;
        #clock-cells = <0>;
    };
