%YAML 1.2
---
$id: http://devicetree.org/schemas/ti,cdce706.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: TI CDCE706 Clock Synthesizer

maintainers:
  - Alexander A. Klimov <grandmaster@al2klimov.de>
  - Marco Franchi <marco.franchi@nxp.com>
  - Max Filippov <jcmvbkbc@gmail.com>

description: |
  Bindings for Texas Instruments CDCE706 programmable 3-PLL clock synthesizer/multiplier/divider.

  Reference: https://www.ti.com/lit/ds/symlink/cdce706.pdf

properties:
  compatible:
    enum:
      - ti,cdce706

  reg:
    description: I2C device address of the CDCE706.
    items:
      - description: I2C device address; valid range 0x68..0x6b.
        minimum: 104
        maximum: 107

  "#clock-cells":
    const: 1
    description: Number of cells required to identify clock output; shall be 1.

  clocks:
    description: Reference clock(s) connected to CLK_IN0 and CLK_IN1 pins.
    minItems: 1
    items:
      - description: Clock input 0 (CLK_IN0).
      - description: Clock input 1 (CLK_IN1).

  clock-names:
    description: Names for the input clocks.
    minItems: 1
    items:
      - const: clk_in0
      - const: clk_in1

required:
  - compatible
  - reg
  - "#clock-cells"
  - clocks
  - clock-names

additionalProperties: false
