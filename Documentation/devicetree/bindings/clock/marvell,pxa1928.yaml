%YAML 1.2
---
$id: http://devicetree.org/schemas/clock/marvell,pxa1928.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Marvell PXA1928 Clock Controllers

maintainers:
  - Rob Herring <robh@kernel.org>

description: |
  * Marvell PXA1928 Clock Controllers

  The PXA1928 clock subsystem generates and supplies clock to various
  controllers within the PXA1928 SoC. The PXA1928 contains 3 clock controller
  blocks called APMU, MPMU, and APBC roughly corresponding to internal buses.

  Each clock is assigned an identifier and client nodes use the clock controller
  phandle and this identifier to specify the clock which they consume.

  All these identifiers can be found in <dt-bindings/clock/marvell,pxa1928.h>.

properties:
  compatible:
    items:
      - enum:
          - marvell,pxa1928-apmu
          - marvell,pxa1928-mpmu
          - marvell,pxa1928-apbc

  reg:
    # The core schema already checks that reg values are numbers, so device
    # specific schema don't need to do those checks.
    # The description of each element defines the order and implicitly defines
    # the number of reg entries.
    items:
      - description: Physical base address of the clock controller
      - description: Length of memory mapped region
    # minItems/maxItems equal to 2 is implied

  '#clock-cells':
    const: 1

  '#reset-cells':
    const: 1

required:
  - compatible
  - reg
  - '#clock-cells'
  - '#reset-cells'

additionalProperties: false
