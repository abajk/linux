%YAML 1.2
---
$id: http://devicetree.org/schemas/clock/marvell,armada-3700-xtal-clock.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Marvell Armada 3700 Xtal Clock

maintainers:
  - Gregory CLEMENT <gregory.clement@bootlin.com>

description: |
  * Xtal Clock bindings for Marvell Armada 37xx SoCs

  Marvell Armada 37xx SoCs allow to determine the xtal clock frequencies by
  reading the gpio latch register.

  This node must be a subnode of the node exposing the register address
  of the GPIO block where the gpio latch is located.
  See Documentation/devicetree/bindings/pinctrl/marvell,armada-37xx-pinctrl.txt

properties:
  compatible:
    items:
      - const: marvell,armada-3700-xtal-clock

  '#clock-cells':
    const: 0

  clock-output-names:
    description: Overwrites the default clock output name 'xtal'.
    $ref: /schemas/types.yaml#/definitions/string-array
    items:
      - const: xtal

required:
  - compatible
  - '#clock-cells'

additionalProperties: false

examples:
  - |
    pinctrl_nb: pinctrl-nb@13800 {
        compatible = "armada3710-nb-pinctrl", "syscon", "simple-mfd";
        reg = <0x13800 0x100>, <0x13C00 0x20>;

        xtalclk: xtal-clk {
            compatible = "marvell,armada-3700-xtal-clock";
            clock-output-names = "xtal";
            #clock-cells = <0>;
        };
    };
