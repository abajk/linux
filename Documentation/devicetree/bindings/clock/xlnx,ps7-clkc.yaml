%YAML 1.2
---
$id: http://devicetree.org/schemas/clock/xlnx,ps7-clkc.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Xilinx Zynq-7000 PS Clock Controller

maintainers:
  - Josh Cartwright <josh.cartwright@ni.com>
  - Michal Simek <michal.simek@amd.com>
  - Soren Brinkmann <soren.brinkmann@xilinx.com>

description: |
  Device Tree Clock bindings for the Zynq 7000 EPP

  The Zynq EPP has several different clk providers, each with their own bindings.
  The purpose of this document is to document their usage.

  See clock_bindings.txt for more information on the generic clock bindings.
  See Chapter 25 of Zynq TRM for more information about Zynq clocks.

  The clock controller is a logical abstraction of Zynq's clock tree. It reads
  required input clock frequencies from the devicetree and acts as clock provider
  for all clock consumers of PS clocks.

properties:
  compatible:
    const: xlnx,ps7-clkc

  '#clock-cells':
    const: 1

  ps-clk-frequency:
    description: Frequency of the oscillator providing ps_clk in Hz.
    $ref: /schemas/types.yaml#/definitions/uint32

  reg:
    maxItems: 1

  clock-output-names:
    minItems: 1
    maxItems: 48
    items:
      enum:
        - armpll
        - ddrpll
        - iopll
        - cpu_6or4x
        - cpu_3or2x
        - cpu_2x
        - cpu_1x
        - ddr2x
        - ddr3x
        - dci
        - lqspi
        - smc
        - pcap
        - gem0
        - gem1
        - fclk0
        - fclk1
        - fclk2
        - fclk3
        - can0
        - can1
        - sdio0
        - sdio1
        - uart0
        - uart1
        - spi0
        - spi1
        - dma
        - usb0_aper
        - usb1_aper
        - gem0_aper
        - gem1_aper
        - sdio0_aper
        - sdio1_aper
        - spi0_aper
        - spi1_aper
        - can0_aper
        - can1_aper
        - i2c0_aper
        - i2c1_aper
        - uart0_aper
        - uart1_aper
        - gpio_aper
        - lqspi_aper
        - smc_aper
        - swdt
        - dbg_trc
        - dbg_apb

  fclk-enable:
    description: Bitmask to enable FCLKs statically at boot time; bits 0..3 map to FCLK0..FCLK3.
    $ref: /schemas/types.yaml#/definitions/uint32

  clocks:
    description: Optional phandle(s) to alternate clock providers.

  clock-names:
    description: Optional names for the clocks in the "clocks" property.

required:
  - compatible
  - '#clock-cells'
  - reg
  - ps-clk-frequency
  - clock-output-names

additionalProperties: false

examples:
  - |
    clock-controller@100 {
      #clock-cells = <1>;
      compatible = "xlnx,ps7-clkc";
      ps-clk-frequency = <33333333>;
      reg = <0x100 0x100>;
      clock-output-names = "armpll", "ddrpll", "iopll", "cpu_6or4x",
        "cpu_3or2x", "cpu_2x", "cpu_1x", "ddr2x", "ddr3x",
        "dci", "lqspi", "smc", "pcap", "gem0", "gem1",
        "fclk0", "fclk1", "fclk2", "fclk3", "can0", "can1",
        "sdio0", "sdio1", "uart0", "uart1", "spi0", "spi1",
        "dma", "usb0_aper", "usb1_aper", "gem0_aper",
        "gem1_aper", "sdio0_aper", "sdio1_aper",
        "spi0_aper", "spi1_aper", "can0_aper", "can1_aper",
        "i2c0_aper", "i2c1_aper", "uart0_aper", "uart1_aper",
        "gpio_aper", "lqspi_aper", "smc_aper", "swdt",
        "dbg_trc", "dbg_apb";
      clocks = <&clkc 16>, <&clk_foo>;
      clock-names = "gem1_emio_clk", "can_mio_clk_23";
      fclk-enable = <0xf>;
    };
