%YAML 1.2
---
$id: http://devicetree.org/schemas/clock/stericsson,nomadik-src.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: ST Microelectronics Nomadik SRC System Reset and Control

maintainers:
  - Linus Walleij <linus.walleij@linaro.org>
  - Stefan Huber <steffhip@googlemail.com>

description:
  The Nomadik SRC controller is responsible of controlling crystals, PLLs and
  clock gates.

properties:
  compatible:
    items:
      - const: stericsson,nomadik-src

  reg:
    maxItems: 1

  disable-sxtalo:
    description: Disable the SXTALO 32kHz crystal output when the board provides its own oscillator.
    type: boolean

  disable-mxtal:
    description: Disable the MXTALO (~19.2 MHz) crystal output when the board provides its own oscillator.
    type: boolean

required:
  - compatible
  - reg

additionalProperties: false
