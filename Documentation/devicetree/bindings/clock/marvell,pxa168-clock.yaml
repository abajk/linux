%YAML 1.2
---
$id: http://devicetree.org/schemas/clock/marvell,pxa168-clock.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Marvell PXA168 Clock Controller

maintainers:
  - Chao Xie <chao.xie@marvell.com>

description:
  The PXA168 clock subsystem generates and supplies clock to various
  controllers within the PXA168 SoC.

properties:
  compatible:
    items:
      - const: marvell,pxa168-clock

  reg:
    items:
      - description: mpmu registers
      - description: apmu registers
      - description: apbc registers

  reg-names:
    items:
      - const: mpmu
      - const: apmu
      - const: apbc

  "#clock-cells":
    const: 1
    description: One cell is used to specify clocks from this controller.

  "#reset-cells":
    const: 1
    description: One cell is used to specify resets from this controller.

required:
  - compatible
  - reg
  - "#clock-cells"
  - "#reset-cells"

additionalProperties: false
