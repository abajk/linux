%YAML 1.2
---
$id: http://devicetree.org/schemas/clock/silabs,si514.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Silicon Labs Si514 programmable I2C clock generator

maintainers:
  - Alexander A. Klimov <grandmaster@al2klimov.de>
  - Mike Looijmans <mike.looijmans@topic.nl>

description: |
  Binding for Silicon Labs 514 programmable I2C clock generator.

  Details about the device can be found in the datasheet[1].

  [1] Si514 datasheet
      https://www.silabs.com/Support%20Documents/TechnicalDocs/si514.pdf

properties:
  compatible:
    const: silabs,si514

  reg:
    maxItems: 1

  '#clock-cells':
    const: 0

  clock-output-names:
    items:
      - const: si514

required:
  - compatible
  - reg
  - '#clock-cells'

additionalProperties: false

examples:
  - |
    clock-generator@55 {
        reg = <0x55>;
        #clock-cells = <0>;
        compatible = "silabs,si514";
    };
