%YAML 1.2
---
$id: http://devicetree.org/schemas/fujitsu,mb86s70-crg11.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Fujitsu MB86S70 CRG11 Clock Driver
maintainers:
  - Jassi Brar <jaswinder.singh@linaro.org>

description: |
  Fujitsu CRG11 clock driver bindings

  The consumer specifies the desired clock pointing to its phandle.

properties:
  compatible:
    description: 'Shall contain "fujitsu,mb86s70-crg11"'
    items:
      - const: fujitsu,mb86s70-crg11
  '#clock-cells':
    description: 'Number of cells in the clock specifier: controller, domain, port'
    const: 3

required:
  - compatible
  - '#clock-cells'

additionalProperties: false

examples:
  - |
    clock: crg11 {
        compatible = "fujitsu,mb86s70-crg11";
        #clock-cells = <3>;
    };
