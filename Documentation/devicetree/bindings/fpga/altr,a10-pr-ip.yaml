%YAML 1.2
---
$id: http://devicetree.org/schemas/altr,a10-pr-ip.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Altera Arria10 Partial Reconfiguration IP
maintainers:
  - Matthew Gerlach <matthew.gerlach@linux.intel.com>
description: |
  Altera Arria10 Partial Reconfiguration IP

properties:
  compatible:
    items:
      - const: altr,a10-pr-ip

  reg:
    description: Base address and size of the registers
    items:
      - description: Base address of the registers
      - description: Size of the registers

required:
  - compatible
  - reg

additionalProperties: false

examples:
  - |
    fpga_mgr: fpga-mgr@ff20c000 {
        compatible = "altr,a10-pr-ip";
        reg = <0xff20c000 0x10>;
    };
