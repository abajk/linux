%YAML 1.2
---
$id: http://devicetree.org/schemas/fpga/altr,socfpga-fpga-mgr.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Altera SOCFPGA FPGA Manager

maintainers:
  - Alan Tull <atull@opensource.altera.com>
  - Moritz Fischer <moritz.fischer@ettus.com>

description: |
  Altera SOCFPGA FPGA Manager

properties:
  compatible:
    items:
      - const: altr,socfpga-fpga-mgr

  reg:
    description: >
      Register address and size for memory mapped IO.
      The first entry is for FPGA manager register access.
      The second entry is for writing FPGA configuration data.
    items:
      - description: FPGA manager register access
      - description: FPGA configuration data write window

  interrupts:
    description: Interrupt for the FPGA Manager device.
    items:
      - description: FPGA manager interrupt

required:
  - compatible
  - reg
  - interrupts

additionalProperties: false

examples:
  - |
    hps_0_fpgamgr: fpgamgr@ff706000 {
        compatible = "altr,socfpga-fpga-mgr";
        reg = <0xFF706000 0x1000
               0xFFB90000 0x1000>;
        interrupts = <0 175 4>;
    };
