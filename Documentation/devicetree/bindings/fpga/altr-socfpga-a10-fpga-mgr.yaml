%YAML 1.2
---
$id: http://devicetree.org/schemas/fpga/altr-socfpga-a10-fpga-mgr.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Altera SOCFPGA Arria10 FPGA Manager

maintainers:
  - Alan Tull <atull@opensource.altera.com>

description: |
  Altera SOCFPGA Arria10 FPGA Manager

properties:
  compatible:
    # Must list the compatible string values
    items:
      - const: altr,socfpga-a10-fpga-mgr
  reg:
    # The first index is for FPGA manager register access.
    # The second index is for writing FPGA configuration data.
    items:
      - description: FPGA manager register access
      - description: FPGA configuration data register access
  clocks:
    description: Clocks used by the device.
    $ref: /schemas/types.yaml#/definitions/phandle-array
  resets:
    description: Reset specifiers for the device's reset.
    $ref: /schemas/types.yaml#/definitions/phandle-array

required:
  - compatible
  - reg
  - clocks
  - resets

additionalProperties: false

examples:
  - |
    fpga_mgr: fpga-mgr@ffd03000 {
        compatible = "altr,socfpga-a10-fpga-mgr";
        reg = <0xffd03000 0x100
               0xffcfe400 0x20>;
        clocks = <&l4_mp_clk>;
        resets = <&rst FPGAMGR_RESET>;
    };
